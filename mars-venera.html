const T = ["Мужчины с Марса, женщины с Венеры", "Господин Решатель и Комитет по Улучшениям", "Мужчина уходит в пещеру", "Как мотивировать противоположный пол", "Мы говорим на разных языках", "Мужчина подобен резиновой ленте", "Женщина подобна волне", "Различия в эмоциональных потребностях", "Как избегать споров", "Подсчёт баллов в отношениях", "Как рассказать о негативных чувствах", "Как просить о поддержке", "Как поддерживать магию любви"];

let cur=-1;
const fr=document.getElementById('fr');
const tt=document.getElementById('tt');
function go(i){
  i=Math.max(0,Math.min(12,i));
  if(i===cur)return;
  cur=i;
  const bin=atob(B64[i]);
  const bytes=new Uint8Array(bin.length);
  for(let j=0;j<bin.length;j++)bytes[j]=bin.charCodeAt(j);
  const blob=new Blob([bytes],{type:'text/html;charset=utf-8'});
  fr.src=URL.createObjectURL(blob);
  tt.innerHTML='<b>Глава '+(i+1)+'</b>&ensp;'+T[i];
  document.querySelectorAll('.nl').forEach(a=>{
    a.classList.toggle('on',parseInt(a.dataset.ch)===i);
  });
}
go(0);
</script>
