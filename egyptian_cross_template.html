<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТАЙНА ЕГИПЕТСКОГО КРЕСТА | АРХИВ КУИНА</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* === ARCHIVE DELUXE THEME === */
:root {
  --gold: #c5a059;
  --blood: #8b0000;
  --paper: #f4f1ea;
  --ink: #1a1a1a;
  --sidebar: #121212;
  --border: rgba(197, 160, 89, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--sidebar); 
  color: #fff; 
  font-family: 'EB Garamond', serif; 
  height: 100vh; 
  display: flex; 
  overflow: hidden; 
}

/* Sidebar - The Dossier List */
.sidebar { 
  width: 380px; 
  background: var(--sidebar); 
  border-right: 2px solid var(--gold); 
  display: flex; 
  flex-direction: column; 
  box-shadow: 10px 0 30px rgba(0,0,0,0.5);
}
.header { 
  padding: 40px 20px; 
  text-align: center; 
  border-bottom: 1px double var(--gold);
  background: linear-gradient(to bottom, #1a1a1a, #121212);
}
.header h1 { 
  font-family: 'Playfair Display', serif; 
  font-size: 1.4rem; 
  color: var(--gold); 
  text-transform: uppercase; 
  letter-spacing: 4px;
}
.header p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-top: 10px; }

.chapters-list { 
  flex: 1; 
  overflow-y: auto; 
  padding: 20px; 
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
}
.chapter-btn { 
  width: 100%;
  text-align: left;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 15px;
  cursor: pointer;
  border-radius: 4px;
  transition: .3s;
  display: block;
}
.chapter-btn:hover { background: rgba(197, 160, 89, 0.1); border-color: var(--gold); transform: scale(1.02); }
.chapter-btn.active { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

.chapter-btn b { display: block; font-size: 0.6rem; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px; }
.chapter-btn.active b { color: var(--blood); }
.chapter-btn span { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #ddd; display: block; }
.chapter-btn.active span { color: #000; font-weight: 700; }

/* Main Viewer */
.viewer { 
  flex: 1; 
  background: #000; 
  position: relative; 
  display: flex; 
  flex-direction: column; 
}
.top-bar { 
  height: 50px; 
  background: #1a1a1a; 
  display: flex; 
  align-items: center; 
  padding: 0 30px; 
  border-bottom: 1px solid #333;
}
.status-pill { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 20px; }

.content-area { 
  flex: 1; 
  overflow-y: auto; 
  padding: 60px 40px; 
  background: radial-gradient(circle, #222 0%, #000 100%);
  display: flex;
  justify-content: center;
}
.paper-sheet { 
  width: 100%; 
  max-width: 850px; 
  background: var(--paper); 
  color: var(--ink); 
  box-shadow: 0 0 50px rgba(0,0,0,0.8); 
  min-height: 1000px;
  border-radius: 2px;
  padding: 80px 100px;
  position: relative;
}

/* Typography Inside Paper */
.chapter-body h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; line-height: 1.1; margin-bottom: 40px; color: #000; }
.chapter-body .kicker { color: var(--blood); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 15px; display: block; border-bottom: 2px solid #d2c5a7; padding-bottom: 5px; }
.chapter-body .lead { font-size: 1.4rem; font-style: italic; color: #444; margin-bottom: 50px; line-height: 1.6; }
.chapter-body p { font-size: 1.2rem; margin-bottom: 30px; text-align: justify; }

/* Rich Visuals */
.photo-frame { 
  margin: 50px -20px; 
  padding: 15px; 
  background: #fff; 
  box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
  transform: rotate(-1deg);
  border: 1px solid #ddd;
}
.photo-frame img { 
  width: 100%; 
  height: auto; 
  filter: grayscale(100%) contrast(110%); 
  display: block;
  max-height: 450px;
  object-fit: cover;
}
.photo-caption { 
  margin-top: 15px; 
  font-family: 'Playfair Display', serif; 
  text-align: center; 
  font-size: 0.8rem; 
  color: #666; 
  font-style: italic;
}

.vis-diag { border: 2px double var(--gold); padding: 30px; margin: 40px 0; background: #fff; text-align: center; }
.vis-diag svg { max-width: 100%; height: auto; }

.evidence-card { 
  background: #111; 
  color: var(--gold); 
  padding: 30px; 
  margin: 40px 0; 
  border-left: 5px solid var(--blood);
  font-family: 'Playfair Display', serif;
}
.evidence-card b { display: block; margin-bottom: 10px; color: #fff; text-transform: uppercase; font-size: 0.8rem; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="header">
    <h1>Archive: EQ</h1>
    <p>The Egyptian Cross Mystery</p>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</aside>

<main class="viewer">
  <div class="top-bar">
    <div class="status-pill">CONFIDENTIAL // CASE NO. 32</div>
  </div>
  <div class="content-area" id="scroll-target">
    <article class="paper-sheet" id="content-container">
      <div class="chapter-body" id="chapter-view">
        <!-- Content injected here -->
      </div>
    </article>
  </div>
</main>

<script id="book-assets" type="application/json">{{ASSETS}}</script>
<script id="book-chapters" type="application/json">{{LOCAL_CHAPTERS}}</script>
<script>
(function() {
  const CHAPTERS = JSON.parse(document.getElementById('book-chapters').textContent);
  const ASSETS = JSON.parse(document.getElementById('book-assets').textContent);
  const view = document.getElementById('chapter-view');
  const scrollTarget = document.getElementById('scroll-target');
  const T = {{GLOBAL_TITLES}};

  function render(i) {
    const content = CHAPTERS[i];
    const parser = new DOMParser();
    const doc = parser.parseFromString(content, 'text/html');
    
    // Process images
    doc.querySelectorAll('img').forEach(img => {
      const key = img.getAttribute('data-src');
      if (key && ASSETS[key]) {
        img.src = ASSETS[key];
      }
    });

    view.innerHTML = doc.body.innerHTML;
    scrollTarget.scrollTop = 0;

    // Update buttons
    document.querySelectorAll('.chapter-btn').forEach((btn, idx) => {
      btn.classList.toggle('active', idx === i);
    });
  }

  const list = document.getElementById('chapters-list');
  T.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'chapter-btn';
    btn.innerHTML = `<b>Case File Part ${i+1}</b><span>${t}</span>`;
    btn.onclick = () => render(i);
    list.appendChild(btn);
  });

  // Initial render
  render(0);
})();
</script>
</body>
</html>
