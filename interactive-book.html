<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Книга: Собрано HTML Bundler</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a0a0f;color:#ccc;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
.sh{display:flex;flex-direction:column;height:100vh}
.nv{flex-shrink:0;height:44px;background:#111;display:flex;align-items:center;
justify-content:center;gap:3px;padding:0 8px;overflow-x:auto}
.nv.top{border-bottom:1px solid #222}
.nv.bot{border-top:1px solid #222}
.lb{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#444;margin-right:8px;flex-shrink:0}
.nl{display:flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0;
border-radius:5px;color:#777;font-size:12px;cursor:pointer;border:1px solid transparent;
transition:all .12s;text-decoration:none}
.nl:hover{background:rgba(232,93,68,.12);color:#fff;border-color:rgba(232,93,68,.3)}
.nl.on{background:#e85d44;color:#fff}
.tb{flex-shrink:0;height:32px;background:#0e0e14;border-bottom:1px solid #1a1a1a;
display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px}
.tb button{font-size:11px;color:#555;cursor:pointer;padding:3px 10px;border:1px solid #222;
border-radius:4px;background:none;transition:all .12s;font-family:inherit}
.tb button:hover{color:#fff;border-color:#e85d44}
.tb .tt{font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb .tt b{color:#999;font-weight:400}
.fc{flex:1;overflow:hidden}
.fc iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<div class="sh">
<nav class="nv top" id="nav-top"></nav>
<div class="tb">
<button onclick="go(cur-1)">&larr;</button>
<div class="tt" id="tt"></div>
<button onclick="go(cur+1)">&rarr;</button>
</div>
<div class="fc"><iframe id="fr"></iframe></div>

const T = ["Глава 1: Знакомство с P3.express","Глава 2: Принципы NUPP","Глава 3: Запуск проекта"];
let cur=-1;
const fr=document.getElementById('fr');
const tt=document.getElementById('tt');

function buildNav() {
  const containers = [document.getElementById('nav-top'), document.getElementById('nav-bot')];
  containers.forEach(c => {
    c.innerHTML = '<span class="lb">Главы</span>';
    T.forEach((_, i) => {
      const a = document.createElement('a');
      a.className = 'nl';
      a.textContent = i + 1;
      a.onclick = () => go(i);
      a.dataset.ch = i;
      c.appendChild(a);
    });
  });
}

function go(i){
  if (i < 0 || i >= B64.length) return;
  if(i===cur)return;
  cur=i;
  const bin=atob(B64[i]);
  const bytes=new Uint8Array(bin.length);
  for(let j=0;j<bin.length;j++)bytes[j]=bin.charCodeAt(j);
  const blob=new Blob([bytes],{type:'text/html;charset=utf-8'});
  fr.src=URL.createObjectURL(blob);
  tt.innerHTML='<b>Глава '+(i+1)+'</b>&ensp;'+T[i];
  document.querySelectorAll('.nl').forEach(a=>{
    a.classList.toggle('on',parseInt(a.dataset.ch)===i);
  });
}

buildNav();
go(0);
</script>
