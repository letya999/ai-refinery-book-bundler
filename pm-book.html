<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Управление ИТ-проектами по-простому</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --panel: #e4ecf5; --panel2: #d4e2ee; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #b07000;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Trebuchet MS", "Segoe UI Variable", Tahoma, sans-serif;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #e4ecf5 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="stars" aria-hidden="true"></div>
<div class="side-overlay" id="overlay"></div>

<div class="app" id="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1 id="book-title">Управление ИТ-проектами по-простому</h1>
      <p id="vol-info"></p>
    </div>
    <div class="search-box">
      <input type="search" id="search" autocomplete="off">
    </div>
    <div class="bm-panel" id="bm-panel">
      <details id="bm-details">
        <summary id="bm-summary"></summary>
        <div class="bm-list" id="bm-list"></div>
      </details>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="main">
    <div class="top">
      <button id="menu-btn" aria-label="Menu">☰</button>
      <button id="prev-btn"></button>
      <button id="next-btn"></button>
      <div class="tt" id="tt"></div>
      <button id="bm-btn" title="Bookmark" style="font-size:16px"></button>
      <button id="theme-btn" title="Toggle theme" style="font-size:16px"></button>
    </div>
    <div class="prog"><i id="bar"></i></div>
    <div class="frame">
      <iframe id="fr" sandbox="allow-scripts allow-same-origin" title="Chapter content"></iframe>
    </div>
  </main>
</div>

  const CHAPTERS = ["<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff; /* alias for --txt, kept for compatibility */\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed;\n    --line: #b0c8e0; --txt: #1a2535; --muted: #4a6580;\n    --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 1160px;\n  margin: 0 auto;\n  padding: 26px 16px 56px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 28px;\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  background: linear-gradient(-45deg, #081423, #0f1f38, #163056, #081423);\n  background-size: 400% 400%;\n  animation: gradientBG 15s ease infinite;\n  box-shadow: 0 16px 34px rgba(0,0,0,.32);\n  margin-bottom: 28px;\n}\n[data-theme=\"light\"] .hero {\n  background: linear-gradient(-45deg, #dce8f2, #e8f0f8, #d0e4f0, #dce8f2);\n  background-size: 400% 400%;\n  box-shadow: 0 8px 24px rgba(0,0,0,.08);\n}\n\n@keyframes gradientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  f аны никто не читает, риски неуправляемы».</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">3</div>\n        <div class=\"tl-content\"><b>Агрессия</b>: «Книги пишут теоретики, не видевшие кода».</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">4</div>\n        <div class=\"tl-content\"><b>Удивление</b>: «Ого, я сам изобрел то, что написано в PMBOK».</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">5</div>\n        <div class=\"tl-content\"><b>Принятие</b>: «Зачем я изобретал велосипед?»</div>\n      </div>\n    </div>\n\n    <p>Книга ведет вас по жизненному циклу проекта: от оффера на должность до закрытия документов.</p>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 15; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta nam nd: rgba(114,216,255,.12);\n  color: var(--acc);\n  text-transform: uppercase;\n  letter-spacing: .05em;\n}\n.badge.warn { border-color: var(--warn); color: var(--warn); background: rgba(255,209,138,.1); }\n.badge.bad  { border-color: var(--bad); color: var(--bad); background: rgba(255,143,143,.1); }\n\n/* Improved Stats */\n.stats { margin: 24px 0; }\n.stat-num { font-variant-numeric: tabular-nums; }\n\ndetails.long-para {\n  margin-bottom: 14px;\n  border-left: 2px solid var(--line);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 4</p>\n      <h1>Как определиться с подходом?</h1>\n    </section>\n\n    <blockquote class=\"insight\">\n      Методология — это карта и компас; они не приносят пользы без навыка навигации, но незаменимы в тумане неопределенности.\n    </blockquote>\n\n    <p class=\"lead-para\">Мы используем <b>PMI (PMBOK)</b> как базу, но помним о существовании альтернатив (IPMA, PRINCE2, Agile, MSF).</p>\n\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">ПРОДУКТ</div>\n        <p>То, что хочет получить заказчик (информационная система).</p>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">ПРОЕКТ</div>\n        <p>То, что делает команда, чтобы создать продукт (процесс).</p>\n<blockquote class=\"insight\"><p>Мы используем PMI (PMBOK) как базу, но помним о существовании альтернатив (IPMA, PRINCE2, Agile, MSF).</p></blockquote>\n      </div>\n    </div>\n\n    <h3>9 областей знаний ПМ</h3>\n    <div class=\"grid\">\n      <div class=\"card\"><b>Базовые</b><p>Время, Стоимость, Содержание.</p></div>\n      <div class=\"card\"><b>Вспомогательные</b><p>Качество, Риски, Закупки, Персонал, Коммуникации.</p></div>\n      <div class=\"card\"><b>Связующая</b><p>Интеграция.</p></div>\n    </div>\n\n    <h3>Жизненный цикл «Удав»</h3>\n    <p>Процессы планирования, выполнения и мониторинга итеративны и зациклены до момента закрытия.</p>\n    <div class=\"vis-timeline\">\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">1</div>\n        <div class=\"tl-content\"><b>Инициация</b>: Решения стоят дешево, влияние максимально.</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">2</div>\n        <div class=\"tl-content\"><b>Планирование & Мониторинг</b>: Циклическая коррекция курса.</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">3</div>\n        <div class=\"tl-content\"><b>Закрытие</b>: Изменить что-то почти невозможно, цена ошибки огромна.</div>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <div class=\"acc-head\">Совет: не стройте систему с нуля<  {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgba(192,48,48,.06); }\n\n.tr-head        { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; font-weight: 700; }\n.tr-head.good   { color: var(--acc2); }\n.tr-head.bad    { color: var(--bad);  }\n.tr-col ul { padding-left: 18px; margin: 0; color: var(--txt); }\n.tr-col li { margin-bottom: 6px; }\n\n/* ── Accordion (JS-driven) ── */\n.acc-item {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: rgba(15,31,56,.6);\n  overflow: hidden;\n  margin-bottom: 8px;\n}\n[data-theme=\"light\"] .acc-item { background: rgba(220,232,242,.7); }\n\n.acc-head {\n  padding: 13px 16px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  background: rgba(15,31,56,.9);\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  transition: .15s;\n}\n[data-theme=\"light\"] .acc-head { background: rgba(220,232,242,.95); }\n.acc-head::after { content: '+'; font-size: 20px; color: var(--muted); }\n.acc-item.open .acc-head { background: rgba(114,216,255,.12); border-bottom: 1px solid var(--line); }\n.acc-item.open .acc-head::after { content: '−'; }\n\n.acc-body {\n  max-height: 0;\n  overflow: hidden;\n  transition: max-height .3s ease-out;\n  color: var(--txt);\n}\n.acc-item.open .acc-body { max-height: 800px; padding: 16px; }\n\n/* ── Native exclusive accordion (Chrome 120+, Firefox 130+, Safari 17.2+) ── */\ndetails[name] { margin-bottom: 8px; }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/*  padding: 16px; }\n}\n\n/* ── Universal enrichments (chapter_processor auto-passes) ── */\n.vis-timeline {\n  margin: 32px 0;\n  border-left: 2px solid var(--line);\n  padding-left: 24px;\n  position: relative;\n}\n.tl-step {\n  position: relative;\n  margin-bottom: 24px;\n}\n.tl-step:last-child { margin-bottom: 0; }\n.tl-num {\n  position: absolute;\n  left: -33px;\n  top: 0;\n  width: 18px;\n  height: 18px;\n  background: var(--acc);\n  color: var(--bg);\n  border-radius: 50%;\n  font-size: 10px;\n  font-weight: 900;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border: 2px solid var(--bg);\n}\n.tl-content b { display: block; color: var(--acc2); margin-bottom: 4px; font-size: 14px; }\n.tl-content { font-size: 14px; color: var(--txt); line-height: 1.4; }\n\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 10px;\n  border-radius: 999px;\n  font-size: 11px;\n  font-weight: 700;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.12);\n  color: var(--acc);\n  text-transform: uppercase;\n  letter-spacing: .05em;\n}\n.badge.warn { border-color: var(--warn); color: var(--warn); background: rgba(255,209,138,.1); }\n.badge.bad  { border-color: var(--bad); color: var(--bad); background: rgba(255,143,143,.1); }\n\n/* Improved Stats */\n.stats { margin: 24px 0; }\n.stat-num { font-variant-numeric: tabular-nums; }\n\ndetails.long-para {\n  margin-bottom: 14px;\n  border-left: 2px solid var(--line);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 10</p>\n      <h1>Ответственность, коммуникации, качество</h1>\n    </section>\n\n    <blockquote class=\"insight\">\n      Правильно организованная работа — это когда вы никогда не слышите от команды вопроса «Я закончил, что дальше?».\n    </blockquote>\n\n    <h3>Матрица ответственности (RACI)</h3>\n    <div class=\"grid\">\n      <div class=\"card\"><b>Главный (A/R)</b><p class=\"lead-para\">Тот, кто отвечает за результат головой.</p></div>\n      <div class=\"card\"><b>Вспомогательный (C/I)</b><p>Тот, кто помогает или должен быть проинформирован.</p></div>\n    </div>\n\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">ПЛОХИЕ КОММУНИКАЦИИ</div>\n        <div class=\"grid\">\n<div class=\"card\"><p>Статус-митинги «для галочки»</p></div>\n<div class=\"card\"><p>Избыточная отчетность (эссе вместо цифр)</p></div>\n<div class=\"card\"><p>Нарушение субординации у заказчика</p></div>\n</div>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">ПРАВИЛЬНЫЙ ПОДХОД</div>\n        <div class=\"grid\">\n<div class=\"card\"><p>Отчеты в электронном виде (асинхронно)</p></div>\n<div class=\"card\"><p>Фиксация «правил игры» на поле заказчика</p></div>\n<div class=\"card\"><p>График вех для спонсора</p></div>\n</div>\n      </div>\n    </div>\n\n    <h3>Качество и «Золотая сервировка»</h3>\n    <p>Качество — это соответствие требованиям, а не бесконечное совершенство.</p>\n<blockquote class=\"insight\"><p>Добавление фич, которые заказчик не просил, но которые «было бы круто сделать».</p></blockquote>\n    <div class=\"acc-item\">\n      <div class=\"acc-head\">Осторожно: Gold Plating!</div>\n      <div class=\"acc-body\">\n        <p>Добавление фич, которые заказчик не просил, но которые «было бы круто сделать». Это зло: съедает ресурсы и время, не принося формальной пользы проекту.</p>\n      </div>\n    </div>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 15; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lan ent: '−'; }\n\n.acc-body {\n  max-height: 0;\n  overflow: hidden;\n  transition: max-height .3s ease-out;\n  color: var(--txt);\n}\n.acc-item.open .acc-body { max-height: 800px; padding: 16px; }\n\n/* ── Native exclusive accordion (Chrome 120+, Firefox 130+, Safari 17.2+) ── */\ndetails[name] { margin-bottom: 8px; }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { x-shadow: 0 8px 24px rgba(0,0,0,.08);\n}\n\n@keyframes gradientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgba(192,48,48,.06); }\n\n.tr-head        { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; font-weight: 700; }\n.tr-head.good   { color: var(--acc2); }\n.tr-head.bad    { color: var(--bad);  }\n.tr-col ul { padding-left: 18px; margin: 0; color: var(--txt); }\n.tr-col li { margin-bottom: 6px; }\n\n/* ── Accordion (JS-driven) ── */\n.acc-item {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: rgba(15,31,56,.6);\n  overflow: hidden;\n  margin-bottom: 8px;\n}\n[data-theme=\"light\"] .acc-item { background: rgba(220,232,242,.7); }\n\n.acc-head {\n  padding: 13px 16px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  background: rgba(15,31,56,.9);\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  transition: .15s;\n}\n[data-theme=\"light\"] .acc-head { background: rgba(220,232,242,.95); }\n.acc-head::after { content: '+'; font-size: 20px; color: var(--muted); }\n.acc-item.open .acc-head { background: rgba(114,216,255,.12); border-bottom: 1px solid var(--line); }\n.acc-item.open .acc-head::after { content: '−'; }\n\n.acc-body {\n  max-height: 0;\n  overflow: hidden;\n  transition: max-height .3s ease-out;\n  color: var(--txt);\n}\n.acc-item.open .acc-body { max-height: 800px; padding: 16px; }\n\n/* ── Native exclusive accordion (Chrome 120+, Firefox 130+, Safari 17.2+) ── */\ndetails[name] { margin-bottom: 8px; }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); background: var(--panel2); text-align: left; }\ntd { color: var(--txt); font-size: 14px; }\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar { width: 5px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }\n::-webkit-scrollbar-thumb:hover { background: var(--acc); }\n\n/* ── Responsive ── */\n@media (max-width: 900px) {\n  .scale      { grid-template-columns: 1fr 1fr; }\n  .translator { grid-template-columns: 1fr; }\n}\n@media (max-width: 640px) {\n  .grid  { grid-template-columns: 1fr; }\n  .stats { grid-template-columns: 1fr 1fr; }\n  .hero  { padding: 18px; }\n  .sec   { padding: 16px; }\n}\n\n/* ── Universal enrichments (chapter_processor auto-passes) ── */\n.vis-timeline {\n  margin: 32px 0;\n  border-left: 2       <p>Работайте с людьми весь проект. Не делайте из «сдачи» сюрприз.</p>\n      </div>\n    </div>\n\n    <h3>Команда и Мотивация</h3>\n    <div class=\"acc-item\">\n      <div class=\"acc-head\">Тим-билдинг — это не только пьянки</div>\n      <div class=\"acc-body\">\n        <p>Самый эффективный тим-билдинг — это совместное планирование. Когда люди сами участвуют в создании ИСР и расписания, они чувствуют свою ответственность за результат.</p>\n      </div>\n    </div>\n\n    <div class=\"vis-timeline\">\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">1</div>\n        <div class=\"tl-content\"><b>Отслеживание</b>: Сбор данных о выполненных работах.</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">2</div>\n        <div class=\"tl-content\"><b>Анализ</b>: Поймем ли мы «цель» с текущим курсом?</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">3</div>\n        <div class=\"tl-content\"><b>Коррекция</b>: Сжатие расписания, переоценка рисков или ресурсов.</div>\n      </div>\n    </div>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 15; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff; /* alias for --txt, kept for compatibility */\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed;\n    --line: #b0c8e0; --txt: #1a2535; --muted: #4a6580;\n    --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  backgro [data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgb ckground: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); background: var(--panel2); text-align: left; }\ntd { color: var(--txt); font-size: 14px; }\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar { width: e);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 14</p>\n      <h1>Закрытие проекта</h1>\n    </section>\n\n    <blockquote class=\"insight\">\n      Проект завершен только тогда, когда ресурсы высвобождены, а извлеченные уроки задокументированы.\n    </blockquote>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>Для заказчика</b>\n        <p class=\"lead-para\">Сдача-приемка продукта. Подписание актов.</p>\n      </div>\n      <div class=\"card\">\n        <b>Для спонсора</b>\n        <p>Высвобождение ресурсов (людей и техники).</p>\n      </div>\n      <div class=\"card\">\n        <b>Для ПМ</b>\n        <p>Lessons Learned (извлеченные уроки) и обновление шаблонов.</p>\n<blockquote class=\"insight\"><p>Это краткое резюме: что пошло не так, где мы промахнулись с оценками, какие эксперты проявили себя.</p></blockquote>\n      </div>\n    </div>\n\n    <h3>Сдача-приемка</h3>\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">РИСК ПРОВАЛА</div>\n        <div class=\"grid\">\n<div class=\"card\"><p>В комиссии незнакомые люди</p></div>\n<div class=\"card\"><p>Критерии приемки не были зафиксированы в ТЗ</p></div>\n<div class=\"card\"><p>Пользователи саботируют систему</p></div>\n</div>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">ЗАЛОГ УСПЕХА</div>\n        <div class=\"grid\">\n<div class=\"card\"><p>Все члены комиссии — в Реестре стейкхолдеров</p></div>\n<div class=\"card\"><p>Ожидания управлялись весь проект</p></div>\n<div class=\"card\"><p>Приемка — это просто проверка чек-листа</p></div>\n</div>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <div class=\"acc-head\">Что такое Lessons Learned?</div>\n      <div class=\"acc-body\">\n        <p>Это краткое резюме: что пошло не так, где мы промахнулись с оценками, какие эксперты проявили себя. Это бесценный актив для ваших будущих проектов.</p>\n      </div>\n    </div>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 15; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff; /* alias for --txt, kept for compatibility */\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed;\n    --line: #b0c8e0; --txt: #1a2535; --muted: #4a6580;\n    --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 1160px;\n  margin: 0 auto;\n  padding: 26px 16px 56px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 28px;\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  background: linear-gradient(-45deg, #081423, #0f1f38, #163056, #081423);\n  background-size: 400% 400%;\n  animation: gradientBG 15s ease infinite;\n  box-shadow: 0 16px 34px rgba(0,0,0,.32);\n  margin-bottom: 28px;\n}\n[data-theme=\"light\"] .hero {\n  background: linear-gradient(-45deg, #dce8f2, #e8f0f8, #d0e4f0, #dce8f2);\n  background-size: 400% 400%;\n  box-shadow: 0 8px 24px rgba(0,0,0,.08);\n}\n\n@keyframes gradientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgba(192,48,48,.06); }\n\n.tr-head        { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; font-weight: 700; }\n.tr-head.good   { color: var(--acc2); }\n.tr-head.bad    { color: var(--bad);  }\n.tr-col ul { padding-left: 18px; margin: 0; color: var(--txt); }\n.tr-col li { margin-bottom: 6px; }\n\n/* ── Accordion (JS-driven) ── */\n.acc-item {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: rgba(15,31,56,.6);\n  overflow: hidden;\n  margin-bottom: 8px;\n}\n[data-theme=\"light\"] .acc-item { background: rgba(220,232,242,.7); }\n\n.acc-head {\n  padding: 13px 16px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  background: rgba(15,31,56,.9);\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  transition: .15s;\n}\n[data-theme=\"light\"] .acc-head { background: rgba(220,232,242,.95); }\n.acc-head::after { content: '+'; font-size: 20px; color: var(--muted); }\n.acc-item.open .acc-head { background: rgba(114,216,255,.12); border-bottom: 1px solid var(--line); }\n.acc-item.open .acc-head::after { content: '−'; }\n\n.acc-body {\n  max-height: 0;\n  overflow: hidden;\n  transition: max-height .3s ease-out;\n  color: var(--txt);\n}\n.acc-item.open .acc-body { max-height: 800px; padding: 16px; }\n\n/* ── Native exclusive accordion (Chrome 120+, Firefox 130+, Safari 17.2+) ── */\ndetails[name] { margin-bottom: 8px; }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); background: var(--panel2); text-align: left; }\ntd { color: var(--txt); font-size: 14px; }\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar { width: 5px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }\n::-webkit-scrollbar-thumb:hover { background: var(--acc); }\n\n/* ── Responsive ── */\n@media (max-width: 900px) {\n  .scale      { grid-template-columns: 1fr 1fr; }\n  .translator { grid-template-columns: 1fr; }\n}\n@media (max-width: 640px) {\n  .grid  { grid-template-columns: 1fr; }\n  .stats { grid-template-columns: 1fr 1fr; }\n  .hero  { padding: 18px; }\n  .sec   { padding: 16px; }\n}\n\n/* ── Universal enrichments (chapter_processor auto-passes) ── */\n.vis-timeline {\n  margin: 32px 0;\n  border-left: 2px solid var(--line);\n  padding-left: 24px;\n  position: relative;\n}\n.tl-step {\n  position: relative;\n  margin-bottom: 24px;\n}\n.tl-step:last-child { margin-bottom: 0; }\n.tl-num {\n  position: absolute;\n  left: -33px;\n  top: 0;\n  width: 18px;\n  height: 18px;\n  background: var(--acc);\n  color: var(--bg);\n  border-radius: 50%;\n  font-size: 10px;\n  font-weight: 900;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border: 2px solid var(--bg);\n}\n.tl-content b { display: block; color: var(--acc2); margin-bottom: 4px; font-size: 14px; }\n.tl-content { font-size: 14px; color: var(--txt); line-height: 1.4; }\n\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 10px;\n  border-radius: 999px;\n  font-size: 11px;\n  font-weight: 700;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.12);\n  color: var(--acc);\n  text-transform: uppercase;\n  letter-spacing: .05em;\n}\n.badge.warn { border-color: var(--warn); color: var(--warn); background: rgba(255,209,138,.1); }\n.badge.bad  { border-color: var(--bad); color: var(-   // ── Safe Storage ──────────────────────────────────────────────────────────
  const store = {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const fr       = document.getElementById('fr');
  const tt       = document.getElementById('tt');
  const bar      = document.getElementById('bar');
  const side     = document.getElementById('side');
  const overlay  = document.getElementById('overlay');
  const searchEl = document.getElementById('search');
  const app      = document.getElementById('app');
  const bmBtn    = document.getElementById('bm-btn');
  const bmList   = document.getElementById('bm-list');
  const bmDetails = document.getElementById('bm-details');

  let cur = 0;
  let searchFilter = '';

  // ── i18n helpers ─────────────────────────────────────────────────────────
  document.getElementById('search').placeholder = LANG.search_placeholder;
  document.getElementById('prev-btn').textContent = LANG.prev;
  document.getElementById('next-btn').textContent = LANG.next;
  document.getElementById('bm-summary').textContent = LANG.bookmarks_title;
  document.getElementById('vol-info').textContent = LANG.total_chapters.replace('{n}', T.length);
  document.documentElement.lang = LANG.code || 'ru';

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? LANG.theme_to_light : LANG.theme_to_dark;
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe if loaded
    try { fr.contentDocument.documentElement.setAttribute('data-theme', t); } catch(e) {}
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);
  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }
    catch(e) { return []; }
  }
  function saveBookmarks(bm) {
    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }
  function toggleBookmark() {
    const bm = getBookmarks();
    const idx = bm.indexOf(cur);
    if (idx === -1) bm.push(cur); else bm.splice(idx, 1);
    saveBookmarks(bm);
    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? LANG.bookmark_remove : LANG.bookmark_add;
  }
  function buildBookmarkList() {
    const bm = getBookmarks();
    bmList.innerHTML = '';
    if (!bm.length) {
      bmList.innerHTML = `<div class="bm-empty">${LANG.no_bookmarks}</div>`;
      return;
    }
    bm.forEach(i => {
      const btn = document.createElement('button');
      btn.className = 'bm-item';
      btn.textContent = `${LANG.chapter} ${i + 1} — ${T[i] || ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      bmList.appendChild(btn);
    });
  }
  bmBtn.onclick = toggleBookmark;

  // ── Search (inverted index) ───────────────────────────────────────────────
  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, '')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

  // ── Chapter navigation ────────────────────────────────────────────────────
  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;

    const doSwitch = () => {
      fr.onload = () => {
        // Propagate theme to iframe
        try { fr.contentDocument.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')); } catch(e) {}

        // Restore scroll position
        const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + i) || '0');
        if (savedRatio > 0.005) {
          try {
            const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
            if (maxY > 0) fr.contentWindow.scrollTo({ top: savedRatio * maxY, behavior: 'instant' });
          } catch(e) {}
        }

        // Navigate to anchor if specified
        if (anchor) {
          try {
            const el = fr.contentDocument.getElementById(anchor);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          } catch(e) {}
        }

        // Save scroll position on scroll
        try {
          fr.contentWindow.addEventListener('scroll', () => {
            try {
              const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
              if (maxY > 10) {
                const ratio = fr.contentWindow.scrollY / maxY;
                store.set('sc_' + BOOK_ID + '_' + cur, ratio.toFixed(4));
              }
            } catch(e) {}
          }, { passive: true });
        } catch(e) {}
      };

      fr.srcdoc = CHAPTERS[i];

      // Update UI
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      tt.innerHTML = `<i>${chLabel}</i> ${T[i] || ''}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));
      store.set('prog_' + BOOK_ID, i);
      updateBookmarkBtn();
    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${t}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      list.appendChild(btn);
    });

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  // ── Mobile sidebar ────────────────────────────────────────────────────────
  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target === searchEl) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.data && e.data.action === 'bookGo') go(e.data.chapterIdx, e.data.anchorId);
  });

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);
  searchEl.oninput = e => buildList(e.target.value);

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
