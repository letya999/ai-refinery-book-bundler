<span><span id="id36"><div class="title2">
<p class="p1">Приложение C. НЕКОТОРЫЕ ОБЩИЕ НЕСТАНДАРТНЫЕ СРЕДСТВА SQL</p>
</div><p class="empty-line"/><p class="p">ИМЕЕТСЯ РЯД ОСОБЕННОСТЕЙ ЯЗЫКА SQL которые пока не определены как часть стандарта ANSI или стандарта ISO (Международная Организация По Стандартизации), и являются общими для многочисленных реализаций, так как они были получены для практического использования. Это дополнительные элементы чисел этих особенностей. Конечно, эти особенности меняются от программы к программе, и их обсуждение предназначено только чтобы показать некоторые общие подходы к ним.</p><p class="subtitle">ТИПЫ ДАННЫХ</p><p class="p">Типы данных поддерживаемые стандартом SQL, собраны в Приложении B. Это колличество для CHARACTER и разнообразие числовых типов. Реализация их может, фактически, быть значительно сложнее чем показано в терминах типов, которые они фактически могут использовать. Мы будем здесь обсуждать ряд таких нестандартных типов данных.</p><p class="subtitle">ТИПЫ DATE И TIME</p><p class="p">Как упомянуто в Главе 2, тип данных DATE широко поддерживается, даже если он не часть стандарта. Мы использовали ранее в нашей таблице Порядков, этот тип использующий формат mm/dd/yyyy. Это стандартный формат IBM в США. Разумеется возможны и другие форматы, и программные реализации часто поддерживают ряд форматов, позволяя вам выбирать тот который лучше для вас подходит. Реализация которая предлагает эту особенность должна быть способна преобразовывать дату одного формата в другой - автоматически.</p><p class="p">Имеются несколько основных форматов даты с которыми вы можете сталкнуться:</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>Стандарт</strong></p></td>
<td class="td"><p class="p"><strong>Формат</strong></p></td>
<td class="td"><p class="p"><strong>Пример</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">Международная Организация По Стандартизации (ISO)</p></td>
<td class="td"><p class="p">yyyy-mm-dd</p></td>
<td class="td"><p class="p">1990-10-31</p></td>
</tr>
<tr>
<td class="td"><p class="p">Японский Индустриальный Стандарт (JIS)</p></td>
<td class="td"><p class="p">yyyy-mm-dd</p></td>
<td class="td"><p class="p">1990-10-31</p></td>
</tr>
<tr>
<td class="td"><p class="p">IBM Европейский Стандарт (EUR)</p></td>
<td class="td"><p class="p">dd.mm.yyyy</p></td>
<td class="td"><p class="p">10.31.1990</p></td>
</tr>
</table><p class="empty-line"/><p class="p">Наличие специального типа определяемого для даты, дает возможность выполнять арифметические операция с датами. Например, вы можете добавлять число дней к дате и получать другую дату, в программе, самостоятельно следящей за числом дней в месяцах, високосными годами, и так далее. Даты могут также сравниваться; например фраза, дата A &lt; дата B, означает, что дата A предшествует дате B по времени.</p><p class="p">Кроме даты, большое количество программ определяют специальный тип для времени, который может также быть представлен в ряде форматов, включая следующие:</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>Стандарт</strong></p></td>
<td class="td"><p class="p"><strong>Формат</strong></p></td>
<td class="td"><p class="p"><strong>Пример</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">МЕЖДУНАРОДНАЯ ОРГАНИЗАЦИЯ ПО СТАНДАРТИЗАЦИИ (ISO)</p></td>
<td class="td"><p class="p">hh-mm-ss</p></td>
<td class="td"><p class="p">21.04.37</p></td>
</tr>
<tr>
<td class="td"><p class="p">Японский Индустриальный Стандарт (JIS )</p></td>
<td class="td"><p class="p">hh-mm-ss</p></td>
<td class="td"><p class="p">21.04.37</p></td>
</tr>
<tr>
<td class="td"><p class="p">IBM Европейский Стандарт</p></td>
<td class="td"><p class="p">hh-mm-ss</p></td>
<td class="td"><p class="p">21.04.37</p></td>
</tr>
<tr>
<td class="td"><p class="p">IBM USA Стандарт(USA)</p></td>
<td class="td"><p class="p">hh.mm AM/PM</p></td>
<td class="td"><p class="p">9.04 PM</p></td>
</tr>
</table><p class="empty-line"/><p class="p">Время может добавляться или сравниваться точно также как дата, с коррекцией числа секунд в минутах или часах автоматически. Кроме того, специально встроенные константы указывающие текущую дату или время (CURDATE или CURTIME ) являются общими. Они похожи на константу USER (Пользователь) в которой их значение будет непрерывно меняться.</p><p class="p">Можете ли вы включать время и дату в одно поле ? Некоторые реализации определяют тип DATE достаточно точно, чтобы включать туда еще и TIME.</p><p class="p">В качестве альтернативы, третий обобщающий тип, TIMESTAMP, может быть определен как комбинация этих двух.</p><p class="empty-line"/><p class="subtitle">ТИПЫ ТЕКСТОВОЙ СТРОКИ</p><p class="p">ANSI поддерживает только один тип чтобы представлять текст. Это - тип CHAR. Любое поле такого типа должно иметь определенную длину. Если строка вставляемая в поле меньше чем длина поля, она дополняется пробелами; строка не может быть длиннее чем длина поля.</p><p class="p">Хотя и достаточно удобное, это определение все же имеет некоторые ограничения для пользователя. Например, символьные поля должны иметь одинаковую длинну чтобы можно было выполнить команду UNION. Большинство реализаций, поддерживают строки переменной длины для типов данных VARCHAR и LONG VARCHAR( или просто LONG). В то время как поле типа CHAR всегда может распределить память для максимального числа символов которое может сохраняться в поле, поле VARCHAR при любом колличестве символов, может распределить только определенное количество памяти чтобы сохранить фактическое содержание поля, хотя SQL может установить снаружи, некоторое дополнительное пространство памяти чтобы следить за текущей длиной поля.</p><p class="p">Поле VARCHAR может быть любой длинны включая реализационно-определяемый максимум. Этот максимум может меняться от 254 до 2048 символов для VARCHAR, и до 16000 символов для LONG. LONG обычно используется для текста пояснительного характера или для данных, которые не могут легко сжиматься в простые значения полей; VARCHAR может использоваться для любой текстовой строки чья длина может меняться. Между прочим, не всегда хорошо использовать VARCHAR вместо CHAR. Извлечение и модифицирование полей VARCHAR - более сложный, и следовательно более медленный процесс, чем извлечение и модифицирование полей CHAR. Кроме того, некоторое количество памяти VARCHAR, остается всегда неиспользованной (в резерве) для гарантии вмещения всей длины строки. Вы должны просчитывать, насколько значения полей могут меняться по длине, а также, способны ли они к объединению с другими полями, перед тем как решить, использовать CHAR или VARCHAR. Часто, тип LONG используется для сохранения двоичных данных. Естественно, что использование размера такого "неуклюжего" поля будет ограничивать оперативность SQL. Проконсультируйтесь с вашим руководством.</p><p class="empty-line"/><p class="subtitle">КОМАНДА FORMAT</p><p class="p">Как мы подчеркивали в Главе 7, процесс вывода выполняемого в стандарте SQL - ограничен. Хотя большинство реализаций включают SQL в пакеты, имеющие другие средства для управления этой функцией, некоторые реализации также используют команду типа FORMAT внутри SQL чтобы навязывать выводу запроса, определенные формы, структуры, или ограничения.</p><p class="p">Среди возможных функций команды FORMAT - существуют такие:</p><p class="p">* определение ширины столбцов (при печати ).</p><p class="p">* определение представления NULL значений.</p><p class="p">* обеспечение (новых) заголовков для столбцов.</p><p class="p">* обеспечение заголовков внизу или вверху страниц выводимых на печать.</p><p class="p">* навязывает присвоение или изменение форматам полей содержащих значения даты, времени или денежной суммы.</p><p class="p">* вычисляет общие и промежуточные суммы не исключая возможности обобщения поля, как это делает например SUM. (Альтернативным подходом к этой проблеме в некоторых программах является предложение COMPUTE. )</p><p class="empty-line"/><p class="p">Команда FORMAT может вводиться сразу перед или сразу после запроса к которому она применяется, в зависимости от реализации. Одна команда FORMAT обычно может применяться только к одному запросу, хотя любое число команд FORMAT может применяться к одному и тому же запросу. Вот некоторые примеры команды FORMAT:</p><p class="empty-line"/><p class="p">FORMAT NULL '_ _ _ _ _ _ _';</p><p class="p">FORMAT BTITLE 'Orders Grouped by Salesperson';</p><p class="p">FORMAT EXCLUDE (2, 3);</p><p class="empty-line"/><p class="p">Первая из их значения NULL представляеть в виде | _ _ _ _ _ _ _ | при выводе на печать; вторая вставляет заголовок 'Orders Grouped by Salesperson' в нижнюю часть каждой страницы; третья исключает второй и третий столбцы из вывода предыдущего запроса. Вы могли бы использовать последнюю из их если вы выбираете конкретные столбцы, чтобы использовать их в предложении ORDER BY, в вашем выводе. Так как указанные функции команды FORMAT могут выполняться по разному, весь набор их приложений не может быть здесь показан.</p><p class="p">Имеются другие команды которые могут использоваться для выполнения тех же функций. Команда SET подобна команде FORMAT; она является вариантом или дополнением к команде, которая применяется во всех запросах текущего сеанса пользователя а не просто в одиночном запросе. В следующей реализации, команда FORMAT начинается ключевым словом COLUMN следующим образом:</p><p class="empty-line"/><p class="p">COLUMN odate FORMAT dd-mon-yy;</p><p class="empty-line"/><p class="p">что навязывает формат типа - 10-Oct-90 в поле даты использующемся в выводе запроса на печать. Предложение COMPUTE, упомянутое ранее,</p><p class="p">вставляется в запрос, следующим образом:</p><p class="empty-line"/><p class="p">SELECT odate, amt</p><p class="p">FROM Orders</p><p class="p">WHERE snum=1001</p><p class="p">COMPUTE SUM (amt);</p><p class="empty-line"/><p class="p">Оно выводит все порядки продавца Peel, с датой и суммой приобретения по каждой дате, а в конце, общую сумму приобретений.</p><p class="p">Другая реализация выводит промежуточные суммы приобретений используя COMPUTE в качестве команды. Сначала, она определяет разбивку</p><p class="empty-line"/><p class="p">BREAK ON odate;</p><p class="empty-line"/><p class="p">вывода вышеупомянутого запроса на страницы - сгруппировав их по датам, поэтому все значения odate в каждой группе - одинаковые. Затем вы можете ввести следующее предложение:</p><p class="empty-line"/><p class="p">COMPUTE SUM OF amt ON odate;</p><p class="empty-line"/><p class="p">Столбец в предложении ON, предварительно, должен быть использован в команде BREAK.</p><p class="subtitle">ФУНКЦИИ</p><p class="p">Для SQL в стандарте ANSI, вы можете применять агрегатные функции для столбцов или использовать их значения в скалярных выражениях, таких например как - comm * 100. Имеется много других полезных функций, которые вы, вероятно встречали на практике.</p><p class="p">Имеется список некоторых общих функций SQL отличающихся от стандартных агрегатов. Они могут использоваться в предложениях SELECT запросов, точно так же как агрегатные функции, но эти функции выполняются для одиночных значениях а не групповых. В следующем списке они классифицированны согласно типам данных с которыми они выполняются. Если нет примечаний, то переменные в этом списке стандартизованы для любого выражения значений соответствующего типа, которые могут быть использованы в предложении SELECT:</p><p class="empty-line"/><p class="subtitle">МАТЕМАТИЧЕСКИЕ ФУНКЦИИ</p><p class="empty-line"/><p class="p">Эти функции применяются для чисел.</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>ФУНКЦИЯ</strong></p></td>
<td class="td"><p class="p"><strong>ЗНАЧЕНИЕ</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">ABX(X)</p></td>
<td class="td"><p class="p">Абсолютное значение из X (преобразование отрицательного или положительного значений в положительное )</p></td>
</tr>
<tr>
<td class="td"><p class="p">CEIL (X)</p></td>
<td class="td"><p class="p">X - является десятичным значением которое будет округляться сверху.</p></td>
</tr>
<tr>
<td class="td"><p class="p">FLOOR (X)</p></td>
<td class="td"><p class="p"> X - является десятичным значением которое будет округляться снизу.</p></td>
</tr>
<tr>
<td class="td"><p class="p">GREATEST(X,Y)</p></td>
<td class="td"><p class="p">Возвращает большее из двух значений.</p></td>
</tr>
<tr>
<td class="td"><p class="p"> LEAST(X,Y)</p></td>
<td class="td"><p class="p">Возвращает меньшее из двух значений.</p></td>
</tr>
<tr>
<td class="td"><p class="p">MOD(X,Y)</p></td>
<td class="td"><p class="p">Возвращает остаток от деления X на Y.</p></td>
</tr>
<tr>
<td class="td"><p class="p">POWER(X,Y)</p></td>
<td class="td"><p class="p">Возвращает значение X в степени Y.</p></td>
</tr>
<tr>
<td class="td"><p class="p">ROUND(X,Y)</p></td>
<td class="td"><p class="p">Цикл от X до десятичного Y. Если Y отсутствует, цикл до целого числа.</p></td>
</tr>
<tr>
<td class="td"><p class="p">SING(X)</p></td>
<td class="td"><p class="p">Возвращает минус если X &lt; 0, или плюс если X &gt; 0.</p></td>
</tr>
<tr>
<td class="td"><p class="p">SQRT (X)</p></td>
<td class="td"><p class="p">Возвращает квадратный корень из X.</p></td>
</tr>
</table><p class="empty-line"/><p class="subtitle">СИМВОЛЬНЫЕ ФУНКЦИИ</p><p class="p">Эти функции могут быть применены для строк текста, либо из столбцов текстовых типов данных, либо из строк литерных текстов, или же комбинация из этих двух.</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>ФУНКЦИЯ</strong></p></td>
<td class="td"><p class="p"><strong>ЗНАЧЕНИЕ</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">LEFT(&lt;string&gt;,X) </p></td>
<td class="td"><p class="p">Возвращает крайние левые(старшие) символы X из строки. </p></td>
</tr>
<tr>
<td class="td"><p class="p">RICHT(&lt;string&gt;,X) </p></td>
<td class="td"><p class="p">Возвращает символы X младшего разряда из строки </p></td>
</tr>
<tr>
<td class="td"><p class="p">ASCII(&lt;string&gt;) </p></td>
<td class="td"><p class="p">Возвращает код ASCII которым представляется строка в памяти компьютера. </p></td>
</tr>
<tr>
<td class="td"><p class="p">CHR(&lt;ASCIIcode&gt;) </p></td>
<td class="td"><p class="p">Возвращает принтерные символы кода ASCII. </p></td>
</tr>
<tr>
<td class="td"><p class="p">VALUE(&lt;string&gt;) </p></td>
<td class="td"><p class="p">Возвращает математическое значение для строки. Считается что строка имеет тип CHAR или VARCHAR, но состоит из чисел. VALUE('3') произведет число 3 типа INTEGER. </p></td>
</tr>
<tr>
<td class="td"><p class="p">UPPER(&lt;string&gt;) </p></td>
<td class="td"><p class="p">Преобразует все символы строки в символы верхнего регистра. </p></td>
</tr>
<tr>
<td class="td"><p class="p">LOWER(&lt;string&gt;) </p></td>
<td class="td"><p class="p">Преобразует все символы строки в символы нижнего регистра. </p></td>
</tr>
<tr>
<td class="td"><p class="p">INlTCAP(&lt;string&gt;) </p></td>
<td class="td"><p class="p">Преобразует символы строки в заглавные буквы. В некоторых реализациях может иметь название - PROPER. </p></td>
</tr>
<tr>
<td class="td"><p class="p">LENGTH(&lt;string&gt;) </p></td>
<td class="td"><p class="p">Возвращает число символов в строке. </p></td>
</tr>
<tr>
<td class="td"><p class="p">&lt;string&gt;||&lt;string&gt; </p></td>
<td class="td"><p class="p">Объединяет две строки в выводе, так чтобы после первой немедленно следовала вторая. (значек || называется оператором сцепления). </p></td>
</tr>
<tr>
<td class="td"><p class="p">LPAD(&lt;string &gt;,X,'*') </p></td>
<td class="td"><p class="p">Дополняет строку слева звездочками '*', или любым другим указанным символом, с колличестве, определяемом X. </p></td>
</tr>
<tr>
<td class="td"><p class="p">RPAD(&lt;string&gt;,X, ") </p></td>
<td class="td"><p class="p"> То же самое что и LPAD, за исключением того, что дополнение делается справа.</p></td>
</tr>
<tr>
<td class="td"><p class="p">SUBSTR(&lt;string &gt;,X,Y) </p></td>
<td class="td"><p class="p">Извлекает Y символов из строки начиная с позиции X.</p></td>
</tr>
</table><p class="empty-line"/><p class="subtitle">ФУНКЦИИ ДАТЫ И ВРЕМЕНИ</p><p class="p">Эти функции выполняются только для допустимых значений даты или времени.</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>ФУНКЦИЯ</strong></p></td>
<td class="td"><p class="p"><strong>ЗНАЧЕНИЕ</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">DAY(&lt;date&gt;) </p></td>
<td class="td"><p class="p">Извлекает день месяца из даты. Подобные же функции существуют для MONTH(МЕСЯЦ), YEAR(ГОД), HOUR(ЧАСЫ), SECOND(СЕКУНДЫ) и так далее.</p></td>
</tr>
<tr>
<td class="td"><p class="p">WEEKDAY(&lt;date&gt;) </p></td>
<td class="td"><p class="p">Извлекает день недели из даты.</p></td>
</tr>
</table><p class="empty-line"/><p class="subtitle">ДРУГИЕ ФУНКЦИИ</p><p class="p">Эта функция может быть применена к любому типу данных.</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>ФУНКЦИЯ</strong></p></td>
<td class="td"><p class="p"><strong>ЗНАЧЕНИЕ</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">NVL(&lt;column&gt;,&lt;value&gt;) </p></td>
<td class="td"><p class="p">NVL (NULL Значение) будет меняться на значение &lt;value&gt; каждое NULL значение найденое в столбце &lt;column&gt;. Если полученное значение &lt;column &gt; не=NULL, NVL ничего не делает. </p></td>
</tr>
</table><p class="empty-line"/><p class="subtitle">INTERSECT И MINUS</p><p class="p">Команда UNION, как вы уже видели в Главе 14, может объединить два запроса, обьединив их вывод в один. Два других обычно имеющихся способа объединения отдельных запросов - это INTERSECT(Плюс) и MINUS(Минус). INTERSECT выводит только строки произведенные обоими перекресными запросами, в то время как MINUS выводит строки которые производятся одним запросом, но не другим. Следовательно, следующие два запроса</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London'</p><p class="empty-line"/><p class="p">INTERSECT</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE 'London' IN</p><p class="p">(SELECT city</p><p class="p">FROM Customers</p><p class="p">WHERE Customers.snum=</p><p class="p">Salespeople.snum);</p><p class="empty-line"/><p class="p">выведут строки произведенные обоими запросами, производящими всех продавцов в Лондоне которые имели по крайней мере одного заказчика размещенного там также. С другой стороны, запрос</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London'</p><p class="empty-line"/><p class="p">MINUS</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE 'London' IN</p><p class="p">(SELECT sity</p><p class="p">FROM Customers</p><p class="p">WHERE Customers.snum=</p><p class="p">Salespeople.snum);</p><p class="empty-line"/><p class="p">удалит строки выбранные вторым запросом из вывода первого, и таким образом будут выводены все продавцы в Лондоне которые не имели там заказчиков. MINUS иногда еще называют DIFFERENCE (ОТЛИЧИЕ)</p><p class="empty-line"/><p class="subtitle">АВТОМАТИЧЕСКИЕ ВНЕШНИЕ ОБЬЕДИНЕНИЯ</p><p class="p">В Главе 14, мы обсуждали внешнее обьединение и показывали вам как выполнять его используя команду UNION. Некоторые программы базы данных имеют более непосредственный способ выполнения внешних обьединений. В некоторых реализациях, вводимый знак " + " после предиката, может выводить строки которые удовлетворяют условию также как и строки которые ему не удовлетворяют. В условии предиката может содержаться поле совпадающее для обеих таблиц, и NULL значения будут вставлены там, где такого совпадения не будет найдено. Например, предположим вы хотите видеть ваших продавцов и соответствующих им заказчиков, не исключая тех продавцов которым не назначено ни одного заказчика (хотя такого нет в наших типовых таблицах, но в действительности это возможно ) :</p><p class="empty-line"/><p class="p">SELECT a.snum, sname, cname</p><p class="p">FROM Salespeople a, Customers b</p><p class="p">WHEREa.snum=b.snum(+);</p><p class="empty-line"/><p class="p">Это является эквивалентом следующего объединения (UNION):</p><p class="empty-line"/><p class="p">SELECT a.snum, sname, cname</p><p class="p">FROM Salespeople a, Customers b</p><p class="p">WHERE a.snum=b.snum</p><p class="empty-line"/><p class="p">UNION</p><p class="empty-line"/><p class="p">SELECT snum, sname, '_ _ _ _ _ _ _ _ _ _'</p><p class="p">FROM Salespeople</p><p class="p">WHERE snum NOT IN</p><p class="p">(SELECT snum</p><p class="p">FROM Customers);</p><p class="empty-line"/><p class="p">Мы считаем что подчеркивания будут отображены NULL значениями( см. команду FORMAT ранее в этом приложении где описывалось отображение NULL значениями).</p><p class="subtitle">ОТСЛЕЖИВАНИЕ ДЕЙСТВИЙ</p><p class="p">Ваша SQL реализация - достаточна хороша, если она доступна многим пользователями, чтобы обеспечивать для них некий способ слежения за действиями выполняемыми в базе данных. Имеются две основные формы чтобы делать это:</p><p class="empty-line"/><p class="p">Journaling(Протоколирование) и Auditing(Ревизия).</p><p class="empty-line"/><p class="p">Эти формы отличаются по назначению. Journaling, пименяется с целью защиты ваших данных, при разрушении вашей системы. Сначала Вы используете реализационно-зависимую процедуру чтобы архивировать текущее содержание вашей базы данных, поэтому копия ее содержания где-нибудь будет сохранена. Затем вы просматриваете протокол изменений сделанных в базе данных. Он сохраняется в некоторой области памяти, но не в главной памяти базы данных а желательно на отдельном устройстве, и содержит список всех команд которые произвели изменения в структуре или в содержании базы данных. Если у вас вдруг появились проблемы и текущее содержание вашей базы данных оказалось нарушенным, вы можете повторно выполнить все изменения зарегистрированные в протоколе на резервной копии вашей базы данных, и снова привести вашу базу данных в состояние которое было до момента последней записи в протокол. Типичной командой чтобы начать протоколирование, будет следующяя:</p><p class="empty-line"/><p class="p">SET JOURNAL ON;</p><p class="empty-line"/><p class="p">Auditing используется c целью защиты. Она следит за тем, кто и какие действия выполнял в базе данных, и сохраняет эту информацию в таблице доступной только очень немногим высоко привилегированным пользователям. Конечно, вы редко будете прибегать к процедуре ревизии, потому что очень скоро она займет много памяти и вам будет сложно работать в вашей базе данных. Но вы можете устанавливать ревизию для определенных пользователей, определенных действий или определенных объектов данных.</p><p class="p">Имеется такая форма команды AUDIT:</p><p class="empty-line"/><p class="p">AUDIT INSERT ON Salespeople BY Diane;</p><p class="empty-line"/><p class="p">Или предложение ON или предложение BY могут быть исключены, устанавливая ревизию, либо всех объектов или всех пользователей, соответственно. Применвние AUDIT ALL, вместо AUDIT INSERT, приведет к отслеживанию всех действий Diane в таблице Продавцов.</p></span></span>
