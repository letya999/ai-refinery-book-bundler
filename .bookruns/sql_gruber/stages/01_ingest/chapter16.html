<span><span id="id23"><div class="title2">
<p class="p1">Глава 15. ВВОД, УДАЛЕНИЕ и ИЗМЕНЕНИЕ ЗНАЧЕНИЙ ПОЛЕЙ</p>
</div><p class="empty-line"/><p class="p">ЭТА ГЛАВА ПРЕДСТАВЛЯЕТ КОМАНДЫ КОТОРЫЕ управляют значениями представляемыми в таблице. Когда вы закончите эту главу, вы будете способны помещать строки в таблицу, удалять их, и изменять индивидуальные значения представленные в каждой строке.</p><p class="empty-line"/><p class="p">Будет показано использование запросов в формировании полной группы строк для вставки, а также, как может использоваться предикат для управления изменения значений и удаления строк. Материал в этой главе составляет полный объем знаний показывающий, как создавать и управлять информацией в базе данных.</p><p class="p">Более мощные способы проектирования предикатов будут обсуждены в следующей главе.</p><p class="subtitle">КОМАНДЫ МОДИФИКАЦИИ ЯЗЫКА DML</p><p class="p">Значения могут быть помещены и удалены из полей, тремя командами языка DML (Язык Манипулирования Данными ):</p><p class="empty-line"/><p class="p">INSERT (ВСТАВИТЬ),</p><p class="p">UPDATE (МОДИФИЦИРОВАТЬ),</p><p class="p">DELETE (УДАЛИТЬ).</p><p class="empty-line"/><p class="p">Не смущайтесь, все они упоминались ранее в SQL, как команды модификации.</p><p class="p"><strong>ВВОД ЗНАЧЕНИЙ</strong></p><p class="p">Все строки в SQL вводятся с использованием команды модификации INSERT. В самой простой форме, INSERT использует следующий синтаксис:</p><p class="empty-line"/><p class="p">INSERT INTO &lt;table name&gt;</p><p class="p">VALUES (&lt;value&gt;, &lt;value&gt; . . .);</p><p class="empty-line"/><p class="p">Так, например, чтобы ввести строку в таблицу Продавцов, вы можете использовать следующее условие:</p><p class="empty-line"/><p class="p">INSERT INTO Salespeople</p><p class="p">VALUES (1001, 'Peel', 'London', .12);</p><p class="empty-line"/><p class="p">Команды DML не производят никакого вывода, но ваша программа должна дать вам некоторое подтверждение того что данные были использованы.</p><p class="p">Имя таблицы (в нашем случае - Salespeople (Продавцы)), должно быть предварительно определено, в команде CREATE TABLE (см. Главу 17 ), а каждое значение пронумерованное в предложении значений, должно совпадать с типом данных столбца, в который оно вставляется. В ANSI, эти значения не могут составлять выражений, что означает что 3 - это доступно, а выражение 2 + 1 - нет. Значения, конечно же, вводятся в таблицу в поименном порядке, поэтому первое значение с именем, автоматическми попадает в столбец 1, второе в столбец 2, на так далее.</p><p class="p">ВСТАВКА ПУСТЫХ УКАЗАТЕЛЕЙ (NULL)</p><p class="p">Если вам нужно ввести пустое значение(NULL), вы вводите его точно также как и обычное значение. Предположим, что еще не имелось поля city для мистера Peel. Вы можете вставить его строку со значением=NULL в это поле, следующим образом:</p><p class="empty-line"/><p class="p">INSERT INTO Salespeople</p><p class="p">VALUES (1001, 'Peel', NULL, .12);</p><p class="empty-line"/><p class="p">Так как значение NULL - это специальный маркер, а не просто символьное значение, он не включяется в одиночные кавычки.</p><p class="p">ИМЕНОВАНИЕ СТОЛБЦА ДЛЯ ВСТАВКИ (INSERT)</p><p class="p">Вы можете также указывать столбцы, куда вы хотите вставить значение имени. Это позволяет вам вставлять имена в любом порядке. Предположим что вы берете значения для таблицы Заказчиков из отчета выводимого на принтер, который помещает их в таком порядке: city, cname, и cnum, и для упрощения, вы хотите ввести значения в том же порядке:</p><p class="empty-line"/><p class="p">INSERT INTO Customers (city, cnamе, cnum)</p><p class="p">VALUES ('London', 'Honman', 2001);</p><p class="empty-line"/><p class="p">Обратите внимание что столбцы rating и snum - отсутствуют. Это значит, что эти строки автоматически установлены в значение - по умолчанию. По умолчанию может быть введено или значение NULL или другое значение определяемое как - по умолчанию. Если ограничение запрещает использование значения NULL в данном столбце, и этот столбец не установлен как по умолчанию, этот столбец должен быть обеспечен значением для любой команды INSERT которая относится к таблице( смотри Главу 18 для информации об ограничениях на NULL и на "по умолчанию" ).</p><p class="subtitle">ВСТАВКА РЕЗУЛЬТАТОВ ЗАПРОСА</p><p class="p">Вы можете также использовать команду INSERT чтобы получать или выбирать значения из одной таблицы и помещать их в другую, чтобы использовать их вместе с запросом. Чтобы сделать это, вы просто заменяете предложение VALUES (из предыдущего примера) на соответствующий запрос:</p><p class="empty-line"/><p class="p">INSERT INTO Londonstaff</p><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London';</p><p class="p">Здесь выбираются все значения произведенные запросом - то-есть все строки из таблицы Продавцов со значениями city="London" - и помещаются в таблицу называемую Londonstaff. Чтобы это работало, таблица Londonstaff должна отвечать следующим условиям:</p><p class="p">* Она должна уже быть создана командой CREATE TABLE.</p><p class="p">* Она должна иметь четыре столбца которые совпадают с таблицей Продавцов в терминах типа данных; то-есть первый, второй, и так далее, столбцы каждой таблицы, должны иметь одинаковый тип данных (причем они не должны иметь одинаковых имен ).</p><p class="empty-line"/><p class="p">Общее правило то, что всталяемые столбцы таблицы, должны совпадать со столбцами выводимыми подзапросом, в данном случае, для всей таблицы Продавцов.</p><p class="p">Londonstaff - это теперь независимая таблица которая получила некоторые значения из таблицы Продавцов(Salespeople). Если значения в таблице Продавцов будут вдруг изменены, это никак не отразится на таблицеLondonstaff (хотя вы могли бы создать такой эффект, с помощью Представления( VIEW), описанного в Главе 20 ).</p><p class="p">Так как или запрос или команда INSERT могут указывать столбцы по имени, вы можете, если захотите, переместить только выбранные столбцы а также переупорядочить только те столбцы которые вы выбрали. Предположим, например, что вы решили сформировать новую таблицу с именем Daytotals, которая просто будет следить за общим количеством долларов сумм приобретений упорядоченных на каждый день. Вы можете ввести эти данные независимо от таблицы Порядков, но сначала вы должны заполнить таблицу Daytotals информацией ранее представленной в таблице Порядков.</p><p class="p">Понимая что таблица Поряжков охватывает последний финансовый год, а не только несколько дней, как в нашем примере, вы можете видеть преимущество использования следующего условия INSERT в подсчете и вводе значений</p><p class="empty-line"/><p class="p">INSERT INTO Daytotals (date, total)</p><p class="p">SELECT odate, SUM (amt)</p><p class="p">FROM Orders</p><p class="p">GROUP BY odate;</p><p class="empty-line"/><p class="p">Обратите внимание что, как предложено ранее, имена столбцов таблицы Порядков и таблицы Daytotals - не должны быть одинаковыми. Кроме того, если дата приобретения и общее количество - это единственые столбцы в таблице, и они находятся в данном порядке, их имена могут быть исключены из вывода из-за их очевидной простоты.</p><p class="subtitle">УДАЛЕНИЕ СТРОК ИЗ ТАБЛИЦ</p><p class="p">Вы можете удалять строки из таблицы командой модификации - DELETE.</p><p class="p">Она может удалять только введеные строки, а не индивидуальные значения полей, так что параметр поля является необязательным или недоступным.</p><p class="p">Чтобы удалить все содержание таблицы Продавцов, вы можете ввести следующее условие:</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople;</p><p class="empty-line"/><p class="p">Теперь когда таблица пуста ее можно окончательно удалить командой DROP TABLE (это объясняется в Главе 17 ).</p><p class="p">Обычно, вам нужно удалить только некоторые определенные строки из таблицы. Чтобы определить какие строки будут удалены, вы используете предикат, так же как вы это делали для запросов. Например, чтобы удалить продавца Axelrod из таблицы, вы можете ввести</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople</p><p class="p">WHERE snum=1003;</p><p class="empty-line"/><p class="p">Мы использовали поле snum вместо поля sname потому, что это лучшая тактика при использовании первичных ключей когда вы хотите чтобы действию подвергалась одна и только одна строка. Для вас - это аналогично действию первичного ключя.</p><p class="p">Конечно, вы можете также использовать DELETE с предикатом который бы выбирал группу строк, как показано в этом примере:</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople</p><p class="p">WHERE city='London';</p><p class="empty-line"/><p class="subtitle">ИЗМЕНЕНИЕ ЗНАЧЕНИЙ ПОЛЯ</p><p class="p">Теперь, когда вы уже можете вводить и удалять строки таблицы, вы должны узнать как изменять некоторые или все значения в существующей строке.</p><p class="p">Это выполняется командой UPDATE. Эта команда содержит предложение UPDATE в которой указано имя используемой таблицы и предложение SET которое указывает на изменение которое нужно сделать для определенного столбца. Например, чтобы изменить оценки всех заказчиков на 200, вы можете ввести</p><p class="empty-line"/><p class="p">UPDATE Customers</p><p class="p">SET rating=200;</p><p class="subtitle">МОДИФИЦИРОВАНИЕ ТОЛЬКО ОПРЕДЕЛЕННЫХ СТРОК</p><p class="p">Конечно, вы не всегда захотите указывать все строки таблицы для изменения единственного значения, так что UPDATE, наподобии DELETE, может брать предикаты. Вот как например можно выполнить изменение одинаковое для всех заказчиков продавца Peel (имеющего snum=1001 ):</p><p class="empty-line"/><p class="p">UPDATE Customers</p><p class="p">SET rating=200</p><p class="p">WHERE snum=1001;</p><p class="p">КОМАНДА UPDATE ДЛЯ МНОГИХ СТОЛБЦОВ</p><p class="p">Однако, вы не должны, ограничивать себя модифицированием единственного столбца с помощью команды UPDATE. Предложение SET может назначать любое число столбцов, отделяемых запятыми. Все указанные назначения могут быть сделаны для любой табличной строки, но только для одной в каждый момент времени. Предположим, что продавец Motika ушел на пенсию, и мы хотим переназначить его номер новому продавцу:</p><p class="empty-line"/><p class="p">UPDATE Salespeople</p><p class="p">SET sname='Gibson',city='Boston',comm=.10</p><p class="p">WHERE snum=1004;</p><p class="empty-line"/><p class="p">Эта команда передаст новому продавцу Gibson, всех текущих заказчиков бывшего продавца Motika и порядки, в том виде в котором они были скомпонованы для Motika с помощью поля snum. Вы не можете, однако, модифицировать сразу много таблиц в одной команде, частично потому, что вы не можете использовать префиксы таблицы со столбцами измененными предложением SET. Другими словами, вы не можете сказать - "SET Salespeople.sname=Gibson" в команде UPDATE, вы можете сказать только так - "SET sname =Gibson".</p><p class="subtitle">ИСПОЛЬЗОВАНИЕ ВЫРАЖЕНИЙ ДЛЯ МОДИФИКАЦИИ</p><p class="p">Вы можете использовать скалярные выражения в предложении SET команды UPDATE, однако, включив его в выражение поля которое будет изменено. В этом их отличие от предложения VALUES команды INSERT, в котором выражения не могут использоваться; это свойство скалярных выражений весьма полезная особенность. Предположим, что вы решили удвоить комиссионные всем вашим продавцам. Вы можете использовать следующее выражение:</p><p class="empty-line"/><p class="p">UPDATE Salespeople</p><p class="p">SET comm=comm * 2;</p><p class="empty-line"/><p class="p">Всякий раз, когда вы ссылаетесь к указанному значению столбца в предложении SET, произведенное значение может получится из текущей строки, прежде в ней будут сделаны какие-то изменения с помощью команды UPDATE. Естественно, вы можете скомбинировать эти особенности, и сказать, - удвоить комиссию всем продавцам в Лондоне, таким предложением:</p><p class="empty-line"/><p class="p">UPDATE Salespeople</p><p class="p">SET comm=comm * 2</p><p class="p">WHERE city='London';</p><p class="p">МОДИФИЦИРОВАНИЕ ПУСТЫХ(NULL) ЗНАЧЕНИЙ</p><p class="p">Предложение SET - это не предикат. Он может вводить пустые NULL значения также как он вводил значения не используя какого-то специального синтаксиса (такого например как IS NULL). Так что, если вы хотите установить все оценки заказчиков в Лондоне в NULL, вы можете ввести следующее предложение:</p><p class="empty-line"/><p class="p">UPDATE customers</p><p class="p">SET rating=NULL</p><p class="p">WHERE city='London';</p><p class="empty-line"/><p class="p">что обнулит все оценки заказчиков в Лондоне.</p><p class="subtitle">РЕЗЮМЕ</p><p class="p">Теперь вы овладели мастерством управления содержанием вашей базы данных с помощью трех простых команд:</p><p class="empty-line"/><p class="p">INSERT - используемой чтобы помещать строки в базу данных;</p><p class="p">DELETE - чтобы удалять их;</p><p class="p">REFERENCES - чтобы изменять значения в уже вставленных строках.</p><p class="p">Вы обучались использованию предиката с командами UPDATE и DELETE чтобы определять, на которую из строк будет воздействовать команда.</p><p class="p">Конечно, предикаты как таковые - не значимы для INSERT, потому что обсуждаемая строка не существует в таблице до окончания выполнения команды INSERT. Однако, вы можете использовать запросы с INSERT, чтобы сразу помещать все наборы строк в таблицу. Причем это, вы можете делать со столбцами в любом порядке.</p><p class="p">Вы узнали, что значения по умолчанию, могут помещаться в столбцы,если вы не устанавливаете это значение явно. Вы также видели использование стандартного значения по умолчанию, которым является NULL. Кроме того, вы поняли, что UPDATE может использовать выражение значения, тогда как INSERT не может.</p><p class="p">Следующая глава расширит ваше познания, показав вам, как использовать подзапросы с этими командами. Эти подзапросы напоминают те, с которыми вы уже знакомы, но имеются некоторые специальные выводы и ограничения, когда подзапросы используются в командах DML, что мы будем обсуждать в Главе 16.</p><p class="empty-line"/><p class="subtitle">РАБОТА С SQL</p><p class="empty-line"/><p class="p">Напишите команду которая бы поместила следующие значения, в их нижеуказанном порядке, в таблицу Продавцов:</p><p class="p">city - San Jose,</p><p class="p">name - Bianco,</p><p class="p">comm - NULL,</p><p class="p">* cnum - 1100.</p><p class="p">* Напишите команду которая бы удалила все порядки заказчика Clemens из таблицы Порядков.</p><p class="p">* Напишите команду которая бы увеличила оценку всех заказчиков в Риме на 100.</p><p class="p">* Продавец Serres оставил компанию. Переназначьте его заказчиков продавцу Motika.</p></span></span>
