<span><span id="id29"><div class="title2">
<p class="p1">Глава 21. ИЗМЕНЕНИЕ ЗНАЧЕНИЙ С ПОМОЩЬЮ ПРЕДСТАВЛЕНИЙ</p>
</div><p class="empty-line"/><p class="p">ЭТА ГЛАВА РАССКАЗЫВАЕТ О КОМАНДАХ МОДИФИКАЦИИ ЯЗЫКА DML - ВСТАВИТЬ(INSERT), ИЗМЕНИТЬ(UPDATE), и УДАЛИТЬ(DELETE) - когда они применя ются для представлений. Как упомянуто в предыдущей главе, использование команд модификации в представлениях - это косвенный способ использования их в ссылочных таблицах с помощью запросов представлений. Однако, не все представления могут модифицироваться.</p><p class="p">В этой главе, мы будем обсуждать правила определяющие, является ли представление модифицируемым. Кроме того, вы обучитесь использованию предложения WITH CHECK OPTION, которое управляет указанными значениями, которые можно вводить в таблицу с помощью представления.</p><p class="p">Как упомянуто в Главе 18, это, в некоторых случаях, может быть желательным вариантом непосредственного ограничения таблицы.</p><p class="subtitle">МОДИФИЦИРОВАНИЕ ПРЕДСТАВЛЕНИЯ</p><p class="p">Один из наиболее трудных и неоднозначных аспектов представлений - непосредственное их использование с командами модификации DML. Как упомянуто в предыдущей главе, эти команды фактически воздействуют на значения в базовой таблице представления. Это является некоторым противоречием. Представление состоит из результатов запроса, и когда вы модифицируете представление, вы модифицируете набор результатов запроса. Но модификация не должна воздействовать на запрос ; она должна воздействовать на значения в таблице к которой был сделан запрос, и таким образом изменять вывод запроса. Это не простой вопрос. Следующий оператор будет создавать представление показанное в Таблице 21.1:</p><p class="empty-line"/><p class="p">CREATE VIEW Citymatch (custcity, salescity)</p><p class="p">AS SELECT DISTINCT a.city, b.city</p><p class="p">FROM Customers a, Salespeople b</p><p class="p">WHERE a.snum=b.snum;</p><p class="empty-line"/><p class="p">Это представление показывает все совпадения заказчиков с их продавцами так, что имеется по крайней мере один заказчик в городе_заказчика обслуживаемый продавцом в городе_продавца.</p><p class="p">Например, одна строка этой таблицы - London London - показывает, что имеется по крайней мере один заказчик в Лондоне,обслуживаемый продавцом в Лондоне. Эта строка может быть произведена при совпадении Hoffmanа с его продавцом Peel, причем если оба они из Лондона.</p><p class="empty-line"/><p class="subtitle">SQL Execution Log</p><p class="empty-line"/><p class="p">SELECT * FROM Citymatch;</p><p class="empty-line"/><table class="table">
<tr>
<td class="td"><p class="p"><strong>custcity</strong></p></td>
<td class="td"><p class="p"><strong>salescity</strong></p></td>
</tr>
<tr>
<td class="td"><p class="p">Berlin</p></td>
<td class="td"><p class="p">San Jose</p></td>
</tr>
<tr>
<td class="td"><p class="p">London</p></td>
<td class="td"><p class="p">London</p></td>
</tr>
<tr>
<td class="td"><p class="p">Rome</p></td>
<td class="td"><p class="p">London</p></td>
</tr>
<tr>
<td class="td"><p class="p">Rome</p></td>
<td class="td"><p class="p">New York</p></td>
</tr>
<tr>
<td class="td"><p class="p">San Jose</p></td>
<td class="td"><p class="p">Barselona</p></td>
</tr>
<tr>
<td class="td"><p class="p">San Jose</p></td>
<td class="td"><p class="p">San Jose</p></td>
</tr>
</table><p class="empty-line"/><p class="p">Таблица 21.1: Представление совпадения по городам</p><p class="p">Однако, то же самое значение будет произведено при совпадении Clemens из Лондона, с его продавцом, который также оказался с именем - Peel. Пока отличающиеся комбинации городов выбирались конкретно, только одна строка из этих значений была произведена.</p><p class="p">Даже если вы не получите выбора используя отличия, вы все еще будете в том же самом положении, потому что вы будете тогда иметь две строки в представлении с идентичными значениями, то-есть с обоими столбцами равными " Lоndon London ". Эти две строки представления будут отличаться друг от друга, так что вы пока не сможете сообщить, какая строка представления исходила из каких значений базовых таблиц( имейте в виду, что запросы не использующие предложение ORDER BY, производят вывод в произвольном порядке. Это относится также и к запросам используемым внутри представлений, которые не могут использовать ORDER BY. Таким образом, порядок из двух строк не может быть использован для их отличий. Это означает, что мы будем снова обращаться к выводу строк которые не могут быть точно связаны с указаными строками запрашиваемой таблицы. Что если вы пробуете удалить строку | London London | из представления? Означало бы это удаление Hoffmanа из таблицы Заказчиков, удаление Clemens из той же таблицы, или удаление их обоих? Должен ли SQL также удалить Peel из таблицы Продавцов? На эти вопросы невозможно ответить точно, поэтому удаления не разрешены в представлениях такого типа. Представление Citymatch - это пример представления только_чтение, оно может быть только запрошено, но не изменено.</p><p class="subtitle">ОПРЕДЕЛЕНИЕ МОДИФИЦИРУЕМОСТИ ПРЕДСТАВЛЕНИЯ</p><p class="p">Если команды модификации могут выполняться в представлении, представление как сообщалось будет модифицируемым; в противном случае оно предназначено только для чтения при запросе. Непротивореча этой терминологии, мы будем использовать выражение "модифицируемое представление"(updating a view), чтоы означает возможность выполнения в представление любой из трех команд модификации DML (Вставить, Изменить и Удалить ), которые могут изменять значения. Как вы определите, является ли представление модифицируемым? В теории базы данных, это - пока обсуждаемая тема. Основной ее принцип такой: модифицирумое представление - это представление в котором команда модификации может выполниться, чтобы изменить одну и только одну строку основной таблицы в каждый момент времени, не воздействуя на любые другие строки любой таблицы.</p><p class="p">Использование этого принципа на практике, однако, затруднено. Кроме того, некоторые представления, которые являются модифицируемыми в теории, на самом деле не являются модифицируемыми в SQL. Критерии по которые определяют, является ли представление модифицируемым или нет, в SQL, следующие:</p><p class="p">* Оно должно выводиться в одну и только в одну базовую таблицу.</p><p class="p">* Оно должно содержать первичный ключ этой таблицы (это технически не предписывается стандартом ANSI, но было бы неплохо придерживаться этому).</p><p class="p">* Оно не должно иметь никаких полей, которые бы являлись агрегатнымифункциями.</p><p class="p">* Оно не должно содержать DISTINCT в своем определении.</p><p class="p">* Оно не должно использовать GROUP BY или HAVING в своем определении.</p><p class="p">* Оно не должно использовать подзапросы (это - ANSI_ограничение которое не предписано для некоторых реализаций )</p><p class="p">* Оно может быть использовано в другом представлении, но это представление должно также быть модифицируемыми.</p><p class="p">* Оно не должно использовать константы, строки, или выражения значений (например: comm * 100 ) среди выбранных полей вывода.</p><p class="p">* Для INSERT, оно должно содержать любые поля основной таблицы которые имеют ограничение NOT NULL, если другое ограничение по умолчанию, не определено.</p><p class="empty-line"/><p class="subtitle">МОДИФИЦИРУЕМЫЕ ПРЕДСТАВЛЕНИЯ И ПРЕДСТАВЛЕНИЯ ТОЛЬКО_ЧТЕНИЕ.</p><p class="p">Одно из этих ограничений то, что модифицируемые представления, фактически, подобны окнам в базовых таблицах. Они показывают кое-что, но не обязательно все, из содержимого таблицы. Они могут ограничивать определенные строки (использованием предикатов), или специально именованные столбцы (с исключениями ), но они представляют значения непосредственно и не выводит их информацию, с использованием составных функций и выражений.</p><p class="p">Они также не сравнивают строки таблиц друг с другом (как в обьединениях и подзапросах, или как с DISTINCT ).</p><p class="p">Различия между модифицируемыми представлениями и представлениями только_чтение неслучайны.</p><p class="p">Цели для которых вы их используете, часто различны. Модифицируемые представления, в основном, используются точно так же как и базовые таблицы. Фактически, пользователи не могут даже осознать, является ли объект который они запрашивают, базовой таблицей или представлением.</p><p class="p">Это превосходный механизм защиты для сокрытия частей таблицы, которые являются конфиденциальными или не относятся к потребностям данного пользователя. (В Главе 22, мы покажем вам, как позволить пользователям обращаться к представлению, а не к базовой таблице ).</p><p class="p">Представления только_чтение, с другой стороны, позволяют вам получать и переформатировать данные более рационально. Они дают вам библиотеку сложных запросов, которые вы можете выполнить и повторить снова, сохраняя полученную вами информацию до последней минуты. Кроме того, результаты этих запросов в таблицах, которые могут затем использоваться в запросах самостоятельно (например, в обьединениях ) имеют преимущество над просто выполнением запросов.</p><p class="p">Представления только_чтение могут также иметь прикладные программы защиты. Например, вы можете захотеть, чтобы некоторые пользователи видели агрегатные данные, такие как усредненное значение комиссионных продавца, не видя индивидуальных значений комиссионных.</p><p class="empty-line"/><p class="subtitle">ЧТО ЯВЛЯЕТСЯ - МОДИФИЦИРУЕМЫМИ ПРЕДСТАВЛЕНИЕМ</p><p class="p">Имеются некоторые примеры модифицируемых представлений и представлений только_чтение:</p><p class="empty-line"/><p class="p">CREATE VIEW Dateorders (odate, ocount)</p><p class="p">AS SELECT odate, COUNT (*)</p><p class="p">FROM Orders</p><p class="p">GROUP BY odate;</p><p class="empty-line"/><p class="p">Это - представление только_чтение из-за присутствия в нем агрегатной функции и GROUP BY.</p><p class="empty-line"/><p class="p">CREATE VIEW Londoncust</p><p class="p">AS SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE city='London';</p><p class="empty-line"/><p class="p">А это - представление модифицируемое.</p><p class="empty-line"/><p class="p">CREATE VIEW SJsales (name, number, percentage)</p><p class="p">AS SELECT sname, snum, comm 100</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='SanJose';</p><p class="empty-line"/><p class="p">Это - представление только_чтение из-за выражения " comm * 100 " . При этом, однако, возможны переупорядочение и переименование полей. Некоторые программы будут позволять удаление в этом представлении или в порядках столбцов snum и sname.</p><p class="empty-line"/><p class="p">CREATE VIEW Salesonthird</p><p class="p">AS SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE snum IN</p><p class="p">(SELECT snum</p><p class="p">FROM Orders</p><p class="p">WHERE odate=10/03/1990);</p><p class="empty-line"/><p class="p">Это - представление только_чтение в ANSI из-за присутствия в нем подзапроса. В некоторых программах, это может быть приемлемо.</p><p class="empty-line"/><p class="p">CREATE VIEW Someorders</p><p class="p">AS SELECT snum, onum, cnum</p><p class="p">FROM Orders</p><p class="p">WHERE odate IN (10/03/1990,10/05/1990);</p><p class="empty-line"/><p class="p">Это - модифицируемое представление.</p><p class="empty-line"/><p class="subtitle">ПРОВЕРКА ЗНАЧЕНИЙ ПОМЕЩАЕМЫХ В ПРЕДСТАВЛЕНИЕ</p><p class="p">Другой вывод о модифицируемости представления тот, что вы можете вводить значения которые " проглатываются " (swallowed) в базовой таблице. Рассмотрим такое представление:</p><p class="empty-line"/><p class="p">CREATE VIEW Highratings</p><p class="p">AS SELECT cnum, rating</p><p class="p">FROM Customers</p><p class="p">WHERE rating=300;</p><p class="empty-line"/><p class="p">Это - представление модифицируемое. Оно просто ограничивает ваш доступ к определенным строкам и столбцам в таблице. Предположим, что вы вставляете (INSERT) следующую строку:</p><p class="empty-line"/><p class="p">INSERT INTO Highratings</p><p class="p">VALUES (2018, 200);</p><p class="empty-line"/><p class="p">Это - допустимая команда INSERT в этом представлении. Строка будет вставлена, с помощью представления Highratings, в таблицу Заказчиков.</p><p class="p">Однако когда она появится там, она исчезнет из представления, поскольку значение оценки не равно 300. Это - обычная проблема.</p><p class="p">Значение 200 может быть просто напечатано, но теперь строка находится уже в таблице Заказчиков где вы не можете даже увидеть ее. Пользователь не сможет понять, почему введя строку он не может ее увидеть, и будет неспособен при этом удалить ее. Вы можете быть гарантированы от модификаций такого типа с помощью включения WITH CHECK OPTION (С ОПЦИЕЙ ПРОВЕРКИ) в определение представления. Мы можем использовать WITH CHECK OPTION в определении представления Highratmgs.</p><p class="empty-line"/><p class="p">CREATE VIEW Highratings</p><p class="p">AS SELECT cnum, rating</p><p class="p">FROM Customers</p><p class="p">WHERE rating=300</p><p class="p">WITH CHECK OPTION;</p><p class="empty-line"/><p class="p">Вышеупомянутая вставка будет отклонена.</p><p class="p">WITH CHECK OPTION - производит действие все_или_ничего (all-or-nothing). Вы помещаете его в определение представления, а не в команду DML, так что или все команды модификации в представлении будут проверяться, или ни одна не будет проверена. Обычно вы хотите использовать опцию проверки, используя ее в определении представления, что может быть удобно.</p><p class="p">В общем, вы должны использовать эту опцию, если у вас нет причины, разрешать представлению помещать в таблицу значения, которые он сам не может содержать.</p><p class="empty-line"/><p class="subtitle">ПРЕДИКАТЫ И ИСКЛЮЧЕННЫЕ ПОЛЯ</p><p class="p">Похожая проблема, которую вы должны знать, включает в себя вставку строк в представление с предикатом, базирующемся на одном или более исключенных полей. Например, может показаться разумным, чтобы создать Londonstaff подобно этому:</p><p class="empty-line"/><p class="p">CREATE VIEW Londonsta1t</p><p class="p">AS SELECT snum, sname, comm</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London';</p><p class="empty-line"/><p class="p">В конце концов, зачем включать значение city, если все значения city будут одинаковыми.</p><p class="p">А как будет выглядит картинка получаемая всякий раз, когда мы пробуем вставить строку. Так как мы не можем указать значение city как значение по умолчанию, этим значением вероятно будет NULL, и оно будет введено в поле city (NULL используется если другое значение по умолчанию значение не было определено. См. Главу 18 для подробностей ).</p><p class="p">Так как в этм случае поле city не будет равняться значению London, вставляемая строка будет исключена из представления.</p><p class="p">Это будет верным для любой строки которую вы попробуете вставить в просмотр Londonstaff. Все они должны быть введены с помощью представления Londonstaff в таблицу Продавцов, и затем исключены из самого представления( если определением по умолчанию был не London, то это особый случай). Пользователь не сможет вводить строки в это представление, хотя все еще неизвестно, может ли он вводить строки в базовую таблицу. Даже если мы добавим WITH CHECK OPTION в определение представления</p><p class="empty-line"/><p class="p">CREATE VIEW Londonstate</p><p class="p">AS SELECT snum, sname, comm</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London'</p><p class="p">WITH CHECK OPTION;</p><p class="empty-line"/><p class="p">проблема не обязательно будет решена. В результате этого мы получим представление которое мы могли бы модифицировать или из которого мы могли бы удалять, но не вставлять в него. В некоторых случаях, это может быть хорошо; хотя возможно нет смысла пользователям имеющим доступ к этому представлению иметь возможность добавлять строки. Но вы должны точно определить что может произойти прежде, чем вы создадите такое представление.</p><p class="p">Даже если это не всегда может обеспечить Вас полезной информацией, полезно включать в ваше представление все поля, на которые имеется ссылка в предикате. Если вы не хотите видеть эти поля в вашем выводе, вы всегда сможете исключить их из запроса в представлении, в противоположность запросу внутри представления. Другими словами, вы могли бы определить представление Londonstaff подобно этому:</p><p class="empty-line"/><p class="p">CREATE VIEW Londonstaff</p><p class="p">AS SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London'</p><p class="p">WITH CHECK OPTION;</p><p class="empty-line"/><p class="p">Эта команда заполнит представление одинаковыми значениями в поле city, которые вы можете просто исключить из вывода с помощью запроса в котором указаны только те поля которые вы хотите видеть</p><p class="empty-line"/><p class="p">SELECT snum, sname, comm</p><p class="p">FROM Londonstaff;</p><p class="subtitle">ПРОВЕРКА ПРЕДСТАВЛЕНИЙ КОТОРЫЕ БАЗИРУЮТСЯ НА ДРУГИХ ПРЕДСТАВЛЕНИЯХ</p><p class="p">Еще одно надо упоминуть относительно предложения WITH CHECK OPTION в ANSI: оно не делает каскадированного изменения : Оно применяется только в представлениях в которых оно определено, но не в представлениях основанных на этом представлении. Например, в предыдущем примере</p><p class="empty-line"/><p class="p">CREATE VIEW Highratings</p><p class="p">AS SELECT cnum, rating</p><p class="p">FROM Customers</p><p class="p">WHERE rating=300</p><p class="p">WITH CHECK OPTION;</p><p class="empty-line"/><p class="p">попытка вставить или модифицировать значение оценки не равное 300 потерпит неудачу. Однако, мы можем создать второе представление (с идентичным содержанием ) основанное на первом:</p><p class="empty-line"/><p class="p">CREATE VIEW Myratings</p><p class="p">AS SELECT *</p><p class="p">FROM Highratings;</p><p class="empty-line"/><p class="p">Теперь мы можем модифицировать оценки не равные 300:</p><p class="empty-line"/><p class="p">UPDATE Myratings</p><p class="p">SET rating=200</p><p class="p">WHERE cnum=2004;</p><p class="empty-line"/><p class="p">Эта команда выполняемая так как если бы она выполнялась как первое представление, будет допустима. Предложение WITH CHECK OPTION просто гарантирует, что любая модификация в представлении, произведет значения, которые удовлетворяют предикату этого представления. Модификация других представлений базирующихся на первом текущем, является все еще допустимой, если эти представления не защищены предложениями WITH CHECK OPTION внутри этих представлений. Даже если такие предложения установлены, они проверяют только те предикаты представлений в которых они содержатся. Так например, даже если представление Myratings создавалось следующим образом</p><p class="empty-line"/><p class="p">CREATE VIEW Myratings</p><p class="p">AS SELECT *</p><p class="p">FROM Highratings</p><p class="p">WITH CHECK OPTION;</p><p class="empty-line"/><p class="p">проблема не будет решена. Предложение WITH CHECK OPTION будет исследовать только предикат представления Myratings. Пока у Myratings, фактически, не имеется никакого предиката, WITH CHECK OPTION ничего не будет делать. Если используется предикат, то он будет проверяться всякий раз, когда представление Myratings будет модифицироваться, но предикат Highratings все равно будет проигнорирован. Это - дефект в стандарте ANSI, который у большинство программ исправлен. Вы можете попробовать использовать представление наподобии последнего примера и посмотреть избавлена ли ваша система от этого дефекта. (Попытка выяснить это самостоятельно может быть иногда быть проще и яснее, чем поиск ответа в документации системы. )</p><p class="subtitle">РЕЗЮМЕ</p><p class="p">Вы теперь овладели знаниями о представлениях полностью. Кроме правил определяющих, является ли данное представление модифицируемыми в SQL, вы познакомились с основными понятиями на которых эти правила базируются - т.е что модификации в представлениях допустимы только когда SQL может недвусмысленно определить, какие значения базовой таблицы можно изменять.</p><p class="p">Это означает что команда модификации, при выполнении, не должна требовать ни изменений для многих строк сразу, ни сравнений между многочисленными строками либо базовой таблицы либо вывода запроса. Так как обьединения включают в себя сравнение строк, они также запрещены. Вы также поняли различие между некоторыми способами которые используют модификацируемые представления и представления только_чтение. Вы научились воспринимать модифицируемые представления как окна, отображающие данные одиночной таблицы, но необязательно исключающие или реорганизующие столбцы, посредством выбора только определенных строк отвечающих условию предиката. Представления только_чтение, с другой стороны, могут содержать более допустимые запросы SQL; они могут следовательно стать способом хранения запросов, которые вам нужно часто выполнять в неизменной форме. Кроме того, наличие запроса чей вывод обрабатывается как объект данных, дает вам возможность иметь ясность и удобство при создании запросов в выводе запросов. Вы теперь можете предохранять команды модификации в представлении от создания строк в базовой таблице, которые не представлены в самом представлении с помощью предложения WITH CHECK OPTION в определении представления. Вы можете также использовать WITH CHECK OPTION как один из способов ограничения в базовой таблице. В автономных запросах, вы обычно используете один или более столбцов в предикате не представленых среди выбранных для вывода, что не вызывает никаких проблем. Но если эти запросы используются в модифицируемых представлениях, появляются проблемы, так как эти запросы производят представления, которые не могут иметь вставляемых в них</p><p class="p">строк. Вы видели некоторые подходы к этим проблемам. В Главах 20 И 21, мы говорили, что представления имеют прикладные программы защиты. Вы можете позволить пользователям обращаться к представлениям не разрешая в тоже время обращаться к таблицам в которых эти представления непосредственно находятся. Глава 22 будет исследовать вопросы доступа к объектам данных в SQL.</p><p class="subtitle">РАБОТА С SQL</p><p class="empty-line"/><p class="p">Какое из этих представлений - модифицируемое?</p><p class="p">* CREATE VIEW Dailyorders</p><p class="p">AS SELECT DISTINCT cnum, snum, onum,</p><p class="p">odate</p><p class="p">* FROM Orders;</p><p class="p">CREATE VIEW Custotals</p><p class="p">AS SELECT cname, SUM (amt)</p><p class="p">FROM Orders, Customers</p><p class="p">WHERE Orders.cnum=customer.cnum</p><p class="p">* GROUP BY cname;</p><p class="p">CREATE VIEW Thirdorders</p><p class="p">AS SELECT *</p><p class="p">FROM Dailyorders</p><p class="p">* WHERE odate=10/03/1990;</p><p class="p">CREATE VIEW Nullcities</p><p class="p">AS SELECT snum, sname, city</p><p class="p">FROM Salespeople</p><p class="p">WHERE city IS NULL</p><p class="p">* OR sname BETWEEN 'A' AND 'MZ';</p><p class="empty-line"/><p class="p">* Создайте представление таблицы Продавцов с именем Commissions (Комиссионные). Это представление должно включать только поля comm и snum. С помощью этого представления, можно будет вводить или изменять комиссионные, но только для значений между .10 и .20.</p><p class="p">* Некоторые SQL реализации имеют встроенную константу представляющую текущую дату, иногда называемую " CURDATE ". Слово CURDATE может следовательно использоваться в операторе SQL, и заменяться текущей датой, когда его значение станет доступным с помощью таких команд как SELECT или INSERT. Мы будем использовать представление таблицы Порядков с именем Entryorders для вставки строк в таблицу Порядков. Создайте таблицу порядков, так чтобы CURDATE автоматически вставлялась в поле odate если не указано другого значения. Затем создайте представление Entryorders, так чтобы значения не могли быть указаны.</p></span></span>
