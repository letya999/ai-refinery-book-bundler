<span><span id="id12"><div class="title2">
<p class="p1">Глава 4. ИСПОЛЬЗОВАНИЕ РЕЛЯЦИОННЫХ И БУЛЕВЫХ ОПЕРАТОРОВ ДЛЯ СОЗДАНИЯ БОЛЕЕ ИЗОЩРЕННЫХ ПРЕДИКАТОВ</p>
</div><p class="empty-line"/><p class="p">В ГЛАВЕ 3, ВЫ УЗНАЛИ ЧТО ПРЕДИКАТЫ МОГУТ оценивать равенство оператора как верного или неверного. Они могут также оценивать другие виды связей кроме равенств. Эта глава будет исследовать другие реляционные операторы используемые в SQL. Вы также узнаете как использовать операторы Буля, чтобы изменять и объединять значения предиката. С помощью операторов Буля (или проще говоря логических операторов), одиночный предикат может содержать любое число условий. Это позволяет вам создавать очень сложные предикаты. Использование круглых скобок в структуре этих сложных предикатов будет также объясняться.</p><p class="subtitle">РЕЛЯЦИОННЫЕ ОПЕРАТОРЫ</p><p class="p">Реляционный оператор - математический символ который указывает на определенный тип сравнения между двумя значениями. Вы уже видели как используются равенства, такие как 2 + 3 = 5 или city = "London". Но также имеются другие реляционные операторы. Предположим что вы хотите видеть всех Продавцов с их комиссионными выше определенного значения.</p><p class="p">Вы можете использовать тип сравнения "больше чем" - (&gt;). Реляционные операторы которыми распологает SQL :</p><p class="empty-line"/><p class="p"> = Равный</p><p class="p">&gt; Больше чем</p><p class="p"> &lt; Меньше чем </p><p class="p">&gt;= Больше чем или равно</p><p class="p">&lt;= Меньше чем или равно</p><p class="p">&lt;&gt; Не равно</p><p class="empty-line"/><p class="p">Эти операторы имеют стандартные значения для числовых значений. Для значения символа, их определение зависит от формата преобразования, ASCII или EBCDIC, который вы используете. SQL сравнивает символьные значения в терминах основных номеров как определено в формате преобразования. Даже значение символа, такого как "1", который представляет номер, не обязательно равняется номеру который он представляет. Вы можете использовать реляционные операторы чтобы установить алфавитный порядок - например, "a" &lt; "n" где средство a первое в алфавитном порядке - но все это ограничивается с помощью параметра преобразования формата.</p><p class="p">И в ASCII и в EBCDIC, символы - по значению: меньше чем все другие символы которым они предшествуют в алфавитном порядке и имеют один вариант( верхний или нижний). В ASCII, все символы верхнего регистра меньше чем все символы нижнего регистра, поэтому "Z" &lt; "a", а все номера - меньше чем все символы, поэтому "1" &lt; "Z". То же относится и к EBCDIC. Чтобы сохранить обсуждение более простым, мы допустим что вы будете использовать текстовый формат ASCII. Проконсультируйтесь с вашей документацией системы если вы неуверены какой формат вы используете или как он работает.</p><p class="p">Значения сравниваемые здесь называются - скалярными значениями. Скалярные значения производяться скалярными выражениями; 1 + 2 - это скалярное выражение которое производит скалярное значение 3. Скалярное значение может быть символом или числом, хотя очевидно что только номера используются с арифметическими операторами, такими как +(плюс) или *(звезда).</p><p class="p">Предикаты обычно сравнивают значения скалярных величин, используя или реляционные операторы или специальные операторы SQL чтобы увидеть верно ли это сравнение. Некоторые операторы SQL описаны в Главе 5.</p><p class="p">Предположим что вы хотите увидеть всех заказчиков с оценкой(rating) выше 200. Так как 200 - это скалярное значение, как и значение в столбце оценки, для их сравнения вы можете использовать реляционный оператор.</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE rating &gt; 200;</p><p class="empty-line"/><p class="p">Вывод для этого запроса показывается в Таблице 4.1.</p><p class="p">Конечно, если бы мы захотели увидеть еще и заказчиков с оценкой равной 200, мы стали бы использовать предикат</p><p class="empty-line"/><p class="p">rating &gt;=200</p><p class="subtitle">БУЛЕВЫ ОПЕРАТОРЫ</p><p class="p">Основные Булевы операторы также распознаются в SQL. Выражения Буля - являются или верными или неверными, подобно предикатам. Булевы операторы связывают одно или более верных/неверных значений и производят едиственное верное/или/неверное значение. Стандартными операторами Буля распознаваемыми в SQL являются:</p><p class="empty-line"/><p class="p">AND, OR, и NOT.</p><p class="empty-line"/><p class="subtitle">SQL Execution Log</p><p class="empty-line"/><p class="p">SELECT * FROM Customers WHERE rating &gt; 200;</p><p class="empty-line"/><table class="table">

</table><p class="empty-line"/><p class="p">Таблица 4.1: Использование больше чем (&gt;)</p><p class="p">Существуют другие, более сложные, операторы Буля (типа "исключенный или"), но они могут быть сформированы из этих трех простых операторов - AND, OR, NOT.</p><p class="p">Как вы можете понять, Булева верня / неверная логика - основана на цифровой компьютерной операции; и фактически, весь SQL( или любой другой язык ) может быть сведен до уровня Булевой логики.</p><p class="p">Операторы Буля и как они работают</p><p class="empty-line"/><p class="p">* AND берет два Буля (в форме A AND B) как аргументы и оценивает их по отношению к истине, верны ли они оба.</p><p class="p">* OR берет два Буля (в форме A OR B) как аргументы и оценивает на правильность, верен ли один из них.</p><p class="p">* NOT берет одиночный Булев (в форме NOT A) как аргументы и заменяет его значение с неверного на верное или верное на неверное.</p><p class="empty-line"/><p class="p">Связывая предикаты с операторами Буля, вы можете значительно увеличить их возможности. Предположим вы хотите видеть всех заказчиков в San Jose которые имеют оценку(рейтинг) выше 200:</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE city=" San Jose'</p><p class="p">AND rating &gt; 200;</p><p class="empty-line"/><p class="p">Вывод для этого запроса показан на Таблице 4.2. Имеется только один заказчик который удовлетворяет этому условию.</p><p class="p">Если вы же используете OR вы получите всех заказчиков которые находились в San Jose или(OR) которые имели оценку выше 200.</p><p class="empty-line"/><p class="subtitle">SQL Execution Log</p><p class="p">SELECT * FROM Customers WHERE city='San Jose' AND rating &gt; 200;</p><table class="table">

</table><p class="empty-line"/><p class="p">Таблица 4.2: SELECT использующий AND</p><p class="p">SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE city=" San Jose'</p><p class="p">OR rating &gt; 200;</p><p class="p">Вывод для этого запроса показывается в Таблице 4.3.</p><p class="p">NOT может использоваться для инвертирования значений Буля. Имеется пример запроса с NOT:</p><p class="p">SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE city=" San Jose'</p><p class="p">OR NOT rating &gt; 200;</p><p class="empty-line"/><p class="p">Вывод этого запроса показывается в Таблице 4.4.</p><p class="subtitle">SQL Execution Log</p><p class="p">SELECT * FROM Customers WHERE city='San Jose' OR rating &gt; 200;</p><table class="table">

<td class="td"><p class="p">1004</p></td>

</table><p class="empty-line"/><p class="p">Рисунок 4.4: SELECT использующий NOT</p><p class="p">Все записи за исключением Grass были выбраны. Grass не был в San Jose, и его оценка была больше чем 200, так что он потерпел неудачу при обеих проверках. В каждой из других строк встретился один или другой или оба критериев. Обратите внимание что оператор NOT должен предшествовать Булеву оператору, чье значение должно измениться, и не должен помещаться перед реляционным оператором. Например неправильным вводом оценки предиката будет:</p><p class="empty-line"/><p class="p">rating NOT &gt; 200</p><p class="empty-line"/><p class="p">Он выдаст другую отметку. А как SQL оценит следующее?</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE NOT city=" San Jose'</p><p class="p">OR rating &gt; 200;</p><p class="p">NOT применяется здесь только к выражению city='SanJose', или к выражению rating &gt; 200 тоже ? Как и написано, правильный ответ будет прежним. SQL может применять NOT с выражением Буля только сразу после него. Вы можете получить другой результат при команде:</p><p class="p">SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE NOT( city=" San Jose'</p><p class="p">OR rating &gt; 200 );</p><p class="p">Здесь SQL понимает круглые скобки как означающие, что все внутри них будет оцениваться первым и обрабатываться как единое выражение с помощью всего что снаружи них (это является стандартной интерпретацией математике). Другими словами, SQL берет каждую строку и определяет, соответствует ли истине равенство city =" San Jose' или равенство rating &gt; 200. Если любое условие верно, выражение Буля внутри круглых скобок верно. Однако, если выражение Буля внутри круглых скобок верно, предикат как единое целое неверен, потому что NOT преобразует верно в неверно и наоборот.</p><p class="p">Вывод для этого запроса - показывается в Рисунке 4.5. Имеется намеренно сложный пример. Посмотрим сможете ли вы проследить его логику (вывод показан в Рисунке 4.6 ):</p><p class="p">SELECT *</p><p class="p">FROM Orders</p><p class="p">WHERE NOT ((odate=10/03/1990 AND snum &gt;1002)</p><p class="p">OR amt &gt; 2000.00);</p><p class="empty-line"/><p class="subtitle">SQL Execution Log</p><p class="p">SELECT * FROM Customers WHERE NOT</p><p class="p">(city='San Jose' OR rating &gt; 200);</p><p class="empty-line"/><table class="table">

</table><p class="empty-line"/><p class="p">Рисунок 4.6: Полный (комплексный) запрос</p><p class="p">Несмотря на то что Булевы опреаторы индивидуально просты, они не так просты когда комбинируются в комплексное выражение.</p><p class="p">Способ оценки комплекса Булева состоит в том, чтобы оценивать Булевы выражения наиболее глубоко вложенные в круглых скобках, объединять их в единичное Булево значение, и затем объединять его с верхними значениями.</p><p class="p">Имеется подробное объяснение того как пример выше был вычислен. Наиболее глубоко вложенные выражения Буля в предикате - это odate=10/03/1990 и snum &gt; 1002 являются объединеными с помощью AND, формируя одно выражение Буля которое будет оценено как верное для всех строк в которых встретились оба эти условия. Это составное Булево выражение (которое мы будем называть Булево номер 1, или B1 для краткости) объдиняется с выражением (amt) &gt; 2000.00 (B2) с помощью OR, формируя третье выражение (B3), которое является верным для данной строки, если или B1 или B2 - верны для этой строки.</p><p class="p">B3 полностью содержится в круглых скобках которым предшествует NOT, формируя последнее выражение Буля(B4), которое является условием предиката.</p><p class="p">Таким образом B4, предикат запроса, - будет верен всякий раз, когда B3 неправилен. B3 - неправилен всегда, когда B1 и B2 - оба неверны. B1 неправилен для строки если дата порядка строки не 10/03/1990, или если значение snum не большее чем 1002. B2 неправилен для всех строк, значения суммы приобретений которых не превышает 2000.00. Любая строка со значением выше 2000.00 сделает B2 - верным; в результате B3 будет верен, а B4 нет. Следовательно, все эти строки будут удалены из вывода.</p><p class="p">Из оставшихся, строки которые на 3 Октября имеют snum &gt; 1002 (такие как строки для onum 3001 на 3 Октября со snum=1007 ), делают B1 верным, с помощью верного B3 и неверного предиката запроса. Они будут также удалены из вывода. Вывод показан для строк которые оставлены.</p><p class="subtitle">РЕЗЮМЕ</p><p class="p">В этой главе, вы значительно расширили ваше знакомство с предикатами. Теперь вы можете находить значения которые связаны с данным значением любым способом - определяемым различными реляционными операторами.</p><p class="p">Вы можете также использовать операторы Буля AND и OR чтобы много условий, каждое из которых автономно в предикатах, объединять в единый предикат. Оператор Буля NOT, как вы уже видели, может изменять значение условия или группы условий на противоположное.</p><p class="p">Булевы и Реляционные операторы могут эффективно управляться с помощью круглых скобок, которые определяют порядок, в котором операции будут выполнены. Эти операции применимы к любому уровню сложности и вы поняли как сложные условия могут создаваться из этих простых частей.</p><p class="p">Теперь, когда мы показали как используются стандартные математические операторы, мы можем перейти к операторам которые являются исключительными в SQL. Это мы сделаем в Главе 5.</p><p class="empty-line"/><p class="subtitle">РАБОТА С SQL</p><p class="p">* Напишите запрос который может дать вам все порядки со значениями суммы выше чем $1,000.</p><p class="p">* Напишите запрос который может выдать вам поля sname и city для всех продавцов в Лондоне с комиссионными выше .10 .</p><p class="p">* Напишите запрос к таблице Заказчиков чей вывод может включить всех заказчиков с оценкой=&amp;lt; 100, если они не находятся в Риме.</p><p class="p">* Что может быть выведено в результате следующего запроса?</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Orders</p><p class="p">WHERE (amt &lt; 1000 OR</p><p class="p">NOT (odate=10/03/1990</p><p class="p">AND cnum &gt; 2003 ));</p><p class="empty-line"/><p class="p">* Что может быть выведено в результате следующего запроса?</p><p class="empty-line"/><p class="p">SELECT *</p><p class="p">FROM Orders</p><p class="p">WHERE NOT ((odate=10/03/1990 OR snum &gt; 1006)</p><p class="p">AND amt &gt;=1500 );</p><p class="empty-line"/><p class="p">* Как можно проще переписать такой запрос?</p><p class="empty-line"/><p class="p">SELECT snum, sname, city, comm</p><p class="p">FROM Salespeople</p><p class="p">WHERE (comm &gt; + .12 OR</p><p class="p">comm &lt; .14 );</p></span></span>
