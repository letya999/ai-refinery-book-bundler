<span><span id="id24"><div class="title2">
<p class="p1">Глава 16. ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ С КОМАНДАМИ МОДИФИКАЦИИ</p>
</div><p class="empty-line"/><p class="p">В ЭТОЙ ГЛАВЕ, ВЫ УЗНАЕТЕ КАК ИСПОЛЬЗОВАТЬ подзапросы в командах модификации. Вы найдете, что нечто подобное - вы уже видели при использовании подзапросов в запросах. Понимание, как подзапросы используются в командах SELECT, cделает их применение в командах модификации более уверенным, хотя и останутся некоторые вопросы.</p><p class="empty-line"/><p class="p">Завершением команды SELECT является подзапрос, но не предикат, и поэтому его использование отличается от использования простых предикатов с командами модификации, которые вы уже выполняли ранеее с командами UPDATE и DELETE. Вы использовали простые запросы чтобы производить значения для INSERT, а теперь мы можем расширить эти запросы чтобы включять в них подзапросы.</p><p class="p">Важный принцип который надо соблюдать при работе с командами модификации, состоит в том, что вы не можете в предложении FROM любого подзапроса, модифицировать таблицу к которой ссылаетесь с помощью основной команды. Это относится ко всем трем командам модификации. Хотя имеется большое количество ситуаций в которых будет полезно сделать запрос той таблицы которую вы хотите модифицировать причем во время ее модификации, это слишком усложняет операцию чтобы использовать ее на практике.</p><p class="p">Не делайте ссылки к текущей строке таблицы указанной в команде, которая является соотнесенным подзапросом.</p><p class="subtitle">ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ С INSERT</p><p class="p">INSERT - это самый простой случай. Вы уже видели как вставлять результаты запроса в таблицу. Вы можете использовать подзапросы внутри любого запроса, который генерирует значения для команды INSERT тем же самым способом, которым вы делали это для других запросов - т.е. внутри предиката или предложения HAVING.</p><p class="p">Предположим, что мы имеем таблицу с именем SJpeople, столбцы которой совпадают со столбцами нашей таблицы Продавцов. Вы уже видели как заполнять таблицу подобно этой, заказчиками в городе, например, в San Jose:</p><p class="empty-line"/><p class="p">INSERT INTO SJpeople</p><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='San Jose';</p><p class="empty-line"/><p class="p">Теперь мы можем использовать подзапрос чтобы добавить к таблице SJpeople всех продавцов которые имеют заказчиков в San Jose, независимо от того, находятся ли там продавцы или нет:</p><p class="empty-line"/><p class="p">INSERT INTO SJpeople</p><p class="p">SELECT *</p><p class="p">FROM Salespeople</p><p class="p">WHERE snum=ANY</p><p class="p">( SELECT snum</p><p class="p">FROM Customers</p><p class="p">WHERE city=' (San (Jose' );</p><p class="empty-line"/><p class="p">Оба запроса в этой команде функционируют также как если бы они не являлись частью выражения INSERT. Подзапрос находит все строки для заказчиков в San Jose и формирует набор значений snum. Внешний запрос выбирает строки из таблицы Salespeople, где эти значения snum найдены.</p><p class="p">В этом примере, строки для продавцов Rifkin и Serres, которые назначены заказчикам в San Jose - Liu и Cisneros, будут вставлены в таблицу SJpeople.</p><p class="subtitle">НЕ ВСТАВЛЯЙТЕ ДУБЛИКАТЫ СТРОК</p><p class="p">Последовательность команд в предшествующем разделе может быть проблематичной. Продавец Serres находится в San Jose, и следовательно будет вставлен с помощью первой команды. Вторая команда попытается вставить его снова, поскольку он имеет еще одного заказчика в San Jose.</p><p class="p">Если имеются любые ограничения в таблице SJpeople которые вынуждают ее значения быть уникальными, эта вторая вставка потерпит неудачу (как это и должно было быть). Двойные строки это плохо. (См. Главу 18 для подробностей об ограничениях. )</p><p class="p">Было бы лучше если бы вы могли как-то выяснить, что эти значения уже были вставлены в таблицу, прежде чем вы попытаетесь сделать это снова, с помощью добавления другого подзапроса (использующего операторы типа EXISTS, IN, &lt; &gt; ALL, и так далее ) к предикату.</p><p class="p">К сожалению, чтобы сделать эту работу, вы должны будете сослаться на саму таблицу SJpeople в предложении FROM этого нового подзапроса, а, как мы говорили ранее, вы не можете ссылаться на таблицу которая задействована (целиком ) в любом подзапросе команды модификации. В случае INSERT, это будет также препятствовать соотнесенным подзапросам, основанным на таблице в которую вы вставляете значения. Это имеет значение, потому что, с помощью INSERT, вы создаете новую строку в таблице. "Текущая строка" не будет существовать до тех пор, пока INSERT не закончит ее обрабатывать.</p><p class="subtitle">ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ СОЗДАНЫХ ВО ВНЕШНЕЙ ТАБЛИЦЕ ЗАПРОСА</p><p class="p">Запрещение на ссылку к таблице которая модифицируется командой INSERT не предохранит вас от использования подзапросов которые ссылаются к таблице используемой в предложении FROM внешней команды SELECT. Таблица из которой вы выбираете значения, чтобы произвести их для INSERT, не будет задействована командой; и вы сможете ссылаться к этой таблице любым способом которыми вы обычно это делали, но только если эта таблица указана в автономном запросе. Предположим что мы имеем таблицу с именем Samecity в которой мы запомним продавцов с заказчиками в их городах.</p><p class="p">Мы можем заполнить таблицу используя соотнесенный подзапрос:</p><p class="empty-line"/><p class="p">INSERT INTO (Samecity</p><p class="p">SELECT *</p><p class="p">FROM (Salespeople outer</p><p class="p">WHERE city IN</p><p class="p">( SELECT city</p><p class="p">FROM Customers inner</p><p class="p">WHERE inner.snum=outer.snum );</p><p class="empty-line"/><p class="p">Ни таблица Samecity, ни таблица Продавцов не должны быть использованы во внешних или внутренних запросах INSERT. В качестве другого примера, предположим, что вы имеете премию для продавца который имеет самый большой порядок на каждый день. Вы следите за ним в таблице с именем Bonus, которая содержит поле snum продавцов, поле odate и поле amt. Вы должны заполнить эту таблицу информацией которая хранится в таблице Порядков, используя следующую команду:</p><p class="empty-line"/><p class="p">INSERT INTO Bonus</p><p class="p">SELECT snum, odate, amt</p><p class="p">FROM Orders a</p><p class="p">WHERE amt=</p><p class="p">( SELECT MAX (amt)</p><p class="p">FROM Orders b</p><p class="p">WHERE a.odate=b.odate );</p><p class="empty-line"/><p class="p">Даже если эта команда имеет подзапрос который базируется на той же самой таблице что и внешний запрос, он не ссылается к таблице Bonus, на которую воздействует команда. Что для нас абсолютно приемлемо.</p><p class="p">Логика запроса, естественно, должна просматривать таблицу Порядков, и находить для каждой строки максимум порядка сумм приобретений для этой даты. Если эта величина - такая же как у текущей строки, текущая строка является наибольшим порядком для этой даты, и данные вставляются в таблицу Bonus.</p><p class="subtitle">ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ С DELETE</p><p class="p">Вы можете также использовать подзапросы в предикате команды DELETE.</p><p class="p">Это даст вам возможность определять некоторые довольно сложные критерии чтобы установить, какие строки будут удаляться, что важно, так как вы конечно же не захотите по неосторожности удалить нужную строку.</p><p class="p">Например, если мы закрыли наше ведомство в Лондоне, мы могли бы использовать следующий запрос чтобы удалить всех заказчиков назначенных к продавцам в Лондоне:</p><p class="empty-line"/><p class="p">DELETE</p><p class="p">FROM Customers</p><p class="p">WHERE snum=ANY</p><p class="p">( SELECT snum</p><p class="p">FROM Salespeople</p><p class="p">WHERE city='London' );</p><p class="empty-line"/><p class="p">Эта команда удалит из таблицы Заказчиков строки Hoffman и Clemens (назначенных для Peel), и Periera (назначенного к Motika).</p><p class="p">Конечно, вы захотите удостовериться, правильно ли сформирована эта операция, прежде чем удалитт или изменитт строки Peel и Motika.</p><p class="p">Это важно. Обычно, когда мы делаем модификацию в базе данных, котовая повлечет другие модификации, наше первое желание - сделать сначало основное действие, а затем проследить другие, вторичные. Этот пример, покажет, почему более эффективно делать наоборот, выполнив сначала вторичные действия.</p><p class="p">Если, например, вы решили изменить значение поля city ваших продавцов везде, где они переназначены, вы должны рассмотреть всех этих заказчиков более сложным способом.</p><p class="p">Так как реальные базы данных имеют тенденцию развиваться до значительно больших размеров чем наши небольшие типовые таблицы, это может стать серьезной проблемой. SQL может предоставить некоторую помощь в этой области используя механизм справочной целостности (обсужденной в Главе 19 ), но это не всегда доступно и не всегда применимо.</p><p class="p">Хотя вы не можете ссылаться к таблице из которой вы будете удалять строки в предложении FROM подзапроса, вы можете в предикате, сослаться на текущую строку-кандидат этой таблицы - которая является строкой которая в настоящее время проверяется в основном предикате. Другими словами, вы можете использовать соотнесенные подзапросы. Они отличаются от тех соотнесенных подзапросов, которые вы могли использовать с INSERT, в котором они фактически базировались на строках-кандидатах таблицы задействованой в команде, а не на запросе другой таблицы.</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople</p><p class="p">WHERE EXISTS</p><p class="p">( SELECT *</p><p class="p">FROM Customers</p><p class="p">WHERE rating=100</p><p class="p">AND Salespeople.snum=Customers.snum );</p><p class="empty-line"/><p class="p">Обратите внимание, что AND часть предиката внутреннего запроса ссылается к таблице Продавцов. Это означает что весь подзапрос будет выполняться отдельно для каждой строки таблицы Продавцов, также как это выполнялось с другими соотнесенными подзапросами. Эта команда удалит всех продавцов которые имели по меньшей мере одного заказчика с оценкой 100 в таблице Продавцов.</p><p class="p">Конечно же, имеется другой способ сделать то же:</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople</p><p class="p">WHERE 100 IN</p><p class="p">( SELECT rating</p><p class="p">FROM Customers</p><p class="p">WHERE Salespeople.snum=Customers.snum);</p><p class="empty-line"/><p class="p">Эта команда находит все оценки для каждого заказчика продавцов и удаляет тех продавцов заказчики которого имеют оценку=100.</p><p class="p">Обычно соотнесенные подзапросы - это подзапросы связанные с таблицей к которой они ссылаются во внешнем запросе (а не в самом предложении DELETE) - и также часто используемы. Вы можете найти наинизший порядок на каждый день и удалить продавцов которые произвели его, с помощью следующей команды:</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople</p><p class="p">WHERE (snum IN</p><p class="p">( SELECT snum</p><p class="p">FROM Orders</p><p class="p">WHERE amt=</p><p class="p">( SELECT MIN (amt)</p><p class="p">FROM Orders b</p><p class="p">WHERE a.odate=b.odate ));</p><p class="empty-line"/><p class="p">Подзапрос в предикате DELETE, берет соотнесенный подзапрос. Этот внутренний запрос находит минимальный порядок суммы приобретеий для даты каждой строки внешнего запроса. Если эта сумма такая же как сумма текущей строки, предикат внешнего запроса верен, что означает, что текущая строка имеет наименьший порядок для этой даты. Поле snum продавца, ответственного за этот порядок, извлекается и передается в основной предикат команды DELETE, которая затем удаляет все строки с этим значением поля snum из таблицы Продавцов( так как snum - это первичный ключ таблицы Продавцов, то естественно там должна иметься только одна удаляемая строка для значения поля snum выведенного с помощью подзапроса. Если имеется больше одной строки, все они будут удалены. ) Поле snum=1007 которое будет удалено, имеет наименьшее значение на 3 Октября; поле snum =1002, наименьшее на 4 Октября; поле snum=1001, наименьшее в порядках на 5 Октября (эта команда кажется довольно резкой, особенно когда она удаляет Peel создавшего единственный порядок на 5 Октября, но зато это хорошая иллюстрация). Если вы хотите сохранить Peel, вы могли бы добавить другой подзапрос, который бы это делал:</p><p class="empty-line"/><p class="p">DELETE FROM Salespeople</p><p class="p">WHERE (snum IN</p><p class="p">( SELECT snum</p><p class="p">FROM Orders a</p><p class="p">WHERE amt=</p><p class="p">( SELECT MIN (amt)</p><p class="p">FROM Orders b</p><p class="p">WHERE a.odate=b.odate )</p><p class="p">AND 1 &lt;</p><p class="p">( SELECT COUNT onum</p><p class="p">FROM Orders b</p><p class="p">WHERE a.odate=b.odate ));</p><p class="empty-line"/><p class="p">Теперь для дня в котором был создан только один порядок, будет произведен счет=1 во втором соотнесенном подзапросе. Это сделает предикат внешнего запроса неправильным, и поля snum следовательно не будут переданы в основной предикат.</p><p class="subtitle">ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ С UPDATE</p><p class="p">UPDATE использует подзапросы тем же самым способом что и DELETE - внутри этого необязательного предиката. Вы можете использовать соотнесенные подзапросы или в форме пригодной для использования с DELETE - связаной или с модифицируемой таблицей или с таблицей вызываемой во внешнем запросе. Например, с помощью соотнесенного подзапроса к таблице которая будет модифицироваться, вы можете увеличить комиссионные всех продавцов которые были назначены по крайней мере двум заказчикам:</p><p class="empty-line"/><p class="p">UPDATE Salespeople</p><p class="p">SET comm=comm + .01</p><p class="p">WHERE 2 &lt;=</p><p class="p">( SELECT COUNT (cnum)</p><p class="p">FROM Customers</p><p class="p">WHERE Customers.snum=</p><p class="p">Salespeople.snum );</p><p class="empty-line"/><p class="p">Теперь продавцы Peel и Serres, имеющие многочисленых заказчиков, получат повышение своих комиссионных.</p><p class="p">Имеется разновидность последнего примера из предыдущего раздела с DELETE. Он уменьшает комиссионные продавцов которые произвели наименьшие порядки, но не стирает их в таблице:</p><p class="empty-line"/><p class="p">UPDATE Salespeople</p><p class="p">SET comm=comm - .01</p><p class="p">WHERE snum IN</p><p class="p">( SELECT snum</p><p class="p">FROM Orders a</p><p class="p">WHERE amt=</p><p class="p">( SELECT MIN (amt)</p><p class="p">FROM Orders b</p><p class="p">WHERE a.odate=b.odate ));</p><p class="subtitle">СТОЛКНОВЕНИЕ С ОГРАНИЧЕНИЯМИ ПОДЗАПРОСОВ КОМАНДЫ DML</p><p class="p">Неспособность сослаться к таблице задействованой в любом подзапросе из команды модификации (UPDATE), устраняет целые категории возможных действий. Например, вы не можете просто выполнить такую операцию как удаление всех заказчиков с оценками ниже средней. Вероятно лучше всего вы могли бы сначала (Шаг 1.), выполнить запрос, получающий среднюю величину, а затем (Шаг 2.), удалить все строки с оценкой ниже этой величины:</p><p class="empty-line"/><p class="p">Шаг 1.</p><p class="empty-line"/><p class="p">SELECT AVG (rating)</p><p class="p">FROM Customers;</p><p class="empty-line"/><p class="p">Вывод=200.</p><p class="empty-line"/><p class="p">Шаг 2.</p><p class="empty-line"/><p class="p">DELETE</p><p class="p">FROM Customers</p><p class="p">WHERE rating &lt; 200;</p><p class="subtitle">РЕЗЮМЕ</p><p class="p">Теперь вы овладели тремя командами которые управляют всем содержанием вашей базы данных. Осталось только несколько общих вопросов относительно ввода и стирания значений таблицы, когда например эти команды могут выполниться данным пользователем в данной таблице и когда действия сделанные ими, становятся постоянными. Подведем итог: Вы используете команду INSERT чтобы добавлять строки в таблицу. Вы можете или дать имена значениям этих строк в предложении VALUES (когда только одна строка может быть добавлена ), или вывести значения с помощью запроса (когда любое число строк можно добавить одной командой). Если используется запрос, он не может ссылаться к таблице в которую вы делаете вставку,каким бы способом Вы ее ни делали, ни в предложении FROM, ни с помощью внешней ссылки (как это делается в соотнесенных подзапросах). Все это относится к любым подзапросам внутри этого запроса.</p><p class="p">Запрос, однако, оставляет вам свободу использования соотнесенных подзапросов или подзапросов которые дают в предложении FROM имя таблице, которое уже было указано в предложении FROM внешнего запроса (это - общий случай для запросов).</p><p class="p">DELETE и UPDATE используются чтобы, соответственно удалить строки из таблицы и изменить в них значения. Оба они применимы ко всем строкам таблицы, если не используется предикат определяющий какие строки должны быть удалены или модифицированы. Этот предикат может содержать подзапросы, которые могут быть связаны с таблицей, удаляемой, или модифицированой, с помощью внешней ссылки. Эти подзапросы, однако, не могут ссылать к таблице модифицируемой любым предложением FROM. Может показаться, что мы прошли материал SQL который обладает не самым понятным логическим порядком. Сначала мы сделали запрос таблицы которая уже заполнена данными. Потом мы показали как можно фактически помещать эти значения изначально. Но, как вы видете, полное ознакомление с запросами здесь неоценимо. Теперь, когда мы показали вам как заполнять значениями таблицы которые уже были созданы (по определению), мы покажем(со следующей главы) откуда появились эти таблицы.</p><p class="subtitle">РАБОТА С SQL</p><p class="p">* Предположите, что имеется таблица называемая Multicust, с такими же именами столбцов что и таблица Продавцов. Напишите команду, которая бы вставила всех продавцов (из таблицы Продавцов)имеющих более чем одного заказчика в эту таблицу.</p><p class="p">* Напишите команду которая бы удаляла всех заказчиков не имеющих текущих порядков.</p><p class="p">* Напишите команду которая бы увеличила на двадцать процентов комиссионные всех продавцов имеющих общие текущие порядки выше чем $3,000.</p></span></span>
