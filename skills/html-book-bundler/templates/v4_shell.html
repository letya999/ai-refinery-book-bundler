<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="chapters/theme_v4.css">
    <style>
        :root { --sidebar-w: 300px; }
        body { display: flex; height: 100vh; overflow: hidden; margin: 0; }
        #sidebar { 
            width: var(--sidebar-w); 
            background: var(--bg-deep); 
            border-right: 1px solid var(--border); 
            overflow-y: auto; 
            padding: 1rem;
            flex-shrink: 0;
        }
        #reader { 
            flex-grow: 1; 
            overflow-y: auto; 
            background: var(--bg);
            scroll-behavior: smooth;
        }
        .nav-item { 
            padding: 0.75rem 1rem; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-bottom: 4px;
            font-weight: 500;
            color: #475569;
        }
        .nav-item:hover { background: var(--acc-soft); color: var(--acc); }
        .nav-item.active { background: var(--acc); color: white; }
        
        #glossary-overlay {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }
        #glossary-overlay.open { right: 0; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <h2 style="font-size: 1.2rem; padding: 0 1rem;">Содержание</h2>
        <div id="toc"></div>
    </nav>
    
    <main id="reader">
        <div id="content-mount"></div>
    </main>

    <div id="glossary-overlay">
        <button onclick="closeGlossary()" style="float: right;">✕</button>
        <h2 id="glossary-title">Термин</h2>
        <div id="glossary-def">Определение...</div>
    </div>

    <script type="application/json" id="book-data">
        {{BOOK_DATA}}
    </script>

    <script>
        const data = JSON.parse(document.getElementById('book-data').textContent);
        const toc = document.getElementById('toc');
        const mount = document.getElementById('content-mount');
        
        function loadChapter(id) {
            const ch = data.chapters.find(c => c.id === id);
            mount.innerHTML = ch.content;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-id="${id}"]`).classList.add('active');
            document.getElementById('reader').scrollTop = 0;
            
            // Re-bind glossary links
            document.querySelectorAll('.term-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    showGlossary(link.dataset.term);
                });
            });
        }

        function showGlossary(termId) {
            const term = data.glossary.find(t => t.id === termId);
            if (term) {
                document.getElementById('glossary-title').textContent = term.name;
                document.getElementById('glossary-def').innerHTML = term.def;
                document.getElementById('glossary-overlay').classList.add('open');
            }
        }

        function closeGlossary() { document.getElementById('glossary-overlay').classList.remove('open'); }

        data.chapters.forEach((ch, index) => {
            const el = document.createElement('div');
            el.className = 'nav-item';
            el.dataset.id = ch.id;
            el.textContent = `${index + 1}. ${ch.title}`;
            el.onclick = () => loadChapter(ch.id);
            toc.appendChild(el);
        });

        // Initial load
        if (data.chapters.length > 0) loadChapter(data.chapters[0].id);
    </script>
</body>
</html>
