<!DOCTYPE html>
<html lang="{{LANG_CODE}}" dir="{{LANG_DIR}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BOOK_TITLE}}</title>
    <style>
        {{THEME_CSS}}
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar { 
            width: var(--sidebar-w); 
            background: var(--bg-deep); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            overflow-y: auto;
        }
        
        #sidebar-header { padding: 2rem; border-bottom: 1px solid var(--border); }
        #sidebar-header h1 { font-size: 1.1rem; margin: 0; font-weight: 800; color: var(--acc); }

        #toc { flex: 1; padding: 1rem 0; }
        .nav-item { 
            padding: 0.75rem 2rem; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 600; 
            color: var(--muted);
            transition: all 0.2s;
        }
        .nav-item:hover { background: white; color: var(--acc); }
        .nav-item.active { background: white; color: var(--acc); border-left: 4px solid var(--acc); padding-left: calc(2rem - 4px); }

        #reader { flex: 1; overflow-y: auto; background: white; position: relative; }
        #content-mount { transition: opacity 0.2s; padding: 2rem; max-width: 900px; margin: 0 auto; }
        
        /* Overlay Glossary */
        #glossary-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        #glossary-overlay.open { display: flex; }
        #glossary-card {
            background: white; padding: 2rem; border-radius: 16px; max-width: 500px; width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative;
        }
        #glossary-card h2 { margin-top: 0; color: var(--acc); border: none; font-size: 1.5rem; }
        #glossary-close { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem; line-height: 1; }

        @media (max-width: 800px) {
            #sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-header">
                <h1>{{BOOK_TITLE}}</h1>
            </div>
            <nav id="toc"></nav>
        </aside>
        
        <main id="reader">
            <div id="content-mount" class="chapter-content"></div>
        </main>
    </div>

    <div id="glossary-overlay" onclick="closeGlossary()">
        <div id="glossary-card" onclick="event.stopPropagation()">
            <span id="glossary-close" onclick="closeGlossary()">&times;</span>
            <h2 id="glossary-title">Термин</h2>
            <hr style="border:0; border-top:1px solid var(--border); margin: 1rem 0;">
            <div id="glossary-def">Определение...</div>
        </div>
    </div>

    <script id="book-data" type="application/json">
        {
          "chapters": {{LOCAL_CHAPTERS}},
          "glossary": {{GLOSSARY_DATA}},
          "titles":   {{GLOBAL_TITLES}},
          "anchors":  {{GLOBAL_ANCHORS}},
          "assets":   {{ASSETS}}
        }
    </script>

    <script>
        const data = JSON.parse(document.getElementById('book-data').textContent);
        const toc = document.getElementById('toc');
        const mount = document.getElementById('content-mount');
        const reader = document.getElementById('reader');
        
        function hydrateImages(container) {
            container.querySelectorAll('img[data-src]').forEach(img => {
                const assetKey = img.getAttribute('data-src');
                if (data.assets[assetKey]) {
                    img.src = data.assets[assetKey];
                    img.removeAttribute('data-src');
                }
            });
        }

        function loadChapter(index) {
            mount.style.opacity = '0';
            setTimeout(() => {
                mount.innerHTML = data.chapters[index];
                hydrateImages(mount);
                reader.scrollTop = 0;
                mount.style.opacity = '1';
                
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                const navItem = document.querySelector(`[data-idx="${index}"]`);
                if (navItem) navItem.classList.add('active');
            }, 100);
        }

        // DELEGATED CLICK HANDLER
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (!link) return;

            // 1. Term links
            if (link.classList.contains('term-link')) {
                e.preventDefault();
                e.stopPropagation();
                showGlossary(link.dataset.term);
                return;
            }

            // 2. Anchor links
            const href = link.getAttribute('href');
            if (href && href.startsWith('#')) {
                const targetId = href.substring(1);
                const chapterIdx = data.anchors[targetId];
                if (chapterIdx !== undefined) {
                    e.preventDefault();
                    loadChapter(chapterIdx);
                    setTimeout(() => {
                        const target = document.getElementById(targetId);
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    }, 250);
                }
            }
        });

        function showGlossary(termId) {
            const term = data.glossary.find(t => t.id === termId);
            if (term) {
                document.getElementById('glossary-title').textContent = term.name;
                document.getElementById('glossary-def').innerHTML = term.def;
                document.getElementById('glossary-overlay').classList.add('open');
            }
        }

        function closeGlossary() { 
            document.getElementById('glossary-overlay').classList.remove('open'); 
        }

        // Render TOC
        data.titles.forEach((title, index) => {
            const el = document.createElement('div');
            el.className = 'nav-item';
            el.dataset.idx = index;
            el.textContent = `${index + 1}. ${title}`;
            el.onclick = () => loadChapter(index);
            toc.appendChild(el);
        });

        if (data.chapters.length > 0) loadChapter(0);
    </script>
</body>
</html>
