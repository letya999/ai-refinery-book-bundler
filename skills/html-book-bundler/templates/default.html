<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Интерактивная книга</title>
<style>
:root { 
  --bg: #081423; --panel: #0f1f38; --panel2: #163056; --line: #2c4d80; --text: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  height: 100%; background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%); 
  color: var(--text); font-family: "Trebuchet MS", "Segoe UI Variable", Tahoma, sans-serif; overflow: hidden; 
}
.stars {
  position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
              radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
              radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px; animation: twinkle 5s infinite; opacity: 0.4; z-index: 0;
}
@keyframes twinkle { 0%, 100% { opacity: 0.2 } 50% { opacity: 0.5 } }

.app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15, 31, 56, 0.95), rgba(11, 22, 45, 0.98));
  display: flex; flex-direction: column; backdrop-filter: blur(12px);
  height: 100vh; overflow: hidden;
}
.app.side-hide .side { display: none; }

.brand { padding: 24px 20px; border-bottom: 1px solid var(--line); }
.brand h1 { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.brand p { font-size: 12px; color: var(--muted); }

.search-box { padding: 12px; border-bottom: 1px solid var(--line); }
.search-box input { 
  width: 100%; padding: 12px; background: #0c1831; border: 1px solid #3f66a6; 
  color: #fff; border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s;
}
.search-box input:focus { border-color: var(--acc); background: #12244a; }

.list { flex: 1; overflow-y: auto; padding: 10px; display: grid; gap: 8px; align-content: start; }
.ch { 
  all: unset; cursor: pointer; padding: 14px 16px; border-radius: 12px; 
  border: 1px solid #3f66a6; background: rgba(17, 31, 57, .72); 
  font-size: 14px; line-height: 1.4; color: #dce9ff; transition: 0.2s;
}
.ch:hover { border-color: var(--acc); background: rgba(22, 48, 86, .8); }
.ch.on { 
  background: linear-gradient(135deg, rgba(114, 216, 255, .2), rgba(135, 239, 201, .14)); 
  border-color: var(--acc); color: #fff; font-weight: 700; 
}
.ch b { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--acc); margin-bottom: 4px; }

.main { display: flex; flex-direction: column; min-width: 0; background: rgba(8, 20, 35, 0.2); position: relative; }
.top { 
  height: 60px; border-bottom: 1px solid var(--line); background: rgba(13, 25, 49, 0.9); 
  display: flex; align-items: center; gap: 12px; padding: 0 16px; backdrop-filter: blur(10px); z-index: 10;
}
.top button { 
  all: unset; cursor: pointer; padding: 8px 14px; border: 1px solid #456fb0; 
  border-radius: 10px; color: #d6e7ff; font-size: 13px; font-weight: 600; transition: 0.2s;
}
.top button:hover { border-color: var(--acc); color: #fff; background: rgba(22, 48, 86, .5); }
.tt { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; }
.tt i { font-style: normal; color: var(--muted); margin-right: 8px; }

.prog { height: 4px; background: #234071; position: relative; z-index: 10; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .3s; }

.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: #0c1831; display: block; }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .side { position: fixed; inset: 0 0 0 -100%; width: 85vw; max-width: 320px; transition: 0.3s; z-index: 100; box-shadow: 20px 0 40px rgba(0,0,0,.5); }
  .side.open { left: 0; }
}

::view-transition-old(chapter-frame) { animation: 150ms cubic-bezier(0.4, 0, 1, 1) both fade-out; }
::view-transition-new(chapter-frame) { animation: 250ms cubic-bezier(0, 0, 0.2, 1) both fade-in; }
@keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>
<div class="stars"></div>
<div class="app" id="app">
  <aside class="side" id="side">
    <div class="brand"><h1>Интерактивная книга</h1><p id="vol-info">Загрузка...</p></div>
    <div class="search-box"><input type="text" id="search" placeholder="Поиск по книге..."></div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main">
    <div class="top">
      <button id="menu-btn">☰</button>
      <button id="prev-btn">← Назад</button>
      <button id="next-btn">Вперед →</button>
      <div class="tt" id="tt"></div>
    </div>
    <div class="prog"><i id="bar"></i></div>
    <div class="frame"><iframe id="fr" sandbox="allow-scripts allow-same-origin"></iframe></div>
  </main>
</div>

<script>
  const BOOK_ID = "{{BOOK_ID}}", T = {{GLOBAL_TITLES}}, IDX = {{GLOBAL_SEARCH_INDEX}}, B64 = {{LOCAL_B64_CHAPTERS}};
  let cur = 0, curBlobUrl = null;
  const fr = document.getElementById('fr'), tt = document.getElementById('tt'), bar = document.getElementById('bar');
  const side = document.getElementById('side'), searchInput = document.getElementById('search'), app = document.getElementById('app');

  document.getElementById('menu-btn').onclick = (e) => {
    e.stopPropagation();
    if (window.innerWidth <= 900) side.classList.toggle('open'); else app.classList.toggle('side-hide');
  };

  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;
    const switchContent = () => {
      const bin = atob(B64[i]), bytes = new Uint8Array(bin.length);
      for (let j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j);
      const blob = new Blob([bytes], { type: 'text/html;charset=utf-8' });
      if (curBlobUrl) URL.revokeObjectURL(curBlobUrl);
      curBlobUrl = URL.createObjectURL(blob);
      
      fr.onload = () => {
        if (anchor) {
          const el = fr.contentWindow.document.getElementById(anchor);
          if (el) el.scrollIntoView({ behavior: 'smooth' });
        }
      };
      fr.src = curBlobUrl;
      tt.innerHTML = `<i>Глава ${i+1}</i> ${T[i]}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', Number(el.dataset.i) === i));
      localStorage.setItem(`prog_${BOOK_ID}`, i);
    };

    if (document.startViewTransition) document.startViewTransition(switchContent); else switchContent();
  }

  function buildList(f = '') {
    const list = document.getElementById('list'); list.innerHTML = '';
    T.forEach((t, i) => {
      if (f && !t.toLowerCase().includes(f) && !(IDX[i] && IDX[i].includes(f))) return;
      const b = document.createElement('button'); b.className = 'ch'; b.dataset.i = i;
      b.innerHTML = `<b>Глава ${i+1}</b>${t}`;
      b.onclick = () => { go(i); if (window.innerWidth <= 900) side.classList.remove('open'); };
      if (i === cur) b.classList.add('on');
      list.appendChild(b);
    });
  }

  window.addEventListener('message', e => { if (e.data.action === 'bookGo') go(e.data.chapterIdx, e.data.anchorId); });
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);
  searchInput.oninput = (e) => buildList(e.target.value.toLowerCase());
  
  document.getElementById('vol-info').textContent = `Всего ${T.length} глав`;
  buildList();
  go(parseInt(localStorage.getItem(`prog_${BOOK_ID}`)) || 0);
</script>
</body>
</html>
