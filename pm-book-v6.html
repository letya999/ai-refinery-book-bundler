". Планирование закончено только тогда, когда все стейкхолдеры знают, где лежит АКТУАЛЬНЫЙ план и как подавать заявку на изменения. Без контроля конфигураций вы утонете в письмах и разных версиях ТЗ. 🛠️</p>\n    </section>\n\n    <div class=\"vis-diag\">\n      <svg viewBox=\"0 0 800 400\" xmlns=\"http://www.w3.org/2000/svg\">\n        <defs>\n          <marker id=\"arrowhead\" markerWidth=\"10\" markerHeight=\"7\" refX=\"9\" refY=\"3.5\" orient=\"auto\">\n            <polygon points=\"0 0, 10 3.5, 0 7\" fill=\"#395f9d\" />\n          </marker>\n        </defs>\n\n        <!-- PDCA Circle -->\n        <g transform=\"translate(400, 200)\">\n          <!-- Plan -->\n          <rect x=\"-60\" y=\"-160\" width=\"120\" height=\"50\" rx=\"10\" class=\"diag-node\" fill=\"#72d8ff\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"0\" y=\"-130\" text-anchor=\"middle\" font-weight=\"bold\">PLAN</text>\n          \n          <!-- Do -->\n          <rect x=\"80\" y=\"-25\" width=\"120\" height=\"50\" rx=\"10\" class=\"diag-node\" fill=\"#87efc9\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"140\" y=\"5\" text-anchor=\"middle\" font-weight=\"bold\">DO</text>\n\n          <!-- Check -->\n          <rect x=\"-60\" y=\"110\" width=\"120\" height=\"50\" rx=\"10\" class=\"diag-node\" fill=\"#72d8ff\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"0\" y=\"140\" text-anchor=\"middle\" font-weight=\"bold\">CHECK</text>\n\n          <!-- Act -->\n          <rect x=\"-200\" y=\"-25\" width=\"120\" height=\"50\" rx=\"10\" class=\"diag-node\" fill=\"#87efc9\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"-140\" y=\"5\" text-anchor=\"middle\" font-weight=\"bold\">ACT</text>\n\n          <!-- Curved Arrows -->\n          <path d=\"M70 -135 Q 160 -135 160 -45\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n          <path d=\"M160 45 Q 160 135 70 135\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n          <path d=\"M-70 135 Q -160 135 -160 45\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n          <path d=\"M-160 -45 Q -160 -135 -70 -135\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n        </g>\n        \n        <text x=\"400\" y=\"380\" text-anchor=\"middle\" class=\"diag-text\" font-style=\"italic\">PDCA Cycle: The Project Control Loop</text>\n      </svg>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>🔀 Контроль изменений</b>\n        <p>Новая идея? Ок. Оцениваем влияние на Сроки и Деньги. Спонсор согласен? Меняем Baseline. Нет? Идея идет в корзину. 📉</p>\n      </div>\n      <div class=\"card\">\n        <b>🛒 План закупок</b>\n        <p>Ваша ответственность. Даже если сервер покупает админ, ВЫ отвечаете за то, чтобы он был в нужную дату. ⚠️</p>\n<blockquote class=\"insight\"><p>Планирование закончено только тогда, когда все стейкхолдеры знают, где лежит АКТУАЛЬНЫЙ план и как подавать заявку на изменения.</p></blockquote>\n      </div>\n    </div>\n\n    <details class=\"acc-item\">\n      <summary class=\"acc-head\">Чек-лист перед стартом (Baseline):</summary>\n      <div class=\"acc-body\">\n        <div class=\"grid\">\n<div class=\"card\"><p>Scope (ТЗ) согласован и подписан. ✅</p></div>\n<div class=\"card\"><p>WBS (ИСР) отражает 100% работ. ✅</p></div>\n<div class=\"card\"><p>Расписание подтверждено командой. ✅</p></div>\n<div class=\"card\"><p>Бюджет утвержден спонсором. ✅</p></div>\n<div class=\"card\"><p>Реестр рисков содержит планы спасения. ✅</p></div>\n</div>\n      </div>\n    </details>\n\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">❌ ОШИБКА</div>\n        <p>Хранить план в закрытом файле на своем ноутбуке. Команда не знает, что делать. 💀</p>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">✅ НОРМА</div>\n        <p>План доступен всем 24/7. Версия \"Final_v2_UPD\" не существует — есть только \"Current\". 🔦</p>\n      </div>\n    </div>\n\n    <footer class=\"summary\">\n      <p>💡 <b>Запомните:</b> План — это контракт. Если меняете его втихую — вы нарушаете условия игры.</p>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 15; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff; /* alias for --txt, kept for compatibility */\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed;\n    --line: #b0c8e0; --txt: #1a2535; --muted: #4a6580;\n    --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 1160px;\n  margin: 0 auto;\n  padding: 26px 16px 56px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 28px;\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  background: linear-gradient(-45deg, #081423, #0f1f38, #163056, #081423);\n  background-size: 400% 400%;\n  animation: gradientBG 15s ease infinite;\n  box-shadow: 0 16px 34px rgba(0,0,0,.32);\n  margin-bottom: 28px;\n}\n[data-theme=\"light\"] .hero {\n  background: linear-gradient(-45deg, #dce8f2, #e8f0f8, #d0e4f0, #dce8f2);\n  background-size: 400% 400%;\n  box-shadow: 0 8px 24px rgba(0,0,0,.08);\n}\n\n@keyframes gradientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgba(192,48,48,.06); }\n\n.tr-head        { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; font-weight: 700; }\n.tr-head.good   { color: var(--acc2); }\n.tr-head.bad    { color: var(--bad);  }\n.tr-col ul { padding-left: 18px; margin: 0; color: var(--txt); }\n.tr-col li { margin-bottom: 6px; }\n\n/* ── Accordion (Native details/summary) ── */\ndetails.acc-item {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: rgba(15,31,56,.4);\n  margin-bottom: 12px;\n  overflow: hidden;\n  transition: background .2s;\n}\ndetails.acc-item[open] { background: rgba(15,31,56,.7); }\n[data-theme=\"light\"] details.acc-item { background: rgba(220,232,242,.5); }\n\nsummary.acc-head {\n  padding: 14px 18px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  list-style: none;\n  user-select: none;\n}\nsummary.acc-head::marker, summary.acc-head::-webkit-details-marker { display: none; }\nsummary.acc-head::after { content: '+'; font-size: 18px; opacity: .6; transition: transform .3s; }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; transform: rotate(180deg); }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); margin-bottom: 8px; }\n\n.acc-body {\n  padding: 0 18px 18px;\n  color: var(--txt);\n  font-size: 14px;\n  line-height: 1.5;\n}\n\n/* ── SVG Diagrams ── */\n.vis-diag {\n  margin: 32px 0;\n  padding: 20px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg { max-width: 100%; height: auto; }\n.vis-diag .caption { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }\n.diag-highlight { stroke: var(--acc2); }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); background: var(--panel2); text-align: left; }\ntd { color: var(--txt); font-size: 14px; }\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar { width: 5px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }\n::-webkit-scrollbar-thumb:hover { background: var(--acc); }\n\n/* ── Responsive ── */\n@media (max-width: 900px) {\n  .scale      { grid-template-columns: 1fr 1fr; }\n  .translator { grid-template-columns: 1fr; }\n}\n@media (max-width: 640px) {\n  .grid  { grid-template-columns: 1fr; }\n  .stats { grid-template-columns: 1fr 1fr; }\n  .hero  { padding: 18px; }\n  .sec   { padding: 16px; }\n}\n\n/* ── Universal enrichments (chapter_processor auto-passes) ── */\n.vis-timeline {\n  margin: 32px 0;\n  border-left: 2px solid var(--line);\n  padding-left: 24px;\n  position: relative;\n}\n.tl-step {\n  position: relative;\n  margin-bottom: 24px;\n}\n.tl-step:last-child { margin-bottom: 0; }\n.tl-num {\n  position: absolute;\n  left: -33px;\n  top: 0;\n  width: 18px;\n  height: 18px;\n  background: var(--acc);\n  color: var(--bg);\n  border-radius: 50%;\n  font-size: 10px;\n  font-weight: 900;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border: 2px solid var(--bg);\n}\n.tl-content b { display: block; color: var(--acc2); margin-bottom: 4px; font-size: 14px; }\n.tl-content { font-size: 14px; color: var(--txt); line-height: 1.4; }\n\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 10px;\n  border-radius: 999px;\n  font-size: 11px;\n  font-weight: 700;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.12);\n  color: var(--acc);\n  text-transform: uppercase;\n  letter-spacing: .05em;\n}\n.badge.warn { border-color: var(--warn); color: var(--warn); background: rgba(255,209,138,.1); }\n.badge.bad  { border-color: var(--bad); color: var(--bad); background: rgba(255,143,143,.1); }\n\n/* Improved Stats */\n.stats { margin: 24px 0; }\n.stat-num { font-variant-numeric: tabular-nums; }\n\ndetails.long-para {\n  margin-bottom: 14px;\n  border-left: 2px solid var(--line);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 13</p>\n      <h1>Выполнение и Контроль: Удержание курса</h1>\n    </section>\n\n    <blockquote class=\"insight\">\n      🌊 Если вы не контролируете прогресс — вы не управляете проектом, а просто плывете по течению к обрыву.\n    </blockquote>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <b class=\"stat-num\">ФОКУС</b>\n        <span class=\"stat-label\">Удержание в Triangle 🔺</span>\n      </div>\n      <div class=\"stat\">\n        <b class=\"stat-num\">%</b>\n        <span class=\"stat-label\">Реальный прогресс</span>\n      </div>\n    </div>\n\n    <section class=\"essence\">\n      <p class=\"lead-para\">Работа РП в фазе выполнения — это не написание кода, а борьба с отклонениями. Собрали данные -> Сравнили с Базовым планом -> Сделали выводы. Если \"всё успеваем\" — значит, кто-то врет. 📉</p>\n    </section>\n\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">❌ ОШИБКА ОТЧЕТА</div>\n        <p>Использовать формальное \"50/50\" (задача либо не начата, либо готова). Или спрашивать у РП-новичка \"ну как там?\". 🤡</p>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">✅ ПРАВИЛЬНЫЙ ОТЧЕТ</div>\n        <p>Спросить исполнителя \"Сколько еще осталось?\". Личная оценка в часах или % — самый точный прогноз. 🤝</p>\n<blockquote class=\"insight\"><p>Работа РП в фазе выполнения — это не написание кода, а борьба с отклонениями.</p></blockquote>\n      </div>\n    </div>\n\n    <div class=\"vis-timeline\">\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">1</div>\n        <div class=\"tl-content\"><b>Сбор</b>: Что сделано по факту? 📊</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">2</div>\n        <div class=\"tl-content\"><b>Анализ</b>: Где мы отклонились? На критическом пути? 🔍</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">3</div>\n        <div class=\"tl-content\"><b>Действие</b>: Сжимаем расписание или меняем приоритеты. 🛠️</div>\n      </div>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>👥 Команда</b>\n        <p>Лучшая мотивация — когда люди сами планировали свои задачи. ИСР — лучший тим-билдинг. 🤝</p>\n      </div>\n      <div class=\"card\">\n        <b>🤝 Заказчик</b>\n        <p>Управляйте его ожиданиями. Плохие новости нужно сообщать сразу, а не в день релиза. ⚠️</p>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <details>\n        <summary class=\"acc-head\">Как работать с \"хотелками\" в разгар работы?</summary>\n        <div class=\"acc-body\">\n          <p>Любое изменение = Change Request. Оцените влияние на сроки и деньги. Если Спонсор готов платить — меняем план. Если нет — идея в корзину до следующей версии. 🔀</p>\n        </div>\n      </details>\n    </div>\n\n    <footer class=\"summary\">\n      <p>💡 <b>Запомните:</b> Не делайте из сдачи проекта сюрприз. Сдавайте куски работы итеративно.</p>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 15; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0 adientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,25 \nsummary.acc-head {\n  padding: 14px 18px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  list-style: none;\n  user-select: none;\n}\nsummary.acc-head::marker, summary.acc-head::-webkit-details-marker { display: none; }\nsummary.acc-head::after { content: '+'; font-size: 18px; opacity: .6; transition: transform .3s; }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; transform: rotate(180deg); }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); margin-bottom: 8px; }\n\n.acc-body {\n  padding: 0 18px 18px;\n  color: var(--txt);\n  font-size: 14px;\n  line-height: 1.5;\n}\n\n/* ── SVG Diagrams ── */\n.vis-diag {\n  margin: 32px 0;\n  padding: 20px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg { max-width: 100%; height: auto; }\n.vis-diag .caption { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }\n.diag-highlight { stroke: var(--acc2); }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line   const store = {

    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }

  document.getElementById('search').placeholder = LANG.search_placeholder;

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? LANG.theme_to_light : LANG.theme_to_dark;
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe if loaded
    try { fr.contentDocument.documentElement.setAttribute('data-theme', t); } catch(e) {}
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);
  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }
    catch(e) { return []; }
  }
  function saveBookmarks(bm) {
    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }
  function toggleBookmark() {
    const bm = getBookmarks();
    const idx = bm.indexOf(cur);
    if (idx === -1) bm.push(cur); else bm.splice(idx, 1);
    saveBookmarks(bm);
    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? LANG.bookmark_remove : LANG.bookmark_add;
  }
  function buildBookmarkList() {
    const bm = getBookmarks();
    bmList.innerHTML = '';
    if (!bm.length) {
      bmList.innerHTML = `<div class="bm-empty">${LANG.no_bookmarks}</div>`;
      return;
    }
    bm.forEach(i => {
      const btn = document.createElement('button');
      btn.className = 'bm-item';
      btn.textContent = `${LANG.chapter} ${i + 1} — ${T[i] || ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      bmList.appendChild(btn);
    });
  }
  bmBtn.onclick = toggleBookmark;

  // ── Search (inverted index) ───────────────────────────────────────────────
  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, '')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

  // ── Chapter navigation ────────────────────────────────────────────────────
  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;

    const doSwitch = () => {
      fr.onload = () => {
        // Propagate theme to iframe
        try { fr.contentDocument.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')); } catch(e) {}

        // Restore scroll position
        const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + i) || '0');
        if (savedRatio > 0.005) {
          try {
            const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
            if (maxY > 0) fr.contentWindow.scrollTo({ top: savedRatio * maxY, behavior: 'instant' });
          } catch(e) {}
        }

        // Navigate to anchor if specified
        if (anchor) {
          try {
            const el = fr.contentDocument.getElementById(anchor);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          } catch(e) {}
        }

        // Save scroll position on scroll
        try {
          fr.contentWindow.addEventListener('scroll', () => {
            try {
              const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
              if (maxY > 10) {
                const ratio = fr.contentWindow.scrollY / maxY;
                store.set('sc_' + BOOK_ID + '_' + cur, ratio.toFixed(4));
              }
            } catch(e) {}
          }, { passive: true });
        } catch(e) {}
      };

      fr.srcdoc = CHAPTERS[i];

      // Update UI
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      tt.innerHTML = `<i>${chLabel}</i> ${T[i] || ''}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));
      store.set('prog_' + BOOK_ID, i);
      updateBookmarkBtn();
    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${t}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      list.appendChild(btn);
    });

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target === searchEl) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.data && e.data.action === 'bookGo') go(e.data.chapterIdx, e.data.anchorId);
  });

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);
  searchEl.oninput = e => buildList(e.target.value);

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
</script>
</body>
</html>
