<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' data:; img-src 'self' data: blob:; connect-src 'none'">
<title>Без Сложностей: Управление Проектами</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --panel: #e4ecf5; --panel2: #d4e2ee; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #b07000;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Trebuchet MS", "Segoe UI Variable", Tahoma, sans-serif;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #e4ecf5 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="stars" aria-hidden="true"></div>
<div class="side-overlay" id="overlay"></div>

<div class="app" id="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1 id="book-title">Без Сложностей: Управление Проектами</h1>
      <p id="vol-info"></p>
    </div>
    <div class="search-box">
      <input type="search" id="search" autocomplete="off">
    </div>
    <div class="bm-panel" id="bm-panel">
      <details id="bm-details">
        <summary id="bm-summary"></summary>
        <div class="bm-list" id="bm-list"></div>
      </details>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="main">
    <div class="top">
      <button id="menu-btn" aria-label="Menu">☰</button>
      <button id="prev-btn"></button>
      <button id="next-btn"></button>
      <div class="tt" id="tt"></div>
      <button id="bm-btn" title="Bookmark" style="font-size:16px"></button>
      <button id="theme-btn" title="Toggle theme" style="font-size:16px"></button>
    </div>
    <div class="prog"><i id="bar"></i></div>
    <div class="frame">
      <iframe id="fr" sandbox="allow-scripts allow-same-origin" title="Chapter content"></iframe>
    </div>
  </main>
</div>



<script>

  // ── Data injected by bundler ──────────────────────────────────────────────

  const T        = ["Глава 1. Введение","Глава 2. О чём книга","Глава 3. Предложение ПМ","Глава 4. Инициация","Глава 5. Планирование","Глава 6. Планируем содержание","Глава 7. Содержание проекта","Глава 8. Время и Стоимость","Глава 9. Время и стоимость","Глава 10. Риски","Глава 11. Управление рисками","Глава 12. Контроль исполнения","Глава 13. Исполнение и контроль","Глава XIV. Закрытие проекта","Глава XV. Что дальше? Рекомендованная литература","Глоссарий PM-Терминов"];
  const CHAPTERS = ["<!DOCTYPE html>\n<html lang=\"ru\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v7.1 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 900px;\n  margin: 0 auto;\n  padding: 26px 20px 80px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 40px 28px;\n  border-bottom: 1px solid var(--line);\n  background: rgba(15,31,56,.4);\n  margin-bottom: 32px;\n  text-align: center;\n}\n.kicker { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--acc); margin-bottom: 8px; font-weight: 700; }\nh1 { margin: 8px 0 0; font-size: clamp(24px, 5vw, 42px); line-height: 1.2; color: var(--txt); }\n\n/* ── Typography ── */\np { margin-bottom: 1.2em; max-width: 75ch; }\nh2 { color: var(--acc); margin-top: 40px; }\nh3 { color: var(--acc2); margin-top: 30px; }\n\n/* ── Glossary Links ── */\n.term-link {\n  color: var(--acc);\n  text-decoration: none;\n  border-bottom: 1px dashed rgba(114,216,255,.4);\n  transition: .2s;\n}\n.term-link:hover { border-bottom-style: solid; background: rgba(114,216,255,.1); }\n\n/* ── SVG Diagrams ── */\n.vis-diag, .vis-network {\n  margin: 32px auto;\n  padding: 24px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  max-width: 640px; /* FIXED: Prevent diagrams from being too large */\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg, .vis-network svg { width: 100%; height: auto; display: block; }\n.caption { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; }\n.diag-highlight { stroke: var(--bad); stroke-width: 3; }\n\n/* ── Table (RACI etc) ── */\n.matrix { \n  overflow-x: auto; \n  border: 1px solid var(--line); \n  border-radius: 12px; \n  margin: 24px 0;\n}\ntable { width: 100%; border-collapse: collapse; background: rgba(15,31,56,.6); }\nth, td { padding: 12px 15px; border: 1px solid var(--line); text-align: left; }\nth { background: var(--panel2); color: var(--acc); font-size: 12px; text-transform: uppercase; }\n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: upperca stat-val\">3</div><div class=\"stat-lab\">Max проектов</div></div>\n    <div class=\"stat-item\"><div class=\"stat-val\"><a href=\"glossary.html#rom\" class=\"term-link\">ROM</a></div><div class=\"stat-lab\">Оценка</div></div>\n</div>\n\n<p class=\"lead-para\">Назначение на проект — не приговор, а сделка. Всегда имейте выбор и понимайте, во что ввязываетесь. Вам предлагают возглавить хаос? Оцените свои силы.</p>\n\n<div class=\"grid\">\n    <div class=\"card\">\n        <span class=\"badge\">Scope</span>\n        <h3>🔍 Что это?</h3>\n        <p>Ясно очертите проект в текущей ситуации. Нет границ — нет проекта.</p>\n    </div>\n    <div class=\"card\">\n        <span class=\"badge\">Power</span>\n        <h3>🛡️ Власть?</h3>\n        <p>Хватит ли полномочий? Если вы — номинальный ПМ без прав, бегите.</p>\n    </div>\n</div>\n\n<blockquote class=\"insight\"><p>Назначение — это не приказ. Это переговоры. Выясните условия до того, как скажете «да».</p></blockquote>\n\n<div class=\"grid\">\n  <div class=\"card\">\n    <span class=\"badge bad\">Waterfall</span>\n    <b>Классический подход</b>\n    <div class=\"grid\">\n<div class=\"card\"><p>Требования зафиксированы до старта</p></div>\n<div class=\"card\"><p>Изменения болезненны и дороги</p></div>\n<div class=\"card\"><p>Результат — в конце пути</p></div>\n<div class=\"card\"><p>Подходит: стройка, производство</p></div>\n</div>\n  </div>\n  <div class=\"card\">\n    <span class=\"badge\">Agile</span>\n    <b>Гибкий подход</b>\n    <div class=\"grid\">\n<div class=\"card\"><p>Требования уточняются итерационно</p></div>\n<div class=\"card\"><p>Изменения — норма, не исключение</p></div>\n<div class=\"card\"><p>Результат виден после каждого спринта</p></div>\n<div class=\"card\"><p>Подходит: разработка ПО, продукты</p></div>\n</div>\n  </div>\n</div>\n\n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 600 120\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <marker id=\"arr3\" markerWidth=\"8\" markerHeight=\"6\" refX olid var(--line);\n  background: rgba(15,31,56,.4);\n  margin-bottom: 32px;\n  text-align: center;\n}\n.kicker { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--acc); margin-bottom: 8px; font-weight: 700; }\nh1 { margin: 8px 0 0; font-size: clamp(24px, 5vw, 42px); line-height: 1.2; color: var(--txt); }\n\n/* ── Typography ── */\np { margin-bottom: 1.2em; max-width: 75ch; }\nh2 { color: var(--acc); margin-top: 40px; }\nh3 { color: var(--acc2); margin-top: 30px; }\n\n/* ── Glossary Links ── */\n.term-link {\n  color: var(--acc);\n  text-decoration: none;\n  border-bottom: 1px dashed rgba(114,216,255,.4);\n  transition: .2s;\n}\n.term-link:hover { border-bottom-style: solid; background: rgba(114,216,255,.1); }\n\n/* ── SVG Diagrams ── */\n.vis-diag, .vis-network {\n  margin: 32px auto;\n  padding: 24px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  max-width: 640px; /* FIXED: Prevent diagrams from being too large */\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg, .vis-network svg { width: 100%; height: auto; display: block; }\n.caption { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; }\n.diag-highlight { stroke: var(--bad); stroke-width: 3; }\n\n/* ── Table (RACI etc) ── */\n.matrix { \n  overflow-x: auto; \n  border: 1px solid var(--line); \n  border-radius: 12px; \n  margin: 24px 0;\n}\ntable { width: 100%; border-collapse: collapse; background: rgba(15,31,56,.6); }\nth, td { padding: 12px 15px; border: 1px solid var(--line); text-align: left; }\nth { background: var(--panel2); color: var(--acc); font-size: 12px; text-transform: uppercase; }\n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: #000; border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<section class=\"hero\"><p class=\"kicker\">Глава 14</p><h1>Глава XIII. Закрытие проекта</h1></section>\n<div class=\"wrap\">\n\n<p class=\"lead-para\"><b>Входы:</b> Устав, Концепция проекта, Продукт проекта</p>\n\n<p>Закрытие проекта – это процесс в самой «голове удава». Проект близок к окончанию. В этой фазе нам предстоит:</p>\n\n<div class=\"stats\">\n    <div class=\"stat-item\"><b>Шаг 1</b><span>Приемка продукта</span></div>\n    <div class=\"stat-item\"><b>Шаг 2</b><span>Высвобождение ресурсов</span></div>\n    <div class=\"stat-item\"><b>Шаг 3</b><span>Сохранение опыта</span></div>\n</div>\n\n<h3>Проводим сдачу-приемку продукта</h3>\n<p>Этот процесс мы проводим для заказчика. Наш проект имеет целью создание продукта, свойства которого описаны в уставе и плане управления проектом. Текущая задача – передать продукт заказчику и получить письменное подтверждение, что он полностью удовлетворяет согласованным требованиям. После этого мы можем считать, что обязательства перед заказчиком выполнены в полном объеме.</p>\n<p>В ходе планирования-исполнения-управления мы собирали и фиксировали требования, информировали заказчика и ключевых пользователей о том, что они получат в качестве продукта и управляли их ожиданиями. Теперь предстоит формальная сдача-приемка.</p>\n<p>Положения концепции будут основой для дальнейшей сдачи работ (если вы в начале проекта не утвердили соответствующие критерии – готовьтесь к сложностям).</p>\n<p>Как правило, заказчик старается не принимать продукт единолично, а организует специальную комиссию. Внимание, в ней не должно быть незнакомых вам людей! Всех, кто будет принимать продукт, вы должны были внести в регистр заинтересованных лиц и заранее определить и обработать их требования, ожидания, накопив, к настоящему моменту, «согласие с продуктом».</p>\n<p>Очень часто в комиссию включают конечных пользователей. Чем лучше выстроены ваши отношения с ними к моменту сдачи работ – тем выше ваши шансы на прием.</p>\n<p>Помните, что сдача работ – не время для споров («что еще стоило бы сделать»). Это лишь проверка, что ранее достигнутые договоренности реализованы. Если вы не провалили свою часть (сбор требований и реализация согласованных), то можете настаивать на том, чтобы продукт был принят.</p>\n\n<h3>Высвобождаем ресурсы</h3>\n<p>Высвобождение ресурсов – это закрытие проекта с точки зрения его спонсора. Именно в этот момент ваша организация перестает тратить деньги на проект.</p>\n<p>Высвободить ресурсы – значит «вернуть» их хозяевам, и, по необходимости, оповестить спонсора. Высвобождение ресурсов предполагает, что люди, техника и специализированное ПО на проекте больше не потребуются.</p>\n<p>Важно понимать, что некоторые ваши сотрудники могли быть выделены на некое определенное время (не на весь проект), и уже давно переключились на прочие задачи. Но, высвобождая ресурсы, вы подаете сигнал всем членам команды и их боссам – «мы закончили». «Хозяева ресурсов» теперь могут окончательно выкинуть ваш проект из головы. Вы не появитесь у них на пороге с просьбой «дать снова того же программиста через недельку на месяц-другой, ибо сдача затянулась и нужны доработки».</p>\n<p>Не торопитесь заявить о «высвобождении» - делайте это только после официального закрытия работ. Но и не затягивайте – оповещайте коллег, как только будете в ней уверены, что закрытие состоялось.</p>\n\n<h3>Сохранить информацию по проекту</h3>\n<p>Сохранение информации по проекту – это закрытие проекта с точки зрения менеджера проекта. Лучшие практики и «извлеченные» в ходе выполнения проекта уроки – важнейший актив вашей компании.</p>\n<p>Закрыв проект – вы получили определенные знания. Напишите краткое резюме проекта. Каковы были цели? Сильно ли они менялись? Промахнулись ли вы с оценкой и по каким признакам ее формировали? Какие уроки для себя вы вынесли, работая в этой предметной области, с этим заказчиком, разрабатывая на этой платформе? Какие эксперты обнаружились в вашей команде, и какие способности конкретных сотрудников можно было бы эффективнее использовать в будущем?</p>\n<p>Не пишите много, сконцентрируйтесь только на важной (с вашей точки зрения) информации.</p>\n<p>Не пренебрегайте корректировкой шаблонов документов. Возможно, в структуру какого-то документа напрашиваются изменения – внесите, облегчите жизнь себе и последователям. Также очень-очень полезно сохранять заполненные «типовые» документы.</p>\n<p>Когда сохранение информации по проекту закончено, можно констатировать: закрытие выполнено. Проект действительно завершен для всех его участников.</p>\n\n<div class=\"grid\">\n    <div class=\"card\">\n        <b>Выход 1</b>\n        <p>Документы, подтверждающие приемку продукта заказчиком.</p>\n    </div>\n    <div class=\"card\">\n        <b>Выход 2</b>\n        <p>Скорректированные шаблоны типовых документов.</p>\n    </div>\n    <div class=\"card\">\n        <b>Выход 3</b>\n        <p>Извлеченные уроки и резюме проекта.</p>\n    </div>\n</div>\n\n</div>\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n  // FIX: include glossary in chapterMap\n  chapterMap['glossary.html'] = 16 - 1;\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\  в ваших проектах!</b></p>\n\n<h3>Рекомендованная литература</h3>\n<div class=\"grid\">\n    <div class=\"card\">\n        <b>1. PMBOK Guide</b>\n        <p>Project Management Institute. Основополагающий свод знаний.</p>\n    </div>\n    <div class=\"card\">\n        <b>2. Вальсируя с медведями</b>\n        <p>ДеМарко Т., Листер Т. Управление рисками в ИТ-проектах.</p>\n    </div>\n    <div class=\"card\">\n        <b>3. Путь камикадзе</b>\n        <p>Эдвард Йордон. Работа в экстремальных условиях.</p>\n    </div>\n    <div class=\"card\">\n        <b>4. Управление проектами</b>\n        <p>Арчибальд Рассел Д. Системный подход.</p>\n    </div>\n    <div class=\"card\">\n        <b>5. Человеческий фактор</b>\n        <p>ДеМарко Т., Листер Т. Психология командной работы.</p>\n    </div>\n    <div class=\"card\">\n        <b>6. Как привести дела в порядок</b>\n        <p>Аллен Дэвид. Личная эффективность (GTD).</p>\n    </div>\n</div>\n\n</div>\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n  // FIX: include glossary in chapterMap\n  chapterMap['glossary.html'] = 16 - 1;\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v7.1 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 900px;\n  margin: 0 auto;\n  padding: 26px 20px 80px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 40px 28px;\n  border-bottom: 1px solid var(--line);\n  background: rgba(15,31,56,.4);\n  margin-bottom: 32px;\n  text-align: center;\n}\n.kicker { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--acc); margin-bottom: 8p adge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<section class=\"hero\">\n    <div class=\"kicker\">Справочник</div>\n    <h1>Глоссарий</h1>\n</section>\n\n<div class=\"wrap\">\n    <div class=\"grid\">\n        <div class=\"card\" id=\"pmbok\">\n            <b>PMBoK (Project Management Body of Knowledge)</b>\n            <p class=\"lead-para\">Свод знаний по управлению проектами, разработанный PMI. Стандарт де-факто в индустрии.</p>\n        </div>\n        <div class=\"card\" id=\"rom\">\n            <b>ROM (Rough Order of Magnitude)</b>\n            <p>Грубая оценка масштаба проекта. Точность обычно составляет от -25% до +75% или от -50% до +100%.</p>\n        </div>\n        <div class=\"card\" id=\"scope\">\n            <b>Scope (Содержание)</b>\n            <p>Совокупность продуктов, услуг и результатов, которые должны быть предоставлены в рамках проекта.</p>\n        </div>\n        <div class=\"card\" id=\"wbs\">\n            <b>WBS (Work Breakdown Structure)</b>\n            <p>Иерархическая структура работ — декомпозиция всех работ проекта для достижения целей и создания результатов.</p>\n        </div>\n        <div class=\"card\" id=\"deliverable\">\n            <b>Deliverable (Результат)</b>\n            <p>Уникальный и проверяемый продукт, результат или способность оказать услугу, который должен быть произведен для завершения процесса, фазы или проекта.</p>\n        </div>\n        <div class=\"card\" id=\"gantt\">\n            <b>Gantt (Диаграмма Ганта)</b>\n            <p>Тип столбчатых диаграмм, который используется для иллюстрации плана-графика проекта.</p>\n        </div>\n        <div class=\"card\" id=\"critical_path\">\n            <b>Critical Path (Критический путь)</b>\n            <p>Самая длинная последовательность задач в проекте, которая определяет минимальную продолжительность проекта.</p>\n        </div>\n        <div class=\"card\" id=\"risk\">\n            <b>Risk (Риск)</b>\n            <p>Неопределенное событие или условие, которое в случае возникновения имеет положительное или отрицательное влияние на цели проекта.</p>\n        </div>\n        <div class=\"card\" id=\"mitigation\">\n            <b>Mitigation (Минимизация риска)</b>\n            <p>Стратегия реагирования на риски, направленная на снижение вероятности или воздействия отрицательного риска.</p>\n        </div>\n        <div class=\"card\" id=\"charter\">\n            <b>Charter (Устав проекта)</b>\n            <p>Документ, выпущенный инициатором или спонсором проекта, который официально авторизует существование проекта и дает менеджеру полномочия.</p>\n        </div>\n        <div class=\"card\" id=\"stakeholder\">\n            <b>Stakeholder (Стейкхолдер)</b>\n            <p>Лицо, группа или организация, которые могут влиять на проект или на которые может повлиять проект.</p>\n        </div>\n        <div class=\"card\" id=\"milestone\">\n            <b>Milestone (Веха)</b>\n            <p>Значимое событие в проекте, имеющее нулевую длительность.</p>\n        </div>\n        <div class=\"card\" id=\"baseline\">\n            <b>Baseline (Базовый план)</b>\n            <p>Одобренная версия плана, с которой сравниваются фактические показатели для выявления отклонений.</p>\n        </div>\n        <div class=\"card\" id=\"raci\">\n            <b>RACI</b>\n            <p>Матрица ответственности (Responsible, Accountable, Consulted, Informed), используемая для распределения ролей в проекте.</p>\n        </div>\n        <div class=\"card\" id=\"kpi\">\n            <b>KPI (Key Performance Indicator)</b>\n            <p>Ключевой показатель эффективности, используемый для оценки успеха деятельности или конкретного проекта.</p>\n        </div>\n        <div class=\"card\" id=\"status_report\">\n            <b>Status Report (Статус-отчет)</b>\n            <p>Регулярный отчет о текущем состоянии проекта, достигнутом прогрессе, рисках и проблемах.</p>\n        </div>\n        <div class=\"card\" id=\"lessons_learned\">\n            <b>Lessons Learned (Усвоенные уроки)</b>\n            <p>Знания, полученные в ходе проекта, которые могут быть использованы для улучшения будущих проектов.</p>\n        </div>\n        <div class=\"card\" id=\"change_request\">\n            <b>Change Request (Запрос на изменение)</b>\n            <p>Формальное предложение об изменении любого документа, поставляемого результата или базового плана.</p>\n        </div>\n        <div class=\"card\" id=\"pert\">\n            <b>PERT (Program Evaluation and Review Technique)</b>\n            <p>Метод статистической оценки длительности задач. Формула: EAD = (O + 4M + P) / 6, где O — оптимистичная, M — наиболее вероятная, P — пессимистичная оценка.</p>\n        </div>\n        <div class=\"card\" id=\"pmi\">\n            <b>PMI (Project Management Institute)</b>\n            <p>Международная некоммерческая организация по управлению проектами, разработавшая стандарт PMBoK и систему сертификации PMP.</p>\n        </div>\n        <div class=\"card\" id=\"budget\">\n            <b>Budget (Бюджет)</b>\n            <p>Одобренная оценка стоимости проекта или его компонента. Включает резервы на непредвиденные расходы и управленческий резерв.</p>\n        </div>\n        <div class=\"card\" id=\"quality\">\n            <b>Quality (Качество)</b>\n            <p>Степень соответствия совокупности характеристик продукта требованиям. В управлении проектами: соответствие целевому назначению, а не максимум характеристик.</p>\n        </div>\n        <div class=\"card\" id=\"gold-plating\">\n            <b>Gold Plating (Золочение)</b>\n            <p>Добавление незапрошенных функций или улучшений сверх согласованного содержания проекта. Запрещённая практика — ведёт к перерасходу и срыву сроков.</p>\n        </div>\n        <div class=\"card\" id=\"critical-path\">\n            <b>Critical Path (Критический путь)</b>\n            <p>Самая длинная цепочка зависимых задач проекта, определяющая минимально возможную длительность. Задержка любой задачи на критическом пути задерживает весь проект.</p>\n        </div>\n    </div>\n</div>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n  // FIX: include glossary in chapterMap\n  chapterMap['glossary.html'] = 16 - 1;\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>"];

  // ── Safe Storage ──────────────────────────────────────────────────────────
  const store = {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const fr       = document.getElementById('fr');
  const tt       = document.getElementById('tt');
  const bar      = document.getElementById('bar');
  const side     = document.getElementById('side');
  const overlay  = document.getElementById('overlay');
  const searchEl = document.getElementById('search');
  const app      = document.getElementById('app');
  const bmBtn    = document.getElementById('bm-btn');
  const bmList   = document.getElementById('bm-list');
  const bmDetails = document.getElementById('bm-details');

  let cur = 0;
  let searchFilter = '';

  // ── i18n helpers ─────────────────────────────────────────────────────────
  document.getElementById('search').placeholder = LANG.search_placeholder;
  document.getElementById('prev-btn').textContent = LANG.prev;
  document.getElementById('next-btn').textContent = LANG.next;
  document.getElementById('bm-summary').textContent = LANG.bookmarks_title;
  document.getElementById('vol-info').textContent = LANG.total_chapters.replace('{n}', T.length);
  document.documentElement.lang = LANG.code || 'ru';

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? LANG.theme_to_light : LANG.theme_to_dark;
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe if loaded
    try { fr.contentDocument.documentElement.setAttribute('data-theme', t); } catch(e) {}
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);
  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }
    catch(e) { return []; }
  }
  function saveBookmarks(bm) {
    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }
  function toggleBookmark() {
    const bm = getBookmarks();
    const idx = bm.indexOf(cur);
    if (idx === -1) bm.push(cur); else bm.splice(idx, 1);
    saveBookmarks(bm);
    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? LANG.bookmark_remove : LANG.bookmark_add;
  }
  function buildBookmarkList() {
    const bm = getBookmarks();
    bmList.innerHTML = '';
    if (!bm.length) {
      bmList.innerHTML = `<div class="bm-empty">${LANG.no_bookmarks}</div>`;
      return;
    }
    bm.forEach(i => {
      const btn = document.createElement('button');
      btn.className = 'bm-item';
      btn.textContent = `${LANG.chapter} ${i + 1} — ${T[i] || ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      bmList.appendChild(btn);
    });
  }
  bmBtn.onclick = toggleBookmark;

  // ── Search (inverted index) ───────────────────────────────────────────────
  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, '')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

  // ── Chapter navigation ────────────────────────────────────────────────────
  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;

    const doSwitch = () => {
      fr.onload = () => {
        // Propagate theme to iframe
        try { fr.contentDocument.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')); } catch(e) {}

        // Restore scroll position only when not jumping to a specific anchor
        if (!anchor) {
          const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + i) || '0');
          if (savedRatio > 0.005) {
            try {
              const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
              if (maxY > 0) fr.contentWindow.scrollTo({ top: savedRatio * maxY, behavior: 'instant' });
            } catch(e) {}
          }
        }

        // Navigate to anchor if specified — defer to let iframe layout settle first
        if (anchor) {
          setTimeout(() => {
            try {
              const el = fr.contentDocument.getElementById(anchor);
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch(e) {}
          }, 80);
        }

        // Save scroll position on scroll
        try {
          fr.contentWindow.addEventListener('scroll', () => {
            try {
              const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
              if (maxY > 10) {
                const ratio = fr.contentWindow.scrollY / maxY;
                store.set('sc_' + BOOK_ID + '_' + cur, ratio.toFixed(4));
              }
            } catch(e) {}
          }, { passive: true });
        } catch(e) {}
      };

      fr.srcdoc = CHAPTERS[i];

      // Update UI
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      tt.innerHTML = `<i>${chLabel}</i> ${T[i] || ''}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));
      store.set('prog_' + BOOK_ID, i);
      updateBookmarkBtn();
    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${t}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      list.appendChild(btn);
    });

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  // ── Mobile sidebar ────────────────────────────────────────────────────────
  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target === searchEl) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.data && e.data.action === 'bookGo') go(e.data.chapterIdx, e.data.anchorId);
  });

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);
  searchEl.oninput = e => buildList(e.target.value);

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
