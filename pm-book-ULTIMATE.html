<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Управление ИТ-проектами: Полное руководство (v7.0)</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --panel: #e4ecf5; --panel2: #d4e2ee; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #b07000;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Trebuchet MS", "Segoe UI Variable", Tahoma, sans-serif;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #e4ecf5 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>

<div class="stars" aria-hidden="true"></div>
<div class="side-overlay" id="overlay"></div>

<div class="app" id="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1 id="book-title">Управление ИТ-проектами: Полное руководство (v7.0)</h1>
      <p id="vol-info"></p>
    </div>

      <input type="search" id="search" autocomplete="off">

    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="main">
    <div class="top">

      <button id="prev-btn"></button>
      <button id="next-btn"></button>
      <div class="tt" id="tt"></div>

      <button id="theme-btn" title="Toggle theme" style="font-size:16px"></button>
    </div>
    <div class="prog"><i id="bar"></i></div>
    <div class="frame">
      <iframe id="fr" sandbox="allow-scripts allow-same-origin" title="Chapter content"></iframe>

  </main>
</div>

ackground: rgba(114,216,255,.12);\n  color: var(--acc);\n  text-transform: uppercase;\n  letter-spacing: .05em;\n}\n.badge.warn { border-color: var(--warn); color: var(--warn); background: rgba(255,209,138,.1); }\n.badge.bad  { border-color: var(--bad); color: var(--bad); background: rgba(255,143,143,.1); }\n\n/* Improved Stats */\n.stats { margin: 24px 0; }\n.stat-num { font-variant-numeric: tabular-nums; }\n\ndetails.long-para {\n  margin-bottom: 14px;\n  border-left: 2px solid var(--line);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 1</p>\n      <h1>Авторский фильтр: Почему это работает</h1>\n      <p class=\"essence\">От циничного скепсиса до международного стандарта. 🛠️</p>\n    </section>\n\n    <blockquote class=\"insight\">\n      💡 Методология без практики — это галлюцинация. Я набивал шишки в ФМС и Росздравнадзоре, чтобы вы могли просто нажать «Play».\n    </blockquote>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <b class=\"stat-num\">20+</b>\n        <span class=\"stat-label\">Лет в ИТ-мясорубке</span>\n      </div>\n      <div class=\"stat\">\n        <b class=\"stat-num\"><a href=\"glossary.html#pmi\" class=\"term-link\">PMP</a></b>\n        <span class=\"stat-label\">Циничный стандарт</span>\n      </div>\n    </div>\n\n    <section class=\"essence\">\n      <p class=\"lead-para\">Эта книга — не пересказ учебников. Это экстракт из реальных провалов и редких побед в международном консалтинге (Tieto) и госсекторе. Если вам нужна академическая чистота — идите в университет. Если нужен результат в понедельник — вы по адресу. 🛠️</p>\n    </section>\n\n    <div class=\"scale\">\n      <div class=\"sc-step current\">\n        <div class=\"sc-head\">Хаос</div>\n        <p>Работаем \"по наитию\". 💀</p>\n<blockquote class=\"insight\"><p>Это экстракт из реальных провалов и редких побед в международном консалтинге (Tieto) и госсекторе.</p></blockquote>\n      </div>\n      <div class=\"sc-step\">\n        <div class=\"sc-head\">Процесс</div>\n        <p>Есть правила, но они мешают. ⚖️</p>\n      </div>\n      <div class=\"sc-step\">\n        <div class=\"sc-head\">Культура</div>\n        <p>Проектное управление — это ДНК. 🧬</p>\n      </div>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>🏛️ Госсектор</b>\n        <p>Где требования меняются чаще, чем погода, а бюджеты — это святое.</p>\n      </div>\n      <div class=\"card\">\n        <b>🌍 Global IT</b>\n        <p>Финские процессы, жесткие дедлайны и мультикультурный хаос.</p>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <details>\n        <summary class=\"acc-head\">👨‍💼 Как объяснить это боссу?</summary>\n        <div class=\"acc-body\">\n          <p>Проект — это не творчество, а технология. Чем меньше в нем \"магии\" и \"подвигов\", тем выше вероятность сдать его вовремя и в рамках <a href=\"glossary.html#rom\" class=\"term-link\">ROM-оценки</a>. 🎯</p>\n        </div>\n      </details>\n    </div>\n\n    <footer class=\"summary\">\n      <p><span class=\"badge warn\">ВНИМАНИЕ</span> Читайте только если готовы признать, что проект — это технология, а не искусство.</p>\n<blockquote class=\"insight\"><p>Чем меньше в нем \"магии\" и \"подвигов\", тем выше вероятность сдать его вовремя и в рамках ROM-оценки.</p></blockquote>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<sty in-bottom: 14px;\n  border-left: 2px solid var(--line);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 3</p>\n      <h1>Предлагают стать РП? Сначала проверьте тормоза</h1>\n      <p class=\"essence\">Вы меняете спокойствие на ответственность за чужие косяки. ⚠️</p>\n    </section>\n\n    <blockquote class=\"insight\">\n      ⚠️ Назначение на проект — это не награда, это сделка. Проект — это всегда **Цель + Срок + Бюджет**.\n    </blockquote>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <b class=\"stat-num\">ВХОД</b>\n        <span class=\"stat-label\">Смутные обещания</span>\n      </div>\n      <div class=\"stat\">\n        <b class=\"stat-num\">ВЫХОД</b>\n        <span class=\"stat-label\">Устав проекта (Charter)</span>\n      </div>\n    </div>\n\n    <div class=\"vis-diag\">\n      <svg viewBox=\"0 0 800 300\" xmlns=\"http://www.w3.org/2000/svg\">\n        <polygon points=\"400,50 200,250 600,250\" fill=\"none\" stroke=\"#395f9d\" stroke-width=\"4\" />\n        <text x=\"400\" y=\"40\" text-anchor=\"middle\" font-weight=\"bold\">Scope (Содержание)</text>\n        <text x=\"150\" y=\"270\" text-anchor=\"middle\" font-weight=\"bold\">Time (Сроки)</text>\n        <text x=\"650\" y=\"270\" text-anchor=\"middle\" font-weight=\"bold\">Cost (Бюджет)</text>\n        <circle cx=\"400\" cy=\"180\" r=\"40\" fill=\"#87efc9\" fill-opacity=\"0.5\" />\n        <text x=\"400\" y=\"185\" text-anchor=\"middle\" font-weight=\"bold\" font-size=\"14\">Quality</text>\n        <text x=\"400\" y=\"290\" text-anchor=\"middle\" font-style=\"italic\">Project Triangle: Change one, all move. 🔺</text>\n      </svg>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>📐 Треугольник</b>\n        <p class=\"lead-para\">Меняете <a href=\"glossary.html#scope\" class=\"term-link\">Scope</a> — едут Сроки. Хотите быстро и дешево? Готовьтесь к провалу Качества. 🔺</p>\n      </div>\n      <div class=\"card\">\n        <b>🏢 Матрица</b>\n        <p>В ИТ вы чаще всего \"проситель\" ресурсов. Ваша власть — это ваши навыки переговоров. 🤝</p>\n<blockquote class=\"insight\"><p>Scope (Содержание)\n        Time (Сроки)\n        Cost (Бюджет)\n        \n        Quality\n        Project Triangle: Change one, all move.</p></blockquote>\n      </div>\n    </div>\n\n    <div class=\"scale\">\n      <div class=\"sc-step\">\n        <div class=\"sc-head\">Функциональная 💀</div>\n        <p>Вы никто, ресурсы у начальников отделов.</p>\n      </div>\n      <div class=\"sc-step current\">\n        <div class=\"sc-head\">Матричная ⚖️</div>\n        <p>У программиста два босса. Вечный конфликт.</p>\n      </div>\n      <div class=\" lass=\"stat\">\n        <b class=\"stat-num\">+/- 50%</b>\n        <span class=\"stat-label\">Допуск <a href=\"glossary.html#rom\" class=\"term-link\">ROM-оценки</a></span>\n      </div>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>💰 <a href=\"glossary.html#rom\" class=\"term-link\">ROM-оценка</a></b>\n        <p class=\"lead-para\">Называйте диапазон, а не цифру. Иначе вас распнуть за ошибку в 5% позже. 📉</p>\n      </div>\n      <div class=\"card\">\n        <b>⛔ Ограничения</b>\n        <p>Если бюджет $10k, а хотят космолет — говорите об этом сейчас, а не на релизе. ⚠️</p>\n<blockquote class=\"insight\"><p>Без него вы просто парень, который делает одолжение коллегам.</p></blockquote>\n      </div>\n    </div>\n\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">❌ ГЛУПОСТЬ</div>\n        <ul>\n          <li>Padding: Накинуть «на всякий случай» x3. 🤡</li>\n          <li>Страх: «Если я скажу нет, меня уволят». 💀</li>\n        </ul>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">✅ ПРОФЕССИОНАЛИЗМ</div>\n        <ul>\n          <li>Экспертная оценка: Спросить тех, кто делал. 🧠</li>\n          <li>Честность: «Это стоит X, если повезет, и Y, если нет». 🤝</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <details>\n        <summary class=\"acc-head\">👨‍💼 Как объяснить это боссу?</summary>\n        <div class=\"acc-body\">\n          <p>«Чтобы проект был успешным, нам нужно четкое понимание целей и границ. Устав закрепит наши договоренности и позволит мне эффективно управлять ресурсами». 🎯</p>\n        </div>\n      </details>\n    </div>\n\n    <footer class=\"summary\">\n      <p><span class=\"badge ok\">ЗАПОМНИТЕ</span> Спонсор платит за результат, а не за процесс. Держите его в курсе. 💰</p>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    cha : var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 6</p>\n      <h1>Приступаем к планированию: Не клятва, а карта</h1>\n      <p class=\"essence\">План нужен не боссу, а ВАМ и КОМАНДЕ. Чтобы не бегать с криками «всё пропало». 🛠️</p>\n    </section>\n\n    <blockquote class=\"insight\">\n      📉 Цель плана — не угадать будущее, а снизить неопределенность до приемлемого уровня. План — это прогноз.\n    </blockquote>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <b class=\"stat-num\">+/- 10%</b>\n        <span class=\"stat-label\">Точность плана</span>\n      </div>\n      <div class=\"stat\">\n        <b class=\"stat-num\"><a href=\"glossary.html#wbs\" class=\"term-link\">WBS</a></b>\n        <span class=\"stat-label\">Фундамент</span>\n      </div>\n    </div>\n\n    <div class=\"vis-diag\">\n      <svg viewBox=\"0 0 800 300\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x=\"325\" y=\"20\" width=\"150\" height=\"50\" rx=\"5\" fill=\"#72d8ff\" stroke=\"#395f9d\" stroke-width=\"2\" />\n        <text x=\"400\" y=\"50\" text-anchor=\"middle\" font-weight=\"bold\">Project</text>\n        <path d=\"M400 70 L400 120\" stroke=\"#395f9d\" fill=\"none\" stroke-width=\"2\" />\n        <path d=\"M400 90 L200 90 L200 120\" stroke=\"#395f9d\" fill=\"none\" stroke-width=\"2\" />\n        <path d=\"M400 90 L600 90 L600 120\" stroke=\"#395f9d\" fill=\"none\" stroke-width=\"2\" />\n        <rect x=\"125\" y=\"120\" width=\"150\" height=\"45\" rx=\"5\" fill=\"#87efc9\" stroke=\"#395f9d\" />\n        <text x=\"200\" y=\"148\" text-anchor=\"middle\">Phase 1</text>\n        <rect x=\"325\" y=\"120\" width=\"150\" height=\"45\" rx=\"5\" fill=\"#87efc9\" stroke=\"#395f9d\" />\n        <text x=\"400\" y=\"148\" text-anchor=\"middle\">Phase 2</text>\n        <rect x=\"525\" y=\"120\" width=\"150\" height=\"45\" rx=\"5\" fill=\"#87efc9\" stroke=\"#395f9d\" />\n        <text x=\"600\" y=\"148\" text-anchor=\"middle\">Phase 3</text>\n        <text x=\"400\" y=\"260\" text-anchor=\"middle\" font-style=\"italic\"><a href=\"glossary.html#wbs\" class=\"term-link\">WBS</a> Tree: Decomposition from Goal to Task</text>\n      </svg>\n    </div>\n\n    <div class=\"vis-timeline\">\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">1</div>\n        <div class=\"tl-content\"><b><a href=\"glossary.html#scope\" class=\"term-link\">Scope</a></b>: Что мы делаем? (И чего НЕ делаем). 📋</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">2</div>\n        <div class=\"tl-content\"><b><a href=\"glossary.html#wbs\" class=\"term-link\">WBS</a></b>: Декомпозиция. Режем слона на стейки. 🥩</div>\n      </div>\n      <div class=\"tl-step\">\n        <div class=\"tl-num\">3</div>\n        <div class=\"tl-content\"><b>Network</b>: Что за чем идет. <a href=\"glossary.html#critical_path\" class=\"term-link\">Критический путь</a>. 🕸️</div>\n      </div>\n    </div>\n\n    <div class=\"translator\">\n      <div class=\"tr-col bad\">\n        <div class=\"tr-head bad\">❌ ПЛАН-ДУБИНА</div>\n        <p class=\"lead-para\">Используется для наказания тех, кто «не успел». Вызывает ложь и саботаж. 💀</p>\n      </div>\n      <div class=\"tr-col good\">\n        <div class=\"tr-head good\">✅ ПЛАН-МАЯК</div>\n        <p>Помогает понять, где мы сейчас и когда увидим берег. Синхронизирует хаос. 🔦</p>\n<blockquote class=\"insight\"><p>Phase 1\n        \n        Phase 2\n        \n        Phase 3\n        WBS Tree: Decomposition from Goal to Task\n      \n    \n\n    \n      \n        1\n        Scope: Что мы делаем?</p></blockquote>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <details>\n        <summary class=\"acc-head\">👨‍💼 Как объяснить это боссу?</summary>\n        <div class=\"acc-body\">\n          <p>«Этот план — не клятва в крови, а прогноз развития событий. Он поможет нам вовремя увидеть риски и скорректировать действия, чтобы не сорвать дедлайны». 🎯</p>\n        </div>\n      </details>\n    </div>\n\n    <footer class=\"summary\">\n      <p><span class=\"badge warn\">ВЕРДИКТ</span> Не тратьте месяцы на «идеальный» план. Он устареет в первый день разработки. Лучше планируйте итеративно.</p>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff; /* alias for --txt, kept for compatibility */\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed;\n    --line: #b0c8e0; --txt: #1a2535; --muted: #4a6580;\n    --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 1160px;\n  margin: 0 auto;\n  padding: 26px 16px 56px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 28px;\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  background: linear-gradient(-45deg, #081423, #0f1f38, #163056, #081423);\n  background-size: 400% 400%;\n  animation: gradientBG 15s ease infinite;\n  box-shadow: 0 16px 34px rgba(0,0,0,.32);\n  margin-bottom: 28px;\n}\n[data-theme=\"light\"] .hero {\n  background: linear-gradient(-45deg, #dce8f2, #e8f0f8, #d0e4f0, #dce8f2);\n  background-size: 400% 400%;\n  box-shadow: 0 8px 24px rgba(0,0,0,.08);\n}\n\n@keyframes gradientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { er-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { font-size: 12px; letter-spacing: .12em; t овать\" (процесс), вы пишете \"Модуль авторизации\" (результат).\n    </blockquote>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <b class=\"stat-num\">ФОКУС</b>\n        <span class=\"stat-label\">На результат</span>\n      </div>\n      <div class=\"stat\">\n        <b class=\"stat-num\">100%</b>\n        <span class=\"stat-label\">Правило полноты</span>\n      </div>\n    </div>\n\n    <div class=\"vis-diag\">\n      <svg viewBox=\"0 0 800 400\" xmlns=\"http://www.w3.org/2000/svg\">\n        <defs>\n          <marker id=\"arrowhead\" markerWidth=\"10\" markerHeight=\"7\" refX=\"9\" refY=\"3.5\" orient=\"auto\">\n            <polygon points=\"0 0, 10 3.5, 0 7\" fill=\"#395f9d\" />\n          </marker>\n          <marker id=\"arrowhead-crit\" markerWidth=\"10\" markerHeight=\"7\" refX=\"9\" refY=\"3.5\" orient=\"auto\">\n            <polygon points=\"0 0, 10 3.5, 0 7\" fill=\"#ff4d4d\" />\n          </marker>\n        </defs>\n\n        <g class=\"diag-node\">\n          <rect x=\"50\" y=\"150\" width=\"100\" height=\"60\" rx=\"5\" fill=\"#72d8ff\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"100\" y=\"185\" text-anchor=\"middle\" font-weight=\"bold\">Start</text>\n        </g>\n\n        <g class=\"diag-node\">\n          <rect x=\"250\" y=\"50\" width=\"120\" height=\"60\" rx=\"5\" fill=\"#87efc9\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"310\" y=\"85\" text-anchor=\"middle\" font-weight=\"bold\">Task A</text>\n        </g>\n\n        <g class=\"diag-node diag-highlight\">\n          <rect x=\"250\" y=\"250\" width=\"120\" height=\"60\" rx=\"5\" fill=\"#ffcccb\" stroke=\"#ff4d4d\" stroke-width=\"3\" />\n          <text x=\"310\" y=\"285\" text-anchor=\"middle\" font-weight=\"bold\">Task B (CRIT)</text>\n        </g>\n\n        <g class=\"diag-node\">\n          <rect x=\"450\" y=\"150\" width=\"120\" height=\"60\" rx=\"5\" fill=\"#87efc9\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"510\" n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <details>\n        <summary class=\"acc-head\">👨‍💼 Как объяснить это боссу?</summary>\n        <div class=\"acc-body\">\n          <p class=\"lead-para\">«<a href=\"glossary.html#wbs\" class=\"term-link\">WBS</a> — это основа бюджета и расписания. Она наглядно показывает, из чего состоит проект и кто за что отвечает. Это исключает споры о том, \"кто должен был это сделать\"». 🎯</p>\n        </div>\n      </details>\n    </div>\n\n    <footer class=\"summary\">\n      <p><span class=\"badge warn\">ВЕРДИКТ</span> <a href=\"glossary.html#wbs\" class=\"term-link\">WBS</a> — это скелет расписания и бюджета. Сделали криво — проект родится уродом. 🌲</p>\n<blockquote class=\"insight\"><p>Никто не заплатит за то, чего нет на этой схеме.</p></blockquote>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\ lay: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { fo ight: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Глава 12</p>\n      <h1>Завершаем планирование: Единый источник правды</h1>\n      <p class=\"essence\">План управления проектом — это согласованный пакет документов. 📁</p>\n    </section>\n\n    <blockquote class=\"insight\">\n      📁 Главная беда ИТ — \"версионный ад\". Планирование закончено только тогда, когда все знают, где лежит АКТУАЛЬНЫЙ план.\n    </blockquote>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <b class=\"stat-num\">BASELINE</b>\n        <span class=\"stat-label\">Подписано и зафиксировано</span>\n      </div>\n    </div>\n\n    <div class=\"vis-diag\">\n      <svg viewBox=\"0 0 800 400\" xmlns=\"http://www.w3.org/2000/svg\">\n        <defs>\n          <marker id=\"arrowhead\" markerWidth=\"10\" markerHeight=\"7\" refX=\"9\" refY=\"3.5\" orient=\"auto\">\n            <polygon points=\"0 0, 10 3.5, 0 7\" fill=\"#395f9d\" />\n          </marker>\n        </defs>\n        <g transform=\"translate(400, 200)\">\n          <rect x=\"-60\" y=\"-160\" width=\"120\" height=\"50\" rx=\"10\" fill=\"#72d8ff\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"0\" y=\"-130\" text-anchor=\"middle\" font-weight=\"bold\">PLAN</text>\n          <rect x=\"80\" y=\"-25\" width=\"120\" height=\"50\" rx=\"10\" fill=\"#87efc9\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"140\" y=\"5\" text-anchor=\"middle\" font-weight=\"bold\">DO</text>\n          <rect x=\"-60\" y=\"110\" width=\"120\" height=\"50\" rx=\"10\" fill=\"#72d8ff\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"0\" y=\"140\" text-anchor=\"middle\" font-weight=\"bold\">CHECK</text>\n          <rect x=\"-200\" y=\"-25\" width=\"120\" height=\"50\" rx=\"10\" fill=\"#87efc9\" stroke=\"#395f9d\" stroke-width=\"2\" />\n          <text x=\"-140\" y=\"5\" text-anchor=\"middle\" font-weight=\"bold\">ACT</text>\n          <path d=\"M70 -135 Q 160 -135 160 -45\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n          <path d=\"M160 45 Q 160 135 70 135\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n          <path d=\"M-70 135 Q -160 135 -160 45\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n          <path d=\"M-160 -45 Q -160 -135 -70 -135\" stroke=\"#395f9d\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#arrowhead)\" />\n        </g>\n        <text x=\"400\" y=\"380\" text-anchor=\"middle\" class=\"diag-text\" font-style=\"italic\">PDCA Cycle: The Project Control Loop 🕸️</text>\n      </svg>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>🔀 Контроль изменений</b>\n        <p class=\"lead-para\">Новая идея? Оцениваем влияние. Спонсор согласен? Меняем Baseline. Нет? Идея в корзину. 📉</p>\n      </div>\n      <div class=\"card\">\n        <b>🛒 План закупок</b>\n        <p>Ваша ответственность. Даже если сервер покупает админ, ВЫ отвечаете за дату. ⚠️</p>\n<blockquote class=\"insight\"><p>Она позволит нам честно оценить, где мы отклонились и почему, чтобы принимать верные решения, а не действовать вслепую».</p></blockquote>\n      </div>\n    </div>\n\n    <div class=\"acc-item\">\n      <details>\n        <summary class=\"acc-head\">👨‍💼 Как объяснить это боссу?</summary>\n        <div class=\"acc-body\">\n          <p>«Baseline — это точка отсчета. Она позволит нам честно оценить, где мы отклонились и почему, чтобы принимать верные решения, а не действовать вслепую». 🎯</p>\n        </div>\n      </details>\n    </div>\n\n    <footer class=\"summary\">\n      <p><span class=\"badge warn\">ЗАПОМНИТЕ</span> План — это контракт. Если меняете его втихую — вы нарушаете условия игры. 🤝</p>\n    </footer>\n  </main>\n\n<script>\n(function() {\n  const chapterMap = {};\n  for (let i = 1; i <= 16; i++) {\n    chapterMap['chapter' + i + '.html'] = i - 1;\n    const padded = String(i).padStart(3, '0') + '.html';\n    chapterMap[padded] = i - 1;\n  }\n\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0].toLowerCase();\n    const anchor = parts[1] || null;\n\n    let targetIdx = chapterMap[pathPart];\n    if (targetIdx === undefined && pathPart.includes('chapter')) {\n      const m = pathPart.match(/chapter(\\d+)/);\n      if (m) targetIdx = parseInt(m[1]) - 1;\n    }\n\n    if (targetIdx !== undefined) {\n      window.parent.postMessage({ action: 'bookGo', chapterIdx: targetIdx, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n    }\n  });\n})();\n<\\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v5 — Shared Theme\n  Injected into every chapter before chapter-specific styles.\n  Chapters can override any rule via cascade.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff; /* alias for --txt, kept for compatibility */\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed;\n    --line: #b0c8e0; --txt: #1a2535; --muted: #4a6580;\n    --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: var(--txt);\n  font: 16px/1.6 \"Trebuchet MS\", \"Segoe UI Variable\", Tahoma, sans-serif;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 1160px;\n  margin: 0 auto;\n  padding: 26px 16px 56px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 28px;\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  background: linear-gradient(-45deg, #081423, #0f1f38, #163056, #081423);\n  background-size: 400% 400%;\n  animation: gradientBG 15s ease infinite;\n  box-shadow: 0 16px 34px rgba(0,0,0,.32);\n  margin-bottom: 28px;\n}\n[data-theme=\"light\"] .hero {\n  background: linear-gradient(-45deg, #dce8f2, #e8f0f8, #d0e4f0, #dce8f2);\n  background-size: 400% 400%;\n  box-shadow: 0 8px 24px rgba(0,0,0,.08);\n}\n\n@keyframes gradientBG {\n  0%   { background-position: 0%   50% }\n  50%  { background-position: 100% 50% }\n  100% { background-position: 0%   50% }\n}\n\n.kicker {\n  font-size: 11px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Typography — optimal reading width ── */\nh1 { margin: 8px 0 10px; font-size: clamp(26px, 5vw, 48px); line-height: 1.1; color: var(--txt); }\nh2 { margin: 0 0 16px;   font-size: clamp(20px, 3.5vw, 28px); color: var(--acc); }\nh3 { margin: 0 0 8px;    font-size: clamp(16px, 2.5vw, 21px); color: var(--acc2); }\n\n.lead {\n  margin: 0;\n  max-width: 72ch;\n  color: var(--muted);\n  font-size: 1.05rem;\n}\n\np, li { max-width: 72ch; }\n\n/* ── Sections ── */\n.sec {\n  margin-top: 32px;\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  background: rgba(10,18,34,.82);\n}\n[data-theme=\"light\"] .sec { background: rgba(220,232,242,.7); }\n\n/* ── Stats grid ── */\n.stats {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n\n.stat {\n  padding: 14px 12px;\n  border: 1px solid var(--line);\n  border-radius: 11px;\n  background: rgba(10,19,36,.76);\n  text-align: center;\n}\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgba(192,48,48,.06); }\n\n.tr-head        { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; font-weight: 700; }\n.tr-head.good   { color: var(--acc2); }\n.tr-head.bad    { color: var(--bad);  }\n.tr-col ul { padding-left: 18px; margin: 0; color: var(--txt); }\n.tr-col li { margin-bottom: 6px; }\n\n/* ── Accordion (Native details/summary) ── */\ndetails.acc-item {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: rgba(15,31,56,.4);\n  margin-bottom: 12px;\n  overflow: hidden;\n  transition: background .2s;\n}\ndetails.acc-item[open] { background: rgba(15,31,56,.7); }\n[data-theme=\"light\"] details.acc-item { background: rgba(220,232,242,.5); }\n\nsummary.acc-head {\n  padding: 14px 18px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  list-style: none;\n  user-select: none;\n}\nsummary.acc-head::marker, summary.acc-head::-webkit-details-marker { display: none; }\nsummary.acc-head::after { content: '+'; font-size: 18px; opacity: .6; transition: transform .3s; }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; transform: rotate(180deg); }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); margin-bottom: 8px; }\n\n.acc-body {\n  padding: 0 18px 18px;\n  color: var(--txt);\n  font-size: 14px;\n  line-height: 1.5;\n}\n\n/* ── SVG Diagrams ── */\n.vis-diag {\n  margin: 32px 0;\n  padding: 20px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg { max-width: 100%; height: auto; }\n.vis-diag .caption { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }\n.diag-highlight { stroke: var(--acc2); }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,6 ta-theme=\"light\"] .stat { background: rgba(220,232,242,.8); }\n\n.stat-num, .stat b {\n  display: block;\n  font-size: 28px;\n  font-weight: 900;\n  line-height: 1.1;\n  color: var(--acc);\n  margin-bottom: 4px;\n}\n.stat-label, .stat span {\n  font-size: 11px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ── Cards grid ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 16px;\n  margin-top: 20px;\n}\n\n.card {\n  padding: 20px;\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  transition: .25s;\n}\n[data-theme=\"light\"] .card { background: rgba(255,255,255,.6); }\n\n.card:hover {\n  transform: translateY(-3px);\n  border-color: var(--acc);\n  box-shadow: 0 8px 20px rgba(0,0,0,.25);\n}\n\n.card b {\n  display: block;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: var(--acc);\n  margin-bottom: 8px;\n}\n\n/* ── Canvas wrapper ── */\n.canvas-wrap {\n  margin: 24px 0;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  background: var(--bg2);\n  padding: 14px;\n  overflow: hidden;\n}\ncanvas { display: block; width: 100%; height: auto; }\n\n.caption {\n  margin-top: 10px;\n  color: var(--muted);\n  font-size: 13px;\n  font-style: italic;\n  text-align: center;\n}\n\n/* ── Comparison translator ── */\n.translator {\n  margin: 24px 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  gap: 1px;\n}\n\n.tr-col         { padding: 20px 22px; background: var(--bg2); }\n.tr-col.good    { background: rgba(135,239,201,.06); }\n.tr-col.bad     { background: rgba(255,143,143,.06); }\n[data-theme=\"light\"] .tr-col       { background: var(--panel); }\n[data-theme=\"light\"] .tr-col.good  { background: rgba(21,128,96,.06); }\n[data-theme=\"light\"] .tr-col.bad   { background: rgba(192,48,48,.06); }\n\n.tr-head        { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; font-weight: 700; }\n.tr-head.good   { color: var(--acc2); }\n.tr-head.bad    { color: var(--bad);  }\n.tr-col ul { padding-left: 18px; margin: 0; color: var(--txt); }\n.tr-col li { margin-bottom: 6px; }\n\n/* ── Accordion (Native details/summary) ── */\ndetails.acc-item {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: rgba(15,31,56,.4);\n  margin-bottom: 12px;\n  overflow: hidden;\n  transition: background .2s;\n}\ndetails.acc-item[open] { background: rgba(15,31,56,.7); }\n[data-theme=\"light\"] details.acc-item { background: rgba(220,232,242,.5); }\n\nsummary.acc-head {\n  padding: 14px 18px;\n  cursor: pointer;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-weight: 700;\n  font-size: 14px;\n  color: var(--acc);\n  list-style: none;\n  user-select: none;\n}\nsummary.acc-head::marker, summary.acc-head::-webkit-details-marker { display: none; }\nsummary.acc-head::after { content: '+'; font-size: 18px; opacity: .6; transition: transform .3s; }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; transform: rotate(180deg); }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); margin-bottom: 8px; }\n\n.acc-body {\n  padding: 0 18px 18px;\n  color: var(--txt);\n  font-size: 14px;\n  line-height: 1.5;\n}\n\n/* ── SVG Diagrams ── */\n.vis-diag {\n  margin: 32px 0;\n  padding: 20px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg { max-width: 100%; height: auto; }\n.vis-diag .caption { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }\n.diag-highlight { stroke: var(--acc2); }\n\n/* ── Maturity scale ── */\n.scale {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(100px, 1fr));\n  gap: 8px;\n}\n\n.lv {\n  padding: 10px;\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  background: rgba(16,30,56,.7);\n  font-size: 13px;\n  color: var(--txt);\n}\n.lv b {\n  display: block;\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--warn);\n  margin-bottom: 4px;\n}\n\n/* ── Panels ── */\n.panel {\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--panel);\n  padding: 16px;\n}\n\n/* ── Stat box ── */\n.stat-box {\n  margin-top: 20px;\n  padding: 20px;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: rgba(20,35,60,.8);\n}\n[data-theme=\"light\"] .stat-box { background: rgba(220,232,242,.8); }\n\n/* ── Badge ── */\n.badge {\n  display: inline-block;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.16);\n  color: var(--acc);\n}\n\n/* ── Buttons ── */\nbutton {\n  cursor: pointer;\n  padding: 8px 14px;\n  border-radius: 9px;\n  border: 1px solid var(--line);\n  background: rgba(18,30,58,.72);\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--txt);\n  transition: .2s;\n}\nbutton:hover, button.on { background: rgba(114,216,255,.18); border-color: var(--acc); }\n[data-theme=\"light\"] button { background: rgba(220,232,242,.8); }\n[data-theme=\"light\"] button:hover { background: rgba(26,127,196,.12); }\n\n/* ── Links ── */\na { color: var(--acc); text-decoration: none; border-bottom: 1px solid rgba(114,216,255,.3); transition: .2s; }\na:hover { background: rgba(114,216,255,.1); border-bottom-color: var(--acc); }\n[data-theme=\"light\"] a { color: var(--acc); }\n\n/* ── Blockquote ── */\nblockquote {\n  margin: 32px 0;\n  padding-left: 28px;\n  border-left: 4px solid var(--acc);\n  font-style: italic;\n  font-size: 1.2em;\n  color: var(--txt);\n  line-height: 1.5;\n  max-width: 68ch;\n}\n\n/* ── Table ── */\n.matrix { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }\ntable { width: 100%; border-collapse: collapse; background: var(--panel); }\nth, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }\nth { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); background: var(--panel2); text-align: left; }\ntd { color: var(--txt); font-size: 14px; }\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar { width: 5px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }\n::-webkit-scrollbar-thumb:hover { background: var(--acc); }\n\n/* ── Responsive ── */\n@media (max-width: 900px) {\n  .scale      { grid-template-columns: 1fr 1fr; }\n  .translator { grid-template-columns: 1fr; }\n}\n@media (max-width: 640px) {\n  .grid  { grid-template-columns: 1fr; }\n  .stats { grid-template-columns: 1fr 1fr; }\n  .hero  { padding: 18px; }\n  .sec   { padding: 16px; }\n}\n\n/* ── Universal enrichments (chapter_processor auto-passes) ── */\n.vis-timeline {\n  margin: 32px 0;\n  border-left: 2px solid var(--line);\n  padding-left: 24px;\n  position: relative;\n}\n.tl-step {\n  position: relative;\n  margin-bottom: 24px;\n}\n.tl-step:last-child { margin-bottom: 0; }\n.tl-num {\n  position: absolute;\n  left: -33px;\n  top: 0;\n  width: 18px;\n  height: 18px;\n  background: var(--acc);\n  color: var(--bg);\n  border-radius: 50%;\n  font-size: 10px;\n  font-weight: 900;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border: 2px solid var(--bg);\n}\n.tl-content b { display: block; color: var(--acc2); margin-bottom: 4px; font-size: 14px; }\n.tl-content { font-size: 14px; color: var(--txt); line-height: 1.4; }\n\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 10px;\n  border-radius: 999px;\n  font-size: 11px;\n  font-weight: 700;\n  border: 1px solid var(--line);\n  background: rgba(114,216,255,.12);\n  color: var(--acc);\n  text-transform: uppercase;\n  letter-spacing: .05em;\n}\n.badge.warn { border-color: var(--warn); color: var(--warn); background: rgba(255,209,138,.1); }\n.badge.bad  { border-color: var(--bad); color: var(--bad); background: rgba(255,143,143,.1); }\n\n/* Improved Stats */\n.stats { margin: 24px 0; }\n.stat-num { font-variant-numeric: tabular-nums; }\n\ndetails.long-para {\n  margin-bottom: 14px;\n  border-left: 2px solid var(--line);\n  padding-left: 14px;\n}\ndetails.long-para summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 4px 0;\n  list-style: none;\n  user-select: none;\n  outline: none;\n}\ndetails.long-para summary::marker { display: none; content: ''; }\ndetails.long-para[open] summary   { display: none; }\ndetails.long-para[open] > p       { margin-top: 8px; }\n\ndetails.more-text summary {\n  cursor: pointer;\n  color: var(--acc);\n  font-size: .88rem;\n  padding: 6px 0;\n  list-style: none;\n  user-select: none;\n}\ndetails.more-text summary::marker { display: none; content: ''; }\n\nblockquote.insight {\n  margin: 24px 0;\n  padding: 16px 20px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.06);\n  border-radius: 0 12px 12px 0;\n  max-width: 68ch;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.07); }\nblockquote.insight p {\n  margin: 0;\n  font-size: 1.05rem;\n  font-style: italic;\n  line-height: 1.65;\n  color: var(--txt);\n}\n\n.lead-para {\n  font-size: 1.08rem;\n  line-height: 1.8;\n  opacity: .95;\n}\n\n/* ── Reduced motion ── */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition: none !important; }\n}\n\n</style>\n</head>\n<body>\n  <main class=\"wrap\">\n    <section class=\"hero\">\n      <p class=\"kicker\">Справочник мастера</p>\n      <h1>Словарь терминов</h1>\n      <p class=\"essence\">Краткий путеводитель по профессиональному сленгу и стандартам проектного управления.</p>\n    </section>\n\n    <div class=\"grid\">\n      <div class=\"card\" id=\"wbs\">\n        <b>WBS (ИСР)</b>\n        <p class=\"lead-para\">Иерархическая структура работ. Декомпозиция проекта на управляемые элементы (пакеты работ). 🌲</p>\n      </div>\n      <div class=\"card\" id=\"pert\">\n        <b>PERT</b>\n        <p>Техника оценки и анализа программ. Формула для расчета ожидаемой длительности: (P + 4M + O) / 6. 📊</p>\n<blockquote class=\"insight\"><p>Краткий путеводитель по профессиональному сленгу и стандартам проектного управления.</p></blockquote>\n      </div>\n      <div class=\"card\" id=\"rom\">\n        <b>ROM</b>\n        <p>Rough Order of Magnitude. Грубая оценка «по порядку величины» на этапе инициации (допуск -25%/+75% или +/-50%). 📉</p>\n      </div>\n      <div class=\"card\" id=\"raci\">\n        <b>RACI</b>\n        <p>Матрица ответственности: Responsible, Accountable, Consulted, Informed. Кто делает, кто отвечает, с кем советуемся, кого уведомляем. 🤝</p>\n      </div>\n      <div class=\"card\" id=\"pmbok\">\n        <b>PMBOK</b>\n        <p>Project Management Body of Knowledge. Свод знаний по управлению проектами от PMI. Библия и стандарт индустрии. 📖</p>\n      </div>\n      <div class=\"card\" id=\"agile\">\n        <b>Agile</b>\n        <p>Гибкие подходы к разработке. Фокус на итерациях, работающем продукте и людях, а не процессах. 🔄</p>\n      </div>\n      <div class=\"card\" id=\"waterfall\">\n        <b>Waterfall</b>\n        <p>Каскадная модель. Линейная последовательность фаз: требования → дизайн → код → тест. 🌊</p>\n      </div>\n      <div class=\"card\" id=\"scope\">\n        <b>Scope (Содержание)</b>\n        <p>Границы проекта. Всё, что должно быть сделано (и что НЕ будет сделано). 📦</p>\n<blockquote class=\"insight\"><p>Декомпозиция проекта на управляемые элементы (пакеты работ).</p></blockquote>\n      </div>\n      <div class=\"card\" id=\"stakeholder\">\n        <b>Stakeholder</b>\n        <p>Заинтересованная сторона. Любой человек или группа, на которых влияет проект (или которые влияют на него). 👥</p>\n      </div>\n      <div class=\"card\" id=\"critical_path\">\n        <b>Critical Path</b>\n        <p>Критический путь. Самая длинная последовательность задач, определяющая минимальный срок завершения проекта. 🕸️</p>\n      </div>\n      <div class=\"card\" id=\"float\">\n        <b>Float (Slack)</b>\n        <p>Резерв времени. На сколько можно задержать задачу без сдвига даты финиша всего проекта. ⏳</p>\n      </div>\n      <div class=\"card\" id=\"buffer\">\n        <b>Buffer</b>\n        <p>Резерв (временной или денежный), заложенный в план для компенсации рисков. 🛡️</p>\n      </div>\n      <div class=\"card\" id=\"gantt\">\n        <b>Gantt Chart</b>\n        <p>Диаграмма Ганта. Визуализация графика работ, где задачи представлены полосками на шкале времени. 📊</p>\n      </div>\n      <div class=\"card\" id=\"milestone\">\n        <b>Milestone (Веха)</b>\n        <p>Значимое событие в проекте с нулевой длительностью. Контрольная точка (например, подписание Акта). 🏁</p>\n      </div>\n      <div class=\"card\" id=\"pmi\">\n        <b>PMI</b>\n        <p>Project Management Institute. Ведущая мировая ассоциация профессионалов в области управления проектами. 🏛️</p>\n      </div>\n    </div>\n\n    <footer class=\"summary\">\n      <p style=\"text-align: center;\"><a href=\"data:application/octet-stream;base64,PGh0bWw+CjxoZWFkPgogIDx0aXRsZT7Qk9C70LDQstCwIDEuINCQ0LLRgtC+0YDRgdC60LjQuSDRhNC40LvRjNGC0YA8L3RpdGxlPgogIDxsaW5rIHJlbD0ic3R5bGVzaGVldCIgaHJlZj0idGhlbWUuY3NzIj4KPC9oZWFkPgo8Ym9keT4KICA8bWFpbiBjbGFzcz0id3JhcCI+CiAgICA8c2VjdGlvbiBjbGFzcz0iaGVybyI+CiAgICAgIDxwIGNsYXNzPSJraWNrZXIiPtCT0LvQsNCy0LAgMT   // ── Safe Storage ──────────────────────────────────────────────────────────
  const store = {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const fr       = document.getElementById('fr');
  const tt       = document.getElementById('tt');
  const bar      = document.getElementById('bar');
  const side     = document.getElementById('side');
  const overlay  = document.getElementById('overlay');
  const searchEl = document.getElementById('search');
  const app      = document.getElementById('app');
  const bmBtn    = document.getElementById('bm-btn');
  const bmList   = document.getElementById('bm-list');
  const bmDetails = document.getElementById('bm-details');

  let cur = 0;
  let searchFilter = '';

  // ── i18n helpers ─────────────────────────────────────────────────────────
  document.getElementById('search').placeholder = LANG.search_placeholder;
  document.getElementById('prev-btn').textContent = LANG.prev;
  document.getElementById('next-btn').textContent = LANG.next;
  document.getElementById('bm-summary').textContent = LANG.bookmarks_title;
  document.getElementById('vol-info').textContent = LANG.total_chapters.replace('{n}', T.length);
  document.documentElement.lang = LANG.code || 'ru';

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? LANG.theme_to_light : LANG.theme_to_dark;
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe if loaded
    try { fr.contentDocument.documentElement.setAttribute('data-theme', t); } catch(e) {}
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);
  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }
    catch(e) { return []; }
  }
  function saveBookmarks(bm) {
    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }
  function toggleBookmark() {
    const bm = getBookmarks();
    const idx = bm.indexOf(cur);
    if (idx === -1) bm.push(cur); else bm.splice(idx, 1);
    saveBookmarks(bm);
    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? LANG.bookmark_remove : LANG.bookmark_add;
  }
  function buildBookmarkList() {
    const bm = getBookmarks();
    bmList.innerHTML = '';
    if (!bm.length) {
      bmList.innerHTML = `<div class="bm-empty">${LANG.no_bookmarks}</div>`;
      return;
    }
    bm.forEach(i => {
      const btn = document.createElement('button');
      btn.className = 'bm-item';
      btn.textContent = `${LANG.chapter} ${i + 1} — ${T[i] || ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      bmList.appendChild(btn);
    });
  }
  bmBtn.onclick = toggleBookmark;

  // ── Search (inverted index) ───────────────────────────────────────────────
  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, '')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

  // ── Chapter navigation ────────────────────────────────────────────────────
  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;

    const doSwitch = () => {
      fr.onload = () => {
        // Propagate theme to iframe
        try { fr.contentDocument.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')); } catch(e) {}

        // Restore scroll position
        const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + i) || '0');
        if (savedRatio > 0.005) {
          try {
            const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
            if (maxY > 0) fr.contentWindow.scrollTo({ top: savedRatio * maxY, behavior: 'instant' });
          } catch(e) {}
        }

        // Navigate to anchor if specified
        if (anchor) {
          try {
            const el = fr.contentDocument.getElementById(anchor);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          } catch(e) {}
        }

        // Save scroll position on scroll
        try {
          fr.contentWindow.addEventListener('scroll', () => {
            try {
              const maxY = fr.contentDocument.body.scrollHeight - fr.clientHeight;
              if (maxY > 10) {
                const ratio = fr.contentWindow.scrollY / maxY;
                store.set('sc_' + BOOK_ID + '_' + cur, ratio.toFixed(4));
              }
            } catch(e) {}
          }, { passive: true });
        } catch(e) {}
      };

      fr.srcdoc = CHAPTERS[i];

      // Update UI
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      tt.innerHTML = `<i>${chLabel}</i> ${T[i] || ''}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));
      store.set('prog_' + BOOK_ID, i);
      updateBookmarkBtn();
    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = LANG.chapter_label.replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${t}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      list.appendChild(btn);
    });

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  // ── Mobile sidebar ────────────────────────────────────────────────────────
  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target === searchEl) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.data && e.data.action === 'bookGo') go(e.data.chapterIdx, e.data.anchorId);
  });

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);
  searchEl.oninput = e => buildList(e.target.value);

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
