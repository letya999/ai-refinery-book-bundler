          - paragraph [ref=f2e21]: "Вы просго ЕМУ НЕ НРАВИТЕСЬ ГРЕТ, У МЕНЯ ПОЛУЧИЛОСЬ! Дорри, 32 года Я встречалась с парнем, с которым познакоми— лась по работе. Нам приходилось проводить много времени вместе, и было действительно романтично узнавать его, одновременно работая с ним. Закон— чив работу, мы продолжали встречаться, ходили на свидания и целовали друг друга на прощание. Так продолжалось два месяца. Он никогда не пытался зайти дальше. но в то же время я познакомилась с его родителями, мы вместе ходили на важные меро— приятии, строили общие планы. Я знала, что у него до меня долго никого не было, поэтоьу я решила. что он просто не хочет торопиться. Но через три месяца я поняла, что он пытается стать близким мне человеком, избегая самой близости. Я софа— лась с духом и спросила у него, как долго это будет продолжаться. Он начал что—то бормотать и, заикаясь, объяснил, что все это его жутко пугает, и так далее. Я порвала с ним решительно и быстро, как никогда, потому что поняла: каким бы он ни был милым и ках бы ни притворялся, что он мой са— ный близкий человек, на самом деле я нравлюсь ему недостаточно сильно, а мне нужно намного больше. ЕСЛИ ВЫ НЕ ВЕРИТЕ ГРЕЉ•' Двадцать из двадцати опрошенных мужчин без колеба- ний заявили (правда, мы опрашивали их по электронной поте, но, казалось, они все полностью уверены в своем от- вете), что им никогда не нравилась женщина, с которой они бы не хотели заняться сексом. Один парень даже написал: «Что?! Не понял?! А разве такое бывает?!» 62 Воз, праф о ЧТО ДОЛЖНЫ ТЛИ УСВОИТЬ из этой гтвы Люди постоянно говорят о том, какие они на самом деле, Если мужчина говорит вам, что моногамия не для него, то нет причин Общение — это прекрасно. Но если обще- ние сочетается с сексом — это еще лучше. Называйте вещи своими именами. а точнее, называйте друга другом. И найдите себе такого друга, который не сможет удержать- ся от к вам. Если у вас заниженная самооценка, то вам придется потратить на ее повышение больше времени, чем на поис