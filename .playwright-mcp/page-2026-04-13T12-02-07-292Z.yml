осовето- ваты как именно вести себя в этой очень сложной н неприятной ситуации. Но самое важное здесь — это задать себе вопрос: чего вы ждали от этих отноше- ний? ВОТ ПОЧЕМУ ЭТО ТРУДНО лиз: У меня в жизни было двое мужчин, которые заявили мне, что спали с другими женщинами на ранней стадии наших от- ношений. (В одном из случаев мысль об этом буквально при- шла ко мне во сне, и я допросила его с пристрастием. Это про- сто его убило.) Как бы там ни было, из обоих случаев я сделала следующий вывод: эти мужчины хотели известить меня о том, что им вообще нельзя доверять. Они едва успели добиться вза- имности, как их руки сами потянулись к крышке аварийного люка. Когда люди только начинают встречаться, их отношения еще очень хрупкие и уязвимые. И нет лучшего способа погасить ого- нек взаимной симпатии, чем вылить на него ушат холодной воды из колодца под названием «Измена». Я никогда не смогла бы преодолеть это и простить мужчину. Поэтому для меня вопрос о да.льнейших отношениях с ним просто не стоит. 71"
