          - paragraph [ref=f2e20]: "ВОТ ПОЧЕМУ ЭТО ТРУДНО Лих Так-так. Мы опять о сексе. Мы говорим о сексе. Мы спра- шиваем о сексе. Мы требуем секса. Жуть. Как это все забавно! Не знаю. как вы, а я бы скорее предпочла поверить, что мужчи- на слишком напуган, слишком измотан, слишком набожен, слишком зол, слишком толст, слишком болен, слишком влюб- лен в свою бывшую подружку, слишком чувствителен, слиш- ком обгорел на солнце, слишком любит свою мать, слишком одержим мыслями об убийстве, слишком... Да все, что угодно, лучше, чем выяснить, что он не находит меня привлекательной. Или что он не хочет заниматься со мной сексом. Ведь это будет означать, что нас связывают некие отношения, но при этом я в действительности ему не нраваюсь. Особенно сбивает с толку то. что мы говорим о сексе (возмутительно!) вперемешку с на- шими чувствами (убийственно!) и внутренними страхами (су- щий кошмар!). А люди, которые вместе уже много лет, всегда говорят, что с годами секс так и так теряет свою прелесть и ис- чезает из их жизни. Тогда какая разница, исчезнетли он немно- го раньше, чем я того хотела? Разве не более важно то, что нам хорошо вместе, что он замечательный человек и скорее всего станет идеальным отцом? Так как с точки зрения психологии это невероятно сложная проблема и одни мысли о ней приводят меня в ужас, то я поду- мала, что в принципе могла бы согласиться на отношения с муж- чиной, которому нравится просто спать со мной в одной посте- ли, или с молодым человеком, которого не интересует секс как таковой. Главное. что сму со мной интересно. Наверное, я смог- ла бы каждый день засыпать рядом с парнем. который больше не хочет заниматься со мной сексом, и никогда не уттрекнула бы его. Или встречаться с парнем. который вроде бы хочет быть моим бойфрендом, но не имеет ни малейшего желания посмот- реть, как я выгляжу без одежды. Наверное, я даже смогла бы житьдолго и счастливо в браке с человеком, похожим скорее на лучшего друга, чем на супруга. Наверное. смогла бы. Если бы мне не мозолили глаза чер- товы счастливые парочки, которые я знаю. 60 Во» пра89ф о Я имею в виду не тех людей, которые ходят по улице, дер- жась за руки, и демонстративно пристают друг к друту. Никто не знает, как они ведут себя дома. Я говорю о своих друзьях, о тех, кого хорошо знаю. Им удается совмещать работу, успеш- Нуто карьеру, общение с близкими людьми и даже воспитание детей, сохраняя при этом здоровые отношения, в которых есть место и для секса. и для любви. Я бы легко согласилась на мень- шее. если бы принадлежала к тем, кто при виде подобных счаст- ливых пар просто говорит: «Ну и что хорошего в таких отноше- ниях?• Но я к ним не принадлежу. Я принадлежу к тем . кто смот- рит на эти счастливые семьи и заключает: «Черт побери! Это именно то, что мне нужно.. И это самое ужасное. Это означает, что мне нужно превратиться в такую девушку, которая донима- ет мужчин унизительными вопросами и, хуже того, может зап- росто бросить самого классного парня, если он отказывается заниматься сексом вообще или удовлетворяет ее недостаточно часто. Но мне ничего не остается, как признаться вам, что я стра- даю от тяжелого недуга: я верю в то, что однажды встречу чело- века, который будет любить меня духовно и страстно желать как женщину. А еще я верю, что, когда наша страсть пойдст на убыть, мы оба сделаем все возможное, чтобы не разучиться получать удовольствие от занятий любовью. Если вы тоже страдаете от этого недуга, то отберите подушку у господина Сони и отправь- те его восвояси вместе с его любимым молоком и печеньем. Вы заслуживаете большего, чем мирный храп, доносящийся с его половины кровати. А ВОТ КАК ВСЕ ДОЛЖНО Быть Грег: Не спрашивайте, откуда я это знаю, я все равно вам не ска- жу. Но уверяю вас, что мон родители (а им обоим уже за семь- десят), пережив воспитание детей, болезни, собственное ста- рение, нервную работу и кучу бытовых неурядиц (читайте: жизнь), до сих пор занимаются сексом. Если это удастся моим родителям, то, значит, и вы с вашим бойфрендом впол