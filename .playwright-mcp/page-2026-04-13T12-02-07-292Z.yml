            - paragraph [ref=f2e34]: "Но если немного пофантазировать, то можно увидеть, что в самом начале отношений границы еще не проведены, а прави- ла еще не устанош:ены. Может быть, это последний разтул стра- стей перед тем, как взять на себя серьезные обязательства. Если это-произошло на раннем этапе отношений, то очень трудно понять, пытается ли парень таким образом расстаться с прежним образом жизни и его измена больше не повторится или этот па- рень просто полный придурок. Это одна из вечных проблем, возникающих межш мужчиной и женщиной: ты пускаешь в свое сердце человека, которого, как выясняется ближе к вечеру, ты знаешь вовсе не так хорошо. Ты еще не изучила его личный моральный кодекс, ты еще не ознакомилась со списком его любовных побед Тебе приходится идти на ощупь, ориентиру- ясь на то. как сильно он тебе нравится и что он сам говорит по этому поводу. Единственное, что сейчас приходит мне в голо- ву, это мысль о том, что очень печально говорить о подобных вещах в самом начале отношений. Ведь считается, что именно в это время дарят друг друту радость и удовольствия, а каждый из партнеров стремится показать лучшее, на что он способен. И хотелось бы верить, что у нас все будет именно так. Мне дей- ствительно хочется в это верить. А ВОТ КАК ВСЕ ДОЛЖНО БЫТЬ Лих Одна моя подруга рассказала мне интересную историю. У нее было назначено свидание с парнем, который безумно ей нравился, но он ее подвел. Потом он позвонил ей, умоляя про- стить его и придумывая всевозможные предлоги, почему он не пришел Она посоветовала ему отвалить и сказала, что всегда дает мужчинам только один шанс. А он его профукал. Представляете, что бы сделала эта женщина, если бы бой- френд ее обманул? P.S. Можно сказать, что таким образом она дала шанс дру- гому парню, который этот шанс не упустил. Теперь они жена- ты, и он носит ее на руках. 72 Во» дра89Ф о ГРЕГ, У МЕНЯ ПОЛУЧИЛОСЬ! Адель, 26 лет Я встречалась с парнем, который хне очень нра— вился. Он играл в местной музыкальной rpyrme,