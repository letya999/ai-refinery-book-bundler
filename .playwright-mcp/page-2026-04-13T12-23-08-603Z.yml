          - paragraph [ref=f3e58]: "Я твердо верю в то, что если вам приходится предпринимать активные действия, преследовать ва- шего избранника, приглашать его на свидания де- вять раз из десяти, то скорее всего не так уж сильно вы ему нравитесь. (А ведь мы добиваемся, дорогие дамы, того, чтобы вы поверили: вы прекрасны!) У меня не хватит воздуха в легких, чтобы крикнуть до- статочно тромко: суперпришлекательная леди, чита- ющая эту книту, вы достойны того, чтобы вас при- гласили на свидание! ВОТ ПОЧЕМУ ЭТО ТРУДНО Лиз: Ну да, все это очевидно. Вы хотите сказать, что мы должны сидеть сложа руки и ждать у моря погоды?"
          - paragraph [ref=f3e59]: "Не знаю, как вас, а меня эта мысль приводит в ярость. Меня всегда учили, что труд и стремление к поставленным целям и есть ключ к исполнению всех желаний. Я массу времени и сил потратила, чтобы добить- ся того, чего хотела: много работала рии карьеры. звонила раз- ным людям, встречалась с ними. просила их сделать мне одол- жение. У меня была активная жизненная позиция, А теперь Грег 23"
          - paragraph [ref=f3e60]: говорит, что в этой ситуации мы не должны делать ровным сче- том ничего. Это мужчины выбирают, с кем им быть, а нам оста- ется нарядиться в короткое платьице, сделать прическу и хло- пать ресничками в надежде на то, что они выберут нас. Почему бы мне просто не затянуть корсет потуже, чтобы упасть в обмо- рок перед каким-нибудь мужчиной, который поднимет меня с дороги, прежде чем я попаду под колеса повозки, запряженной лошадьми? По крайней мере это примечет его внимание. Действительно, в наше время самое сложное для многих женщин и для меня в особенности — это не делать ничего.
          - paragraph [ref=f3e61]: Нам нравится строить планы, делать телефонные звонки, оишцать уверенность в завтрашнем дне. И здесь я имею в виш нечто боль- шее, чем лишний поход к парикмахеру с целью проверить, не торчат ли волосы в разные стороны. Я полагаю, большинство женщин, которые встречаются с мужчинами, не страдают от ежедневных визитов своих избранников. Иногда в отношениях наступает период затишья и никто не приглашает нас на свида- ние. Поэтому когда мы встречаем мужчину, который может стать объектом наших воздыханий, нам еще труднее занять выжида- ющую позицию. Ведь такой шанс может больше не предста- И что же?
