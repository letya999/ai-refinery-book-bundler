          - paragraph [ref=f1e8]: "удк 615.8 ББК 53.51 Б48 Greg Behrendt and Liz Tuccillo I-IE'S JUST NOT ТНАТ INTO YOU ПеревоД с английского Е И. Филипповой Печатается с разрешения издательства Simon & Schuster Inc. и литературного агентства Andrew Nurnberg. Берендт, Г. Б48 Вы просо ему нравитесь.• вся мужчтт/ГрегБерендг, Лиз Туччилло; пер. с англ. Е.И. Фюлипповой. — М.: АСТ: АСТ МОСКВА: ХРАНИТЕЛЬ, 2007. — 170, [6] с. ISBN 978-5-17-0338993 (000 «Изд-во психол.на кажддень-2) ISBN 978-5-9713-0649-8 (000 изд-во «АСТ МОСКВА») ISBN 978-5-97624239-8 (000 «ХРАНИТЕЛЬ») Оформление и компьютерный дизайн ВА Воронина lSBN 978-5-174425134 (000 «Изд-во АСГ»ХС.: совма кажд.день-З) ISBN 978-5-971344634 (000 Изд-во «АСГ МОСКВА») ISBN 978-5-9762-26883 (000 «ХРАНИГЕЛЬ») Оформхюк и компьютерный дизайн ВА Воронина Об этом надо было написать. Кто-то должен был роъяснить женщинам, что на самом деле кроется за поступками и словами мужчин! Вы ждете звонка, а телефон молчит. ОН занят?! Вы год за годом рассчитываете получить предложение руки и сердца Он просто хочет «разобраться в своих чувствах»! Вы настроены на серьезные отношения, а для НЕГО все сводится к «легкой интрижке». ОН боится, что ему опять будет больно?! Вы придумываете ему оправдания. Вы делаете и первый, и второй, И десятый шаг... Безрезультатно! А может, вы просто теряете время? Конечно, порой у мужчин тонкая и сложная натура, но чаще всего — они слишком трусливы, чтобы высказать простенькую правду: «Ты не так уж сильно мне нравишься!» 1SBN 978-98546-2049-0 (ООО «Харвест») (С.: Сов.на кажллень(м)) ISBN 978-985-16-20504 (ООО «ХарЕс-т») (С: Психол.на кажд.день-2) удк 615.8 БЖ 53.51 С Greg Behrendt, 1.iz Tuccillo, 2004 О Перевод. Е.И. Филиппова, 2005 е 000 «Издательство АСТ», 2007 Книга посвящается всем очаровательным Дамам, истории которых и вдохновили нас на ее создание Есть несколько человек, без которых не было бы этой кни- ги. Прежде всего мы благодарим необычайно тиантливых сце- наристов сериала «Секс в большом городе» Синди Чапек, Джен- ни Бикс, Эйми Би Харрис, Джулию Суини, Джули Ротгенберг и Элайзу Заритски (они написали удивительный эпизод, который впервые навел нас на мысль о книге), и, разумеется, нашего за- мечательного начальника — Майюла Патрика Кинга. К этим людям мы испытываем самые теплые чувства и признательны им за помощь, великодушие и умение смотреть с юмором на лобые ситуации. Мы благодарим всех, кто активно поддерживал сумасшед- шую идею написать эту книгу, — Джона Мелфи, Сару Кондон, Ричарда Орена, а также тех, кто сотрудничал с «Эйч-би-оу». Су- перагент и просто друг Грег Кейвик, который работает в «Ай- си-эм»*, помог нам с изданием книги. Большое спасибо Джу- лии Джеймс за моральную поддержку. Наша глубочайшая бла- годарность — агенту по печати Энди Барцви: именно он пер- вым воспринял эту книгу серьезно, а потом еще и умудрился выгодно ее продать. Мы говорим «спасибо» нашему редактору, филологу Патрику Прайсу, настоящему джентльмену. Еще спасибо мужчинам и женщинам, которые заполняли анкеты, рассказывали истории из своей жизни, задавали воп- росы и не позволяли нам соврать при написании книги. Мы искренне признательны всем своим друзьям и родственникам, в особенности Ширли Туччилло и Кристен Берендт за неустан- ную поддержку и энтузиазм. Наконец, мы благодарим за сотрудничество Амииру Руото- лу Берендт: жаркий пыл, чувство юмора, талант, способность * Агентство по поиску талантов. — здесь и далее примеч. пер. 5"
          - paragraph [ref=f1e9]: "любить и сексуальная привлекательность, которыми обладает эта женщина, сделали книту такой потрясающей. Истории, рассказанные в этой книге, и:рают роль нагляд- ных примеров. Они не основаны на событиях из жизни конк- ретных людей. Что бы вы ни подумшли, мы не пытались в ней публично высмеять наших друзей, врагов шш бывших партне- ров. (Однако не отрицаем, что такая мысль, возможно, прихо- дила нам в голову.) Грег и Лиз Фредаолодае сааз Этот день начался как обычно. Все мы сидели в кабинете сценаристов серишта «Секс в большом городе» и обменивались мнениями, рассказывали друг другу о личной жизни, перенося свои переживания на судьбы экранных героинь. И, как уже бы- вало, одна из сотрудниц попросила объяснить поведение муж- чины, который ей нравился. Он вел себя несколько противоре- чиво. и это сбивало ее с толку. Мы с радостью взялись за дело и принялись обсуждать, что мотуг означать его поступки. И, как прежде, после напряженной аналитической дискуссии мы за- ключили: наша коллега восхитительна, а он, должно быть, ис- пугался, поскольку никогда не встречал такой замечательной женщины, и потому дрожит и трепещет; она просто должна дать ему время. Но в тот день с нами в комнате был мужчина — кон- сультант по работе над сценарием. Он появ.лялся в студии раза два в неделю, помогал развивать сюжетные линии и смотрел на сериал с чисто мужской точки зрения. Это был Грег Берендт. В этот самый день Грег внимательно выслушал историю женщи- ны и наши комментарии, а потом обратился к ней. «Похоже, — сказал он, — не так уж сильно ты ему нравишься». Его слова вызвали у нас шок. негодование, неистовый смех, ужас и, ко всему прочему, недоумение. Однако мы туг же по- чувствовали, что, возможно, этот мужчина говорит правду. Правду, которая нам так и не открылась, несмотря на сто лет в общей сложности совместного опыта отношений с мужчинами, и о которой мы уж точно никогда не пытались говорить. «Ну ладно, может, в чем-то он прав», неохотно согласились мы. 7"
