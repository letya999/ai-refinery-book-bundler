          - paragraph [ref=f1e13]: "Вы просто ЕМУ НЕ НРАВИТЕСЬ у меня в жизни просто ужасный период. Твори-тся полная чер- товщина». Мысли о сексе сводят нас с ума, хотя мы притворя- емся, что это вовсе не так. «Что? Нет-нет, я слушал тебя очень внимательно». И к нашему сожалению (а к вашему удивлению), нам проще выпрыгнуть из окна городского автобуса, чем ска- заты «Ты мне не подходишь». Мы на сто процентов уверены. что в этом случае вы убьете нас или себя, или нас обоих, или, что еще хуже, начнете плакать и кричать. Мы и вправду достой- ны сострадания. Но факт остается фактом: даже если не гово- рим об этом, мы явно показываем вам свое отношение. Если парень не звонит вам тогда, когда обещал, если не хочет удер- жать вас, то вот он, ответ на ваш вопрос. Перестаньте придумы- вать д.ля него оправдания, его поступки говорят, даже кричат сами за себя: он просто не запал на вас. Но не отчаивайтесь, дамы! Смиритесь с поражением и не теряйте времени зря. Зачем томиться в неопределенности, ког- да можно встретить того, в ком вы будете полностью уверены? Не хотите и слышать об этом? Ладно. Вот ответ, который вы хотели получить: «Не отставай от него, крошка. Он вовсе не та- кой неудачник, как говорят все вокруг. Если ты подождешь, прекратишь много болтать, будешь звонить ему в подходящее время и предугадывать перепады его настроения, перестанешь питать иллюзии насчет ваших отношений и твоих сексуальных желаний, то он станет твоим!» Но пожалуйста, не удивляйтесь, когда он бросит вас или вы поймете, что ваш роман не прино- сит вам никакого удовольствия. Мы уже нечто подобное слышали, а вы безнадежно от этого устали. Возможно, именно потому вы сейчас держите в руках эту книгу. Вы знаете, что заслуживаете того, чтобы на вас обра- тил внимание достойный мужчина. Мы с вами согласны. По- этому возьмите маркер и — поехали! Лиз уже цитировала мои слова: не стоит растрачивать свою красоту понапрасну! Водо от пор Котриает•еоь о одн,амю Ф hwvw партие Эй, я знаю парня, с которым вы встр