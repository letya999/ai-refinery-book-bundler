          - paragraph [ref=f1e14]: "на все эти оправдания, чтобы вы увидели их такими, какие они есть, — жалкими и неубедительными. Кстати, помните фюльм, в котором девушка ждала, когда парень пригласит ее на свидание, а он все не приглашал, приду- мывая нелепые отговорки? Потом она переспала с ним, когда они оба находились под воздействием алкоголя, и стала ходить за ним хвостом, пока не добилась того, что они как бы начии встречаться. Потом он изменил ей, а она страдала, зная в глуби- не души, что если простит его и решит не требовать невозмож- ното, а будет с ним душечкой, то в конце концов он останется с ней. На свадьбе он напился, а потом они жили долго и несчаст- ливо, мучаясь под гнетом не приносящих удовлетворения от- ношений, которые были построены на убогом фундаменте. Не помните? Правильно, ведь таких фњльмов не снимают. А не снимают их потому, что настоящая любовь выглядит со- всем иначе. Любовь дарит людям вдохновение, которое побуж- дает их совершать удивительные поступ ки, чтобы встретить сво- его избранника и быть с ним. Вот это и становится сюжетом для великих фильмов. И каждый любовный союз, которым вы вос- хищаетесь, излучает некую силу — именно эту силу вы и надее- тесь ощутить в собственной личной жизни. И чем больше вы себя цените, тем больше у вас шансов построить отношения, наделенные этой смой. А теперь почитайте о нелепых мужских отговорках, посмейтесь и... больше не верьте им. Вы этого достойны. НЕ ТАК УЖ СИЛЬНО ВЫ ЕМУ НРАВИТЕСЬ, РАЗ ОН НЕ ПРИГЛАШАЕТ ВАС НА СВИДАНИЕ Фото.ч жо, ид до8орьм Взаимьчо аавв,ФЪ.» Многие женщины говорили: «Грег, миром правят мужчи- ны•. Ух ты! Звучит так, как будто мы весьма решительные на- туры. Тогда почему, скажите на милость, вы считаете, что мы не способны совершить такой простой поступок, как набрать номер телефона и пригласить вас на свидание? Похоже, иног- да вы думаете, что мы «слишком робкие» или «только что пе- режили неудачный роман». Так вот позвольте напомнить: мужчинам доставляет удовольствие добива