сь мы. 7"
          - paragraph [ref=f1e11]: "Вы просто ЕМУ НЕ НРАВИТЕСЬ «Но Грег вряд ли поймет, почему мой будущий муж, очень за- нятой и сложный человек, ведет себя именно так» . — заявила подруга. И туг начались разговоры: Грег, как всезнающий Буд- да, переходил от одной женщины к другой, выслушивая несча- стливые истории их личной жизни. Поведению всех этих муж- чин мы могли найти оправдание. начиная с перелома указатель- ного пальца, которым набирают телефонный номер, и кончая тяжелым детством. Грег разбил наши доводы один за другим в пух и прах. В результате неимоверных усилий Грету удалось убе- дить нас, что если парень в здравом уме действительно запал на женщину, то ему ничто не помешает ее завоевать. А ес.ли он не в здравом уме, то зачем он нужен? Это подтверждшлось и его соб- ственным опытом: он менял партнерш, был плохим мальчиком, был паинькой и в конце концов влюбился в удивительную жен- щину и женился на ней. Все сотрудницы сценарного отдела и я в особенности вдруг чудесным образом прозрели. М ногие годы я страдала из-за муж- чин и их поведения, которое сбивало меня с толку. Теперь я поняла, что они нисколько не хотели сбивать меня с толку. Я сама заводила себя в тупик. А ведь дело было только в том, что я не так уж сильно нравилась тем мужчинам. Каза.лось бы, такие умозаключения неизбежно должны по- дорвать нашу веру в себя и вызвать среди нас панику. На самом деле все совсем наоборот. Знание — сила, и, что самое главное, знание не позволяет тратить время впустую. С того самого дня я осознала, что сэкономлю массу времени, если не буду часами сидеть у телефона в ожидании звонка мужчины, который мне нравится, часами жаловаться на него подругам, часами размыш- лять о том, действительно ли он хотел сказать «Я люблю тебя и хочу быть с тобой», Грег напомнил нам, что мы красивые, ин- теллектуальныс и остроумные женщины и не должны терять время на то, чтобы выяснять, почему тот или иной парень нам не звонит. Как сказал Грег, не стоит растрачивать свою красоту понапрасну. Это нелегко. Нас всегда учили искать положительное в каж- дом явлении и быть оптимистами. Но не в данной ситуации. Сейчас как раз нужно видеть отрицательные стороны. Прежде 8 Во» юра&9Ф о всего следует сразу принять как факт, что ничего может не по- лучиться, и согласиться с тем, что ваш случай правило, а не исключение. Эго дает оц.хущение опьяняющей свободы. Но ис- пытать его дано не каждой. А все потому, что мы поступаем про- тивоположным образом: идем на свидание с мужчиной, влюб- ляемся в него, а потом он совершает поступок, который нас разочаровывает. За этим поступком следует череда других, которые разочаровывают не меньше. Потом наступает период сверхизобретательных оправданий, длящихся неделями или да- же месяцами, а нам и в голову не приходит, что этот замеча- тельный мужчина, который нам так нравится, уже давно пре- вратился в несчастного калеку. Иначе как мотуг все придуман- ные в его оправдание отговорки соответствовать действи- тельности? Мы пытаемся объяснить, почему он ведет себя так странно, и находим порой самые нелепые причины. хотя на са- мом деле причина всего одна: он просто на нас не запал. Мы включили в книп вопросы, которые женщины задают о реальных ситуациях в своей жизни. В ней собраны самые рас- пространенные доводы, которые они находят для оправдания поведения мужчин и потому не могут положить конец несуще- ствующим отношениям. Читайте, получайте от этого удоволь- ствие и, что самое полезное, учитесь на чужом опыте и пробле- мах. И если вам кажется. что ваш бойфренд вовсе не без ума от вас, и вы чувствуете, что пора все выяснить, то подумайте — воз- можно, не так уж вы ему нравитесь. Тогда оставьте его и отправ- ляйтесь на поиски мужчины, который полюбит вас по-настоя- щему,"
          - paragraph [ref=f1e12]: "C)tpegaaaokae Грета Так вот, сижу я в кабинете сценаристов сериала «Секс в боль- шом городе», размышляю над тем, как приятно быть единствен- ным и притом гетеросексуальным мужчиной в женском коллек- тиве (вообще-то в этот момент я как раз ем печенье), и тут жен- шины заводят разговор о мужчинах, с которыми встречаются. У нас такие разговоры заходят довольно часто, это даже помогает писать сценарий фильма или сериала об отношениях между муж- чиной н женщиной. Но этот разговор меня просто заворожил Я знаю, мои слова мотут показаться язвительными, но я говорю то, что думаю. В тот день одна из женщин подходит ко мне и говорит: «Грег, ты мужчина». Очень тонкое наблюдение, я действительно муж- чина. Потом она добавляет: «Я встречалась с одним парнем... Ну даз думаю, это можно назвать именно так». Я уже знаю от- вет. «Понимаешь, мы пошли в кино, и это было здорово. Нет, он не брал меня за руку. Я все равно не люблю держаться за руки». К тому же я знаю ответ. «А потом он поцеловал меня на стоянке для машин. Я спросила, не хочет ли он остаться у меня на ночь, но на следующее утро у него была назначена важная встреча, и он отказался». Да она что, смеется надо мной? Я знаю И я спросил: — Он звонил тебе? — В этом-то и проблема. Дело было около недели назад, — теперь она сама должна догадаться, — а сегодня я получаю от него письмо в духе «почему ты мне не звонишь?». 10 ВОФ о Я пристально посмотрел на нее, недоумевая, отчего она не видит, что ответ написан у меня на лице. (О, дамочки, иногда вы просто выводите меня из себя!) Передо мной красивая, та- лантливая, суперумная девушка, она пи щет сценарий для одно- го из лучших телевизионных сериалов, который также славится тем, что демонстрирует мужчин в истинном свете. Да с ней хо- тел бы встречаться практически любой парень. И эту потрясаю- щую девушку поставила в тупик ситуация, в которой для меня все предельно ясно. На самом деле выражение «поставить в ту- пик» здесь неуместно, девушка слишком 