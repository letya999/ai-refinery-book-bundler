<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2. Схема P3.express (спираль)</title>
<style>
:root{--bg:#081423;--panel:#0f1f38;--line:#395f9d;--txt:#eef5ff;--muted:#adc2e1;--acc:#72d8ff;--acc2:#87efc9;--warn:#ffd18a}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 84% -18%,#2f5f9f 0,#162846 42%,#081423 76%);color:var(--txt);font:16px/1.6 "Trebuchet MS","Segoe UI Variable",Tahoma,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:26px 16px 56px}
.hero{padding:22px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(145deg,rgba(114,216,255,.15),rgba(135,239,201,.1));margin-bottom:20px}
.kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
h1{margin:8px 0 10px;font-size:clamp(30px,5vw,52px);line-height:1.03}
.sec{padding:16px;border:1px solid #345790;border-radius:14px;background:rgba(10,18,34,.82)}
.layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.canvas-wrap{border:1px solid #3a609f;border-radius:12px;background:#fff;padding:0;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
#spiral{display:block;width:100%;height:auto;max-width:770px;background:#fff}
.tools{border:1px solid #3c629f;border-radius:12px;background:#10203a;padding:12px}
.btns{display:grid;gap:6px}
button{all:unset;cursor:pointer;padding:8px 10px;border-radius:9px;border:1px solid #4a71b3;background:rgba(18,30,58,.72);font-size:12px;text-transform:uppercase;font-weight:700;transition:0.2s}
button:hover,button.on{background:rgba(114,216,255,.18);border-color:var(--acc)}
.summary{margin-top:10px;padding:12px;border:1px solid #4a71b3;border-radius:10px;background:rgba(20,32,58,.75);color:#d9e8ff;font-size:14px}
.accordion{margin-top:24px;display:grid;gap:10px;grid-column: 1 / -1}
.acc-item{border:1px solid #2e4f84;border-radius:12px;background:rgba(15,31,56,0.6);overflow:hidden}
.acc-head{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;background:rgba(15,31,56,0.9);font-weight:bold;font-size:14px;color:var(--acc)}
.acc-head::after{content:'+';font-size:20px;color:var(--muted)}
.acc-item.open .acc-head{background:rgba(114,216,255,0.12);border-bottom:1px solid #2e4f84}
.acc-item.open .acc-head::after{content:'−'}
.acc-body{padding:0;max-height:0;transition:max-height 0.3s ease-out;overflow:hidden}
.acc-item.open .acc-body{max-height:600px;padding:16px}
.bpmn-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:12px}
.bpmn-cell{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;border:1px solid rgba(114,216,255,0.1)}
.bpmn-cell b{display:block;margin-bottom:6px;color:var(--acc2);text-transform:uppercase;font-size:11px;letter-spacing:1px}
.bpmn-rule{border-left:4px solid var(--warn);background:rgba(255,210,143,0.05)}
@media(max-width:1150px){.layout{grid-template-columns:1fr}}
</style></head>
<body>
<main class="wrap">
  <section class="hero">
    <div class="kicker">Глава 2 • Методология</div>
    <h1>P3.express: схема-улитка</h1>
    <p>Интерактивная карта процесса. Выберите фазу справа, детали шагов появятся <b>ниже под схемой</b>.</p>
  </section>
  <section class="sec">
    <div class="layout">
      <div class="canvas-container" style="display:flex;flex-direction:column;">
        <div class="canvas-wrap">
          <canvas id="spiral" width="770" height="369"></canvas>
        </div>
      </div>
      <aside class="tools">
        <h3>Фазы проекта</h3>
        <div class="btns" id="btns"></div>
        <div class="summary" id="summary"></div>
      </aside>
      <div class="accordion" id="accordion"></div>
    </div>
  </section>
</main>

let active='all';
const cv=document.getElementById('spiral'), ctx=cv.getContext('2d'), btns=document.getElementById('btns'), summary=document.getElementById('summary'), accordion=document.getElementById('accordion');
const base = document.createElement('canvas'); base.width=W; base.height=H; const bctx=base.getContext('2d');
const img = new Image(); img.onload = () => { bctx.drawImage(img, 0, 0); draw(); }; img.src = RAW_B64;

function draw(){
  ctx.clearRect(0,0,W,H); ctx.drawImage(base,0,0);
  if(active!=='all'){
    for(const [code,x,y] of points){
      const on=active===code[0];
      ctx.strokeStyle=on?'#72d8ff':'rgba(0,0,0,0.05)';
      ctx.lineWidth=on?3:1;
      ctx.beginPath();ctx.arc(x,y,on?13:11,0,Math.PI*2);ctx.stroke();
      if(on) { ctx.fillStyle='rgba(114,216,255,0.2)'; ctx.fill(); }
    }
  }
}

function renderAccordion(pk){
  accordion.innerHTML='';
  const p = phases.find(x=>x.k===pk);
  if(!p || !p.steps || !p.steps.length) return;
  p.steps.forEach(s=>{
    const d=document.createElement('div'); d.className='acc-item';
    d.innerHTML=`<div class="acc-head">${s.id} — ${s.n}</div><div class="acc-body"><div class="bpmn-grid"><div class="bpmn-cell"><b>Вход</b>${s.i}</div><div class="bpmn-cell"><b>Выход</b>${s.o}</div><div class="bpmn-cell bpmn-rule"><b>Правило</b>${s.r}</div></div></div>`;
    d.querySelector('.acc-head').onclick=()=>{
      const o=d.classList.contains('open');
      document.querySelectorAll('.acc-item').forEach(x=>x.classList.remove('open'));
      if(!o) d.classList.add('open');
    };
    accordion.appendChild(d);
  });
}

function renderBtns(){
  btns.innerHTML='';
  phases.forEach(p=>{
    const b=document.createElement('button');
    b.textContent=p.n;
    b.className=p.k===active?'on':'';
    b.onclick=()=>{ active=p.k; summary.textContent=p.d; renderBtns(); draw(); renderAccordion(p.k); };
    btns.appendChild(b);
  });
}
summary.textContent=phases[0].d;
renderBtns();
draw();
