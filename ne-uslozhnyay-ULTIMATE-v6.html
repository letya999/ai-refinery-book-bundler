<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Интерактивная книга</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' data: blob:; style-src 'unsafe-inline'; img-src data: blob:; frame-src 'self' data:; font-src data:; connect-src data:;">
<style>
:root { --bg: #f8f9fa; --panel: #ffffff; --text: #202124; --muted: #5f6368; --acc: #1a73e8; --border: #dadce0; --hover: #f1f3f4; --side-w: 320px; }
@media (prefers-color-scheme: dark) { :root { --bg: #121212; --panel: #1e1e1e; --text: #e8eaed; --muted: #9aa0a6; --acc: #8ab4f8; --border: #3c4043; --hover: #2a2b2e; } }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: "Segoe UI Variable", -apple-system, Roboto, sans-serif; overflow: hidden; }
.app { display: flex; height: 100vh; position: relative; }

/* Боковое меню (Sidebar / Drawer) */
.drawer { width: var(--side-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease, margin-left 0.3s ease; flex-shrink: 0; }
.app.side-hide .drawer { margin-left: calc(-1 * var(--side-w)); }

.brand { padding: 24px 20px; border-bottom: 1px solid var(--border); }
.brand h1 { font-size: 20px; line-height: 1.3; margin-bottom: 4px; }
.brand p { font-size: 13px; color: var(--muted); }
.search-box { padding: 12px; border-bottom: 1px solid var(--border); }
.search-box input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; outline: none; font-size: 15px; }
.list { flex: 1; overflow-y: auto; padding: 8px; }
.ch { display: block; width: 100%; text-align: left; padding: 14px 12px; border-radius: 8px; border: none; background: transparent; color: var(--text); font-size: 15px; cursor: pointer; transition: background 0.2s; }
.ch:hover { background: var(--hover); }
.ch.on { background: rgba(26, 115, 232, 0.1); color: var(--acc); font-weight: 600; }
.ch i { display: block; font-size: 12px; color: var(--muted); font-style: normal; margin-top: 4px; font-weight: 400; }

/* Основной контент */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.topbar { height: 64px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; padding: 0 16px; gap: 8px; z-index: 10; }
.icon-btn { all: unset; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text); transition: 0.2s; }
.icon-btn:hover { background: var(--hover); }
.icon-btn svg { width: 24px; height: 24px; fill: currentColor; }
.tt { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; padding: 0 8px; }
.prog-container { height: 3px; background: var(--border); width: 100%; }
.prog-bar { height: 100%; background: var(--acc); width: 0; transition: width 0.3s; }
.frame-container { flex: 1; min-height: 0; position: relative; }
iframe { width: 100%; height: 100%; border: none; background: var(--bg); display: block; }

/* Оверлей для мобилок */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; opacity: 0; pointer-events: none; transition: 0.3s; }
.overlay.active { opacity: 1; pointer-events: auto; }

@media (max-width: 900px) {
  .drawer { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); margin-left: 0 !important; }
  .drawer.open { transform: translateX(0); }
  .app.side-hide .drawer { transform: translateX(-100%); }
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer">
    <div class="brand"><h1>Интерактивная книга</h1><p id="vol-indicator">Загрузка...</p></div>
    <div class="search-box"><input type="text" id="search" placeholder="Поиск по тексту..."></div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="menu-btn" title="Свернуть меню">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <button class="icon-btn" id="prev-btn" title="Предыдущая глава">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <div class="tt" id="tt"></div>
      <button class="icon-btn" id="next-btn" title="Следующая глава">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </header>
    <div class="prog-container"><div class="prog-bar" id="bar"></div></div>
    <div class="frame-container"><iframe id="fr" sandbox="allow-scripts allow-same-origin"></iframe></div>
  </main>
</div>

<script>
  const BOOK_ID = "ne-uslozhnyay-ULTIMATE-v6", GLOBAL_TITLES = ["1. Введение и смысл метода","2. Схема P3.express (спираль)","3. NUP: принципы и оценка зрелости","4. Раздел 3: Запуск проекта","5. A01: Назначить спонсора"], GLOBAL_SEARCH_INDEX = [" \n \n \n \n \n 1. введение и смысл метода \n\n :root {\n  --bg: #050b14;\n  --bg2: #0a1628;\n  --panel: rgba(16, 28, 48, 0.9);\n  --line: #2a4a7d;\n  --txt: #f0f6ff;\n  --muted: #8ea8c3;\n  --acc: #00d4ff; /* яркий акцент для кнопок */\n  --acc2: #00ffaa; /* вспомогательный для схем */\n  --warn: #ffcc00;\n  --card-bg: linear-gradient(165deg, #0f1c30, #1a2b45);\n}\n\nbody {\n  margin: 0;\n  background: var(--bg);\n  color: var(--txt);\n  font-family: \"segoe ui variable\", system-ui, sans-serif;\n  line-height: 1.6;\n}\n\n.wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }\n\n.hero {\n  padding: 40px;\n  border-radius: 24px;\n  background: linear-gradient(135deg, #0a1628 0%, #163056 100%);\n  border: 1px solid var(--line);\n  box-shadow: 0 30px 60px rgba(0,0,0,0.5);\n  margin-bottom: 50px;\n}\n\nh1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; }\n\nh2 { font-size: 2rem; color: var(--acc); margin-top: 60px; }\n\n.canvas-wrap {\n  background: #000;\n  border-radius: 20px;\n  border: 1px solid var(--line);\n  padding: 20px;\n  margin: 40px 0;\n}\n\n.card {\n  background: var(--card-bg);\n  border: 1px solid var(--line);\n  padding: 30px;\n  border-radius: 20px;\n  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n}\n.card:hover { transform: scale(1.03); border-color: var(--acc); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }\n.card b { color: var(--acc); font-size: 0.9rem; }\n\nblockquote {\n  font-style: italic;\n  font-size: 1.5rem;\n  border-left: 4px solid var(--acc2);\n  padding-left: 30px;\n  margin: 40px 0;\n  color: var(--muted);\n}\n  \n \n \n   \n     ознакомительный фрагмент • глава 1 \n     коротко: зачем нужен p3.express \n     корень проблем проектов: рваный ритм управления. метод дает базовый каркас: принципы решений, цикл действий, обязательное закрытие с уроками. \n     \n        33  шага метода  \n        7  этапов цикла  \n        6  nup-принципов  \n        1  цель: предсказуемость  \n     \n   \n\n   \n     почему проекты буксуют? \n     \n       \n         \n         \n         \n         \n         \n           \n           люди (эго) \n         \n         \n           \n           процесс (хаос) \n         \n         \n         \n           \n           цели (туман) \n         \n         \n           \n           связь (разрыв) \n         \n         крах \n       \n       диаграмма исикавы: типовые причины провала без системного метода. \n     \n\n     суть перехода \n     \n        \n       схема читается слева направо: хаос → управленческий цикл → устойчивый результат. \n     \n\n     \n       \n         сложно (pmbok/prince2) \n         сотни процессов, тяжелые отчеты, порог входа в месяцы обучения. риск бюрократического паралича. \n       \n       \n         просто (p3.express) \n         33 понятных шага, фокус на ритме и принципах. запуск за 1 день. минимум лишнего шума. \n       \n     \n\n     \n        1. диагностика  фиксируем точки потерь: где плавают сроки, роли и риски.  \n        2. ритм  внедряем недельный и ежедневный контур. регулярность важнее штурмов.  \n        3. закрепление  цикл замыкается на ретроспективу и обновление артефактов.  \n     \n\n     \n       как это работает на практике? \n       p3.express — это не про бюрократию, а про ритм. мы не пишем отчеты ради отчетов, мы создаем ценность. весь процесс укладывается в  понятную схему-улитку , где каждый шаг логичен и необходим. \n     \n   \n \n\n \nconst cv=document.getelementbyid('flow');\nconst ctx=cv.getcontext('2d');\nconst base_w=1080, base_h=370;\nfunction rr(x,y,w,h,r){ctx.beginpath();ctx.moveto(x+r,y);ctx.arcto(x+w,y,x+w,y+h,r);ctx.arcto(x+w,y+h,x,y+h,r);ctx.arcto(x,y+h,x,y,r);ctx.arcto(x,y,x+w,y,r);ctx.closepath();}\nfunction wrap(text,x,y,maxw,lineh,color,font){ctx.fillstyle=color;ctx.font=font;const words=text.split(' ');let line='';let row=0;for(let i=0;i maxw && i>0){ctx.filltext(line,x,y+row*lineh);line=words[i]+' ';row++;} else line=test;}if(line) ctx.filltext(line,x,y+row*lineh);}\nfunction drawbox(x,y,w,h,title,rows,fill,stroke,titlecolor,rowcolor){ctx.fillstyle=fill;ctx.strokestyle=stroke;ctx.linewidth=2;rr(x,y,w,h,16);ctx.fill();ctx.stroke();wrap(title,x+16,y+40,w-32,30,titlecolor,'700 30px \"trebuchet ms\"');rows.foreach((r,i)=>wrap('• '+r,x+16,y+88+i*34,w-30,26,rowcolor,'19px \"trebuchet ms\"'));}\nfunction arrow(x1,y1,x2,y2){ctx.strokestyle='#5fc9ef';ctx.linewidth=6;ctx.beginpath();ctx.moveto(x1,y1);ctx.lineto(x2,y2);ctx.stroke();const a=math.atan2(y2-y1,x2-x1),l=14;ctx.fillstyle='#5fc9ef';ctx.beginpath();ctx.moveto(x2,y2);ctx.lineto(x2-l*math.cos(a-0.4),y2-l*math.sin(a-0.4));ctx.lineto(x2-l*math.cos(a+0.4),y2-l*math.sin(a+0.4));ctx.closepath();ctx.fill();}\nfunction draw(){\n  ctx.clearrect(0,0,base_w,base_h);\n  drawbox(20,26,322,318,'хаос',['случайные решения','реакция вместо плана','риски'], '#31274a','#69578f','#f4ecff','#ddcff7');\n  drawbox(378,26,318,318,'p3.express',['принципы nup','ритм цикла','уроки'], '#17334c','#4d81a5','#eaf6ff','#c8e1f6');\n  drawbox(732,26,328,318,'управление',['прогресс','меньше переделок','результат'], '#1b3850','#598bb2','#eef8ff','#d1e6fa');\n  arrow(350,184,372,184); arrow(704,184,726,184);\n}\nfunction setupcanvas(){\n  const dpr=math.max(1,window.devicepixelratio||1);\n  const cssw=cv.clientwidth||base_w;\n  const cssh=math.round(cssw*(base_h/base_w));\n  cv.style.height=cssh+'px';\n  cv.width=math.round(cssw*dpr); cv.height=math.round(cssh*dpr);\n  ctx.settransform(dpr,0,0,dpr,0,0); ctx.scale(cssw/base_w,cssh/base_h); draw();\n}\nsetupcanvas(); window.addeventlistener('resize',setupcanvas);\n \n \n \n"," \r\n \r\n \r\n  \r\n 2. схема p3.express (спираль) \r\n :r e=p.k===active?'on':'';\r\n    b.onclick=()=>{ active=p.k; summary.textcontent=p.d; renderbtns(); draw(); renderaccordion(p.k); };\r\n    btns.appendchild(b);\r\n  });\r\n}\r\nsummary.textcontent=phases[0].d;\r\nrenderbtns();\r\ndraw();\r\n   \r\n"," \n \n \n \n \n 3. nup: принципы и оценка зрелости \n\n :root {\n  --bg: #050b14;\n  --bg2: #0a1628;\n  --panel: rgba(16, 28, 48, 0.9);\n  --line: #2a4a7d;\n  --txt: #f0f6ff;\n  --muted: #8ea8c3;\n  --acc: #00d4ff; /* яркий акцент для кнопок */\n  --acc2: #00ffaa; /* вспомогательный для схем */\n  --warn: #ffcc00;\n  --card-bg: linear-gradient(165deg, #0f1c30, #1a2b45);\n}\n\nbody {\n  margin: 0;\n  background: var(--bg);\n  color: var(--txt);\n  font-family: \"segoe ui variable\", system-ui, sans-serif;\n  line-height: 1.6;\n}\n\n.wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }\n\n.hero {\n  padding: 40px;\n  border-radius: 24px;\n  background: linear-gradient(135deg, #0a1628 0%, #163056 100%);\n  border: 1px solid var(--line);\n  box-shadow: 0 30px 60px rgba(0,0,0,0.5);\n  margin-bottom: 50px;\n}\n\nh1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; }\n\nh2 { font-size: 2rem; color: var(--acc); margin-top: 60px; }\n\n.canvas-wrap {\n  background: #000;\n  border-radius: 20px;\n  border: 1px solid var(--line);\n  padding: 20px;\n  margin: 40px 0;\n}\n\n.card {\n  background: var(--card-bg);\n  border: 1px solid var(--line);\n  padding: 30px;\n  border-radius: 20px;\n  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n}\n.card:hover { transform: scale(1.03); border-color: var(--acc); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }\n.card b { color: var(--acc); font-size: 0.9rem; }\n\nblockquote {\n  font-style: italic;\n  font-size: 1.5rem;\n  border-left: 4px solid var(--acc2);\n  padding-left: 30px;\n  margin: 40px 0;\n  color: var(--muted);\n}\n  \n \n \n   \n     ознакомительный фрагмент • глава 3 \n     nup: принципы + нормальная оценка \n     без оценочной шкалы принципы превращаются в лозунги. ниже: четкая шкала 1–5, профиль зрелости по 6 принципам и приоритеты улучшения. \n   \n\n   \n     шкала nup (1–5) \n     \n        1 не применяется, решения хаотичны. \n        2 есть попытки, но без стабильности. \n        3 базово работает в части команды. \n        4 стабильно применяется в цикле. \n        5 эталон: воспроизводимо и масштабируется. \n     \n\n      \n\n     \n       \n          \n       \n       \n         \n           кризисный режим \n           базовый уровень \n           сильная команда \n         \n          \n          \n          \n          \n       \n     \n\n     \n       \n           принцип  ритуал  метрика  статус   \n          \n       \n     \n   \n \n \nconst data=[\n {k:'nup1',name:'истина важнее привязанности',short:'решение по фактам, не по эго.',rit:'факт-ревью еженедельно',met:'% решений, измененных по данным',icon:'truth'},\n {k:'nup2',name:'береги энергию и ресурсы',short:'убираем лишнюю активность.',rit:'лимиты wip и приоритет-фильтр',met:'незавершенные задачи в цикле',icon:'energy'},\n {k:'nup3',name:'будь проактивен',short:'ловим риск до пожара.',rit:'риск-радар на неделю вперед',met:'доля рисков до эскалации',icon:'pro'},\n {k:'nup4',name:'усиливай слабое звено',short:'бьем в bottleneck.',rit:'один bottleneck на цикл',met:'время прохождения узкого места',icon:'bottle'},\n {k:'nup5',name:'ничего без цели',short:'каждое действие = outcome.',rit:'цель у каждой встречи/дока',met:'доля действий без измеримого эффекта',icon:'target'},\n {k:'nup6',name:'воспроизводимые элементы',short:'шаблоны и чек-листы.',rit:'ретро + обновление стандартов',met:'повторяемость ошибок',icon:'blocks'}\n];\nlet vals=[3,3,2,2,3,2];\nconst principles=document.getelementbyid('principles');\nconst controls=document.getelementbyid('controls');\nconst scorebox=document.getelementbyid('score');\nconst focusbox=document.getelementbyid('focus');\nconst mt=document.getelementbyid('mt');\n\nfunction drawicon(c,type){\n  const x=c.getcontext('2d');const w=c.width,h=c.height;\n  x.fillstyle='#0d1c38';x.fillrect(0,0,w,h);\n  if(type==='truth'){\n    x.strokestyle='#70d8ff';x.linewidth=3;x.beginpath();x.moveto(40,80);x.lineto(120,30);x.lineto(210,90);x.lineto(280,40);x.stroke();\n    x.fillstyle='#85efc7';x.beginpath();x.arc(280,40,14,0,math.pi*2);x.fill();\n  }else if(type==='energy'){\n    x.fillstyle='#ffd48f';x.fillrect(36,26,90,68);x.fillstyle='#0d1c38';x.fillrect(52,38,58,44);\n    x.fillstyle='#70d8ff';x.fillrect(145,36,28,58);x.fillrect(179,48,28,46);x.fillrect(213,26,28,68);\n  }else if(type==='pro'){\n    x.strokestyle='#85efc7';x.linewidth=3;x.beginpath();x.arc(82,60,32,0,math.pi*2);x.stroke();\n    x.fillstyle='#85efc7';x.fillrect(108,56,82,8);\n    x.beginpath();x.moveto(190,60);x.lineto(176,50);x.lineto(176,70);x.fill();\n    x.fillstyle='#ffd48f';x.fillrect(220,34,58,52);\n  }else if(type==='bottle'){\n    x.fillstyle='#70d8ff';x.fillrect(34,34,96,54);x.fillstyle='#ffd48f';x.fillrect(130,46,24,30);x.fillstyle='#85efc7';x.fillrect(154,30,120,62);\n  }else if(type==='target'){\n    x.strokestyle='#70d8ff';x.linewidth=3;[46,34,22].foreach(r=>{x.beginpath();x.arc(84,60,r,0,math.pi*2);x.stroke();});\n    x.fillstyle='#ffd48f';x.fillrect(84,58,130,4);x.fillrect(204,48,4,24);\n  }else if(type==='blocks'){\n    x.fillstyle='#70d8ff';x.fillrect(30,26,72,32);x.fillstyle='#85efc7';x.fillrect(108,26,72,32);x.fillstyle='#ffd48f';x.fillrect(30,64,72,32);x.fillstyle='#bfd3f2';x.fillrect(108,64,72,32);\n    x.strokestyle='#9bb8eb';x.linewidth=2;x.strokerect(214,34,68,58);\n  }\n}\n\nfunction buildprinciples(){\n  principles.innerhtml='';\n  data.foreach((p,i)=>{\n    const el=document.createelement('article');el.classname='p';\n    el.innerhtml=`   ${p.k}  ${p.name}  ${p.short} `;\n    principles.appendchild(el);\n    drawicon(el.queryselector('canvas'),p.icon);\n  });\n}\n\nfunction leveltext(total){\n  if(total риск ';\n  if(v===3)return ' база ';\n  return ' сильно ';\n}\n\nfunction rendercontrols(){\n  controls.innerhtml='';\n  data.foreach((p,i)=>{\n    const row=document.createelement('div');row.classname='row';\n    row.innerhtml=` ${p.k}  ${vals[i]}/5   `;\n    controls.appendchild(row);\n  });\n  controls.queryselectorall('input').foreach(inp=>inp.addeventlistener('input',e=>{vals[+e.target.dataset.i]=+e.target.value;refresh();}));\n}\n\nfunction drawradar(){\n  const cv=document.getelementbyid('radar');const x=cv.getcontext('2d');const w=cv.width,h=cv.height,cx=w/2,cy=h/2,r=120;\n  x.clearrect(0,0,w,h);\n  x.strokestyle='rgba(180,205,255,.28)';\n  for(let l=1;l {const a=(-90+i*60)*math.pi/180;x.beginpath();x.moveto(cx,cy);x.lineto(cx+math.cos(a)*r,cy+math.sin(a)*r);x.stroke();x.fillstyle='#cfe1ff';x.font='12px \"trebuchet ms\"';x.filltext(p.k,cx+math.cos(a)*(r+14)-16,cy+math.sin(a)*(r+14));});\n  x.beginpath();\n  vals.foreach((v,i)=>{const a=(-90+i*60)*math.pi/180;const r=r*v/5;const px=cx+math.cos(a)*r,py=cy+math.sin(a)*r;i?x.lineto(px,py):x.moveto(px,py)});\n  x.closepath();\n  const g=x.createlineargradient(0,0,w,h);g.addcolorstop(0,'rgba(111,215,255,.45)');g.addcolorstop(1,'rgba(133,239,199,.34)');\n  x.fillstyle=g;x.strokestyle='#86e7ff';x.linewidth=2;x.fill();x.stroke();\n}\n\nfunction drawbars(){\n  const cv=document.getelementbyid('bars');const x=cv.getcontext('2d');\n  x.clearrect(0,0,cv.width,cv.height);\n  x.fillstyle='#0d1730';x.fillrect(0,0,cv.width,cv.height);\n  const gap=18,bw=(cv.width-80-gap*5)/6;\n  data.foreach((p,i)=>{\n    const h=vals[i]*24;\n    x.fillstyle='rgba(111,215,255,.9)';x.fillrect(30+i*(bw+gap),150-h,bw,h);\n    x.fillstyle='#d8e7ff';x.font='12px \"trebuchet ms\"';x.filltext(p.k,30+i*(bw+gap)+bw/2-14,166);\n    x.fillstyle='#ffd48f';x.filltext(vals[i]+'/5',30+i*(bw+gap)+bw/2-14,146-h);\n  });\n}\n\nfunction rendermatrix(){\n  mt.innerhtml='';\n  data.foreach((p,i)=>{\n    const tr=document.createelement('tr');\n    tr.innerhtml=` ${p.k}  ${p.rit}  ${p.met}  ${statusbadge(vals[i])} `;\n    mt.appendchild(tr);\n  });\n}\n\nfunction renderscore(){\n  const total=vals.reduce((a,b)=>a+b,0);\n  const pct=math.round(total/30*100);\n  scorebox.innerhtml=` ${total}/30  • ${pct}% • уровень: ${leveltext(total)}`;\n  const sorted=vals.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v).slice(0,2).map(o=>data[o.i]);\n  focusbox.innerhtml=' фокус улучшения:  '+sorted.map(s=>`${s.k} (${s.name})`).join(' и ')+'.';\n}\n\nfunction refresh(){rendercontrols();drawradar();drawbars();renderscore();rendermatrix();}\n\nbuildprinciples();\nrefresh();\ndocument.queryselectorall('.quick button').foreach(b=>b.addeventlistener('click',()=>{\n  if(b.dataset.preset==='low') vals=[1,2,1,2,2,1];\n  if(b.dataset.preset==='mid') vals=[3,3,3,2,3,3];\n  if(b.dataset.preset==='high') vals=[5,4,4,4,5,4];\n  refresh();\n}));\n \n \n \n"," \n \n   4. раздел 3: запуск проекта  :root {\n  --bg: #050b14;\n  --bg2: #0a1628;\n  --panel: rgba(16, 28, 48, 0.9);\n  --line: #2a4a7d;\n  --txt: #f0f6ff;\n  --muted: #8ea8c3;\n  --acc: #00d4ff; /* яркий акцент для кнопок */\n  --acc2: #00ffaa; /* вспомогательный для схем */\n  --warn: #ffcc00;\n  --card-bg: linear-gradient(165deg, #0f1c30, #1a2b45);\n}\n\nbody {\n  margin: 0;\n  background: var(--bg);\n  color: var(--txt);\n  font-family: \"segoe ui variable\", system-ui, sans-serif;\n  line-height: 1.6;\n}\n\n.wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }\n\n.hero {\n  padding: 40px;\n  border-radius: 24px;\n  background: linear-gradient(135deg, #0a1628 0%, #163056 100%);\n  border: 1px solid var(--line);\n  box-shadow: 0 30px 60px rgba(0,0,0,0.5);\n  margin-bottom: 50px;\n}\n\nh1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; }\n\nh2 { font-size: 2rem; color: var(--acc); margin-top: 60px; }\n\n.canvas-wrap {\n  background: #000;\n  border-radius: 20px;\n  border: 1px solid var(--line);\n  padding: 20px;\n  margin: 40px 0;\n}\n\n.card {\n  background: var(--card-bg);\n  border: 1px solid var(--line);\n  padding: 30px;\n  border-radius: 20px;\n  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n}\n.card:hover { transform: scale(1.03); border-color: var(--acc); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }\n.card b { color: var(--acc); font-size: 0.9rem; }\n\nblockquote {\n  font-style: italic;\n  font-size: 1.5rem;\n  border-left: 4px solid var(--acc2);\n  padding-left: 30px;\n  margin: 40px 0;\n  color: var(--muted);\n}\n  \n  \n   \n     методология p3.express • глава 4 \n     раздел 3. запуск проекта \n     многие проекты умирают не потому, что их плохо делали, а потому, что их не нужно было начинать. \n   \n\n   \n     почему запуск — это фильтр? \n     вспомните историю с курсом во время пандемии. идея была классной, но время — худшим. фаза запуска в p3.express заставляет вас ответить на неудобные вопросы до того, как вы потратите первый рубль. \n    \n     \n        \n       интерактив: нажмите на \"запуск\", чтобы увидеть, как метод отсеивает мусорные идеи. \n     \n\n     \n        a01  спонсор  тот, кто дает деньги и защищает интересы бизнеса.  \n        a02  менеджер  тот, кто крутит педали методологии каждый день.  \n        a05  риски  честный взгляд на то, что может пойти не так.  \n     \n   \n\n   \n    const cv=document.getelementbyid('filter-viz'), ctx=cv.getcontext('2d');\n    let phase = 0;\n    cv.onclick = () => { phase = (phase + 1) % 3; draw(); };\n    function draw() {\n      ctx.clearrect(0,0,800,400);\n      // идеи\n      ctx.fillstyle = '#3f66a6';\n      for(let i=0; i  0 ? '#87efc9' : '#395f9d'; ctx.linewidth = 5;\n      ctx.beginpath(); ctx.moveto(300, 50); ctx.lineto(300, 350); ctx.stroke();\n      ctx.fillstyle = '#fff'; ctx.filltext('фильтр запуска', 260, 30);\n      // прошедшие\n      if (phase > 1) {\n        ctx.fillstyle = '#72d8ff';\n        ctx.beginpath(); ctx.arc(500, 200, 15, 0, 7); ctx.fill();\n        ctx.filltext('жизнеспособный проект', 530, 205);\n      }\n      ctx.fillstyle = '#adc2e1'; ctx.font = '16px sans-serif';\n      ctx.filltext('кликните для симуляции', 320, 380);\n    }\n    draw();\n   \n  \n \n"," \n \n   5. a01: назначить спонсора  :root {\n  --bg: #050b14;\n  --bg2: #0a1628;\n  --panel: rgba(16, 28, 48, 0.9);\n  --line: #2a4a7d;\n  --txt: #f0f6ff;\n  --muted: #8ea8c3;\n  --acc: #00d4ff; /* яркий акцент для кнопок */\n  --acc2: #00ffaa; /* вспомогательный для схем */\n  --warn: #ffcc00;\n  --card-bg: linear-gradient(165deg, #0f1c30, #1a2b45);\n}\n\nbody {\n  margin: 0;\n  background: var(--bg);\n  color: var(--txt);\n  font-family: \"segoe ui variable\", system-ui, sans-serif;\n  line-height: 1.6;\n}\n\n.wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }\n\n.hero {\n  padding: 40px;\n  border-radius: 24px;\n  background: linear-gradient(135deg, #0a1628 0%, #163056 100%);\n  border: 1px solid var(--line);\n  box-shadow: 0 30px 60px rgba(0,0,0,0.5);\n  margin-bottom: 50px;\n}\n\nh1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; }\n\nh2 { font-size: 2rem; color: var(--acc); margin-top: 60px; }\n\n.canvas-wrap {\n  background: #000;\n  border-radius: 20px;\n  border: 1px solid var(--line);\n  padding: 20px;\n  margin: 40px 0;\n}\n\n.card {\n  background: var(--card-bg);\n  border: 1px solid var(--line);\n  padding: 30px;\n  border-radius: 20px;\n  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n}\n.card:hover { transform: scale(1.03); border-color: var(--acc); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }\n.card b { color: var(--acc); font-size: 0.9rem; }\n\nblockquote {\n  font-style: italic;\n  font-size: 1.5rem;\n  border-left: 4px solid var(--acc2);\n  padding-left: 30px;\n  margin: 40px 0;\n  color: var(--muted);\n}\n  \n  \n   \n     роли в проекте • глава 5 \n     a01 — назначить спонсора \n     спонсор — это не \"банкомат\", это самый высокопоставленный защитник проекта. \n   \n\n   \n     спонсор vs менеджер \n     менеджер проекта (вы) отвечает за процессы. спонсор отвечает за то, чтобы проект принес пользу бизнесу. если вы не можете договориться с юристами — это ваша проблема. если юристы блокируют проект по политическим причинам — это проблема спонсора. \n    \n     \n        \n       схема власти: спонсор находится \"над\" проектом, пробивая внешние преграды. \n     \n\n     \n       зачем он нужен? \n       без спонсора менеджер превращается в \"секретаря\", который собирает подписи. со спонсором менеджер становится \"директором\", у которого есть мандат на изменения. \n     \n   \n\n   \n    const cv=document.getelementbyid('role-viz'), ctx=cv.getcontext('2d');\n    function draw() {\n      ctx.clearrect(0,0,800,400);\n      // спонсор\n      ctx.fillstyle = '#72d8ff'; ctx.beginpath(); ctx.arc(400, 80, 50, 0, 7); ctx.fill();\n      ctx.fillstyle = '#081423'; ctx.font = 'bold 14px sans-serif'; ctx.filltext('спонсор', 365, 85);\n      // связь\n      ctx.strokestyle = '#395f9d'; ctx.setlinedash([5, 5]);\n      ctx.beginpath(); ctx.moveto(400, 130); ctx.lineto(400, 220); ctx.stroke();\n      // проект\n      ctx.setlinedash([]); ctx.fillstyle = '#163056'; ctx.strokestyle = '#72d8ff';\n      ctx.beginpath(); ctx.roundrect(250, 220, 300, 120, 10); ctx.fill(); ctx.stroke();\n      ctx.fillstyle = '#fff'; ctx.filltext('менеджер + команда', 330, 285);\n      // стены\n      ctx.fillstyle = '#ff8f8f'; ctx.fillrect(100, 200, 20, 150); ctx.fillrect(680, 200, 20, 150);\n      ctx.filltext('бюрократия', 70, 190);\n    }\n    draw();\n   \n  \n \n"];

  let globalCur = 0;
  const fr = document.getElementById('fr'), tt = document.getElementById('tt'), bar = document.getElementById('bar'), app = document.getElementById('app');
  const list = document.getElementById('list'), drawer = document.getElementById('drawer'), overlay = document.getElementById('overlay'), searchInput = document.getElementById('search');

  function toggleMenu() {
    if (window.innerWidth <= 900) {
      drawer.classList.toggle('open');
      overlay.classList.toggle('active');
    } else {
      app.classList.toggle('side-hide');
    }
  }
  document.getElementById('menu-btn').onclick = toggleMenu;
  overlay.onclick = () => { drawer.classList.remove('open'); overlay.classList.remove('active'); };

  function decodeB64(b) { return decodeURIComponent(escape(atob(b))); }

  function goGlobal(idx, anchor = null) {
    if (idx < 0 || idx >= GLOBAL_TITLES.length) return;
    if (VOL_MAP[idx] !== CURRENT_VOL) {
      window.location.href = VOL_FILES[VOL_MAP[idx]] + '?ch=' + idx + (anchor ? '#' + anchor : '');
      return;
    }
    
    globalCur = idx;
    localStorage.setItem(`prog_${BOOK_ID}`, idx);
    fr.srcdoc = decodeB64(LOCAL_B64[idx - LOCAL_START_IDX]);
    
    const checkLoad = () => {
      if (fr.contentWindow && fr.contentWindow.document.readyState === 'complete') {
          if (anchor) {
            const el = fr.contentWindow.document.getElementById(anchor);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          }
          fr.contentWindow.focus();
      } else { setTimeout(checkLoad, 50); }
    };
    checkLoad();

    tt.textContent = `${idx + 1}. ${GLOBAL_TITLES[idx]}`;
    bar.style.width = ((idx + 1) / GLOBAL_TITLES.length * 100) + '%';
    document.getElementById('vol-indicator').textContent = `Всего ${GLOBAL_TITLES.length} глав`;
    renderList(searchInput.value);
  }

  function renderList(f = '') {
    list.innerHTML = ''; f = f.toLowerCase();
    GLOBAL_TITLES.forEach((t, i) => {
      if (f && !t.toLowerCase().includes(f) && !GLOBAL_SEARCH_INDEX[i].includes(f)) return;
      const b = document.createElement('button');
      b.className = 'ch' + (i === globalCur ? ' on' : '');
      b.innerHTML = `<b>Глава ${i+1}</b><i>${t}</i>`;
      b.onclick = () => { goGlobal(i); if(window.innerWidth <= 900) toggleMenu(); };
      list.appendChild(b);
    });
  }

  document.getElementById('prev-btn').onclick = () => goGlobal(globalCur - 1);
  document.getElementById('next-btn').onclick = () => goGlobal(globalCur + 1);
  window.addEventListener('message', e => {
    if (e.data.action === 'bookGo') goGlobal(e.data.chapterIdx, e.data.anchorId);
    if (e.data.action === 'bookNext') goGlobal(globalCur + 1);
  });
  searchInput.oninput = (e) => renderList(e.target.value);

  const startCh = new URLSearchParams(window.location.search).get('ch') || localStorage.getItem(`prog_${BOOK_ID}`) || 0;
  goGlobal(parseInt(startCh));
