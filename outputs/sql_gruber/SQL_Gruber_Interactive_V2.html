tmargin: 1em 0px 0.5em 1.923em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.subtitle {\n\tfont-style: italic;\n\tfont-weight: bold;\n\tmargin: 0.5em 2em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n\ttext-indent: 0px;\n}\n\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body class=\"z\"&gt;\n&lt;span&gt;&lt;span id=\"id14\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;Глава 6. ОБОБЩЕНИЕ ДАННЫХ С ПОМОЩЬЮ АГРЕГАТНЫХ ФУНКЦИЙ&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;В ЭТОЙ ГЛАВЕ, ВЫ ПЕРЕЙДЕТЕ ОТ ПРОСТОГО использования запросов к извлечению значений из базы данных и определению, как вы можете использовать эти значения чтобы получить из них информацию. Это делается с помощью агрегатных или общих функций которые берут группы значений из поля и сводят их до одиночного значения. Вы узнаете как использовать эти функции, как определить группы значений к которым они будут применяться, и как определить какие группы выбираются для вывода. Вы будете также видеть при каких условиях вы сможете объединить значения поля с этой полученной информацией в одиночном запросе.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;ЧТО ТАКОЕ АГРЕГАТНЫЕ ФУНКЦИИ?&lt;/p&gt;&lt;p class=\"p\"&gt;Запросы могут производить обобщенное групповое значение полей точно также как и значение одного поля. Это делает с помощью агрегатых функций. Агрегатные функции производят одиночное значение для всей группы таблицы. Имеется список этих функций:&lt;/p&gt;&lt;p class=\"p\"&gt;* COUNT производит номера строк или не-NULL значения полей которые выбрал запрос.&lt;/p&gt;&lt;p class=\"p\"&gt;* SUM производит арифметическую сумму всех выбранных значений данного поля.&lt;/p&gt;&lt;p class=\"p\"&gt;* AVG производит усреднение всех выбранных значений данного поля.&lt;/p&gt;&lt;p class=\"p\"&gt;* MAX производит наибольшее из всех выбранных значений данного поля.&lt;/p&gt;&lt;p class=\"p\"&gt;* MIN производит наименьшее из всех выбранных значений данного поля.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;КАК ИСПОЛЬЗОВАТЬ АГРЕГАТНЫЕ ФУНКЦИИ?&lt;/p&gt;&lt;p class=\"p\"&gt;Агрегатные функции используются подобно именам полей в предложении SELECT запроса, но с одним исключением, они берут имена поля как аргументы. Только числовые поля могут использоваться с SUM и AVG. С COUNT, MAX, и MIN, могут использоваться и числовые или символьные поля. Когда они используются с символьными полями, MAX и MIN будут транслировать их в эквивалент ASCII, который должен сообщать, что MIN будет означать первое, а MAX последнее значение в алфавитном порядке( выдача алфавит ного упорядочения обсуждается более подробно в Главе 4). Чтобы найти SUM всех наших покупок в таблицы Порядков, мы можем ввести следующий запрос, с его выводом в Таблице 6.1:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT SUM ((amt))&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT SUM (amt) FROM Orders;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;26658.4&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6.1: Выбор суммы&lt;/p&gt;&lt;p class=\"p\"&gt;Это конечно, отличается от выбора поля при котором возвращается одиночное значение, независимо от того сколько строк находится в таблице.&lt;/p&gt;&lt;p class=\"p\"&gt;Из-за этого, агрегатные функции и поля не могут выбираться одновременно, пока предложение GROUP BY (описанное далее) не будет использовано.&lt;/p&gt;&lt;p class=\"p\"&gt;Нахождение усредненой суммы - это похожая операция (вывод следующего запроса показывается в Таблице 6.2 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT AVG (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT AVG (amt) FROM Orders;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;26658.4&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6.2: Выбор среднего&lt;/p&gt;&lt;p class=\"subtitle\"&gt;СПЕЦИАЛЬНЫЕ АТРИБУТЫ COUNT&lt;/p&gt;&lt;p class=\"p\"&gt;Функция COUNT несколько отличается от всех. Она считает число значений в данном столбце, или число строк в таблице. Когда она считает значения столбца, она используется с DISTINCT чтобы производить счет чисел различных значений в данном поле. Мы могли бы использовать ее, например, чтобы сосчитать номера продавцов в настоящее время описаных в таблице Порядков (вывод показывается в Таблице 6.3 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT COUNT (DISTINCT snum )&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ DISTINCT&lt;/p&gt;&lt;p class=\"p\"&gt;Обратите внимание в вышеупомянутом примере, что DISTINCT, сопровождаемый именем поля с которым он применяется, помещен в круглые скобки, но не сразу после SELECT, как раньше.&lt;/p&gt;&lt;p class=\"p\"&gt;Этого использования DISTINCT с COUNT применяемого к индивидуальным столбцам, требует стандарт ANSI, но большое количество программ не предъявляют к ним такого требования.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT COUNT (DISTINCT snum) FROM Orders;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;5&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6.3: Подсчет значений поля&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете выбирать многочисленые счета( COUNT ) из полей с помощью DISTINCT в одиночном запросе который, как мы видели в Главе 3, не выполнялся когда вы выбирали строки с помощью DISTINCT. DISTINCT может использоваться таким образом, с любой функцией агрегата, но наиболее часто он используется с COUNT. С MAX и MIN, это просто не будет иметь никакого эффекта, а SUM и AVG, вы обычно применяете для включения повторяемых значений, так как они законно эффективнее общих и средних значений всех столбцов.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ COUNT СО СТРОКАМИ, А НЕ ЗНАЧЕНИЯМИ&lt;/p&gt;&lt;p class=\"p\"&gt;Чтобы подсчитать общее число строк в таблице, используйте функцию COUNT со звездочкой вместо имени поля, как например в следующем примере, вывод из которого показан в Таблице.4:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT COUNT (*)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;COUNT со звездочкой включает и NULL и дубликаты, по этой причине DISTINCT не может быть использован. DISTINCT может производить более высокие номера чем COUNT особого поля, который удаляет все строки, имеющие избыточные или NULL данные в этом поле.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT COUNT (*) FROM Customers;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;7&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6. 4: Подсчет строк вместо значений&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DISTINCT не применим c COUNT (*), потому, что он не имеет никакого действия в хорошо разработаной и поддерживаемой базе данных. В такой базе данных, не должно быть ни таких строк, которые бы являлись полностью пустыми, ни дубликатов (первые не содержат никаких данных, а последние полностью избыточны). Если, с другой стороны, все таки имеются полностью пустые или избыточные строки, вы вероятно не захотите чтобы COUNT скрыл от вас эту информацию.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ВКЛЮЧЕНИЕ ДУБЛИКАТОВ В АГРЕГАТНЫЕ ФУНКЦИИ&lt;/p&gt;&lt;p class=\"p\"&gt;Агрегатные функции могут также (в большинстве реализаций ) использовать аргумент ALL, который помещается перед именем поля, подобно DISTINCT, но означает противоположное: - включать дубликаты. ANSI технически не позволяет этого для COUNT, но многие реализации ослабляют это ограничение.&lt;/p&gt;&lt;p class=\"p\"&gt;Различия между ALL и * когда они используются с COUNT -&lt;/p&gt;&lt;p class=\"p\"&gt;* ALL использует имя_поля как аргумент.&lt;/p&gt;&lt;p class=\"p\"&gt;* ALL не может подсчитать значения NULL.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Пока * является единственым аргументом который включает NULL значения, и он используется только с COUNT; функции отличные от COUNT игнорируют значения NULL в любом случае. Следующая команда подсчитает(COUNT) число не-NULL значений в поле rating в таблице Заказчиков (включая повторения ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT COUNT (ALL rating )&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;АГРЕГАТЫ ПОСТРОЕННЫЕ НА СКАЛЯРНОМ ВЫРАЖЕНИИ&lt;/p&gt;&lt;p class=\"p\"&gt;До этого, вы использовали агрегатные функции с одиночными полями как аргументами. Вы можете также использовать агрегатные функции с аргументами которые состоят из скалярных выражений включающих одно или более полей. (Если вы это делаете, DISTINCT не разрешается. ) Предположим, что таблица Порядков имеет еще один столбец который хранит предыдущий неуплаченый баланс (поле blnc) для каждого заказчика. Вы должны найти этот текущий баланс, добавлением суммы приобретений к предыдущему балансу. Вы можете найти наибольший неуплаченый баланс следующим образом:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT MAX (blnc + (amt) )&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Для каждой строки таблицы, этот запрос будет складывать blnc и amt для этого заказчика и выбирать самое большое значение которое он найдет. Конечно, пока заказчики могут иметь многочисленые порядки, их неуплаченый баланс оценивается отдельно для каждого порядка. Возможно, порядок с более поздней датой будет иметь самый большой неуплаченый баланс. Иначе, старый баланс должен быть выбран как в запросе выше. Фактически, имеются большое количество ситуаций в SQL где вы можете использовать скалярные выражения с полями или вместо полей, как вы увидете это в Главе 7.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПРЕДЛОЖЕНИЕ GROUP BY&lt;/p&gt;&lt;p class=\"p\"&gt;Предложение GROUP BY позволяет вам определять подмножество значений в особом поле в терминах другого поля, и применять функцию агрегата к подмножеству. Это дает вам возможность объединять поля и агрегатные функции в едином предложении SELECT. Например, предположим что вы хотите найти наибольшую сумму приобретений полученную каждым продавцом.&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете сделать раздельный запрос для каждого из них, выбрав MAX (amt) из таблицы Порядков для каждого значения поля snum. GROUP BY, однако, позволит Вам поместить их все в одну команду:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вывод для этого запроса показывается в Таблице 6.5.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, MAX (amt) FROM Orders GROUP BY snum;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"empty-line\"/&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;767.19&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1713.23&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;75.75&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1014&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1309.95&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.16&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6.5: Нахождение максимальной суммы продажи у каждого продавца&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;GROUP BY применяет агрегатные функции независимо от серий групп которые определяются с помощью значения поля в целом. В этом случае, каждая группа состоит из всех строк с тем же самым значением поля snum, и MAX функция применяется отдельно для каждой такой группы. Это значение поля, к которому применяется GROUP BY, имеет, по определению, только одно значение на группу вывода, также как это делает агрегатная функция. Результатом является совместимость которая позволяет агрегатам и полям объединяться таким образом.&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете также использовать GROUP BY с многочислеными полями. Совершенствуя вышеупомянутый пример далее, предположим что вы хотите увидеть наибольшую сумму приобретений получаемую каждым продавцом каждый день. Чтобы сделать это, вы должны сгруппировать таблицу Порядков по датам продавцов, и применить функцию MAX к каждой такой группе, подобно этому:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, MAX ((amt))&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum, odate;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вывод для этого запроса показывается в Рисунке 6.6.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders GROUP BY snum, odate;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"empty-line\"/&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;767.19&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/05/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;4723.00&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;9891.88&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;5160.45&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/04/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;75.75&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1309.95&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/04/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1713.23&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1014&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1900.10&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.16&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6.6: Нахождение наибольшей суммы приобретений на каждый день&lt;/p&gt;&lt;p class=\"p\"&gt;Конечно же, пустые группы, в дни когда текущий продавец не имел порядков, не будут показаны в выводе.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПРЕДЛОЖЕНИЕ HAVING&lt;/p&gt;&lt;p class=\"p\"&gt;Предположим, что в предыдущем примере, вы хотели бы увидеть только максимальную сумму приобретений значение которой выше $3000.00. Вы не сможете использовать агрегатную функцию в предложении WHERE (если вы не используете подзапрос, описанный позже ), потому что предикаты оце ниваются в терминах одиночной строки, а агрегатные функции оцениваются в терминах групп строк. Это означает что вы не сможете сделать что-нибудь подобно следующему:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Oreders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE MAX ((amt)) &gt; 3000.00&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum, odate;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это будет отклонением от строгой интерпретации ANSI. Чтобы увидеть максимальную стоимость приобретений свыше $3000.00, вы можете использовать предложение HAVING.&lt;/p&gt;&lt;p class=\"p\"&gt;Предложение HAVING определяет критерии используемые чтобы удалять определенные группы из вывода, точно также как предложение WHERE делает это для индивидуальных строк.&lt;/p&gt;&lt;p class=\"p\"&gt;Правильной командой будет следующяя:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, MAX ((amt))&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum, odate&lt;/p&gt;&lt;p class=\"p\"&gt;HAVING MAX ((amt)) &gt; 3000.00;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вывод для этого запроса показывается в Таблице 6. 7.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, MAX (amt) FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum, odate HAVING MAX (amt) &gt; 3000.00;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/05/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;4723.00&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;9891.88&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;5160.45&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6. 7: Удаление групп агрегатных значений&lt;/p&gt;&lt;p class=\"p\"&gt;Аргументы в предложении HAVING следуют тем же самым правилам что и в предложении SELECT, состоящей из команд использующих GROUP BY. Они должны иметь одно значение на группу вывода. Следующая команда будет запрещена:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum&lt;/p&gt;&lt;p class=\"p\"&gt;HAVING odate=10/03/1988;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Поле оdate не может быть вызвано предложением HAVING, потому что оно может иметь (и действительно имеет ) больше чем одно значение на группу вывода. Чтобы избегать такой ситуации, предложение HAVING должно ссылаться только на агрегаты и поля выбранные GROUP BY. Имеется правильный способ сделать вышеупомянутый запрос( вывод показывается в Таблице 6.8 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHEREodate=10/03/1990&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders GROUP BY snum, odate;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"empty-line\"/&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;767.19&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;5160.45&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1014&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1900.10&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.16&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6.8: Максимальное значение суммы приобретений у каждого&lt;/p&gt;&lt;p class=\"p\"&gt;продавца на 3 Октября&lt;/p&gt;&lt;p class=\"p\"&gt;Поскольку поля odate нет, не может быть и выбраных полей, значение этих данных меньше чем в некоторых других примерах. Вывод должен вероятно включать что-нибудь такое что говорит - \" это - самые большие порядки на 3 Октября.\" В Главе 7, мы покажем как вставлять текст в ваш вывод.&lt;/p&gt;&lt;p class=\"p\"&gt;Как и говорилось ранее, HAVING может использовать только аргументы которые имеют одно значение на группу вывода. Практически, ссылки на агрегатные функции - наиболее общие, но и поля выбранные с помощью GROUP BY также допустимы. Например, мы хотим увидеть наибольшие порядки для Serres и Rifkin:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum&lt;/p&gt;&lt;p class=\"p\"&gt;HAVING snum B (1002,1007);&lt;/p&gt;&lt;p class=\"p\"&gt;Вывод для этого запроса показывается в Таблице 6.9.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, MAX (amt)| FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY snum HAVING snum IN (1002, 1007 );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"empty-line\"/&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;5160.45&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.16&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 6. 9: Использование HAVING с GROUP BY полями&lt;/p&gt;&lt;p class=\"subtitle\"&gt;НЕ ДЕЛАЙТЕ ВЛОЖЕННЫХ АГРЕГАТОВ&lt;/p&gt;&lt;p class=\"p\"&gt;В строгой интерпретации ANSI SQL, вы не можете использовать агрегат агрегата. Предположим что вы хотите выяснять, в какой день имелась наибольшая сумма приобретений. Если вы попробуете сделать это, то ваша&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT odate, MAX (SUM (amt) )&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY odate;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;команда будет вероятно отклонена. (Некоторые реализации не предписывают этого ограничения, которое является выгодным, потому что вложенные агрегаты могут быть очень полезны, даже если они и несколько проблематичны.) В вышеупомянутой команде, например, SUM должен применяться к каждой группе поля odate, а MAX ко всем группам, производящим одиночное значение для всех групп. Однако предложение GROUP BY подразумевает что должна иметься одна строка вывода для каждой группы поля odate.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;РЕЗЮМЕ&lt;/p&gt;&lt;p class=\"p\"&gt;Теперь вы используете запросы несколько по-другому. Способность получать, а не просто размещать значения, очень мощна. Это означает что вы не обязательно должны следить за определенной информацией если вы можете сформулировать запрос так чтобы ее получить. Запрос будет давать вам по-минутные результаты, в то время как таблица общего или среднего значений будет хороша только некоторое время после ее модификации. Это не должно наводить на мысль, что агрегатные функции могут полностью вытеснить потребность в отслеживании информации такой например как эта.&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете применять эти агрегаты для групп значений определенны предложением GROUP BY. Эти группы имеют значение поля в целом, и могут постоянно находиться внутри других групп которые имеют значение поля в целом. В то же время, предикаты еще используются чтобы определять какие строки агрегатной функции применяются.&lt;/p&gt;&lt;p class=\"p\"&gt;Объединенные вместе, эти особенности делают возможным, производить агрегаты основанные на сильно определенных подмножествах значений в поле. Затем вы можете определять другое условие для исключения определенных результатов групп с предложением HAVING.&lt;/p&gt;&lt;p class=\"p\"&gt;Теперь, когда вы стали знатоком большого количества того как запрос производит значения, мы покажем вам, в Главе 7, некоторые вещи которые вы можете делать со значениями которые он производит.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РАБОТА С SQL&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который сосчитал бы все суммы приобретений на 3 Октября.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который сосчитал бы число различных не-NULL значений поля city в таблице Заказчиков.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который выбрал бы нименьшую сумму для каждого заказчика.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который бы выбирал заказчиков в алфавитном порядке, чьи имена начинаются с буквы G.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который выбрал бы высшую оценку в каждом городе.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который сосчитал бы число заказчиков регистрирующих каждый день свои порядки. (Если продавец имел более одного порядка в данный день, он должен учитываться только один раз.)&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</title></section></div>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow-y: auto !important; /* Fixed: Allow scrolling in chapters */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1>Модуль 4: Работа с Несколькими Таблицами</h1>\n    \n<section class=\"chapter-unit\" data-original-chapter=\"11\">\n\n<title>\n&lt;style&gt;.z {\n\tfont-family: 'Times New Roman', serif;\n\tmargin-right: 8pt;\n}\n\n.p {\n\tmargin: 0px;\n\ttext-align: justify;\n\ttext-indent: 1.5em;\n}\n\n.a {\n\tfont-size: 0.7em;\n\tline-height: 0.1;\n\tvertical-align: super;\n}\n\n.empty-line {\n\theight: 1em;\n\tmargin: 0px;\n}\n\n.title {\n\tfont-size: 1.8em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 0px;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n}\n\n.p1 {\n\tmargin: 0px 0px 0.5em 0px;\n\ttext-align: inherit;\n\ttext-indent: 0px;\n}\n\n.title1 {\n\tfont-size: 1.5em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.563em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.code {\n\tfont-family: 'Courier New', monospace;\n}\n\n.table {\n\tborder: 1px solid black;\n\tborder-collapse: collapse;\n\tfont-family: Arial, sans-serif;\n\tfont-size: 0.8em;\n\tmargin: 0.5em;\n}\n\n.td {\n\tborder: 1px solid black;\n\tpadding: 0.3em;\n}\n\n.title2 {\n\tfont-size: 1.3em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.923em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.subtitle {\n\tfont-style: italic;\n\tfont-weight: bold;\n\tmargin: 0.5em 2em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n\ttext-indent: 0px;\n}\n\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body class=\"z\"&gt;\n&lt;span&gt;&lt;span id=\"id18\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;Глава 10. ВСТАВКА ОДНОГО ЗАПРОСА ВНУТРЬ ДРУГОГО&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;В КОНЕЦ ГЛАВЫ 9, МЫ ГОВОРИЛИ ЧТО ЗАПРОСЫ могут управлять другими запросами. В этой главе, вы узнаете как это делается (большей частью), помещая запрос внутрь предиката другого запроса, и используя вывод внутреннего запроса в верном или неверном условии предиката. Вы сможете выяснить какие виды операторов могут использовать подзапросы и посмотреть как подзапросы работают со средствами SQL, такими как DISTINCT, с составными функциями и выводимыми выражения. Вы узнаете как использовать подзапросы с предложением HAVING и получите некоторые наставления как правильно использовать подзапросы.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;КАК РАБОТАЕТ ПОДЗАПРОС?&lt;/p&gt;&lt;p class=\"p\"&gt;С помощью SQL вы можете вкладывать запросы внутрь друга друга. Обычно, внутренний запрос генерирует значение которое проверяется в предикате внешнего запроса, определяющего верно оно или нет. Например, предположим что мы знаем имя продавца: Motika, но не знаем значение его поля snum, и хотим извлечь все порядки из таблицы Порядков. Имеется один способ чтобы сделать это( вывод показывается в Таблице 10.1 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE sname='Motika');&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Чтобы оценить внешний( основной ) запрос, SQL сначала должен оценить внутренний запрос (или подзапрос ) внутри предложения WHERE. Он делает это так как и должен делать запрос имеющий единственную цель отыскать через таблицу Продавцов все строки, где поле sname равно значению Motika, и затем извлечь значения поля snum этих строк.&lt;/p&gt;&lt;p class=\"p\"&gt;Единственной найденной строкой естественно будет snum=1004. Однако SQL, не просто выдает это значение, а помещает его в предикат основного запроса вместо самого подзапроса, так чтобы предиката прочитал что&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;WHERE snum=1004&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT * FROM Orders WHERE snum=&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT snum FROM Salespeople WHERE sname='Motika');&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;onum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;amt&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cnum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1900.10&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10.1: Использование подзапроса&lt;/p&gt;&lt;p class=\"p\"&gt;Основной запрос затем выполняется как обычно с вышеупомянутыми результатами. Конечно же, подзапрос должен выбрать один и только один столбец, а тип данных этого столбца должен совпадать с тем значением с которым он будет сравниваться в предикате. Часто, как показано выше, выбранное поле и его значение будут иметь одинаковые имена(в этом случае, snum), но это необязательно.&lt;/p&gt;&lt;p class=\"p\"&gt;Конечно, если бы мы уже знали номер продавца Motika, мы могли бы просто напечатать&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum=1004&lt;/p&gt;&lt;p class=\"p\"&gt;и выполнять далее с подзапросом в целом, но это было бы не так универсально. Это будет продолжать работать даже если номер Motika изменился, а, с помощью простого изменения имени в подзапросе, вы можете использовать его для чего угодно.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;ЗНАЧЕНИЯ, КОТОРЫЕ МОГУТ ВЫДАВАТЬ ПОДЗАПРОСЫ&lt;/p&gt;&lt;p class=\"p\"&gt;Скорее всего было бы удобнее, чтобы наш подзапрос в предыдущем примере возвращал одно и только одно значение.&lt;/p&gt;&lt;p class=\"p\"&gt;Имея выбранным поле snum \" WHERE city=\"London\" вместо \"WHERE sname='Motika\", можно получить несколько различных значений. Это может сделать уравнение в предикате основного запроса невозможным для оценки верности или неверности, и команда выдаст ошибку.&lt;/p&gt;&lt;p class=\"p\"&gt;При использовании подзапросов в предикатах основанных на реляционных операторах (уравнениях или неравенствах, как объяснено в Главе 4 ), вы должны убедиться что использовали подзапрос который будет выдавать одну и только одну строку вывода. Если вы используете подзапрос который не выводит никаких значений вообще, команда не потерпит неудачи; но основной запрос не выведет никаких значений. Подзапросы которые не производят никакого вывода (или нулевой вывод) вынуждают рассматривать предикат ни как верный ни как неверный, а как неизвестный. Однако, неизвестный предикат имеет тот же самый эффект что и неверный: никакие строки не выбираются основным запросом (смотри Главу 5 для подробной информации о неизвестном предикате ).&lt;/p&gt;&lt;p class=\"p\"&gt;Это плохая стратегия, чтобы делать что-нибудь подобное следующему:&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city=Barcelona );&lt;/p&gt;&lt;p class=\"p\"&gt;Поскольку мы имеем только одного продавца в Barcelona - Rifkin, то подзапрос будет выбирать одиночное значение snum и следовательно будет принят. Но это - только в данном случае. Большинство SQL баз данных имеют многочисленых пользователей, и если другой пользователь добавит нового продавца из Barcelona в таблицу, подзапрос выберет два значения, и ваша команда потерпит неудачу.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;DISTINCT С ПОДЗАПРОСАМИ&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете, в некоторых случаях, использовать DISTINCT чтобы вынудить подзапрос генерировать одиночное значение. Предположим что мы хотим найти все порядки кредитований для тех продавцов которые обслуживают Hoffmanа (cnum=2001). Имеется один способ чтобы сделать это (вывод показывается в Таблице 10.2 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT DISTINCT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE cnum=2001 );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT * FROM Orders WHERE snum=&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT DISTINCT snum FROM Orders Where cnum=2001);&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;onum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;amt&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cnum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;767.19&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3008&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;4723.00&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/05/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3011&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;9891.88&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10.2: Использование DISTINCT чтобы вынудить получение одного значения из подзапроса&lt;/p&gt;&lt;p class=\"p\"&gt;Подзапрос установил что значение поля snum совпало с Hoffman - 1001, и затем основной запрос выделил все порядки с этим значением snum из таблицы Порядков( не разбирая, относятся они к Hoffman или нет). Так как каждый заказчик назначен к одному и только этому продавцу, мы знаем что каждая строка в таблице Порядков с данным значением cnum должна иметь такое же значение snum. Однако так как там может быть любое число таких строк, подзапрос мог бы вывести много (хотя и идентичных ) значений snum для данного поля cnum. Аргумент DISTINCT предотвращает это. Если наш подзапрос возвратит более одного значения, это будет указывать на ошибку в наших данных - хорошая вещь для знающих об этом.&lt;/p&gt;&lt;p class=\"p\"&gt;Альтернативный подход должен быть чтобы ссылаться к таблице Заказчиков а не к таблице Порядков в подзапросе. Так как поле cnum - это первичный ключ таблицы Заказчика, запрос выбирающий его должен произвести только одно значение. Это рационально только если вы как пользователь имеете доступ к таблице Порядков но не к таблице Заказчиков. В этом случае, вы можете использовать решение которое мы показали выше. (SQL имеет механизмы которые определяют - кто имеет привилегии чтобы делать что-то в определенной таблице. Это будет объясняться в Главе 22.) Пожалуйста учтите, что методика используемая в предшествующем примере применима только когда вы знаете, что два различных поля в таблице должны всегда совпадать, как в нашем случае. Эта ситуация не является типичной в реляционных базах данных, она являеться исключением из правил.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПРЕДИКАТЫ С ПОДЗАПРОСАМИ ЯВЛЯЮТСЯ НЕОБРАТИМЫМИ&lt;/p&gt;&lt;p class=\"p\"&gt;Вы должны обратить внимание что предикаты включающие подзапросы, используют выражение&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt; скалярная форма &gt; &lt; оператор &gt; &lt; подзапрос &gt;, а не&lt;/p&gt;&lt;p class=\"p\"&gt;&lt; подзапрос &gt; &lt; оператор &gt; &lt; скалярное выражение &gt; или,&lt;/p&gt;&lt;p class=\"p\"&gt;&lt; подзапрос &gt; &lt; оператор &gt; &lt; подзапрос &gt;.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Другими словами, вы не должны записывать предыдущий пример так:&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE (SELECT DISTINCT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE cnum=2001 )&lt;/p&gt;&lt;p class=\"p\"&gt;=snum;&lt;/p&gt;&lt;p class=\"p\"&gt;В строгой ANSI реализации, это приведет к неудаче, хотя некоторые программы и позволяют делать такие вещи. ANSI также предохраняет вас от появления обеих значений при сравнении, которые нужно вывести с помощью подзапроса.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ АГРЕГАТНЫХ ФУНКЦИЙ В ПОДЗАПРОСАХ&lt;/p&gt;&lt;p class=\"p\"&gt;Один тип функций, который автоматически может производить одиночное значение для любого числа строк, конечно же, - агрегатная функция.&lt;/p&gt;&lt;p class=\"p\"&gt;Любой запрос использующий одиночную функцию агрегата без предложения GROUP BY будет выбирать одиночное значение для использования в основном предикате. Например, вы хотите увидеть все порядки имеющие сумму приобретений выше средней на 4-е Октября (вывод показан в Таблице 10.3 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE amt &gt;&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT AVG (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE odate=10/04/1990 );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT * FROM Orders WHERE amt &gt;&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT AVG (amt) FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE odate=01/04/1990 );&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;onum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;amt&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cnum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1900.10&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3005&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2345.45&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.19&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2008&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3009&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1713.23&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/04/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3008&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;4723.00&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/05/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3010&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1309.95&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2004&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3011&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;9891.88&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10.3: Выбор всех сумм со значением выше средней на 10/04/1990&lt;/p&gt;&lt;p class=\"p\"&gt;Средняя сумма приобретений на 4 Октября - 1788.98 (1713.23 + 75.75) делится пополам, что в целом равняется =894.49. Все строки со значением в поле amt выше этого - являются выбраными.&lt;/p&gt;&lt;p class=\"p\"&gt;Имейте ввиду что сгруппированные агрегатные функции, которые являются агрегатными функциями определенными в терминах предложения GROUP BY, могут производить многочисленые значения. Они, следовательно, не позволительны в подзапросах такого характера. Даже если GROUP BY и HAVING используются таким способом, что только одна группа выводится с помощью подзапроса, команда будет отклонена в принципе. Вы должны использовать одиночную агрегатную функцию с предложением WHERE что устранит нежелательные группы. Например, следующий запрос который должен найти среднее значение комиссионных продавца в Лондоне -&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT AVG (comm)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY city&lt;/p&gt;&lt;p class=\"p\"&gt;HAVlNG city=\"London\";&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;не может использоваться в подзапросе! Во всяком случае это не лучший способ формировать запрос. Другим способом может быть -&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT AVG (comm)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city=\"London\";&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ КОТОРЫЕ ВЫДАЮТ МНОГО СТРОК С ПОМОЩЬЮ ОПЕРАТОРА IN&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете использовать подзапросы которые производят любое число строк если вы используете специальный оператор IN (операторы BETWEEN, LIKE, и IS NULL не могут использоваться с подзапросами). Как вы помните, IN определяет набор значений, одно из которых должно совпадать с другим термином уравнения предиката в порядке, чтобы предикат был верным. Когда вы используете IN с подзапросом, SQL просто формирует этот набор из вывода подзапроса. Мы можем, следовательно, использовать IN чтобы выполнить такой же подзапрос который не будет работать с реляционным оператором, и найти все атрибуты таблицы Порядков для продавца в Лондоне (вывод показывается в Таблице 10.4 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city=\"LONDON\" );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT * FROM Orders WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT snum FROM Salespeople WHERE city='London');&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;onum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;amt&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cnum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;767.19&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1900.10&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.19&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2008&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3008&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;4723.00&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/05/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3011&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;9891.88&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10. 4: Использование подзапроса с IN&lt;/p&gt;&lt;p class=\"p\"&gt;В ситуации подобно этой, подзапрос - более прост для пользователя чтобы понимать его и более прост для компьютера чтобы его выполнить, чем если бы Вы использовали обьединение:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT onum, amt, odate, cnum, Orders.snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders, Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE Orders.snum=Salespeople.snum&lt;/p&gt;&lt;p class=\"p\"&gt;AND Salespeople.city=\"London\";&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Хотя это и произведет тот же самый вывод что и в примере с подзапросом, SQL должен будет просмотреть каждую возможную комбинацию строк из двух таблиц и проверить их снова по составному предикату. Проще и эффективнее извлекать из таблицы Продавцов значения поля snum где city=\"London\", и затем искать эти значения в таблице Порядков, как это делается в варианте с подзапросом. Внутренний запрос дает нам snums=1001 и snum=1004. Внешний запрос, затем, дает нам строки из таблицы Поряд ков где эти поля snum найдены.&lt;/p&gt;&lt;p class=\"p\"&gt;Строго говоря, быстрее или нет работает вариант подзапроса, практически зависит от реализации - в какой программе вы это используете.&lt;/p&gt;&lt;p class=\"p\"&gt;Эта часть вашей программы называемой - оптимизатор, пытается найти наиболее эффективный способ выполнения ваших запросов.&lt;/p&gt;&lt;p class=\"p\"&gt;Хороший оптимизатор во всяком случае преобразует вариант обьединения в подзапрос, но нет достаточно простого способа для вас чтобы выяснить выполнено это или нет. Лучше сохранить ваши запросы в памяти чем полагаться полностью на оптимизатор.&lt;/p&gt;&lt;p class=\"p\"&gt;Конечно вы можете также использовать оператор IN, даже когда вы уверены что подзапрос произведет одиночное значение. В любой ситуации где вы можете использовать реляционный оператор сравнения (=), вы можете использовать IN. В отличие от реляционных операторов, IN не может заставить команду потерпеть неудачу если больше чем одно значение выбрано подзапросом. Это может быть или преимуществом или недостатком. Вы не увидите непосредственно вывода из подзапросов; если вы полагаете что подзапрос собирается произвести только одно значение, а он производит различные. Вы не сможете объяснить различия в выводе основного запроса. Например, рассмотрим команду, которая похожа на предыдущую:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT onum, amt, odate&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE cnum=2001 );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вы можете устранить потребность в DISTINCT используя IN вместо (=),&lt;/p&gt;&lt;p class=\"p\"&gt;подобно этому:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT onum, amt, odate&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE cnum=2001 );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Что случится если есть ошибка и один из порядков был акредитован к различным продавцам? Версия использующая IN будет давать вам все порядки для обоих продавцов. Нет никакого очевидного способа наблюдения за ошибкой, и поэтому сгенерированные отчеты или решения сделанные на основе этого запроса не будут содержать ошибки. Вариант использующий (=), просто потерпит неудачу.&lt;/p&gt;&lt;p class=\"p\"&gt;Это, по крайней мере, позволило вам узнать что имеется такая проблема. Вы должны затем выполнять поиск неисправности, выполнив этот подзапрос отдельно и наблюдая значения которые он производит.&lt;/p&gt;&lt;p class=\"p\"&gt;В принципе, если вы знаете что подзапрос должен( по логике) вывести только одно значение, вы должны использовать =. IN является подходящим, если запрос может ограниченно производить одно или более значений, независимо от того ожидаете вы их или нет. Предположим, мы хотим знать комиссионные всех продавцов обслуживающих заказчиков в Лондоне:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT comm&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city=\"London\" );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Выводимыми для этого запроса, показанного в Таблице 10.5, являются значения комиссионных продавца Peel (snum =1001 ), который имеет обоих заказчиков в Лондоне. Это - только для данного случая. Нет никакой причины чтобы некоторые заказчики в Лондоне не могли быть назначеными к кому-то еще. Следовательно, IN - это наиболее логичная форма чтобы использовать ее в запросе.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT comm FROM Salespeople WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT snum FROM Customers WHERE city='London');&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;comm&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.12&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10.5 Использование IN с подзапросом для вывода одного значения&lt;/p&gt;&lt;p class=\"p\"&gt;Между прочим, префикс таблицы для поля city необязателен в предыдущем примере, несмотря на возможную неоднозначность между полями city таблицы Заказчика и таблицы Продавцов.&lt;/p&gt;&lt;p class=\"p\"&gt;SQL всегда ищет первое поле в таблице обозначенной в предложении FROM текущего подзапроса. Если поле с данным именем там не найдено, проверяются внешние запросы. В вышеупомянутом примере, \"city\" в предложении WHERE означает что имеется ссылка к Customer.city( поле city таблицы Заказчиков). Так как таблица Заказчиков указана в предложении FROM текущего запроса, SQL предполагает что это - правильно. Это предположение может быть отменено полным именем таблицы или префиксом псевдонима, о которых мы поговорим позже когда будем говорить об соотнесенных подзапросах. Если возможен беспорядок, конечно же, лучше всего использовать префиксы.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПОДЗАПРОСЫ ВЫБИРАЮТ ОДИНОЧНЫЕ СТОЛБЦЫ&lt;/p&gt;&lt;p class=\"p\"&gt;Смысл всех подзапросов обсужденных в этой главе тот, что все они выбирают одиночный столбец. Это обязательно, поскольку выбранный вывод сравнивается с одиночным значением. Подтверждением этому то, что SELECT * не может использоваться в подзапросе. Имеется исключение из этого, когда подзапросы используются с оператором EXISTS, который мы будем представлять в Главе 12.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ ВЫРАЖЕНИЙ В ПОДЗАПРОСАХ&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете использовать выражение основанное на столбце, а не просто сам столбец, в предложении SELECT подзапроса. Это может быть выполнено или с помощью реляционных операторов или с IN. Например, следующий запрос использует реляционный оператор =( вывод показывается в Таблице 10.6 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE cnum=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum + 1000&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE sname=Serres );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Он находит всех заказчиков чье значение поля cnum равное 1000, выше поля snum Serres. Мы предполагаем что столбец sname не имеет никаких двойных значений (это может быть предписано или UNIQUE INDEX, обсуждаемым в Главе 17, или ограничением UNIQUE, обсуждаемым в Главе 18 );иначе&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT * FROM Customers WHERE cnum=&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT snum + 1000 WHERE Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE sname='Serres'&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cnum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cname&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;city&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;rating&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Giovanni&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Rome&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;200&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10.6: Использование подзапроса с выражением&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;подзапрос может произвести многочисленые значения. Когда поля snum и сnum не имеют такого простого функционального значения как например первичный ключ, что не всегда хорошо, запрос типа вышеупомянутого невероятно полезен.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПОДЗАПРОСЫ В ПРЕДЛОЖЕНИИ HAVING&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете также использовать подзапросы внутри предложения HAVING.&lt;/p&gt;&lt;p class=\"p\"&gt;Эти подзапросы могут использовать свои собственные агрегатные функции если они не производят многочисленых значений или использовать GROUP BY или HAVING. Следующий запрос является этому примером (вывод пока зывается в Таблице 10.7 ):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT rating, COUNT (DISTINCT cnum )&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY rating&lt;/p&gt;&lt;p class=\"p\"&gt;HAVING rating &gt;&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT AVG (rating)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city=\" San Jose';&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT rating,count (DISTINCT cnum) FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY rating HAVING rating &gt;&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT AVG (rating)snum + 1000 FROM Custimers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='San Jose'&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;rating&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"empty-line\"/&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;200&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 10.7: Нахождение заказчиков с оценкой выше среднего в San Jose&lt;/p&gt;&lt;p class=\"p\"&gt;Эта команда подсчитывает заказчиков с оценками выше среднего в San Jose. Так как имеются другие оценки отличные от 300, они должны быть выведены с числом номеров заказчиков которые имели эту оценку.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РЕЗЮМЕ&lt;/p&gt;&lt;p class=\"p\"&gt;Теперь вы используете запросы в иерархической манере. Вы видели, что использование результата одного запроса для управления другим, расширяет возможности позволяющие выполнить большее количество функций. Вы теперь понимаете как использовать подзапросы с реляционными операторами также как и со специальным оператором IN, или в предложении WHERE или в предложении HAVING внешнего запроса.&lt;/p&gt;&lt;p class=\"p\"&gt;В следующих главах, мы будем разрабатывать подзапросы. Сначала в Главе 11, мы обсудим другой вид подзапроса, который выполняется отдельно для каждой строки таблицы вызываемой во внешнем запросе. Затем, в Главе 12 и 13, мы представим вас нескольким специальным операторам которые функционируют на всех подзапросах, как это делает IN, за исключением когда эти операторы могут использоваться только в подзапросах.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РАБОТА С SQL&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос, который бы использовал подзапрос для получениявсех порядков для заказчика с именем Cisneros. Предположим, что вы не знаете номера этого заказчика, указываемого в поле cnum.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который вывел бы имена и оценки всех заказчиков которые имеют усредненые порядки.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который бы выбрал общую сумму всех приобретений в порядках для каждого продавца, у которого эта общая сумма больше чем сумма наибольшего порядка в таблице.&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</title></section></div>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySel
