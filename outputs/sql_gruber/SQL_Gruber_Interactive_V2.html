ые ссылаются к таблице используемой в предложении FROM внешней команды SELECT. Таблица из которой вы выбираете значения, чтобы произвести их для INSERT, не будет задействована командой; и вы сможете ссылаться к этой таблице любым способом которыми вы обычно это делали, но только если эта таблица указана в автономном запросе. Предположим что мы имеем таблицу с именем Samecity в которой мы запомним продавцов с заказчиками в их городах.&lt;/p&gt;&lt;p class=\"p\"&gt;Мы можем заполнить таблицу используя соотнесенный подзапрос:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;INSERT INTO (Samecity&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM (Salespeople outer&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT city&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers inner&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE inner.snum=outer.snum );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Ни таблица Samecity, ни таблица Продавцов не должны быть использованы во внешних или внутренних запросах INSERT. В качестве другого примера, предположим, что вы имеете премию для продавца который имеет самый большой порядок на каждый день. Вы следите за ним в таблице с именем Bonus, которая содержит поле snum продавцов, поле odate и поле amt. Вы должны заполнить эту таблицу информацией которая хранится в таблице Порядков, используя следующую команду:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;INSERT INTO Bonus&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, odate, amt&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders a&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE amt=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT MAX (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders b&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE a.odate=b.odate );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Даже если эта команда имеет подзапрос который базируется на той же самой таблице что и внешний запрос, он не ссылается к таблице Bonus, на которую воздействует команда. Что для нас абсолютно приемлемо.&lt;/p&gt;&lt;p class=\"p\"&gt;Логика запроса, естественно, должна просматривать таблицу Порядков, и находить для каждой строки максимум порядка сумм приобретений для этой даты. Если эта величина - такая же как у текущей строки, текущая строка является наибольшим порядком для этой даты, и данные вставляются в таблицу Bonus.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ С DELETE&lt;/p&gt;&lt;p class=\"p\"&gt;Вы можете также использовать подзапросы в предикате команды DELETE.&lt;/p&gt;&lt;p class=\"p\"&gt;Это даст вам возможность определять некоторые довольно сложные критерии чтобы установить, какие строки будут удаляться, что важно, так как вы конечно же не захотите по неосторожности удалить нужную строку.&lt;/p&gt;&lt;p class=\"p\"&gt;Например, если мы закрыли наше ведомство в Лондоне, мы могли бы использовать следующий запрос чтобы удалить всех заказчиков назначенных к продавцам в Лондоне:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DELETE&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum=ANY&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='London' );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Эта команда удалит из таблицы Заказчиков строки Hoffman и Clemens (назначенных для Peel), и Periera (назначенного к Motika).&lt;/p&gt;&lt;p class=\"p\"&gt;Конечно, вы захотите удостовериться, правильно ли сформирована эта операция, прежде чем удалитт или изменитт строки Peel и Motika.&lt;/p&gt;&lt;p class=\"p\"&gt;Это важно. Обычно, когда мы делаем модификацию в базе данных, котовая повлечет другие модификации, наше первое желание - сделать сначало основное действие, а затем проследить другие, вторичные. Этот пример, покажет, почему более эффективно делать наоборот, выполнив сначала вторичные действия.&lt;/p&gt;&lt;p class=\"p\"&gt;Если, например, вы решили изменить значение поля city ваших продавцов везде, где они переназначены, вы должны рассмотреть всех этих заказчиков более сложным способом.&lt;/p&gt;&lt;p class=\"p\"&gt;Так как реальные базы данных имеют тенденцию развиваться до значительно больших размеров чем наши небольшие типовые таблицы, это может стать серьезной проблемой. SQL может предоставить некоторую помощь в этой области используя механизм справочной целостности (обсужденной в Главе 19 ), но это не всегда доступно и не всегда применимо.&lt;/p&gt;&lt;p class=\"p\"&gt;Хотя вы не можете ссылаться к таблице из которой вы будете удалять строки в предложении FROM подзапроса, вы можете в предикате, сослаться на текущую строку-кандидат этой таблицы - которая является строкой которая в настоящее время проверяется в основном предикате. Другими словами, вы можете использовать соотнесенные подзапросы. Они отличаются от тех соотнесенных подзапросов, которые вы могли использовать с INSERT, в котором они фактически базировались на строках-кандидатах таблицы задействованой в команде, а не на запросе другой таблицы.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DELETE FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE EXISTS&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE rating=100&lt;/p&gt;&lt;p class=\"p\"&gt;AND Salespeople.snum=Customers.snum );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Обратите внимание, что AND часть предиката внутреннего запроса ссылается к таблице Продавцов. Это означает что весь подзапрос будет выполняться отдельно для каждой строки таблицы Продавцов, также как это выполнялось с другими соотнесенными подзапросами. Эта команда удалит всех продавцов которые имели по меньшей мере одного заказчика с оценкой 100 в таблице Продавцов.&lt;/p&gt;&lt;p class=\"p\"&gt;Конечно же, имеется другой способ сделать то же:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DELETE FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE 100 IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT rating&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE Salespeople.snum=Customers.snum);&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Эта команда находит все оценки для каждого заказчика продавцов и удаляет тех продавцов заказчики которого имеют оценку=100.&lt;/p&gt;&lt;p class=\"p\"&gt;Обычно соотнесенные подзапросы - это подзапросы связанные с таблицей к которой они ссылаются во внешнем запросе (а не в самом предложении DELETE) - и также часто используемы. Вы можете найти наинизший порядок на каждый день и удалить продавцов которые произвели его, с помощью следующей команды:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DELETE FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE (snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE amt=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT MIN (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders b&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE a.odate=b.odate ));&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Подзапрос в предикате DELETE, берет соотнесенный подзапрос. Этот внутренний запрос находит минимальный порядок суммы приобретеий для даты каждой строки внешнего запроса. Если эта сумма такая же как сумма текущей строки, предикат внешнего запроса верен, что означает, что текущая строка имеет наименьший порядок для этой даты. Поле snum продавца, ответственного за этот порядок, извлекается и передается в основной предикат команды DELETE, которая затем удаляет все строки с этим значением поля snum из таблицы Продавцов( так как snum - это первичный ключ таблицы Продавцов, то естественно там должна иметься только одна удаляемая строка для значения поля snum выведенного с помощью подзапроса. Если имеется больше одной строки, все они будут удалены. ) Поле snum=1007 которое будет удалено, имеет наименьшее значение на 3 Октября; поле snum =1002, наименьшее на 4 Октября; поле snum=1001, наименьшее в порядках на 5 Октября (эта команда кажется довольно резкой, особенно когда она удаляет Peel создавшего единственный порядок на 5 Октября, но зато это хорошая иллюстрация). Если вы хотите сохранить Peel, вы могли бы добавить другой подзапрос, который бы это делал:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DELETE FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE (snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders a&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE amt=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT MIN (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders b&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE a.odate=b.odate )&lt;/p&gt;&lt;p class=\"p\"&gt;AND 1 &lt;&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT COUNT onum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders b&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE a.odate=b.odate ));&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Теперь для дня в котором был создан только один порядок, будет произведен счет=1 во втором соотнесенном подзапросе. Это сделает предикат внешнего запроса неправильным, и поля snum следовательно не будут переданы в основной предикат.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ИСПОЛЬЗОВАНИЕ ПОДЗАПРОСОВ С UPDATE&lt;/p&gt;&lt;p class=\"p\"&gt;UPDATE использует подзапросы тем же самым способом что и DELETE - внутри этого необязательного предиката. Вы можете использовать соотнесенные подзапросы или в форме пригодной для использования с DELETE - связаной или с модифицируемой таблицей или с таблицей вызываемой во внешнем запросе. Например, с помощью соотнесенного подзапроса к таблице которая будет модифицироваться, вы можете увеличить комиссионные всех продавцов которые были назначены по крайней мере двум заказчикам:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;UPDATE Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;SET comm=comm + .01&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE 2 &lt;=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT COUNT (cnum)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE Customers.snum=&lt;/p&gt;&lt;p class=\"p\"&gt;Salespeople.snum );&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Теперь продавцы Peel и Serres, имеющие многочисленых заказчиков, получат повышение своих комиссионных.&lt;/p&gt;&lt;p class=\"p\"&gt;Имеется разновидность последнего примера из предыдущего раздела с DELETE. Он уменьшает комиссионные продавцов которые произвели наименьшие порядки, но не стирает их в таблице:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;UPDATE Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;SET comm=comm - .01&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders a&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE amt=&lt;/p&gt;&lt;p class=\"p\"&gt;( SELECT MIN (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders b&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE a.odate=b.odate ));&lt;/p&gt;&lt;p class=\"subtitle\"&gt;СТОЛКНОВЕНИЕ С ОГРАНИЧЕНИЯМИ ПОДЗАПРОСОВ КОМАНДЫ DML&lt;/p&gt;&lt;p class=\"p\"&gt;Неспособность сослаться к таблице задействованой в любом подзапросе из команды модификации (UPDATE), устраняет целые категории возможных действий. Например, вы не можете просто выполнить такую операцию как удаление всех заказчиков с оценками ниже средней. Вероятно лучше всего вы могли бы сначала (Шаг 1.), выполнить запрос, получающий среднюю величину, а затем (Шаг 2.), удалить все строки с оценкой ниже этой величины:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Шаг 1.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT AVG (rating)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вывод=200.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Шаг 2.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;DELETE&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE rating &lt; 200;&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РЕЗЮМЕ&lt;/p&gt;&lt;p class=\"p\"&gt;Теперь вы овладели тремя командами которые управляют всем содержанием вашей базы данных. Осталось только несколько общих вопросов относительно ввода и стирания значений таблицы, когда например эти команды могут выполниться данным пользователем в данной таблице и когда действия сделанные ими, становятся постоянными. Подведем итог: Вы используете команду INSERT чтобы добавлять строки в таблицу. Вы можете или дать имена значениям этих строк в предложении VALUES (когда только одна строка может быть добавлена ), или вывести значения с помощью запроса (когда любое число строк можно добавить одной командой). Если используется запрос, он не может ссылаться к таблице в которую вы делаете вставку,каким бы способом Вы ее ни делали, ни в предложении FROM, ни с помощью внешней ссылки (как это делается в соотнесенных подзапросах). Все это относится к любым подзапросам внутри этого запроса.&lt;/p&gt;&lt;p class=\"p\"&gt;Запрос, однако, оставляет вам свободу использования соотнесенных подзапросов или подзапросов которые дают в предложении FROM имя таблице, которое уже было указано в предложении FROM внешнего запроса (это - общий случай для запросов).&lt;/p&gt;&lt;p class=\"p\"&gt;DELETE и UPDATE используются чтобы, соответственно удалить строки из таблицы и изменить в них значения. Оба они применимы ко всем строкам таблицы, если не используется предикат определяющий какие строки должны быть удалены или модифицированы. Этот предикат может содержать подзапросы, которые могут быть связаны с таблицей, удаляемой, или модифицированой, с помощью внешней ссылки. Эти подзапросы, однако, не могут ссылать к таблице модифицируемой любым предложением FROM. Может показаться, что мы прошли материал SQL который обладает не самым понятным логическим порядком. Сначала мы сделали запрос таблицы которая уже заполнена данными. Потом мы показали как можно фактически помещать эти значения изначально. Но, как вы видете, полное ознакомление с запросами здесь неоценимо. Теперь, когда мы показали вам как заполнять значениями таблицы которые уже были созданы (по определению), мы покажем(со следующей главы) откуда появились эти таблицы.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РАБОТА С SQL&lt;/p&gt;&lt;p class=\"p\"&gt;* Предположите, что имеется таблица называемая Multicust, с такими же именами столбцов что и таблица Продавцов. Напишите команду, которая бы вставила всех продавцов (из таблицы Продавцов)имеющих более чем одного заказчика в эту таблицу.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите команду которая бы удаляла всех заказчиков не имеющих текущих порядков.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите команду которая бы увеличила на двадцать процентов комиссионные всех продавцов имеющих общие текущие порядки выше чем $3,000.&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</title></section></div>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow-y: auto !important; /* Fixed: Allow scrolling in chapters */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1>Модуль 7: Проектирование и Администрирование</h1>\n    \n<section class=\"chapter-unit\" data-original-chapter=\"22\">\n\n<title>\n&lt;style&gt;.z {\n\tfont-family: 'Times New Roman', serif;\n\tmargin-right: 8pt;\n}\n\n.p {\n\tmargin: 0px;\n\ttext-align: justify;\n\ttext-indent: 1.5em;\n}\n\n.a {\n\tfont-size: 0.7em;\n\tline-height: 0.1;\n\tvertical-align: super;\n}\n\n.empty-line {\n\theight: 1em;\n\tmargin: 0px;\n}\n\n.title {\n\tfont-size: 1.8em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 0px;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n}\n\n.p1 {\n\tmargin: 0px 0px 0.5em 0px;\n\ttext-align: inherit;\n\ttext-indent: 0px;\n}\n\n.title1 {\n\tfont-size: 1.5em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.563em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.code {\n\tfont-family: 'Courier New', monospace;\n}\n\n.table {\n\tborder: 1px solid black;\n\tborder-collapse: collapse;\n\tfont-family: Arial, sans-serif;\n\tfont-size: 0.8em;\n\tmargin: 0.5em;\n}\n\n.td {\n\tborder: 1px solid black;\n\tpadding: 0.3em;\n}\n\n.title2 {\n\tfont-size: 1.3em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.923em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.subtitle {\n\tfont-style: italic;\n\tfont-weight: bold;\n\tmargin: 0.5em 2em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n\ttext-indent: 0px;\n}\n\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body class=\"z\"&gt;\n&lt;span&gt;&lt;span id=\"id29\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;Глава 21. ИЗМЕНЕНИЕ ЗНАЧЕНИЙ С ПОМОЩЬЮ ПРЕДСТАВЛЕНИЙ&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;ЭТА ГЛАВА РАССКАЗЫВАЕТ О КОМАНДАХ МОДИФИКАЦИИ ЯЗЫКА DML - ВСТАВИТЬ(INSERT), ИЗМЕНИТЬ(UPDATE), и УДАЛИТЬ(DELETE) - когда они применя ются для представлений. Как упомянуто в предыдущей главе, использование команд модификации в представлениях - это косвенный способ использования их в ссылочных таблицах с помощью запросов представлений. Однако, не все представления могут модифицироваться.&lt;/p&gt;&lt;p class=\"p\"&gt;В этой главе, мы будем обсуждать правила определяющие, является ли представление модифицируемым. Кроме того, вы обучитесь использованию предложения WITH CHECK OPTION, которое управляет указанными значениями, которые можно вводить в таблицу с помощью представления.&lt;/p&gt;&lt;p class=\"p\"&gt;Как упомянуто в Главе 18, это, в некоторых случаях, может быть желательным вариантом непосредственного ограничения таблицы.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;МОДИФИЦИРОВАНИЕ ПРЕДСТАВЛЕНИЯ&lt;/p&gt;&lt;p class=\"p\"&gt;Один из наиболее трудных и неоднозначных аспектов представлений - непосредственное их использование с командами модификации DML. Как упомянуто в предыдущей главе, эти команды фактически воздействуют на значения в базовой таблице представления. Это является некоторым противоречием. Представление состоит из результатов запроса, и когда вы модифицируете представление, вы модифицируете набор результатов запроса. Но модификация не должна воздействовать на запрос ; она должна воздействовать на значения в таблице к которой был сделан запрос, и таким образом изменять вывод запроса. Это не простой вопрос. Следующий оператор будет создавать представление показанное в Таблице 21.1:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Citymatch (custcity, salescity)&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT DISTINCT a.city, b.city&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers a, Salespeople b&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE a.snum=b.snum;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это представление показывает все совпадения заказчиков с их продавцами так, что имеется по крайней мере один заказчик в городе_заказчика обслуживаемый продавцом в городе_продавца.&lt;/p&gt;&lt;p class=\"p\"&gt;Например, одна строка этой таблицы - London London - показывает, что имеется по крайней мере один заказчик в Лондоне,обслуживаемый продавцом в Лондоне. Эта строка может быть произведена при совпадении Hoffmanа с его продавцом Peel, причем если оба они из Лондона.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT * FROM Citymatch;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;custcity&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;salescity&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Berlin&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;San Jose&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Rome&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Rome&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;New York&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;San Jose&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Barselona&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;San Jose&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;San Jose&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 21.1: Представление совпадения по городам&lt;/p&gt;&lt;p class=\"p\"&gt;Однако, то же самое значение будет произведено при совпадении Clemens из Лондона, с его продавцом, который также оказался с именем - Peel. Пока отличающиеся комбинации городов выбирались конкретно, только одна строка из этих значений была произведена.&lt;/p&gt;&lt;p class=\"p\"&gt;Даже если вы не получите выбора используя отличия, вы все еще будете в том же самом положении, потому что вы будете тогда иметь две строки в представлении с идентичными значениями, то-есть с обоими столбцами равными \" Lоndon London \". Эти две строки представления будут отличаться друг от друга, так что вы пока не сможете сообщить, какая строка представления исходила из каких значений базовых таблиц( имейте в виду, что запросы не использующие предложение ORDER BY, производят вывод в произвольном порядке. Это относится также и к запросам используемым внутри представлений, которые не могут использовать ORDER BY. Таким образом, порядок из двух строк не может быть использован для их отличий. Это означает, что мы будем снова обращаться к выводу строк которые не могут быть точно связаны с указаными строками запрашиваемой таблицы. Что если вы пробуете удалить строку | London London | из представления? Означало бы это удаление Hoffmanа из таблицы Заказчиков, удаление Clemens из той же таблицы, или удаление их обоих? Должен ли SQL также удалить Peel из таблицы Продавцов? На эти вопросы невозможно ответить точно, поэтому удаления не разрешены в представлениях такого типа. Представление Citymatch - это пример представления только_чтение, оно может быть только запрошено, но не изменено.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ОПРЕДЕЛЕНИЕ МОДИФИЦИРУЕМОСТИ ПРЕДСТАВЛЕНИЯ&lt;/p&gt;&lt;p class=\"p\"&gt;Если команды модификации могут выполняться в представлении, представление как сообщалось будет модифицируемым; в противном случае оно предназначено только для чтения при запросе. Непротивореча этой терминологии, мы будем использовать выражение \"модифицируемое представление\"(updating a view), чтоы означает возможность выполнения в представление любой из трех команд модификации DML (Вставить, Изменить и Удалить ), которые могут изменять значения. Как вы определите, является ли представление модифицируемым? В теории базы данных, это - пока обсуждаемая тема. Основной ее принцип такой: модифицирумое представление - это представление в котором команда модификации может выполниться, чтобы изменить одну и только одну строку основной таблицы в каждый момент времени, не воздействуя на любые другие строки любой таблицы.&lt;/p&gt;&lt;p class=\"p\"&gt;Использование этого принципа на практике, однако, затруднено. Кроме того, некоторые представления, которые являются модифицируемыми в теории, на самом деле не являются модифицируемыми в SQL. Критерии по которые определяют, является ли представление модифицируемым или нет, в SQL, следующие:&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно должно выводиться в одну и только в одну базовую таблицу.&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно должно содержать первичный ключ этой таблицы (это технически не предписывается стандартом ANSI, но было бы неплохо придерживаться этому).&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно не должно иметь никаких полей, которые бы являлись агрегатнымифункциями.&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно не должно содержать DISTINCT в своем определении.&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно не должно использовать GROUP BY или HAVING в своем определении.&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно не должно использовать подзапросы (это - ANSI_ограничение которое не предписано для некоторых реализаций )&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно может быть использовано в другом представлении, но это представление должно также быть модифицируемыми.&lt;/p&gt;&lt;p class=\"p\"&gt;* Оно не должно использовать константы, строки, или выражения значений (например: comm * 100 ) среди выбранных полей вывода.&lt;/p&gt;&lt;p class=\"p\"&gt;* Для INSERT, оно должно содержать любые поля основной таблицы которые имеют ограничение NOT NULL, если другое ограничение по умолчанию, не определено.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;МОДИФИЦИРУЕМЫЕ ПРЕДСТАВЛЕНИЯ И ПРЕДСТАВЛЕНИЯ ТОЛЬКО_ЧТЕНИЕ.&lt;/p&gt;&lt;p class=\"p\"&gt;Одно из этих ограничений то, что модифицируемые представления, фактически, подобны окнам в базовых таблицах. Они показывают кое-что, но не обязательно все, из содержимого таблицы. Они могут ограничивать определенные строки (использованием предикатов), или специально именованные столбцы (с исключениями ), но они представляют значения непосредственно и не выводит их информацию, с использованием составных функций и выражений.&lt;/p&gt;&lt;p class=\"p\"&gt;Они также не сравнивают строки таблиц друг с другом (как в обьединениях и подзапросах, или как с DISTINCT ).&lt;/p&gt;&lt;p class=\"p\"&gt;Различия между модифицируемыми представлениями и представлениями только_чтение неслучайны.&lt;/p&gt;&lt;p class=\"p\"&gt;Цели для которых вы их используете, часто различны. Модифицируемые представления, в основном, используются точно так же как и базовые таблицы. Фактически, пользователи не могут даже осознать, является ли объект который они запрашивают, базовой таблицей или представлением.&lt;/p&gt;&lt;p class=\"p\"&gt;Это превосходный механизм защиты для сокрытия частей таблицы, которые являются конфиденциальными или не относятся к потребностям данного пользователя. (В Главе 22, мы покажем вам, как позволить пользователям обращаться к представлению, а не к базовой таблице ).&lt;/p&gt;&lt;p class=\"p\"&gt;Представления только_чтение, с другой стороны, позволяют вам получать и переформатировать данные более рационально. Они дают вам библиотеку сложных запросов, которые вы можете выполнить и повторить снова, сохраняя полученную вами информацию до последней минуты. Кроме того, результаты этих запросов в таблицах, которые могут затем использоваться в запросах самостоятельно (например, в обьединениях ) имеют преимущество над просто выполнением запросов.&lt;/p&gt;&lt;p class=\"p\"&gt;Представления только_чтение могут также иметь прикладные программы защиты. Например, вы можете захотеть, чтобы некоторые пользователи видели агрегатные данные, такие как усредненное значение комиссионных продавца, не видя индивидуальных значений комиссионных.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;ЧТО ЯВЛЯЕТСЯ - МОДИФИЦИРУЕМЫМИ ПРЕДСТАВЛЕНИЕМ&lt;/p&gt;&lt;p class=\"p\"&gt;Имеются некоторые примеры модифицируемых представлений и представлений только_чтение:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Dateorders (odate, ocount)&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT odate, COUNT (*)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;GROUP BY odate;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это - представление только_чтение из-за присутствия в нем агрегатной функции и GROUP BY.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Londoncust&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='London';&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;А это - представление модифицируемое.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW SJsales (name, number, percentage)&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT sname, snum, comm 100&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='SanJose';&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это - представление только_чтение из-за выражения \" comm * 100 \" . При этом, однако, возможны переупорядочение и переименование полей. Некоторые программы будут позволять удаление в этом представлении или в порядках столбцов snum и sname.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Salesonthird&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE snum IN&lt;/p&gt;&lt;p class=\"p\"&gt;(SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE odate=10/03/1990);&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это - представление только_чтение в ANSI из-за присутствия в нем подзапроса. В некоторых программах, это может быть приемлемо.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Someorders&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT snum, onum, cnum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE odate IN (10/03/1990,10/05/1990);&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это - модифицируемое представление.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;ПРОВЕРКА ЗНАЧЕНИЙ ПОМЕЩАЕМЫХ В ПРЕДСТАВЛЕНИЕ&lt;/p&gt;&lt;p class=\"p\"&gt;Другой вывод о модифицируемости представления тот, что вы можете вводить значения которые \" проглатываются \" (swallowed) в базовой таблице. Рассмотрим такое представление:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Highratings&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT cnum, rating&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE rating=300;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это - представление модифицируемое. Оно просто ограничивает ваш доступ к определенным строкам и столбцам в таблице. Предположим, что вы вставляете (INSERT) следующую строку:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;INSERT INTO Highratings&lt;/p&gt;&lt;p class=\"p\"&gt;VALUES (2018, 200);&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Это - допустимая команда INSERT в этом представлении. Строка будет вставлена, с помощью представления Highratings, в таблицу Заказчиков.&lt;/p&gt;&lt;p class=\"p\"&gt;Однако когда она появится там, она исчезнет из представления, поскольку значение оценки не равно 300. Это - обычная проблема.&lt;/p&gt;&lt;p class=\"p\"&gt;Значение 200 может быть просто напечатано, но теперь строка находится уже в таблице Заказчиков где вы не можете даже увидеть ее. Пользователь не сможет понять, почему введя строку он не может ее увидеть, и будет неспособен при этом удалить ее. Вы можете быть гарантированы от модификаций такого типа с помощью включения WITH CHECK OPTION (С ОПЦИЕЙ ПРОВЕРКИ) в определение представления. Мы можем использовать WITH CHECK OPTION в определении представления Highratmgs.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Highratings&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT cnum, rating&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE rating=300&lt;/p&gt;&lt;p class=\"p\"&gt;WITH CHECK OPTION;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вышеупомянутая вставка будет отклонена.&lt;/p&gt;&lt;p class=\"p\"&gt;WITH CHECK OPTION - производит действие все_или_ничего (all-or-nothing). Вы помещаете его в определение представления, а не в команду DML, так что или все команды модификации в представлении будут проверяться, или ни одна не будет проверена. Обычно вы хотите использовать опцию проверки, используя ее в определении представления, что может быть удобно.&lt;/p&gt;&lt;p class=\"p\"&gt;В общем, вы должны использовать эту опцию, если у вас нет причины, разрешать представлению помещать в таблицу значения, которые он сам не может содержать.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;ПРЕДИКАТЫ И ИСКЛЮЧЕННЫЕ ПОЛЯ&lt;/p&gt;&lt;p class=\"p\"&gt;Похожая проблема, которую вы должны знать, включает в себя вставку строк в представление с предикатом, базирующемся на одном или более исключенных полей. Например, может показаться разумным, чтобы создать Londonstaff подобно этому:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Londonsta1t&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT snum, sname, comm&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='London';&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;В конце концов, зачем включать значение city, если все значения city будут одинаковыми.&lt;/p&gt;&lt;p class=\"p\"&gt;А как будет выглядит картинка получаемая всякий раз, когда мы пробуем вставить строку. Так как мы не можем указать значение city как значение по умолчанию, этим значением вероятно будет NULL, и оно будет введено в поле city (NULL используется если другое значение по умолчанию значение не было определено. См. Главу 18 для подробностей ).&lt;/p&gt;&lt;p class=\"p\"&gt;Так как в этм случае поле city не будет равняться значению London, вставляемая строка будет исключена из представления.&lt;/p&gt;&lt;p class=\"p\"&gt;Это будет верным для любой строки которую вы попробуете вставить в просмотр Londonstaff. Все они должны быть введены с помощью представления Londonstaff в таблицу Продавцов, и затем исключены из самого представления( если определением по умолчанию был не London, то это особый случай). Пользователь не сможет вводить строки в это представление, хотя все еще неизвестно, может ли он вводить строки в базовую таблицу. Даже если мы добавим WITH CHECK OPTION в определение представления&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Londonstate&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT snum, sname, comm&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='London'&lt;/p&gt;&lt;p class=\"p\"&gt;WITH CHECK OPTION;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;проблема не обязательно будет решена. В результате этого мы получим представление которое мы могли бы модифицировать или из которого мы могли бы удалять, но не вставлять в него. В некоторых случаях, это может быть хорошо; хотя возможно нет смысла пользователям имеющим доступ к этому представлению иметь возможность добавлять строки. Но вы должны точно определить что может произойти прежде, чем вы создадите такое представление.&lt;/p&gt;&lt;p class=\"p\"&gt;Даже если это не всегда может обеспечить Вас полезной информацией, полезно включать в ваше представление все поля, на которые имеется ссылка в предикате. Если вы не хотите видеть эти поля в вашем выводе, вы всегда сможете исключить их из запроса в представлении, в противоположность запросу внутри представления. Другими словами, вы могли бы определить представление Londonstaff подобно этому:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Londonstaff&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city='London'&lt;/p&gt;&lt;p class=\"p\"&gt;WITH CHECK OPTION;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Эта команда заполнит представление одинаковыми значениями в поле city, которые вы можете просто исключить из вывода с помощью запроса в котором указаны только те поля которые вы хотите видеть&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, sname, comm&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Londonstaff;&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПРОВЕРКА ПРЕДСТАВЛЕНИЙ КОТОРЫЕ БАЗИРУЮТСЯ НА ДРУГИХ ПРЕДСТАВЛЕНИЯХ&lt;/p&gt;&lt;p class=\"p\"&gt;Еще одно надо упоминуть относительно предложения WITH CHECK OPTION в ANSI: оно не делает каскадированного изменения : Оно применяется только в представлениях в которых оно определено, но не в представлениях основанных на этом представлении. Например, в предыдущем примере&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Highratings&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT cnum, rating&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE rating=300&lt;/p&gt;&lt;p class=\"p\"&gt;WITH CHECK OPTION;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;попытка вставить или модифицировать значение оценки не равное 300 потерпит неудачу. Однако, мы можем создать второе представление (с идентичным содержанием ) основанное на первом:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Myratings&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Highratings;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Теперь мы можем модифицировать оценки не равные 300:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;UPDATE Myratings&lt;/p&gt;&lt;p class=\"p\"&gt;SET rating=200&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE cnum=2004;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Эта команда выполняемая так как если бы она выполнялась как первое представление, будет допустима. Предложение WITH CHECK OPTION просто гарантирует, что любая модификация в представлении, произведет значения, которые удовлетворяют предикату этого представления. Модификация других представлений базирующихся на первом текущем, является все еще допустимой, если эти представления не защищены предложениями WITH CHECK OPTION внутри этих представлений. Даже если такие предложения установлены, они проверяют только те предикаты представлений в которых они содержатся. Так например, даже если представление Myratings создавалось следующим образом&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;CREATE VIEW Myratings&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Highratings&lt;/p&gt;&lt;p class=\"p\"&gt;WITH CHECK OPTION;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;проблема не будет решена. Предложение WITH CHECK OPTION будет исследовать только предикат представления Myratings. Пока у Myratings, фактически, не имеется никакого предиката, WITH CHECK OPTION ничего не будет делать. Если используется предикат, то он будет проверяться всякий раз, когда представление Myratings будет модифицироваться, но предикат Highratings все равно будет проигнорирован. Это - дефект в стандарте ANSI, который у большинство программ исправлен. Вы можете попробовать использовать представление наподобии последнего примера и посмотреть избавлена ли ваша система от этого дефекта. (Попытка выяснить это самостоятельно может быть иногда быть проще и яснее, чем поиск ответа в документации системы. )&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РЕЗЮМЕ&lt;/p&gt;&lt;p class=\"p\"&gt;Вы теперь овладели знаниями о представлениях полностью. Кроме правил определяющих, является ли данное представление модифицируемыми в SQL, вы познакомились с основными понятиями на которых эти правила базируются - т.е что модификации в представлениях допустимы только когда SQL может недвусмысленно определить, какие значения базовой таблицы можно изменять.&lt;/p&gt;&lt;p class=\"p\"&gt;Это означает что команда модификации, при выполнении, не должна требовать ни изменений для многих строк сразу, ни сравнений между многочисленными строками либо базовой таблицы либо вывода запроса. Так как обьединения включают в себя сравнение строк, они также запрещены. Вы также поняли различие между некоторыми способами которые используют модификацируемые представления и представления только_чтение. Вы научились воспринимать модифицируемые представления как окна, отображающие данные одиночной таблицы, но необязательно исключающие или реорганизующие столбцы, посредством выбора только определенных строк отвечающих условию предиката. Представления только_чтение, с другой стороны, могут содержать более допустимые запросы SQL; они могут следовательно стать способом хранения запросов, которые вам нужно часто выполнять в неизменной форме. Кроме того, наличие запроса чей вывод обрабатывается как объект данных, дает вам возможность иметь ясность и удобство при создании запросов в выводе запросов. Вы теперь можете предохранять команды модификации в представлении от создания строк в базовой таблице, которые не представлены в самом представлении с помощью предложения WITH CHECK OPTION в определении представления. Вы можете также использовать WITH CHECK OPTION как один из способов ограничения в базовой таблице. В автономных запросах, вы обычно используете один или более столбцов в предикате не представленых среди выбранных для вывода, что не вызывает никаких проблем. Но если эти запросы используются в модифицируемых представлениях, появляются проблемы, так как эти запросы производят представления, которые не могут иметь вставляемых в них&lt;/p&gt;&lt;p class=\"p\"&gt;строк. Вы видели некоторые подходы к этим проблемам. В Главах 20 И 21, мы говорили, что представления имеют прикладные программы защиты. Вы можете позволить пользователям обращаться к представлениям не разрешая в тоже время обращаться к таблицам в которых эти представления непосредственно находятся. Глава 22 будет исследовать вопросы доступа к объектам данных в SQL.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РАБОТА С SQL&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Какое из этих представлений - модифицируемое?&lt;/p&gt;&lt;p class=\"p\"&gt;* CREATE VIEW Dailyorders&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT DISTINCT cnum, snum, onum,&lt;/p&gt;&lt;p class=\"p\"&gt;odate&lt;/p&gt;&lt;p class=\"p\"&gt;* FROM Orders;&lt;/p&gt;&lt;p class=\"p\"&gt;CREATE VIEW Custotals&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT cname, SUM (amt)&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders, Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE Orders.cnum=customer.cnum&lt;/p&gt;&lt;p class=\"p\"&gt;* GROUP BY cname;&lt;/p&gt;&lt;p class=\"p\"&gt;CREATE VIEW Thirdorders&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Dailyorders&lt;/p&gt;&lt;p class=\"p\"&gt;* WHERE odate=10/03/1990;&lt;/p&gt;&lt;p class=\"p\"&gt;CREATE VIEW Nullcities&lt;/p&gt;&lt;p class=\"p\"&gt;AS SELECT snum, sname, city&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city IS NULL&lt;/p&gt;&lt;p class=\"p\"&gt;* OR sname BETWEEN 'A' AND 'MZ';&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;* Создайте представление таблицы Продавцов с именем Commissions (Комиссионные). Это представление должно включать только поля comm и snum. С помощью этого представления, можно будет вводить или изменять комиссионные, но только для значений между .10 и .20.&lt;/p&gt;&lt;p class=\"p\"&gt;* Некоторые SQL реализации имеют встроенную константу представляющую текущую дату, иногда называемую \" CURDATE \". Слово CURDATE может следовательно использоваться в операторе SQL, и заменяться текущей датой, когда его значение станет доступным с помощью таких команд как SELECT или INSERT. Мы будем использовать представление таблицы Порядков с именем Entryorders для вставки строк в таблицу Порядков. Создайте таблицу порядков, так чтобы CURDATE автоматически вставлялась в поле odate если не указано другого значения. Затем создайте представление Entryorders, так чтобы значения не могли быть указаны.&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</title></section></div>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>"]</script>


<script>
(function() {
  'use strict';

  // ── Data injected by bundler ──────────────────────────────────────────────
  const BOOK_ID  = "book_4b8d4de8";
  const LANG     = {"code":"ru","dir":"ltr","chapter":"Глава","total_chapters":"Всего {n} глав","search_placeholder":"Поиск по книге...","prev":"← Назад","next":"Вперёд →","bookmark_add":"☆","bookmark_remove":"★","bookmarks_title":"Закладки","no_bookmarks":"Закладок пока нет","theme_to_light":"☀","theme_to_dark":"☾","chapter_label":"Глава {n}","stop_words":["и","в","на","не","с","а","но","из","к","по","за","то","как","что","так","же","это","да","уж","вот","он","она","оно","они","мы","вы","я","ни","ли","бы","до","при","про","над","под","без","через","для","который","если","когда","такой","всё","было","стало","может","нет","есть","один","два","три","первый","второй","каждый","всегда","уже","ещё","тоже","только","после","перед","между","много","других","самый","просто","очень","хотя","чтобы","потому","поэтому","всего","лишь","никто","никогда","ведь","всем","была","были"]};
  const T        = ["Модуль 1: Основы и Синтаксис","Модуль 2: Фильтрация и Сортировка","Модуль 3: Группировка и Агрегация","Модуль 4: Работа с Несколькими Таблицами","Модуль 5: Подзапросы и Объединения","Модуль 6: Манипуляция Данными (DML)","Модуль 7: Проектирование и Администрирование"];
  const CHAPTERS = JSON.parse(document.getElementById('book-chapters').textContent);
  const SIDX     = JSON.parse(document.getElementById('book-search').textContent);
  const ASSETS   = JSON.parse(document.getElementById('book-assets').textContent);
  const FILES    = JSON.parse(document.getElementById('book-files').textContent);
  const ANCHORS  = JSON.parse(document.getElementById('book-anchors').textContent);

  // ── Helper to escape HTML for safe injection into innerHTML ───────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Safe Storage ──────────────────────────────────────────────────────────
  const store = {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const fr       = document.getElementById('fr');
  const tt       = document.getElementById('tt');
  const bar      = document.getElementById('bar');
  const side     = document.getElementById('side');
  const overlay  = document.getElementById('overlay');
  const searchEl = document.getElementById('search');
  const searchPrev = document.getElementById('search-prev');
  const searchNext = document.getElementById('search-next');
  const app      = document.getElementById('app');
  const bmBtn    = document.getElementById('bm-btn');
  const bmList   = document.getElementById('bm-list');
  const bmDetails = document.getElementById('bm-details');

  let cur = 0;
  let searchFilter = '';
  let pendingAnchor = null;

  // ── i18n helpers ─────────────────────────────────────────────────────────
  searchEl.placeholder = LANG.search_placeholder || 'Search...';
  document.getElementById('prev-btn').textContent = LANG.prev || '<';
  document.getElementById('next-btn').textContent = LANG.next || '>';
  document.getElementById('bm-summary').textContent = LANG.bookmarks_title || 'Bookmarks';
  document.getElementById('vol-info').textContent = (LANG.total_chapters || '{n} chapters').replace('{n}', T.length);

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? (LANG.theme_to_light || '☀') : (LANG.theme_to_dark || '☾');
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe via postMessage
    if (fr.contentWindow) {
      fr.contentWindow.postMessage({ action: 'setTheme', theme: t }, '*');
    }
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);
  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }
    catch(e) { return []; }
  }
  function saveBookmarks(bm) {
    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }
  function toggleBookmark() {
    const bm = getBookmarks();
    const idx = bm.indexOf(cur);
    if (idx === -1) bm.push(cur); else bm.splice(idx, 1);
    saveBookmarks(bm);
    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? (LANG.bookmark_remove || '★') : (LANG.bookmark_add || '☆');
  }
  function buildBookmarkList() {
    const bm = getBookmarks();
    bmList.innerHTML = '';
    if (!bm.length) {
      bmList.innerHTML = `<div class="bm-empty">${LANG.no_bookmarks || 'No bookmarks'}</div>`;
      return;
    }
    bm.forEach(i => {
      const btn = document.createElement('button');
      btn.className = 'bm-item';
      btn.textContent = `${LANG.chapter || 'Chapter'} ${i + 1} — ${T[i] || ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      bmList.appendChild(btn);
    });
  }
  bmBtn.onclick = toggleBookmark;

  // ── Search (inverted index) ───────────────────────────────────────────────
  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, ' ')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

  // ── Chapter navigation ────────────────────────────────────────────────────
  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;
    pendingAnchor = anchor;
    searchPrev.style.display = 'none';
    searchNext.style.display = 'none';

    const doSwitch = () => {
      fr.srcdoc = CHAPTERS[i];

      // Update UI
      const chLabel = (LANG.chapter_label || 'Chapter {n}').replace('{n}', i + 1);
      tt.innerHTML = `<i>${chLabel}</i> ${esc(T[i] || '')}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));
      store.set('prog_' + BOOK_ID, i);
      updateBookmarkBtn();
    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();
    const frag = document.createDocumentFragment();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = (LANG.chapter_label || 'Chapter {n}').replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${esc(t)}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      frag.appendChild(btn);
    });
    list.appendChild(frag);

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  // ── Mobile sidebar ────────────────────────────────────────────────────────
  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    // Allow Escape from search box to also close mobile sidebar
    if (e.target === searchEl) {
      if (e.key === 'Escape') { searchEl.blur(); closeSidebarMobile(); }
      return;
    }
    if (e.key === 'Escape')    closeSidebarMobile();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.source !== fr.contentWindow) return;
    const data = e.data;
    if (!data) return;

    if (data.action === 'bookGo') {
      let targetIdx = -1;
      
      // Global Anchor resolution takes absolute precedence over filename chunk bounds
      if (data.anchorId && ANCHORS[data.anchorId] !== undefined) {
        targetIdx = ANCHORS[data.anchorId];
      }
      else if (data.filename) {
        targetIdx = FILES.indexOf(data.filename.toLowerCase());
        if (targetIdx === -1 && data.filename.includes('chapter')) {
           const m = data.filename.match(/chapter(\d+)/i);
           if (m) {
             const idxHint = parseInt(m[1], 10) - 1;
             targetIdx = idxHint < FILES.length ? idxHint : -1;
           }
        }
      }
      
      if (targetIdx === -1 && data.chapterIdx !== undefined) targetIdx = data.chapterIdx;
      
      if (targetIdx >= 0 && targetIdx < CHAPTERS.length) {
        go(targetIdx, data.anchorId);
      }
    } 
    else if (data.action === 'scrollReport') {
      store.set('sc_' + BOOK_ID + '_' + cur, data.ratio.toFixed(4));
    }
    else if (data.action === 'requestAsset') {
      const b64 = ASSETS[data.key];
      if (b64) {
        fr.contentWindow.postMessage({ action: 'provideAsset', key: data.key, dataUri: b64 }, '*');
      }
    }
    else if (data.action === 'guestReady') {
      // Send theme
      fr.contentWindow.postMessage({ action: 'setTheme', theme: document.documentElement.getAttribute('data-theme') }, '*');
      
      // Handle position restoring
      if (!pendingAnchor) {
        const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + cur) || '0');
        if (savedRatio > 0.005) {
          fr.contentWindow.postMessage({ action: 'setScrollRatio', ratio: savedRatio }, '*');
        }
      }

      // Handle anchor or search
      if (pendingAnchor) {
        fr.contentWindow.postMessage({ action: 'scrollToAnchor', anchorId: pendingAnchor }, '*');
        pendingAnchor = null;
      } else if (searchFilter) {
        fr.contentWindow.postMessage({ action: 'highlightSearch', query: searchFilter }, '*');
      }
    }
    else if (data.action === 'searchHitsFound') {
      if (data.count > 0) {
        searchPrev.style.display = 'block';
        searchNext.style.display = 'block';
      }
    }
    else if (data.action === 'keypress') {
      if (data.key === 'Escape') closeSidebarMobile();
      if (data.key === 'ArrowRight' || data.key === 'ArrowDown') go(cur + 1);
      if (data.key === 'ArrowLeft'  || data.key === 'ArrowUp') go(cur - 1);
    }
  });

  searchPrev.onclick = () => {
    if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'prevSearchHit' }, '*');
  };
  searchNext.onclick = () => {
    if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'nextSearchHit' }, '*');
  };

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);

  // ── Print chapter in new window (iframes don't render in browser print) ──────
  // Restores lazy images from ASSETS dict before opening, so images print correctly.
  document.getElementById('print-btn').onclick = () => {
    const win = window.open('', '_blank', 'width=960,height=800');
    if (!win) { alert('Allow popups for this page to print.'); return; }
    // Restore lazy images: replace placeholder src + data-src with actual data-URI
    let printHtml = CHAPTERS[cur]
      .replace(/<script\b[\s\S]*?<\/script>/gi, '')  // strip navScript (no parent to message)
      .replace(
        /src="data:image\/gif;base64,[^"]*"\s+data-src="([^"]+)"/gi,
        (_, key) => `src="${ASSETS[key] || ''}"`);
    win.document.open();
    win.document.write(printHtml);
    win.document.close();
    // Use setTimeout instead of win.load event: after document.write()+close(),
    // the load event may have already fired before addEventListener() is called.
    setTimeout(() => win.print(), 400);
  };
  let searchDebounce;
  searchEl.oninput = e => {
    clearTimeout(searchDebounce);
    const val = e.target.value;
    searchDebounce = setTimeout(() => {
      buildList(val);
      if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'highlightSearch', query: val }, '*');
      if (!val) {
        searchPrev.style.display = 'none';
        searchNext.style.display = 'none';
      }
    }, 300);
  };

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
</script>
</body>
</html>
