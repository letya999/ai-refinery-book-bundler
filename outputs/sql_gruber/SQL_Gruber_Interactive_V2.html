<title>Понимание SQL (Мастер-класс Издание)</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --bg2: #0c1b35; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a; --bad: #ff8f8f; --fg: #eef5ff;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Segoe UI Variable", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #dce8f2 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ── Print styles ── */
/* Note: iframe content is NOT rendered by browser print.
   Use the 🖨 button in the toolbar — it opens a printable popup with images restored. */
@media print {
  .side, .top, .prog, .stars { display: none !important; }
  .app { display: block; }
  .main { display: block; }
  .frame { height: auto; }
  iframe { display: none; }
}

ion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1>Модуль 1: Основы и Синтаксис</h1>\n    \n<section class=\"chapter-unit\" data-original-chapter=\"2\">\n\n<title>\n&lt;style&gt;.z {\n\tfont-family: 'Times New Roman', serif;\n\tmargin-right: 8pt;\n}\n\n.p {\n\tmargin: 0px;\n\ttext-align: justify;\n\ttext-indent: 1.5em;\n}\n\n.a {\n\tfont-size: 0.7em;\n\tline-height: 0.1;\n\tvertical-align: super;\n}\n\n.empty-line {\n\theight: 1em;\n\tmargin: 0px;\n}\n\n.title {\n\tfont-size: 1.8em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 0px;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n}\n\n.p1 {\n\tmargin: 0px 0px 0.5em 0px;\n\ttext-align: inherit;\n\ttext-indent: 0px;\n}\n\n.title1 {\n\tfont-size: 1.5em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.563em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.code {\n\tfont-family: 'Courier New', monospace;\n}\n\n.table {\n\tborder: 1px solid black;\n\tborder-collapse: collapse;\n\tfont-family: Arial, sans-serif;\n\tfont-size: 0.8em;\n\tmargin: 0.5em;\n}\n\n.td {\n\tborder: 1px solid black;\n\tpadding: 0.3em;\n}\n\n.title2 {\n\tfont-size: 1.3em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.923em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.subtitle {\n\tfont-style: italic;\n\tfont-weight: bold;\n\tmargin: 0.5em 2em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n\ttext-indent: 0px;\n}\n\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body class=\"z\"&gt;\n&lt;span id=\"id1\"&gt;&lt;div class=\"title\"&gt;\n&lt;p class=\"p1\"&gt;МАРТИН ГРУБЕР&lt;/p&gt;\n&lt;p class=\"p1\"&gt;Понимание SQL&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"p\"&gt;Перевод Лебедева В.Н.&lt;/p&gt;&lt;p class=\"p\"&gt;Под редакцией Булычева В.Н.&lt;/p&gt;&lt;p class=\"p\"&gt;МОСКВА, 1993&lt;/p&gt;&lt;p class=\"p\"&gt;MARTIN GRUBER&lt;/p&gt;&lt;p class=\"p\"&gt;Understanding SQL&lt;/p&gt;&lt;span id=\"id2\"&gt;&lt;div class=\"title1\"&gt;\n&lt;p class=\"p1\"&gt;Команда SELECT&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;SELECT * | { [ DISTINCT | ALL] &lt;value expression&gt;.,..}&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    FROM { &lt;table name&gt; [ &lt;alias&gt; ] }.,..&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ WHERE &lt;predicate&gt;]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ GROUP BY { &lt;column name&gt; | &lt;integer&gt; }.,..]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ HAVING &lt;predicate&gt;]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ ORDERBY { &lt;column name&gt; | &lt;integer&gt; }.,..]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ { UNION [ALL]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;SELECT * | { [DISTINCT | ALL] &lt; value expression &gt;.,..}&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    FROM { &lt;table name&gt; [&lt;alias&gt;]} .,..&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ WHERE &lt;predicate&gt;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ GROUP BY { &lt;columnname&gt; | &lt;integer&gt; }.,..]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ HAVING &lt;predicate&gt;]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ ORDER BY { &lt;columnname&gt; | &lt;integer&gt; }.,..] } ] ...;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;Элементы, используемые в команде SELECT&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ЭЛЕМЕНТ&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ОПРЕДЕЛЕНИЕ&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;value expression&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Выражение, которое производит значение. Оно может включать в себя или содержать &lt;column name&gt;.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;table name&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Имя или синоним таблицы или представления&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;alias&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Временный синоним для &lt;table name&gt;, определеный в этой таблице и используемый только в этой команде&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;predicate&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Условие , которое может быть верным или неверным для каждой строки или комбинации строк таблицы в предложении FROM.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;column name&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Имя столбца в таблице.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;integer&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Число с десятичной точкой. В этом случае, оно показывает &lt;value expression&gt; в предложении SELECT с помощью идентификации его местоположения в этом предложении.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"p\"&gt; &lt;/p&gt;&lt;p class=\"p\"&gt; &lt;/p&gt;&lt;/span&gt;&lt;span id=\"id3\"&gt;&lt;div class=\"title1\"&gt;\n&lt;p class=\"p1\"&gt;Команды UPDATE, INSERT, DELETE&lt;/p&gt;\n&lt;/div&gt;&lt;span id=\"id4\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;UPDATE&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;UPDATE &lt;tablename&gt;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    SET { | }.,. .&lt; column name&gt; = &lt;value expresslon&gt; [ WHERE &lt;predlcate&gt;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    | WHERE CURRENT OF &lt;cursor name&gt; (*только для вложения*) ];&lt;/code&gt;&lt;/p&gt;&lt;/span&gt;&lt;span id=\"id5\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;INSERT&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;INSERT INTO &lt; table name&gt; [(&lt;column name&gt; .,. ]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    { VALUES ( &lt;value expression&gt; .,.. ) } | &lt;query&gt;;&lt;/code&gt;&lt;/p&gt;&lt;/span&gt;&lt;span id=\"id6\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;DELETE&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;DELETE FROM &lt;table name&gt;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [ WHERE &lt;predicate&gt;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    | WHERE CURRENT OF &lt;cursor name&gt; (*только для вложения*) ];&lt;/code&gt;&lt;/p&gt;&lt;p class=\"subtitle\"&gt;Элементы, используемые в командах МОДИФИКАЦИИ&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ЭЛЕМЕНТ&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ОПРЕДЕЛЕНИЕ&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;cursor name&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Имя курсора используемого в этой программе.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;query&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Допустимая команда SELECT.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"p\"&gt;Для других элементов смотри команду SELECT.&lt;/p&gt;&lt;p class=\"p\"&gt;Символы Используемые в Синтаксисе Предлжения&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;СИМВОЛ&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ОБЪЯСНЕНИЕ&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;|&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Любой предшествующий знаку (|) символ может быть произвольно&lt;/p&gt;&lt;p class=\"p\"&gt;заменен на любой следующий за (|). Это — символический способ высказывания \"или\" (\"or\").&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;{ }&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Все, что включено в фигурные скобки обрабатывается как модуль с целью оценки |, .,.. или других символов.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;[ ]&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Все,включенное в квадратные скобки является необязательным&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;...&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Любое, предшествующее этому, может повторяться любое число раз.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;.,..&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Любое, предшествующее этому, и в каждом случае отделенное&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"p\"&gt;запятыми, может повторяться любое число раз.&lt;/p&gt;&lt;p class=\"p\"&gt; &lt;/p&gt;&lt;p class=\"p\"&gt; &lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;span id=\"id7\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;Команда CREATE TABLE&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;CREATE TABLE &lt;table name&gt;&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    ( { &lt;column name&gt; &lt;data type&gt; | &lt;size&gt;]&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [&lt;colcnstrnt&gt; ...]} .,.. );&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;code class=\"code\"&gt;    [&lt;tabconstrnt&gt;] .,.. );&lt;/code&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;Элементы, используемые в команде CREATE TABLE&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ЭЛЕМЕНТ&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;ОПРЕДЕЛЕНИЕ&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;table name&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Имя таблицы создаваемой этой командой.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;column name&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Имя столбца таблицы.&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;data type&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Тип данных&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"p\"&gt;Тип данных, который может содержаться в столбце.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;Может быть любым из следующих:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;INTEGER (ЦЕЛОЕ ЧИСЛО),&lt;/p&gt;&lt;p class=\"p\"&gt;CHARACTER (СИМВОЛЬНОЕ),&lt;/p&gt;&lt;p class=\"p\"&gt;DECIMAL (ДЕСЯТИЧНОЕ),&lt;/p&gt;&lt;p class=\"p\"&gt;NUMERIC (ЧИСЛОВОЕ),&lt;/p&gt;&lt;p class=\"p\"&gt;SMALLINT (НАИМЕНЬШЕЕ)&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;FLOAT (С ПЛАВАЮЩЕЙ ТОЧКОЙ)&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;REAL (РЕАЛЬНОЕ),&lt;/p&gt;&lt;p class=\"p\"&gt;DOUBLE PRECISION (УДВОЕННАЯ ТОЧНОСТЬ С ПЛАВАЮЩЕЙ ТОЧКОЙ),&lt;/p&gt;&lt;p class=\"p\"&gt;LONG * (ДЛИННОЕ *),&lt;/p&gt;&lt;p class=\"p\"&gt;VARCHAR * (ПЕРЕМЕННОЕ СИМВОЛЬНОЕ *),&lt;/p&gt;&lt;p class=\"p\"&gt;DATE * (ДАТА *),&lt;/p&gt;&lt;p class=\"p\"&gt;TIME * (ВРЕМЯ *)&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;(* — указывает на нестандартный для SQL тип данных)&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;size&gt; Размер. Его значение зависит от &lt;data type&gt;.&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;colconstrnt&gt; &lt;strong&gt;Может быть любым из следующих&lt;/strong&gt;:&lt;/p&gt;&lt;p class=\"p\"&gt;NOT NULL (НЕ НУЛЕВОЙ),&lt;/p&gt;&lt;p class=\"p\"&gt;UNIQUE (УНИКАЛЬНЫЙ),&lt;/p&gt;&lt;p class=\"p\"&gt;PRIMARY KEY (ПЕРВИЧНЫЙ КЛЮЧ),&lt;/p&gt;&lt;p class=\"p\"&gt;CHECK(&lt;predicate&gt;) (ПРОВЕРКА предиката),&lt;/p&gt;&lt;p class=\"p\"&gt;DEFAULT = &lt;value expression&gt; (ПО УМОЛЧАНИЮ = значимому выражению)&lt;/p&gt;&lt;p class=\"p\"&gt;REFERENCES &lt;table name&gt; [(&lt;column name&gt; .,.. )] (ССЫЛКА НА имя таблицы [(имя столбца) ] )&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;tabconstrnt&gt; &lt;strong&gt;Может быть любым из следующих:&lt;/strong&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;UNIQUE&lt;/strong&gt; (УНИКАЛЬНЫЙ),&lt;/p&gt;&lt;p class=\"p\"&gt;PRIMARY KEY (ПЕРВИЧНЫЙ КЛЮЧ),&lt;/p&gt;&lt;p class=\"p\"&gt;CHECK (ПРОВЕРКА предиката )&lt;/p&gt;&lt;p class=\"p\"&gt;FOREIGN KEY(&lt;column name&gt;) (ВНЕШНИЙ КЛЮЧ)&lt;/p&gt;&lt;p class=\"p\"&gt;REFERENCES &lt;table name&gt; [(&lt;column name&gt; .,.. )] (ССЫЛКА НА имя таблицы [( имя столбца) ].&lt;/p&gt;&lt;/span&gt;&lt;span id=\"id8\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;ПРЕДИСЛОВИЕ&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"p\"&gt;\"ПОНИМАНИЕ SQL\" - это полный учебник по программированию на Структурированном Языке Запросов, написанный специально для тех, кто будет использовать SQL в процессе работы. Даже если это ваш первый опыт с компьютерами или управлением базами данных, книга \"ПОНИМАНИЕ SQL\" очень быстро научит вас свободно работать с реальной SQL, использованию простых запросов, а также снабдит вас ясными понятиями об автоматизированном управлении базой данных. Книга даст вам краткое, удобное в чтении введение в реляционные базы данных. Предоставит вам обучающие программы, чтобы, овладевая командами SQL шаг за шагом, помочь вам узнать, как извлекать и обрабатывать информацию, содержащуюся в таблицах данных, т.е.:&lt;/p&gt;&lt;p class=\"p\"&gt;* выбирать информацию, с которой вы хотите работать&lt;/p&gt;&lt;p class=\"p\"&gt;* добавлять, удалять, и модифицировать информацию в таблице данных&lt;/p&gt;&lt;p class=\"p\"&gt;* использовать и-или, верно/неверно и другие условия для обнуления определенной информации&lt;/p&gt;&lt;p class=\"p\"&gt;* использовать специальные функции SQL для суммирования ваших данных.&lt;/p&gt;&lt;p class=\"p\"&gt;Книга покажет Вам, как эффективно работать с многочислеными таблицами данных, используя улучшеную технику для запроса более чем одной таблицы одновременно, строить комплекс запросов и подзапросов, и использовать представления, чтобы создавать базы данных и работать с базами данных раздельно с многими таблицами.&lt;/p&gt;&lt;p class=\"p\"&gt;Научит создавать новые таблицы данных для пользовательских деловых прикладных программ. Вы исследуете принципы эффективного проектирования базы данных, а также техники для обеспечения целостности данных и их защиты.&lt;/p&gt;&lt;p class=\"p\"&gt;Вы узнаете, как использовать SQL с другими языками в специальной главе SQL для программистов.&lt;/p&gt;&lt;p class=\"p\"&gt;\"ПОНИМАНИЕ SQL\" - необходима и пригодна для любой реализации Структурированного Языка Запроса. Книга включает и краткий справочный стандарт SQL и руководство к общим нестандартным особенностям SQL.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;Об Авторе&lt;/p&gt;&lt;p class=\"p\"&gt;Мартин Грубер - свободный писатель, учитель и консультант из Сан-Франциско.&lt;/p&gt;&lt;p class=\"p\"&gt;В дополнении к написанию и редактированию книг, руководств пользователей и документации, он работает в широком спектре интересов, связанных с компьютерами и компьютерными базами данных.&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</title></section></div>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow-y: auto !important; /* Fixed: Allow scrolling in chapters */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1>Модуль 2: Фильтрация и Сортировка</h1>\n    \n<section class=\"chapter-unit\" data-original-chapter=\"5\">\n\n<title>\n&lt;style&gt;.z {\n\tfont-family: 'Times New Roman', serif;\n\tmargin-right: 8pt;\n}\n\n.p {\n\tmargin: 0px;\n\ttext-align: justify;\n\ttext-indent: 1.5em;\n}\n\n.a {\n\tfont-size: 0.7em;\n\tline-height: 0.1;\n\tvertical-align: super;\n}\n\n.empty-line {\n\theight: 1em;\n\tmargin: 0px;\n}\n\n.title {\n\tfont-size: 1.8em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 0px;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n}\n\n.p1 {\n\tmargin: 0px 0px 0.5em 0px;\n\ttext-align: inherit;\n\ttext-indent: 0px;\n}\n\n.title1 {\n\tfont-size: 1.5em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.563em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.code {\n\tfont-family: 'Courier New', monospace;\n}\n\n.table {\n\tborder: 1px solid black;\n\tborder-collapse: collapse;\n\tfont-family: Arial, sans-serif;\n\tfont-size: 0.8em;\n\tmargin: 0.5em;\n}\n\n.td {\n\tborder: 1px solid black;\n\tpadding: 0.3em;\n}\n\n.title2 {\n\tfont-size: 1.3em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.923em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.subtitle {\n\tfont-style: italic;\n\tfont-weight: bold;\n\tmargin: 0.5em 2em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n\ttext-indent: 0px;\n}\n\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body class=\"z\"&gt;\n&lt;span&gt;&lt;span id=\"id11\"&gt;&lt;div class=\"title2\"&gt;\n&lt;p class=\"p1\"&gt;Глава 3. ИСПОЛЬЗОВАНИЕ SQL ДЛЯ ИЗВЛЕЧЕНИЯ ИНФОРМАЦИИ ИЗ ТАБЛИЦ.&lt;/p&gt;\n&lt;/div&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;В ЭТОЙ ГЛАВЕ МЫ ПОКАЖЕМ ВАМ КАК ИЗВЛЕКАТЬ информацию из таблиц. Вы узнаете как опускать или переупорядочивать столбцы и как автоматически устранять избыточность данных из вашего вывода. В заключение, вы узнаете как устанавливать условие( проверку ) которую вы можете использовать чтобы определить какие строки таблицы используются в выводе. Эта последняя особенность, будет далее описана в более поздних главах и является одной из наиболее изящных и мощных в SQL.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;СОЗДАНИЕ ЗАПРОСА&lt;/p&gt;&lt;p class=\"p\"&gt;Как мы подчеркивали ранее, SQL символизирует собой Структурированный Язык Запросов. Запросы - вероятно наиболее часто используемый аспект SQL. Фактически, для категории SQL пользователей, маловероятно чтобы кто-либо использовал этот язык для чего-то друго. По этой причине, мы будем начинать наше обсуждение SQL с обсуждения запроса и как он выполняется на этом языке.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ЧТО ТАКОЕ ЗАПРОС?&lt;/p&gt;&lt;p class=\"p\"&gt;Запрос - команда которую вы даете вашей программе базы данных, и которая сообщает ей чтобы она вывела определенную информацию из таблиц в память. Эта информация обычно посылается непосредственно на экран компьютера или терминала которым вы пользуетесь, хотя, в большинстве случаев, ее можно также послать принтеру, сохранить в файле (как объект в памяти компьютера ), или представить как вводную информацию для другой команды или процесса.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ГДЕ ПРИМЕНЯЮТСЯ ЗАПРОСЫ?&lt;/p&gt;&lt;p class=\"p\"&gt;Запросы обычно рассматриваются как часть языка DML. Однако, так как запрос не меняет информацию в таблицах, а просто показывает ее пользователю, мы будем рассматривать запросы как самостоятельную категорию среди команд DML которые производят действие, а не просто показывают содержание базы данных.&lt;/p&gt;&lt;p class=\"p\"&gt;Все запросы в SQL состоят из одиночной команды. Структура этой команды обманчиво проста, потому что вы должны расширять ее так чтобы выполнить высоко сложные оценки и обработки данных. Эта команда называется - SELECT(ВЫБОР).&lt;/p&gt;&lt;p class=\"subtitle\"&gt;КОМАНДА SELECT&lt;/p&gt;&lt;p class=\"p\"&gt;В самой простой форме, команда SELECT просто инструктирует базу данных чтобы извлечь информацию из таблицы. Например, вы могли бы вывести таблицу Продавцов напечатав следующее:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, sname, sity, comm&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople;&lt;/p&gt;&lt;p class=\"p\"&gt;Вывод для этого запроса показывается в таблице 3.1.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, sname, sity, comm FROM Salespeople;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;sname&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;city&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;comm&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Peel&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.12&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Serres&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;San Jose&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.13&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Motika&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.11&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Rifkin&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Barcelona&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.15&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Axelrod&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;New York&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.10&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 3.1: команда SELECT&lt;/p&gt;&lt;p class=\"p\"&gt;Другими словами, эта команда просто выводит все данные из таблицы. Большинство программ будут также давать заголовки столбца как выше, а некоторые позволяют детальное форматирование вывода, но это уже вне стандартной спецификации.&lt;/p&gt;&lt;p class=\"p\"&gt;Имеется объяснение каждой части этой команды:&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT Ключевое слово которое сообщает базе данных что эта команда - запрос. Все запросы начинаются этим словом, сопровождаемым пробелом.&lt;/p&gt;&lt;p class=\"p\"&gt;snum, sname Это - список столбцов из таблицы которые выбираются запросом. Любые столбцы не перечисленные здесь не будут включены в вывод команды. Это, конечно, не значит что они будут удалены или их информация будет стерта из таблиц, потому что запрос не воздействует на информацию в таблицах; он только показывает данные.&lt;/p&gt;&lt;p class=\"p\"&gt;FROM FROM - ключевое слово, подобно SELECT, которое должно Salespeople быть представлено в каждом запросе. Оно сопровождается пробелом и затем именем таблицы используемой в качестве источника информации. В данном случае - это таблица Продавцов(Salespeople).&lt;/p&gt;&lt;p class=\"p\"&gt;Точка с запятой используется во всех интерактивных командах SQL чтобы сообщать базе данных что команда заполнена и готова выполниться.&lt;/p&gt;&lt;p class=\"p\"&gt;В некоторых системах наклонная черта влево (\\) в строке, является индикатором конца команды.&lt;/p&gt;&lt;p class=\"p\"&gt;Естественно, запрос такого характера не обязательно будет упорядочивать вывод любым указаным способом. Та же самая команда выполненная с теми же самыми данными но в разное время не сможет вывести тот же самый порядок. Обычно, строки обнаруживаются в том порядке в котором они найдены в таблице, поскольку как мы установили в предыдущей главе - этот порядок произволен. Это не обязательно будет тот порядок в котором данные вводились или сохранялись. Вы можете упорядочивать вывод командами SQL непосредственно: с помощью специального предложения.&lt;/p&gt;&lt;p class=\"p\"&gt;Позже, мы покажем как это делается. А сейчас, просто усвойте, что в отсутствии явного упорядочения, нет никакого определенного порядка в вашем выводе.&lt;/p&gt;&lt;p class=\"p\"&gt;Наше использование возврата (Клавиша ENTER ) является произвольным. Мы должны точно установить как удобнее составить запрос, в несколько строк или в одну строку, следующим образом:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum, sname, city, comm FROM Salespeople;&lt;/p&gt;&lt;p class=\"p\"&gt;С тех пор как SQL использует точку с запятой чтобы указывать конец команды, большинство программ SQL обрабатывают возврат (через нажим Возврат или клавишу ENTER ) как пробел. Это - хорошая идея чтобы использовать возвраты и выравнивание что мы делали это ранее, чтобы сделать ваши команды более легкими для чтения и более правильными.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ВЫБИРАЙТЕ ВСЕГДА САМЫЙ ПРОСТОЙ СПОСОБ&lt;/p&gt;&lt;p class=\"p\"&gt;Если вы хотите видеть каждый столбец таблицы, имеется необязательное сокращение которое вы можете использовать. Звездочка (*) может применяться для вывода полного списка столбцов следующим образом:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople;&lt;/p&gt;&lt;p class=\"p\"&gt;Это привыведет к тому же результату что и наша предыдущая команда.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ОПИСАНИЕ SELECT&lt;/p&gt;&lt;p class=\"p\"&gt;В общем случае, команда SELECT начинается с ключевого слова SELECT, сопровождаемого пробелом. После этого должен следовать список имен столбцов которые вы хотите видеть, отделяемые запятыми. Если вы хотите видеть все столбцы таблицы, вы можете заменить этот список звездочкой (*). Ключевое слово FROM следующее далее, сопровождается пробелом и именем таблицы запрос к которой делается. В заключение, точка с запятой (; ) должна использоваться чтобы закончить запрос и указать что команда готова к выполнению.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПРОСМОТР ТОЛЬКО ОПРЕДЕЛЕННОГО СТОЛБЦА ТАБЛИЦЫ&lt;/p&gt;&lt;p class=\"p\"&gt;Команда SELECT способна извлечь строго определенную информацию из таблицы. Сначала, мы можем предоставить возможность увидеть только определенные столбцы таблицы. Это выполняется легко, простым исключением столбцов которые вы не хотите видеть, из части команды SELECT. Например, запрос&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT sname, comm&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;будет производить вывод показанный в Таблице 3.2.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum, comm FROM Salespeople;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;sname&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;comm&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Peel&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.12&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Serres&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.13&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Motika&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.11&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Rifkin&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.15&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Axelrod&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;0.10&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 3.2: Выбор определенных столбцов&lt;/p&gt;&lt;p class=\"p\"&gt;Могут иметься таблицы которые имеют большое количество столбцов содержащих данные, не все из которых являются относящимися к поставленой задаче. Следовательно, вы можете найти способ подбора и выбора только полезных для Вас столбцов.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПЕРЕУПОРЯДОЧЕНИЕ СТОЛБЦА&lt;/p&gt;&lt;p class=\"p\"&gt;Даже если столбцы таблицы, по определению, упорядоченны, это не означает что вы будете восстанавливать их в том же порядке. Конечно, звездочка (*) покажет все столбцы в их естественном порядке, но если вы укажете столбцы отдельно, вы можете получить их в том порядке котором хотите. Давайте рассмотрим таблицу Порядков, содержащую дату приобретения(odate), номер продавца(snum), номер порядка(onum), и суммы приобретения(amt):&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT odate, snum, onum, amt&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вывод этого запроса показан Таблице 3.3.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT odate, snum, onum, amt FROM Orders;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;odate&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;onum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;amt&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;18.69&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;767.19&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1900.10&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3005&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;5160.45&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/03/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1098.16&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/04/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3009&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1713.23&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/04/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;75.75&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/05/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3008&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;4723.00&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3010&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1309.95&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;10/06/1990&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;3011&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;9891.88&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Рисунок 3.3: Реконструкция столбцов&lt;/p&gt;&lt;p class=\"p\"&gt;Как вы можете видеть, структура информации в таблицах - это просто основа для активной перестройки структуры в SQL.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;УДАЛЕНИЕ ИЗБЫТОЧНЫХ ДАННЫХ&lt;/p&gt;&lt;p class=\"p\"&gt;DISTINCT (ОТЛИЧИЕ) - аргумент который обеспечивает Вас способом устранять двойные значения из вашего предложения SELECT. Предположим что вы хотите знать какие продавцы в настоящее время имеют свои порядки в таблице Порядков. Под порядком (здесь и далее) будет пониматься запись в таблицу Порядков, регистрирующую приобретения сделанные в определенный день определенным заказчиком у определенного продавца на определенную сумму). Вам не нужно знать, сколько порядков имеет каждый; вам нужен только список номеров продавцов (snum). Поэтому Вы можете ввести:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;для получения вывода показанного в Таблице 3.4&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT snum FROM Orders;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 3.4: SELECT с дублированием номеров продавцов.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Для получения списка без дубликатов, для удобочитаемости, вы можете ввести следующее:&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT DISTINCT snum&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Orders;&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Вывод для этого запроса показан в Таблице 3.5.&lt;/p&gt;&lt;p class=\"p\"&gt;Другими словами, DISTINCT следит за тем, какие значения были ранее, так что бы они не были продублированы в списке. Это - полезный способ избежать избыточности данных, но важно что бы при этом вы понимали что вы делаете. Если вы не хотите потерять некоторые данные, вы не должны безоглядно использовать DISTINCT, потому что это может скрыть какую-то проблему или какие-то важные данные. Например, вы могли бы предположить что имена всех ваших заказчиков различны. Если кто-то помещает второго Clemens в таблицу Заказчиков, а вы используете SELECT DISTINCT cname, вы не будете даже знать о существовании двойника. Вы можете получить не того Clemens и даже не знать об этом. Так как вы не ожидаете избыточности, в этом случае вы не должны использовать DISTINCT.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;ПАРАМЕТРЫ DISTINCT&lt;/p&gt;&lt;p class=\"p\"&gt;DISTINCT может указываться только один раз в данном предложении SELECT. Если предложение выбирает многочисленные поля,&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;SQL Execution Log &lt;/strong&gt;&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT DISTINCT snum FROM Orders;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1002&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1003&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1004&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1007&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Таблица 3.5: SELECT без дублирования&lt;/p&gt;&lt;p class=\"p\"&gt;DISTINCT опускает строки где все выбранные поля идентичны. Строки в которых некоторые значения одинаковы а некоторые различны - будут сохранены. DISTINCT, фактически, приводит к показу всей строки вывода, не указывая полей (за исключением когда он используется внутри агрегатных функций, как описано в Главе 6 ), так что нет никакого смысла чтобы его повторять.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;DISTINCT ВМЕСТО ALL&lt;/p&gt;&lt;p class=\"p\"&gt;Вместо DISTINCT, вы можете указать - ALL. Это будет иметь противоположный эффект, дублирование строк вывода сохранится. Так как это - тот же самый случай когда вы не указываете ни DISTINCT ни ALL, то ALL - по существу скорее пояснительный, а не действующий аргумент.&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"subtitle\"&gt;КВАЛИФИЦИРОВАННЫЙ ВЫБОР ПРИ ИСПОЛЬЗОВАНИИ ПРЕДЛОЖЕНИЙ&lt;/p&gt;&lt;p class=\"p\"&gt;Таблицы имеют тенденцию становиться очень большими, поскольку с течением времени, все большее и большее количество строк в нее добавляется. Поскольку обычно из них только определенные строки интересуют вас в данное время, SQL дает возможность вам устанавливать критерии чтобы определить какие строки будут выбраны для вывода.&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE - предложение команды SELECT, которое позволяет вам устанавливать предикаты, условие которых может быть или верным или неверным для любой строки таблицы. Команда извлекает только те строки из таблицы для которой такое утверждение верно. Например, предположим вы хотите видеть имена и комиссионные всех продавцов в Лондоне. Вы можете ввести такую команду:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT sname, city&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Salespeople;&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE city=\"LONDON\";&lt;/p&gt;&lt;p class=\"p\"&gt;Когда предложение WHERE представлено, программа базы данных просматривает всю таблицу по одной строке и исследует каждую строку чтобы определить верно ли утверждение. Следовательно, для записи Peel, программа рассмотрит текущее значение столбца city, определит что оно равно \"London\", и включит эту строку в вывод. Запись для Serres не будет включена, и так далее.&lt;/p&gt;&lt;p class=\"p\"&gt;Вывод для вышеупомянутого запроса показан в Таблице 3.6.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT sname, city FROM Salespeople WHERE city='London'&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;sname city&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Peel London&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Motika London&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Рисунок 3.6: SELECT c предложением WHERE&lt;/p&gt;&lt;p class=\"p\"&gt;Давайте попробуем пример с числовым полем в предложении WHERE. Поле rating таблицы Заказчиков предназначено чтобы разделять заказчиков на группы основанные на некоторых критериях которые могут быть получены в итоге через этот номер. Возможно это - форма оценки кредита или оценки основанной на томе предыдущих приобретений. Такие числовые коды могут быть полезны в реляционных базах данных как способ подведения итогов сложной информации. Мы можем выбрать всех заказчиков с рейтингом 100, следующим образом:&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;SELECT *&lt;/p&gt;&lt;p class=\"p\"&gt;FROM Customers&lt;/p&gt;&lt;p class=\"p\"&gt;WHERE rating=100;&lt;/p&gt;&lt;p class=\"p\"&gt;Одиночные кавычки не используются здесь потому, что оценка - это числовое поле. Результаты запроса показаны в Таблице 3.7.&lt;/p&gt;&lt;p class=\"p\"&gt;Предложение WHERE совместимо с предыдущим материалом в этой главе. Другими словами, вы можете использовать номера столбцов, устранять дубликаты, или переупорядочивать столбцы в команде SELECT которая использует WHERE. Однако, вы можете изменять порядок столбцов для имен только в предложении SELECT, но не в предложении WHERE.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;SQL Execution Log&lt;/p&gt;&lt;p class=\"p\"&gt;SELECT * FROM Customers WHERE rating=100;&lt;/p&gt;&lt;table class=\"table\"&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;сnum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;cname &lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;city &lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt; rating&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;&lt;strong&gt;snum&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2001&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Hoffman&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;100&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2006&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Clemens&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;London&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;100&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;2007&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Pereira&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;Rome&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;100&lt;/p&gt;&lt;/td&gt;\n&lt;td class=\"td\"&gt;&lt;p class=\"p\"&gt;1001&lt;/p&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;Рисунок 3.7: SELECT с числовым полем в предикате&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РЕЗЮМЕ&lt;/p&gt;&lt;p class=\"p\"&gt;Теперь вы знаете несколько способов заставить таблицу давать вам ту информацию какую вы хотите, а не просто выбрасывать наружу все ее содержание. Вы можете переупорядочивать столбцы таблицы или устранять любую из них. Вы можете решать, хотите вы видеть дублированные значения или нет.&lt;/p&gt;&lt;p class=\"p\"&gt;Наиболее важно то, что вы можете устанавливать условие называемое предикатом которое определяет или не определяет указанную строку таблицы из тысяч таких же строк, будет ли она выбрана для вывода.&lt;/p&gt;&lt;p class=\"p\"&gt;Предикаты могут становиться очень сложными, предоставляя вам высокую точность в решении, какие строки вам выбирать с помощью запроса. Именно эта способность решать точно, что вы хотите видеть, делает запросы SQL такими мощными. Следующие несколько глав будут посвещены, в большей мере, особенностям которые расширяют мощность предикатов. В Главе 4, вам будут представлены операторы иные чем те которые используются в условиях предиката, а также способы объединения многочисленых условий в единый предикат.&lt;/p&gt;&lt;p class=\"subtitle\"&gt;РАБОТА С SQL&lt;/p&gt;&lt;p class=\"empty-line\"/&gt;&lt;p class=\"p\"&gt;* Напишите команду SELECT которая бы вывела номер порядка, сумму, и дату для всех строк из таблицы Порядков.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который вывел бы все строки из таблицы Заказчиков для которых номер продавца=1001.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который вывел бы таблицу со столбцами в следующем порядке: city, sname, snum, comm.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите команду SELECT которая вывела бы оценку(rating), сопровождаемую именем каждого заказчика в San Jose.&lt;/p&gt;&lt;p class=\"p\"&gt;* Напишите запрос который вывел бы значения snum всех продавцов в текущем порядке из таблицы Порядков без каких бы то ни было повторений.&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</title></section></div>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow-y: auto !important; /* Fixed: Allow scrolling in chapters */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1>Модуль 3: Группировка и Агрегация</h1>\n    \n<section class=\"chapter-unit\" data-original-chapter=\"8\">\n\n<title>\n&lt;style&gt;.z {\n\tfont-family: 'Times New Roman', serif;\n\tmargin-right: 8pt;\n}\n\n.p {\n\tmargin: 0px;\n\ttext-align: justify;\n\ttext-indent: 1.5em;\n}\n\n.a {\n\tfont-size: 0.7em;\n\tline-height: 0.1;\n\tvertical-align: super;\n}\n\n.empty-line {\n\theight: 1em;\n\tmargin: 0px;\n}\n\n.title {\n\tfont-size: 1.8em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 0px;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: center;\n}\n\n.p1 {\n\tmargin: 0px 0px 0.5em 0px;\n\ttext-align: inherit;\n\ttext-indent: 0px;\n}\n\n.title1 {\n\tfont-size: 1.5em;\n\tfont-weight: bold;\n\tmargin: 1em 0px 0.5em 1.563em;\n\tpage-break-after: avoid;\n\tpage-break-inside: avoid;\n\ttext-align: left;\n}\n\n.code {\n\tfont-family: 'Courier New', monospace;\n}\n\n.table {\n\tborder: 1px solid black;\n\tborder-collapse: collapse;\n\tfont-family: Arial, sans-serif;\n\tfont-size: 0.8em;\n\tmargin: 0.5em;\n}\n\n.td {\n\tborder: 1px solid black;\n\tpadding: 0.3em;\n}\n\n.title2 {\n\tfont-size: 1.3em;\n\tfont-weight: bold;\n\
