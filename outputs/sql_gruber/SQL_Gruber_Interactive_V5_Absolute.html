<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --bg2: #0c1b35; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a; --bad: #ff8f8f; --fg: #eef5ff;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Segoe UI Variable", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #dce8f2 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));

}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ── Print styles ── */
/* Note: iframe content is NOT rendered by browser print.
   Use the 🖨 button in the toolbar — it opens a printable popup with images restored. */
@media print {
  .side, .top, .prog, .stars { display: none !important; }
  .app { display: block; }
  .main { display: block; }
  .frame { height: auto; }
  iframe { display: none; }
}

  <div class=\"vis-diag\">\n      <svg width=\"400\" height=\"200\" viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\">\n        <!-- Table -->\n        <rect x=\"10\" y=\"10\" width=\"380\" height=\"180\" rx=\"10\" fill=\"var(--bg-deep)\" stroke=\"var(--muted)\" stroke-width=\"2\"></rect>\n        <text x=\"20\" y=\"30\" font-weight=\"bold\" fill=\"var(--txt)\">Таблица (Table)</text>\n        \n        <!-- Column -->\n        <rect x=\"50\" y=\"50\" width=\"60\" height=\"120\" fill=\"var(--acc)\" stroke=\"var(--acc)\" stroke-width=\"2\" fill-opacity=\"0.3\"></rect>\n        <text x=\"50\" y=\"185\" font-size=\"12\" fill=\"var(--acc)\">Столбец</text>\n        \n        <!-- Row -->\n        <rect x=\"30\" y=\"80\" width=\"340\" height=\"30\" fill=\"var(--acc)\" stroke=\"var(--acc)\" stroke-width=\"2\" fill-opacity=\"0.5\"></rect>\n        <text x=\"310\" y=\"100\" font-size=\"12\" fill=\"var(--txt)\">Строка</text>\n      </svg>\n    </div>\n\n    <h2>Базовый синтаксис SELECT</h2>\n    <div class=\"card formula-card\">\nSELECT [DISTINCT] { * | column_list }\nFROM table_name\n[WHERE condition]\n[GROUP BY columns]\n[HAVING condition]\n[ORDER BY columns [ASC|DESC]];</div>\n\n    <h2>Типы данных</h2>\n    <div class=\"grid\">\n      <div class=\"type-item\">\n        <strong>Числовые</strong>\n        INTEGER (целые), DECIMAL (фиксированная точка), FLOAT (плавающая точка).\n      </div>\n      <div class=\"type-item\">\n        <strong>Символьные</strong>\n        CHARACTER (фиксированная длина), VARCHAR (переменная длина).\n      </div>\n      <div class=\"type-item\">\n        <strong>Временные</strong>\n        DATE (дата), TIME (время), TIMESTAMP (дата и время).\n      </div>\n    </div>\n\n    <h2>Создание таблиц (DDL)</h2>\n    <div class=\"card formula-card\">\nCREATE TABLE table_name (\n    column1 data_type PRIMARY KEY,\n    column2 data_type NOT NULL,\n    column3 data_type REFERENCES other_table(id)\n);</div>\n\n    <h2>Модификация данных (DML)</h2>\n    <div class=\"grid\">\n      <div class=\"card\">\n        <strong>INSERT</strong>\n        <code>INSERT INTO table VALUES (...);</code>\n      </div>\n      <div class=\"card\">\n        <strong>UPDATE</strong>\n        <code>UPDATE table SET col = val WHERE ...;</code>\n      </div>\n      <div class=\"card\">\n        <strong>DELETE</strong>\n        <code>DELETE FROM table WHERE ...;</code>\n      </div>\n    </div>\n  </div>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n<style>\r\n    :root {\r\n      --bg: #0f172a;\r\n      --bg-deep: #1e293b;\r\n      --bg-card: var(--bg-deep);\r\n      --txt: #f1f5f9;\r\n      --acc: #38bdf8;\r\n      --acc-soft: rgba(56, 189, 248, 0.1);\r\n      --border: var(--acc);\r\n      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);\r\n      --muted: #94a3b8;\r\n    }\r\n\r\n    body {\r\n      background-color: var(--bg);\r\n      color: var(--txt);\r\n      font-family: 'Inter', system-ui, -apple-system, sans-serif;\r\n      line-height: 1.6;\r\n      margin: 0;\r\n      padding: 2rem;\r\n      overflow-y: auto !important;\r\n      height: auto !important;\r\n      min-min-height: 100vh !important;\r\n      padding-bottom: 5rem !important;\r\n    }\r\n\r\n    .wrap { max-width: 900px; margin: 0 auto; }\r\n    \r\n    h1 { font-size: 2.5rem; font-weight: 800; color: var(--acc); margin-bottom: 0.5rem; }\r\n    .lead { font-size: 1.25rem; color: var(--muted) !important; margin-bottom: 3rem; font-style: italic; border-left: 4px solid var(--acc); padding-left: 1.5rem; }\r\n\r\n    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 2rem 0; }\r\n    \r\n    .card {\r\n      background: var(--bg-card);\r\n      border: 1px solid var(--border);\r\n      border-radius: 12px;\r\n      padding: 1.5rem;\r\n      box-shadow: var(--shadow);\r\n    }\r\n\r\n    .formula-card { \r\n      background: #020617 !important; \r\n      color: var(--acc) !important; \r\n      border: 1px solid var(--border) !important;\r\n      border-top: 4px solid var(--acc) !important; \r\n      position: relative; \r\n    }\r\n    \r\n    pre, code, .formula-card code { \r\n      display: block; \r\n      background: #020617 !important; \r\n      padding: 1rem; \r\n      border-radius: 6px; \r\n      color: var(--acc) !important; \r\n      border: 1px solid var(--border) !important;\r\n      margin-top: 1rem; \r\n      font-size: 0.95rem; \r\n    }\r\n    \r\n    code { display: inline; padding: 0.2rem 0.4rem; margin-top: 0; }\r\n\r\n    .vis-diag {\r\n      background: var(--bg-deep) !important;\r\n      border: 1px solid var(--border) !important;\r\n      border-radius: 16px;\r\n      padding: 2rem;\r\n      text-align: center;\r\n      margin: 2.5rem 0;\r\n    }\r\n\r\n    .badge-list { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }\r\n    .badge {\r\n      background: var(--acc-soft);\r\n      color: var(--acc);\r\n      border: 1px solid var(--acc);\r\n      padding: 0.4rem 1rem;\r\n      border-radius: 99px;\r\n      font-weight: 700;\r\n      font-family: monospace;\r\n    }\r\n\r\n    .comparison h3 { color: var(--acc); margin-top: 0; }\r\n    \r\n    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }\r\n    th { text-align: left; color: var(--muted); padding: 0.5rem; border-bottom: 2px solid var(--border); }\r\n    td { padding: 0.5rem; border-bottom: 1px solid var(--border); }\r\n    \r\n    strong { color: var(--acc); }\r\n  </style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1>Фильтрация и Сортировка</h1>\n    <p class=\"lead lead-para\">Точность данных — это не просто отсутствие ошибок, это умение отсекать лишнее. В SQL мастерство владения предложением WHERE определяет разницу между хаотичным дампом данных и хирургически точным отчетом.</p>\n\n    <section id=\"basics\">\n      <h2>Базовая фильтрация: WHERE</h2>\n      <p>Предложение <code>WHERE</code> позволяет устанавливать предикаты — логические условия, которые должны быть истинными для включения строки в результат.</p>\n      \n      <div class=\"card formula-card\">\n        <strong>Синтаксис выбора:</strong>\n        <code>SELECT column1, column2 FROM table_name WHERE condition;</code>\n      </div>\n    </section>\n\n    <section id=\"comparison\">\n      <h2>Сравнение инструментов: IN vs BETWEEN</h2>\n      <p>Выбор правильного оператора повышает читаемость кода и производительность запроса.</p>\n      \n      <div class=\"grid\">\n        <div class=\"card comparison\">\n          <h3>Оператор IN</h3>\n          <p>Идеален для поиска совпадений в дискретном наборе значений (списке).</p>\n          <code>WHERE city IN ('London', 'Barcelona', 'Rome')</code>\n        </div>\n        <div class=\"card comparison\">\n          <h3>Оператор BETWEEN</h3>\n          <p>Определяет непрерывный диапазон (включая границы).</p>\n          <code>WHERE amt BETWEEN 1000 AND 5000</code>\n        </div>\n      </div>\n    </section>\n\n    <section id=\"null-logic\">\n      <h2>Логика NULL: Территория неизвестного</h2>\n      <p>В SQL <code>NULL</code> — это не ноль и не пробел. Это отсутствие данных. Любое сравнение с NULL (кроме специальных операторов) дает результат <strong>UNKNOWN</strong>.</p>\n      \n      <div class=\"vis-diag\">\n        <div style=\"font-size: 1.5rem; margin-bottom: 1rem;\">Value ↔ NULL comparison</div>\n        <div style=\"display: flex; justify-content: space-around; align-items: center;\">\n          <div class=\"card\" style=\"width: 150px; background: var(--bg-deep);\">WHERE col = NULL<br><span style=\"color: #ef4444;\">❌ FALSE</span></div>\n          <div style=\"font-size: 2rem;\">➔</div>\n          <div class=\"card\" style=\"width: 150px; border-color: var(--acc); background: var(--bg-deep);\">WHERE col IS NULL<br><span style=\"color: var(--acc);\">✅ TRUE</span></div>\n        </div>\n        \n<blockquote class=\"insight\"><p>Точность данных — это не просто отсутствие ошибок, это умение отсекать лишнее.</p></blockquote>\n<p style=\"margin-top: 1.5rem; color: var(--muted);\">Всегда используйте <strong>IS NULL</strong> или <strong>IS NOT NULL</strong>.</p>\n      </div>\n    </section>\n\n    <section id=\"wildcards\">\n      <h2>Маски и шаблоны: LIKE</h2>\n      <p>Для поиска по неполным данным используются спецсимволы подстановки:</p>\n      \n      <div class=\"badge-list\">\n        <span class=\"badge\">% — любая последовательность (0+ символов)</span>\n        <span class=\"badge\">_ — ровно один любой символ</span>\n      </div>\n\n      <div class=\"card formula-card\">\n        <strong>Пример поиска по шаблону:</strong>\n        <p>Найти всех заказчиков, чьи имена начинаются на 'C' и содержат 's':</p>\n        <code>SELECT * FROM Customers WHERE cname LIKE 'C%s%';</code>\n      </div>\n    </section>\n\n    <section id=\"summary\">\n      <h2>Краткий справочник операторов</h2>\n      <div class=\"table-container\"><table class=\"table table-enhanced\">\n        <thead>\n          <tr>\n            <th>Оператор</th>\n            <th>Назначение</th>\n            <th>Пример</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr>\n            <td><strong>=, &lt;&gt;, &gt;, &lt;</strong></td>\n            <td>Базовое сравнение</td>\n            <td><code>rating &gt;= 200</code></td>\n          </tr>\n          <tr>\n            <td><strong>AND, OR, NOT</strong></td>\n            <td>Логические связки</td>\n            <td><code>city='London' AND rating&gt;100</code></td>\n          </tr>\n          <tr>\n            <td><strong>IN</strong></td>\n            <td>Проверка по списку</td>\n            <td><code>snum IN (1001, 1002, 1007)</code></td>\n          </tr>\n          <tr>\n            <td><strong>BETWEEN</strong></td>\n            <td>Диапазон значений</td>\n            <td><code>comm BETWEEN 0.10 AND 0.15</code></td>\n          </tr>\n          <tr>\n            <td><strong>LIKE</strong></td>\n            <td>Поиск по шаблону</td>\n            <td><code>sname LIKE 'P_e%'</code></td>\n          </tr>\n          <tr>\n            <td><strong>IS NULL</strong></td>\n            <td>Проверка на пустоту</td>\n            <td><code>amt IS NULL</code></td>\n          </tr>\n        </tbody>\n      </table></div>\n    </section>\n\n    <section id=\"sorting\" style=\"margin-top: 3rem;\">\n      <h2>Сортировка: ORDER BY</h2>\n      <p>Упорядочивание вывода — финальный штрих профессионального отчета.</p>\n      <div class=\"card formula-card\">\n        <code>SELECT * FROM Orders ORDER BY amt DESC, odate ASC;</code>\n        <p style=\"font-size: 0.85rem; margin-top: 0.5rem; color: var(--muted);\">DESC — по убыванию, ASC — по возрастанию (по умолчанию).</p>\n      </div>\n    </section>\n  </div>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n<style>\n    :root {\n      --bg: #0f172a;\n      --bg-deep: #1e293b;\n      --card-bg: var(--bg-deep);\n      --text: #f8fafc;\n      --acc: #38bdf8;\n      --accent: var(--acc);\n      --border: var(--acc);\n      --muted: #94a3b8;\n      --acc2: #10b981;\n      --acc3: #ef4444;\n    }\n    body {\n      background: var(--bg);\n      color: var(--text);\n      font-family: 'Inter', system-ui, -apple-system, sans-serif;\n      line-height: 1.6;\n      padding: 2rem;\n      margin: 0;\n      overflow-y: auto !important;\n      height: auto !important;\n      min-min-height: 100vh !important;\n      padding-bottom: 5rem !important;\n    }\n    .wrap {\n      max-width: 900px;\n      margin: 0 auto;\n    }\n    .module-title { color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }\n    \n    .formula-card, pre, code {\n      background: #020617 !important;\n      color: var(--accent) !important;\n      border: 1px solid var(--border) !important;\n    }\n\n    .formula-card {\n      border-left: 4px solid var(--accent) !important;\n      padding: 1rem;\n      margin: 1.5rem 0;\n      font-family: 'Fira Code', monospace;\n      font-size: 0.95rem;\n      border-radius: 4px;\n    }\n    \n    code { padding: 0.2rem 0.4rem; border-radius: 4px; }\n\n    .grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n      gap: 1rem;\n      margin: 2rem 0;\n    }\n    .grid-item {\n      background: var(--card-bg);\n      border: 1px solid var(--border);\n      padding: 1rem;\n      border-radius: 8px;\n    }\n    .grid-item h3 { margin-top: 0; color: var(--accent); }\n    \n    .vis-diag {\n      background: var(--bg-deep) !important;\n      border: 1px solid var(--border) !important;\n      border-radius: 12px;\n      padding: 2rem;\n      text-align: center;\n      margin: 2rem 0;\n    }\n    \n    .step-box {\n      display: inline-block;\n      padding: 0.5rem 1rem;\n      background: var(--accent);\n      color: var(--bg);\n      border-radius: 4px;\n      font-weight: bold;\n    }\n    .arrow { margin: 0 1rem; font-size: 1.5rem; color: var(--text); }\n    h2 { margin-top: 3rem; }\n    .lead { color: var(--muted) !important; }\n  </style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1 class=\"module-title\">Модуль 3: Агрегация и Группировка</h1>\n    \n    <p class=\"lead lead-para\">Агрегатные функции позволяют вычислять итоговые значения для групп строк, превращая массивы данных в конкретные бизнес-показатели.</p>\n\n    <div class=\"grid\">\n      <div class=\"grid-item\">\n        <h3>COUNT()</h3>\n        <p>Считает количество строк. <code>COUNT(*)</code> — все строки, <code>COUNT(col)</code> — не NULL.</p>\n      </div>\n      <div class=\"grid-item\">\n        <h3>SUM()</h3>\n        <p>Арифметическая сумма числовых значений в столбце.</p>\n      </div>\n      <div class=\"grid-item\">\n        <h3>AVG()</h3>\n        <p>Среднее арифметическое (только для чисел).</p>\n      </div>\n      <div class=\"grid-item\">\n        <h3>MIN / MAX</h3>\n        <p>Минимальное и максимальное значение (числа, даты, текст).</p>\n      </div>\n    </div>\n\n    <div class=\"formula-card\">\n      SELECT snum, COUNT(cnum), SUM(amt)<br>\n      FROM Orders<br>\n      GROUP BY snum;\n    </div>\n\n    <h2>Механика GROUP BY</h2>\n    <div class=\"vis-diag\">\n      <div class=\"step-box\">RAW DATA</div>\n      <span class=\"arrow\">➔</span>\n      <div class=\"step-box\" style=\"background: var(--acc2);\">GROUPING (by Key)</div>\n      <span class=\"arrow\">➔</span>\n      <div class=\"step-box\" style=\"background: var(--acc3);\">AGGREGATION (Math)</div>\n      <p style=\"margin-top:1rem; font-size: 0.9rem; color: var(--muted);\">\n        GROUP BY разделяет таблицу на виртуальные группы по указанному столбцу.\n      </p>\n    </div>\n\n    <h2>Фильтрация групп: HAVING</h2>\n    <p>В отличие от WHERE, который фильтрует строки <strong>до</strong> группировки, HAVING фильтрует уже готовые группы.</p>\n    \n    <div class=\"formula-card\">\n      SELECT city, AVG(rating)<br>\n      FROM Customers<br>\n      GROUP BY city<br>\n      HAVING AVG(rating) &gt; 200;\n    </div>\n\n    <h2>Ограничения</h2>\n    <div class=\"grid\">\n<div class=\"card\"><p>В SELECT нельзя мешать обычные столбцы и агрегаты (без GROUP BY).</p></div>\n<div class=\"card\"><p>Агрегатные функции (кроме COUNT) игнорируют NULL.</p></div>\n<div class=\"card\"><p>HAVING работает медленнее WHERE, используйте его только для условий по агрегатам.</p></div></div>\n  </div>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n<style>\n    :root {\n      --bg: #0f172a;\n      --bg-deep: #1e293b;\n      --card-bg: var(--bg-deep);\n      --text: #f8fafc;\n      --acc: #38bdf8;\n      --accent: var(--acc);\n      --secondary: #bb86fc;\n      --border: var(--acc);\n      --muted: #94a3b8;\n      --acc2: #ef4444;\n    }\n    body {\n      background: var(--bg);\n      color: var(--text);\n      font-family: 'Inter', system-ui, sans-serif;\n      line-height: 1.6;\n      padding: 2rem;\n      margin: 0;\n      overflow-y: auto !important;\n      height: auto !important;\n      min-min-height: 100vh !important;\n      padding-bottom: 5rem !important;\n    }\n    .wrap {\n      max-width: 900px;\n      margin: 0 auto;\n    }\n    .module-title { color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }\n    \n    .formula-card, pre, code {\n      background: #020617 !important;\n      color: var(--accent) !important;\n      border: 1px solid var(--border) !important;\n    }\n\n    .formula-card {\n      border-left: 4px solid var(--accent) !important;\n      padding: 1rem;\n      margin: 1.5rem 0;\n      font-family: 'Fira Code', monospace;\n      font-size: 0.95rem;\n      border-radius: 4px;\n    }\n    \n    code { padding: 2px 4px; border-radius: 3px; }\n\n    .vis-diag {\n      display: flex;\n      justify-content: space-around;\n      align-items: center;\n      background: var(--bg-deep) !important;\n      border: 1px solid var(--border) !important;\n      padding: 2rem;\n      border-radius: 12px;\n      margin: 2rem 0;\n    }\n    .venn-container { text-align: center; }\n    .venn-container svg { width: 150px; height: 100px; }\n    .matrix {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 1rem;\n      margin: 2rem 0;\n    }\n    .matrix-item {\n      background: var(--card-bg);\n      padding: 1rem;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n    }\n    .matrix-item h3 { margin-top: 0; color: var(--secondary); }\n    .complexity { font-weight: bold; color: var(--acc2); }\n    .lead { color: var(--muted) !important; }\n  </style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <h1 class=\"module-title\">Модуль 4: Связи и JOINs</h1>\n    \n    <p class=\"lead lead-para\">Реляционные БД хранят данные в разных таблицах. JOIN — это механизм их временного сшивания по ключу.</p>\n\n    <div class=\"vis-diag\">\n      <div class=\"venn-container\">\n        <h3>INNER JOIN</h3>\n        <svg viewBox=\"0 0 100 60\">\n          <circle cx=\"35\" cy=\"30\" r=\"25\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2\"></circle>\n          <circle cx=\"65\" cy=\"30\" r=\"25\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2\"></circle>\n          <clipPath id=\"inner\">\n            <circle cx=\"65\" cy=\"30\" r=\"25\"></circle>\n          </clipPath>\n          <circle cx=\"35\" cy=\"30\" r=\"25\" fill=\"var(--accent)\" clip-path=\"url(#inner)\"></circle>\n        </svg>\n        <p><small>Только пересечение</small></p>\n      </div>\n      <div class=\"venn-container\">\n        <h3>LEFT JOIN</h3>\n        <svg viewBox=\"0 0 100 60\">\n          <circle cx=\"35\" cy=\"30\" r=\"25\" fill=\"var(--secondary)\"></circle>\n          <circle cx=\"65\" cy=\"30\" r=\"25\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2\"></circle>\n          <clipPath id=\"left\">\n            <circle cx=\"65\" cy=\"30\" r=\"25\"></circle>\n          </clipPath>\n          <circle cx=\"35\" cy=\"30\" r=\"25\" fill=\"var(--secondary)\"></circle>\n          <circle cx=\"65\" cy=\"30\" r=\"25\" fill=\"var(--bg-deep)\" clip-path=\"url(#left)\"></circle>\n          <circle cx=\"65\" cy=\"30\" r=\"25\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2\"></circle>\n        </svg>\n        <p><small>Все левые + совпадения</small></p>\n      </div>\n    </div>\n\n    <div class=\"formula-card\">\n      SELECT c.cname, o.amt<br>\n      FROM Customers c<br>\n      INNER JOIN Orders o ON c.cnum = o.cnum;\n    </div>\n\n    <h2>Матрица сложности и типов</h2>\n    <div class=\"matrix\">\n      <div class=\"matrix-item\">\n        <h3>Self-Join</h3>\n        <p>Таблица связывается сама с собой через алиасы. Полезно для иерархий.</p>\n        <span class=\"complexity\">Сложность: Low</span>\n      </div>\n      <div class=\"matrix-item\">\n        <h3>Cross Join</h3>\n        \n<blockquote class=\"insight\"><p>Реляционные БД хранят данные в разных таблицах.</p></blockquote>\n<p>Декартово произведение (каждый с каждым). Редко нужно, вешает БД на больших данных.</p>\n        <span class=\"complexity\">Сложность: High (Load)</span>\n      </div>\n      <div class=\"matrix-item\">\n        <h3>Equi-Join</h3>\n        <p>Связь по строгому равенству <code>=</code>. Самый частый тип связи.</p>\n        <span class=\"complexity\">Сложность: Normal</span>\n      </div>\n      <div class=\"matrix-item\">\n        <h3>Non-Equi Join</h3>\n        <p>Связь по диапазонам <code>BETWEEN</code> или <code>&lt; / &gt;</code>. Поиск в интервалах.</p>\n        <span class=\"complexity\">Сложность: Normal</span>\n      </div>\n    </div>\n\n    <h2>Золотые правила</h2>\n    <div class=\"grid\">\n<div class=\"card\"><p>Всегда проверяйте ON-условие. Забытый ключ превращает JOIN в CROSS JOIN.</p></div>\n<div class=\"card\"><p>Используйте краткие алиасы (c для Customers, o для Orders).</p></div>\n<div class=\"card\"><p>LEFT JOIN возвращает NULL для правой таблицы, если совпадений нет.</p></div></div>\n  </div>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n<style>\r\n    :root { \r\n      --bg: #0f172a; \r\n      --bg-deep: #1e293b; \r\n      --txt: #f8fafc; \r\n      --acc: #38bdf8; \r\n      --acc-soft: rgba(56, 189, 248, 0.1);\r\n      --muted: #94a3b8;\r\n      --border: var(--acc);\r\n    }\r\n    body {\r\n      background-color: var(--bg);\r\n      color: var(--txt);\r\n      font-family: 'Inter', system-ui, sans-serif;\r\n      line-height: 1.6;\r\n      margin: 0;\r\n      padding: 2rem;\r\n      overflow-y: auto !important;\r\n      height: auto !important;\r\n      min-min-height: 100vh !important;\r\n      padding-bottom: 5rem !important;\r\n    }\r\n    .wrap { max-width: 900px; margin: 0 auto; }\r\n    .hero { margin-bottom: 3rem; }\r\n    .kicker { color: var(--acc); font-weight: bold; font-size: 0.8rem; letter-spacing: 0.1em; }\r\n    h1 { font-size: 2.5rem; margin-top: 0.5rem; color: var(--acc); }\r\n    .lead { font-size: 1.2rem; color: var(--muted) !important; }\r\n    \r\n    .vis-diag {\r\n      background: var(--bg-deep) !important;\r\n      border: 1px solid var(--border) !important;\r\n      padding: 2rem;\r\n      border-radius: 12px;\r\n      margin: 2rem 0;\r\n      text-align: center;\r\n    }\r\n    .caption { color: var(--muted); font-size: 0.9rem; margin-top: 1rem; }\r\n    \r\n    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin: 2rem 0; }\r\n    .card { background: var(--bg-deep); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; }\r\n    .card b { color: var(--acc); display: block; margin-bottom: 0.5rem; }\r\n    \r\n    .formula-card, pre, code {\r\n      background: #020617 !important;\r\n      color: var(--acc) !important;\r\n      border: 1px solid var(--border) !important;\r\n    }\r\n\r\n    .formula-card { \r\n      border-left: 4px solid var(--acc) !important; \r\n      padding: 1.5rem; \r\n      border-radius: 4px; \r\n      margin: 2rem 0; \r\n    }\r\n    .card-title { color: var(--acc); font-weight: bold; display: block; margin-bottom: 1rem; }\r\n    pre { margin: 0; }\r\n    code { font-family: 'Fira Code', monospace; padding: 0.2rem 0.4rem; border-radius: 4px; }\r\n    \r\n    .callout { background: var(--acc-soft); border: 1px solid var(--acc); padding: 1.5rem; border-radius: 8px; margin: 2rem 0; }\r\n    .callout b { color: var(--acc); }\r\n    \r\n    .badge-list { display: flex; gap: 1rem; flex-wrap: wrap; margin: 2rem 0; }\r\n    .badge { background: var(--bg-deep); border: 1px solid var(--acc); color: var(--acc); padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.9rem; }\r\n  </style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <section class=\"hero\">\n      <div class=\"kicker\">SQL MASTERCLASS • МОДУЛЬ 5</div>\n      <h1>Подзапросы и Объединения</h1>\n      <p class=\"lead lead-para\">Переход от простых запросов к сложным многомерным структурам. Использование результатов одного запроса для фильтрации другого.</p>\n    </section>\n\n    <div class=\"vis-diag\">\n      <svg viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x=\"50\" y=\"20\" width=\"300\" height=\"160\" rx=\"10\" fill=\"var(--bg-deep)\" stroke=\"var(--acc)\" stroke-width=\"2\"></rect>\n        <text x=\"70\" y=\"50\" fill=\"var(--acc)\">Внешний запрос (Outer Query)</text>\n        <rect x=\"100\" y=\"80\" width=\"200\" height=\"80\" rx=\"5\" fill=\"var(--acc-soft)\" stroke=\"var(--acc)\" stroke-width=\"1\" stroke-dasharray=\"5\"></rect>\n        <text x=\"120\" y=\"110\" fill=\"var(--txt)\" font-size=\"12\">Внутренний запрос (Subquery)</text>\n        <path d=\"M200,120 L200,60\" stroke=\"var(--acc)\" stroke-width=\"2\" marker-end=\"url(#arrow)\"></path>\n      </svg>\n      <div class=\"caption\">Архитектура подзапроса: Передача данных снизу вверх</div>\n    </div>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <b>ANY / SOME</b>\n        <p>Истинно, если хотя бы одно значение из подзапроса удовлетворяет условию.</p>\n      </div>\n      <div class=\"card\">\n        <b>ALL</b>\n        <p>Истинно только если ВСЕ значения из подзапроса удовлетворяют условию.</p>\n      </div>\n      <div class=\"card\">\n        <b>EXISTS</b>\n        <p>Проверяет само наличие строк, возвращаемых подзапросом, без сравнения значений.</p>\n      </div>\n    </div>\n\n    <div class=\"formula-card\">\n      <span class=\"card-title\">Пример подзапроса</span>\n      <pre><code>SELECT * FROM Customers \nWHERE snum IN (SELECT snum FROM Salespeople WHERE city = 'London');</code></pre>\n    </div>\n\n    <h2>Объединение UNION</h2>\n    <div class=\"callout\">\n      <b>ПРАВИЛО UNION:</b>\n      Количество и типы данных столбцов во всех объединяемых запросах должны совпадать. UNION по умолчанию удаляет дубликаты, UNION ALL сохраняет их.\n    </div>\n\n    <div class=\"badge-list\">\n      <span class=\"badge\">Совместимость столбцов</span>\n      <span class=\"badge\">Удаление дубликатов</span>\n      <span class=\"badge\">Сортировка через ORDER BY</span>\n    </div>\n\n    <div class=\"summary\">\n      <h3>ИТОГИ МОДУЛЯ</h3>\n      <div class=\"grid\">\n        <div class=\"card\"><b>Концепция</b><p>Подзапросы позволяют строить логику на основе динамических данных.</p></div>\n        <div class=\"card\"><b>UNION</b><p>Инструмент для слияния результатов разных таблиц в один поток.</p></div>\n      </div>\n    </div>\n  </div>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.p
