900\" fill=\"var(--acc)\">\n        (P + 4M + O) / 6\n      </text>\n      <text x=\"50\" y=\"90\" font-size=\"10\" fill=\"#64748b\">P: Pessimistic</text>\n      <text x=\"235\" y=\"90\" font-size=\"10\" fill=\"#64748b\">M: Most Likely</text>\n      <text x=\"400\" y=\"90\" font-size=\"10\" fill=\"#64748b\">O: Optimistic</text>\n    </svg>\n    <div class=\"figcaption\">Среднеожидаемая длительность (EAD). Обратите внимание на вес «вероятной» оценки — он в 4 раза выше.</div>\n  </div>\n\n  <h2>2. Критический путь (CPM)</h2>\n  <p>Проект заканчивается тогда, когда закончена самая длинная цепочка задач. Это и есть Критический Путь.</p>\n  \n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Тип задачи</th>\n          <th>Свойства</th>\n          <th>Действие ПМ-а</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>На КП</b></td>\n          <td>Резерв времени = 0. Любая задержка = задержка всего проекта.</td>\n          <td>Жесткий контроль, приоритет ресурсов.</td>\n        </tr>\n        <tr>\n          <td><b>Вне КП</b></td>\n          <td>Есть «люфт» (float). Можно задержать без вреда для дедлайна.</td>\n          <td>Источник ресурсов для задач на КП.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <h2>3. Диаграмма Ганта</h2>\n  <div class=\"figure\">\n    <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_78d09e4545_p041_i01.png\" alt=\"Диаграмма Ганта\" style=\"max-width: 600px; width: 100%;\">\n    <div class=\"figcaption\">Пример из книги: визуализация зависимостей и критического пути.</div>\n  </div>\n\n  <blockquote class=\"insight\">\n    <b>Закон Селиховкина:</b> ПМ управляет не задачами, а «запасом прочности» на критическом пути.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n/* ── OS Preference Fallback ── */\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg:    #f0f4f8;\n    --bg2:   #e8eef5;\n    --panel: #dce8f2;\n    --panel2:#ccdeed;\n    --line:  #b0c8e0;\n    --txt:   #1a2535;\n    --muted: #4a6580;\n    --acc:   #1a7fc4;\n    --acc2:  #158060;\n    --warn:  #a06800;\n    --bad:   #c03030;\n    --fg:    #1a2535;\n  }\n  :root:not([data-theme=\"dark\"]) body {\n    background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n  }\n  :root:not([data-theme=\"dark\"]) .hero {\n    background: rgba(176,200,224,.3);\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, #152847 42%, #081423 76%);\n  color: muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 9</div>\n  <h1>Стоимость: Бюджет и Контроль</h1>\n  <p class=\"lead lead-para\">ПМ не просто «тратит деньги» — он управляет финансовым риском. Если вы вышли за бюджет без согласования — это провал.</p>\n\n  <h2>1. Из чего состоит цена проекта?</h2>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Статья</th>\n          <th>Что входит</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>Прямые затраты</b></td>\n          <td>Зарплата разработчиков, лицензии, «железо».</td>\n        </tr>\n        <tr>\n          <td><b>Косвенные затраты</b></td>\n          <td>Аренда офиса, работа HR, бухгалтерии, кофе.</td>\n        </tr>\n        <tr>\n          <td><b>Резервы</b></td>\n          <td>Деньги на риски и непредвиденные изменения.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <h2>2. Базовый план (Cost Baseline)</h2>\n  <div class=\"callout\">\n    Базовый план по стоимости — это распределенный во времени бюджет. Его обычно рисуют в виде <b>S-кривой</b>. В начале проекта тратим мало, в середине — пик, в конце — хвост.\n  </div>\n\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background: white; border-radius: 8px;\">\n      <!-- S-Curve Graph -->\n      <path d=\"M50 150 Q 150 150, 200 100 T 350 50\" fill=\"none\" stroke=\"var(--acc)\" stroke-width=\"3\"></path>\n      <line x1=\"50\" y1=\"150\" x2=\"350\" y2=\"150\" stroke=\"#cbd5e1\" stroke-width=\"2\"></line>\n      <line x1=\"50\" y1=\"150\" x2=\"50\" y2=\"30\" stroke=\"#cbd5e1\" stroke-width=\"2\"></line>\n      <text x=\"350\" y=\"170\" text-anchor=\"middle\" font-size=\"10\">ВРЕМЯ</text>\n      <text x=\"30\" y=\"30\" text-anchor=\"middle\" font-size=\"10\" transform=\"rotate(-90 30 30)\">ДЕНЬГИ</text>\n    </svg>\n    <div class=\"figcaption\">S-кривая: накопленные затраты проекта.</div>\n  </div>\n\n  <h2>3. Контроль: Освоенный объем (EVM)</h2>\n  <p>Краткая суть: ПМ должен знать не сколько он <i>потратил</i>, а какую <i>ценность</i> он создал на эти деньги.</p>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;\">\n    <div class=\"card\"><b>CPI &gt; 1</b> <p>Экономим. Работаем эффективнее, чем планировали.</p></div>\n    <div class=\"card\"><b>CPI &lt; 1</b> <p>Тратим лишнее. Нужно искать «дыры» в процессах.</p></div>\n  </div>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.5); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Translator / Concept Map ── */\n.translator {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  margin: 24px 0;\n}\n.translator-from,\n.translator-to {\n  padding: 16px 20px;\n}\n.translator-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 10</div>\n  <h1>Люди и Связи</h1>\n  <p class=\"lead lead-para\">ПМ тратит 90% времени на коммуникации. Если вы не говорите с людьми — вы не управляете.</p>\n\n  <h2>1. Формула каналов связи</h2>\n  <div class=\"callout\" style=\"text-align: center;\">\n    <span style=\"font-size: 2rem; font-weight: 900; color: var(--acc);\">N(N - 1) / 2</span>\n    <p>Где N — количество человек в команде.</p>\n  </div>\n  \n  <div class=\"grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;\">\n    <div class=\"card\"><b>5 человек</b> <p>10 каналов связи. Легко контролировать.</p></div>\n    <div class=\"card\" style=\"border-left: 4px solid #ef4444;\"><b>10 человек</b> <p>45 каналов! В 4.5 раза сложнее управлять.</p></div>\n  </div>\n\n  <h2>2. Матрица Стейкхолдеров</h2>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Сила / Интерес</th>\n          <th>Высокий интерес</th>\n          <th>Низкий интерес</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>Высокая власть</b></td>\n          <td style=\"background: #dcfce7;\"><b>Управлять плотно</b> (<a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсор</a>)</td>\n          <td><b>Удовлетворять</b> (Гос. органы)</td>\n        </tr>\n        <tr>\n          <td><b>Низкая власть</b></td>\n          <td><b>Информировать</b> (Пользователи)</td>\n          <td><b>Мониторить</b> (СМИ)</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <blockquote class=\"insight\">\n    <b>Правило:</b> Не все стейкхолдеры одинаково полезны. Тратьте время только на тех, кто может «убить» ваш проект или дать ему ресурсы.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta cha -osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n[data-theme=\"light\"] body {\n  background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n}\n\n/* ── Layout ── */\n.wrap {\n  max-width: 900px;\n  margin: 0 auto;\n  padding: 26px 20px 80px;\n}\n\n/* ── Hero ── */\n.hero {\n  padding: 40px 28px;\n  border-bottom: 1px solid var(--line);\n  background: rgba(15,31,56,.4);\n  margin-bottom: 32px;\n  text-align: center;\n}\n[data-theme=\"light\"] .hero {\n  background: rgba(176,200,224,.3);\n}\n.kicker { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--acc); margin-bottom: 8px; font-weight: 700; }\nh1 { margin: 8px 0 0; font-size: clamp(24px, 5vw, 42px); line-height: 1.2; color: var(--txt); }\n\n/* ── Typography ── */\np { margin-bottom: 1.2em; max-width: 75ch; }\np.lead { font-size: 1.15rem; color: var(--muted); margin-top: 12px; }\nh2 { color: var(--acc); margin-top: 40px; }\nh3 { color: var(--acc2); margin-top: 30px; }\n\n/* ── Glossary Links ── */\n.term-link {\n  color: var(--acc);\n  text-decoration: none;\n  border-bottom: 1px dashed rgba(114,216,255,.4);\n  transition: .2s;\n}\n.term-link:hover { border-bottom-style: solid; background: rgba(114,216,255,.1); }\n\n/* ── SVG Diagrams ── */\n.vis-diag, .vis-network {\n  margin: 32px auto;\n  padding: 24px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  max-width: 640px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg, .vis-network svg { width: 100%; height: auto; display: block; }\n.caption { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; }\n.diag-highlight { stroke: var(--bad); stroke-width: 3; }\n\n/* ── Table (RACI etc) ── */\n.matrix {\n  overflow-x: auto;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  margin: 24px 0;\n}\ntable { width: 100%; border-collapse: collapse; background: rgba(15,31,56,.6); }\n[data-theme=\"light\"] table { background: rgba(220,232,242,.5); }\nth, td { padding: 12px 15px; border: 1px solid var(--line); text-align: left; }\nth { background: var(--panel2); color: var(--acc); font-size: 12px; text-transform: uppercase; }\n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.5); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Translator / Concept Map ── */\n.translator {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  margin: 24px 0;\n}\n.translator-from,\n.translator-to {\n  padding: 16px 20px;\n}\n.translator-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n<style>\n      .risk-grid { display: grid; grid-template-columns: 60px repeat(3, 1fr); gap: 4px; margin: 2rem 0; }\n      .risk-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; color: white; border-radius: 4px; text-align: center; padding: 4px; }\n      .risk-label { display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #64748b; }\n      .low { background: #10b981; } .med { background: #f59e0b; } .high { background: #ef4444; }\n    </style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 11</div>\n  <h1>Управление рисками: План Б</h1>\n  <p class=\"lead lead-para\">Риск — это не проблема. Проблема — это риск, который уже произошел. ПМ работает с будущим, чтобы оно не ударило по настоящему.</p>\n\n  <h2>1. Матрица рисков (Heatmap)</h2>\n  <p>Мы оцениваем риски по двум осям: как сильно он ударит и насколько он вероятен.</p>\n  \n  <div class=\"risk-grid\">\n    <div></div><div class=\"risk-label\">Малое</div><div class=\"risk-label\">Среднее</div><div class=\"risk-label\">Сильное</div>\n    <div class=\"risk-label\">Высок.</div><div class=\"risk-cell med\">Мониторинг</div><div class=\"risk-cell high\">План А!</div><div class=\"risk-cell high\">КРИТИЧНО</div>\n    <div class=\"risk-label\">Средн.</div><div class=\"risk-cell low\">Забить</div><div class=\"risk-cell med\">Контроль</div><div class=\"risk-cell high\">План Б</div>\n    <div class=\"risk-label\">Низк.</div><div class=\"risk-cell low\">Игнор</div><div class=\"risk-cell low\">Игнор</div><div class=\"risk-cell med\">Резерв</div>\n  </div>\n\n  <h2>2. Стратегии реагирования</h2>\n  <div class=\"accordion-group\">\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Уклонение (Avoid)</summary>\n      <div class=\"accordion-content\">Мы меняем план, чтобы риск стал невозможен. <i>Пример: Отказ от использования нестабильной библиотеки.</i></div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Минимизация (Mitigate)</summary>\n      <div class=\"accordion-content\">Снижаем вероятность или влияние. <i>Пример: Проведение обучения для команды перед внедрением новой технологии.</i></div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Перенос (Transfer)</summary>\n      <div class=\"accordion-content\">Отдаем риск кому-то другому. <i>Пример: Аутсорс разработки сложного модуля с фиксированной ценой (Fixed Price).</i></div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Принятие (Accept)</summary>\n      <div class=\"accordion-content\">Мы согласны на риск, но создаем денежный резерв. <i>Пример: «Если сервер упадет — мы купим новый из резервного фонда».</i></div>\n    </details>\n  </div>\n\n  <h2>3. Резервы</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side\">\n      <div class=\"comp-head\">ТЕХНИЧЕСКИЙ (Contingency)</div>\n      <p>Для \"известных неизвестных\". Входит в базовый план. Распоряжается ПМ.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">УПРАВЛЕНЧЕСКИЙ (Management)</div>\n      <p>Для форс-мажоров. НЕ входит в план ПМ-а. Распоряжается <a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсор</a>.</p>\n    </div>\n  </div>\n\n  <blockquote class=\"insight\">\n    <b>Инсайт:</b> Профессиональный ПМ на вопрос «Когда закончите?» всегда дает две даты: оптимистичную и дату с учетом рисков.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n/* ── OS Preference Fallback ── */\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg:    #f0f4f8;\n    --bg2:   #e8eef5;\n    --panel: #dce8f2;\n    --panel2:#ccdeed;\n    --line:  #b0c8e0;\n    --txt:   #1a2535;\n    --muted: #4a6580;\n    --acc:   #1a7fc4;\n    --acc2:  #158060;\n    --warn:  #a06800;\n    --bad:   #c03030;\n    --fg:    #1a2535;\n  }\n  :root:not([data-theme=\"dark\"]) body {\n    background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n  }\n  :root:not([data-theme=\"dark\"]) .hero {\n    background: rgba(176,200,224,.3);\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: r e: 12px; color: var(--muted); font-style: italic; text-align: center; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; }\n.diag-highlight { stroke: var(--bad); stroke-width: 3; }\n\n/* ── Table (RACI etc) ── */\n.matrix {\n  overflow-x: auto;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  margin: 24px 0;\n}\ntable { width: 100%; border-collapse: collapse; background: rgba(15,31,56,.6); }\n[data-theme=\"light\"] table { background: rgba(220,232,242,.5); }\nth, td { padding: 12px 15px; border: 1px solid var(--line); text-align: left; }\nth { background: var(--panel2); color: var(--acc); font-size: 12px; text-transform: uppercase; }\n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.5); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Translator / Concept Map ── */\n.translator {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  margin: 24px 0;\n}\n.translator-from,\n.translator-to {\n  padding: 16px 20px;\n}\n.translator-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 12</div>\n  <h1>Качество: Не только баги</h1>\n  <p class=\"lead lead-para\">Качество — это соответствие результата требованиям. Если вы сделали \"Мерседес\" там, где просили \"Запорожец\" — это низкое качество управления.</p>\n\n  <h2>1. QA vs QC</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side\">\n      <div class=\"comp-head\">QA (Assurance)</div>\n      <p><b>Процесс.</b> Предотвращение ошибок. Например, код-ревью или CI/CD.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">QC (Control)</div>\n      <p><b>Результат.</b> Поиск ошибок. Тестирование готового билда.</p>\n    </div>\n  </div>\n\n  <h2>2. Стоимость качества</h2>\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 500 150\" xmlns=\"http://www.w3.org/2000/svg\">\n      <path d=\"M50 130 L450 130\" stroke=\"#cbd5e1\" stroke-width=\"2\"></path>\n      <path d=\"M50 130 Q 150 120, 250 80 T 450 20\" fill=\"none\" stroke=\"#ef4444\" stroke-width=\"3\"></path>\n      <text x=\"70\" y=\"145\" font-size=\"10\">Требования</text>\n      <text x=\"250\" y=\"145\" font-size=\"10\">Разработка</text>\n      <text x=\"430\" y=\"145\" font-size=\"10\">Прод</text>\n      <text x=\"300\" y=\"50\" fill=\"#ef4444\" font-weight=\"bold\">ЦЕНА ОШИБКИ ↑</text>\n    </svg>\n    <div class=\"figcaption\">Чем позже найден баг, тем дороже его исправление.</div>\n  </div>\n\n  <blockquote class=\"insight\">\n    <b>Gold Plating (Позолота):</b> Избегайте добавления фич «от себя», которые не просил заказчик. Это трата ресурсов и риск снижения качества.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n/* ── OS Preference Fallback ── */\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg:    #f0f4f8;\n    --bg2:   #e8eef5;\n    --panel: #dce8f2;\n    --panel2:#ccdeed;\n    --line:  #b0c8e0;\n    --txt:   #1a2535;\n    --muted: #4a6580;\n    --acc:   #1a7fc4;\n    --acc2:  #158060;\n    --warn:  #a06800;\n    --bad:   #c03030;\n    --fg:    #1a2535;\n  }\n  :root:not([data-theme=\"dark\"]) body {\n    backgro le-container\">\n    <table>\n      <thead>\n        <tr><th>Для Клиента</th><th>Для ПМ-а</th></tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>Подписанный Акт сдачи-приемки. Передача в поддержку.</td>\n          <td>Высвобождение команды. Сбор \"Извлеченных уроков\" (Lessons Learned). Обновление шаблонов.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the
