<!DOCTYPE html>
<html lang="ru" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' data:; img-src 'self' data:; object-src 'none'; connect-src 'none'">
<title>Управление ИТ-проектом (Director's Cut V4)</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --bg2: #0c1b35; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a; --bad: #ff8f8f; --fg: #eef5ff;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Segoe UI Variable", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #dce8f2 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ── Print styles ── */
/* Note: iframe content is NOT rendered by browser print.
   Use the 🖨 button in the toolbar — it opens a printable popup with images restored. */
@media print {
  .side, .top, .prog, .stars { display: none !important; }
  .app { display: block; }
  .main { display: block; }
  .frame { height: auto; }
  iframe { display: none; }
}
</style>

-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; }\n.diag-highlight { stroke: var(--bad); stroke-width: 3; }\n\n/* ── Table (RACI etc) ── */\n.matrix {\n  overflow-x: auto;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  margin: 24px 0;\n}\ntable { width: 100%; border-collapse: collapse; background: rgba(15,31,56,.6); }\n[data-theme=\"light\"] table { background: rgba(220,232,242,.5); }\nth, td { padding: 12px 15px; border: 1px solid var(--line); text-align: left; }\nth { background: var(--panel2); color: var(--acc); font-size: 12px; text-transform: uppercase; }\n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.5); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Translator / Concept Map ── */\n.translator {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  margin: 24px 0;\n}\n.translator-from,\n.translator-to {\n  padding: 16px 20px;\n}\n.translator-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">ИТ-Проекты • Глава 1</div>\n  <h1>О чем эта книга?</h1>\n  <p class=\"lead lead-para\">Это «краткий курс выживания» для тех, кто столкнулся с управлением проектами в ИТ и не хочет утонуть в бюрократии.</p>\n\n  <div class=\"callout\">\n    \"Книга написана на языке здравого смысла. Мы адаптируем PMBoK под реальную жизнь ПМ-а.\"\n  </div>\n\n  <h2>Кому это нужно?</h2>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin: 3rem 0;\">\n    <div class=\"card\" style=\"background: white; padding: 2rem; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border);\">\n      <h3 style=\"color: var(--acc); margin-top: 0;\">Новичкам</h3>\n      <p>Пошаговый план: как зайти в проект, не совершив фатальных ошибок на старте.</p>\n    </div>\n    <div class=\"card\" style=\"background: white; padding: 2rem; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border);\">\n      <h3 style=\"color: var(--acc); margin-top: 0;\">Опытным</h3>\n      <p>Структурирование хаоса и переход от «интуитивного менеджмента» к системному.</p>\n    </div>\n  </div>\n\n  <blockquote class=\"insight\" style=\"font-style: italic; border-left: 4px solid var(--acc); padding-left: 2rem; margin: 3rem 0; font-size: 1.1rem; color: #475569;\">\n    Эта книга читается за один вечер, но экономит годы набивания шишек.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n/* ── OS Preference Fallback ── */\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg:    #f0f4f8;\n    --bg2:   #e8eef5;\n    --panel: #dce8f2;\n    --panel2:#ccdeed;\n    --line:  #b0c8e0;\n    --txt:   #1a2535;\n    --muted: #4a6580;\n    --acc:   #1a7fc4;\n    --acc2:  #158060;\n    --warn:  #a06800;\n    --bad:   #c03030;\n    --fg:    #1a2535;\n  }\n  :root:not([data-theme=\"dark\"]) body {\n    background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e4ecf5 42%, #f0f4f8 76%);\n  }\n  :root:not([data-theme=\"dark\"]) .hero {\n    background: rgba(176,200,224,.3);\n  }\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);\n  background: radial-gradient(circle at 15% -20%, #2b5c9f 0, etter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin t.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580 ize: clamp(24px, 5vw, 42px); line-height: 1.2; color: var(--txt); }\n\n/* ── Typography ── */\np { margin-bottom: 1.2em; max-width: 75ch; }\np.lead { font-size: 1.15rem; color: var(--muted); margin-top: 12px; }\nh2 { color: var(--acc); margin-top: 40px; }\nh3 { color: var(--acc2); margin-top: 30px; }\n\n/* ── Glossary Links ── */\n.term-link {\n  color: var(--acc);\n  text-decoration: none;\n  border-bottom: 1px dashed rgba(114,216,255,.4);\n  transition: .2s;\n}\n.term-link:hover { border-bottom-style: solid; background: rgba(114,216,255,.1); }\n\n/* ── SVG Diagrams ── */\n.vis-diag, .vis-network {\n  margin: 32px auto;\n  padding: 24px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  max-width: 640px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n.vis-diag svg, .vis-network svg { width: 100%; height: auto; display: block; }\n.caption { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; }\n\n.diag-node { fill: var(--panel); stroke: var(--acc); stroke-width: 2; }\n.diag-text { fill: var(--txt); font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }\n.diag-link { stroke: var(--line); stroke-width: 2; fill: none; }\n.diag-highlight { stroke: var(--bad); stroke-width: 3; }\n\n/* ── Table (RACI etc) ── */\n.matrix {\n  overflow-x: auto;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  margin: 24px 0;\n}\ntable { width: 100%; border-collapse: collapse; background: rgba(15,31,56,.6); }\n[data-theme=\"light\"] table { background: rgba(220,232,242,.5); }\nth, td { padding: 12px 15px; border: 1px solid var(--line); text-align: left; }\nth { background: var(--panel2); color: var(--acc); font-size: 12px; text-transform: uppercase; }\n\n/* ── Stats ── */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.5); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Translator / Concept Map ── */\n.translator {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  margin: 24px 0;\n}\n.translator-from,\n.translator-to {\n  padding: 16px 20px;\n}\n.translator-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 5</div>\n  <h1>Приступаем к планированию</h1>\n  <p class=\"lead lead-para\">Планирование — это не создание документа, а процесс обдумывания будущего. План нужен, чтобы знать, когда мы сбились с пути.</p>\n\n  <h2>1. Философия планирования</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side\">\n      <div class=\"comp-head\">ОШИБКА</div>\n      <p>План — это клятва. Мы должны выполнить его любой ценой, иначе мы плохие менеджеры.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">ПРАВДА</div>\n      <p>План — это прогноз. Он будет меняться. ПМ управляет отклонениями от этого прогноза.</p>\n    </div>\n  </div>\n\n  <h2>2. Алгоритм планирования (Поток)</h2>\n  <p>Планирование идет строго последовательно. Вы не можете оценить сроки, пока не знаете объем работ.</p>\n  \n  <div class=\"accordion-group\">\n    <details class=\"accordion\" open=\"\">\n      <summary class=\"accordion-summary\">Шаг 1. Содержание (Scope)</summary>\n      <div class=\"accordion-content\">Что именно мы делаем? Декомпозиция до пакетов работ (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">WBS</a>).</div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Шаг 2. Ресурсы (Resources)</summary>\n      <div class=\"accordion-content\">Кто это будет делать? Внутренняя команда или аутсорс?</div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Шаг 3. Время и Стоимость (Schedule &amp; Cost)</summary>\n      <div class=\"accordion-content\">Оценка трудозатрат, <a href=\"#\" class=\"term-link\" data-term=\"term-pert\">PERT</a> и критический путь.</div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Шаг 4. Риски и Качество (Risk &amp; Quality)</summary>\n      <div class=\"accordion-content\">Что может пойти не так и как мы это проверим?</div>\n    </details>\n  </div>\n\n  <h2>3. Метод набегающей волны (Rolling Wave)</h2>\n  <div class=\"callout\">\n    В ИТ невозможно спланировать всё сразу на год вперед. Мы планируем ближайший этап (2-4 недели) детально, а остальное — крупными мазками. По мере приближения к этапу мы \"раскрываем\" его детали.\n  </div>\n\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 500 150\" xmlns=\"http://w rm-link\" data-term=\"term-wbs\">ИСР</a></h1>\n  <p class=\"lead lead-para\">Самая важная часть планирования. Если работы нет в Иерархической Структуре Работ (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a>) — она не входит в проект и за неё не заплатят.</p>\n\n  <div class=\"callout\">\n    <b>Правило 100%:</b> <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> должна содержать 100% работ проекта. Ничего лишнего, но и ничего не пропущено.\n  </div>\n\n  <h2>1. Что такое <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">WBS</a>)?</h2>\n  <p>Это графическое представление декомпозиции проекта. Мы разбиваем большую задачу на мелкие «пакеты работ», которые можно оценить по времени и деньгам.</p>\n  \n  <div class=\"figure\">\n    <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_53e802764d_p037_i01.png\" alt=\"WBS Пример 1\" style=\"max-width: 400px; margin-bottom: 1rem;\">\n    <div class=\"figcaption\">Рис. 6.1. Пример классической древовидной декомпозиции из оригинального PDF.</div>\n  </div>\n\n  <h2>2. Правила декомпозиции</h2>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin: 2rem 0;\">\n    <div class=\"card\" style=\"border-left: 5px solid var(--acc);\">\n      <b>Правило 8/80</b>\n      <p>Нижний уровень (пакет работ) не должен быть короче 8 часов и длиннее 80 часов трудозатрат.</p>\n    </div>\n    <div class=\"card\" style=\"border-left: 5px solid var(--acc);\">\n      <b>Результативность</b>\n      <p>Каждый узел <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> должен иметь понятный результат (deliverable), а не просто процесс \"делание чего-то\".</p>\n    </div>\n  </div>\n\n  <h2>3. Словарь <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a></h2>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>ID</th>\n          <th>Название</th>\n          <th>Результат</th>\n          <th>Критерий приемки</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>1.1</td>\n          <td>Дизайн-макет</td>\n          <td>Figma-файл</td>\n          <td>Подпись <a href=\"#\" class=\"term-link\" data-term=\"term-customer\">Заказчика</a> и <a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсора</a>.</td>\n        </tr>\n        <tr>\n          <td>1.2</td>\n          <td>Верстка Shell</td>\n          <td>HTML/CSS код</td>\n          <td>Прохождение тестов производительности.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <blockquote class=\"insight\">\n    Помните: <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> — это дерево РЕЗУЛЬТАТОВ, а не дерево действий. Используйте существительные, а не глаголы.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --pane gap: 16px;\n  margin: 24px 0;\n}\n.stat { padding: 16px; border: 1px solid var(--line); border-radius: 12px; text-align: center; background: rgba(15,31,56,.4); }\n[data-theme=\"light\"] .stat { background: rgba(220,232,242,.5); }\n.stat-num { display: block; font-size: 24px; font-weight: 900; color: var(--acc); }\n.stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }\n\n/* ── Translator / Concept Map ── */\n.translator {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  margin: 24px 0;\n}\n.translator-from,\n.translator-to {\n  padding: 16px 20px;\n}\n.translator-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left: 24px; position: relative; }\n.tl-step { position: relative; margin-bottom: 24px; }\n.tl-num { position: absolute; left: -33px; top: 0; width: 18px; height: 18px; background: var(--acc); color: var(--bg); border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }\n\n/* ── Insights ── */\nblockquote.insight {\n  margin: 32px 0;\n  padding: 20px 24px;\n  border-left: 4px solid var(--acc);\n  background: rgba(114,216,255,.05);\n  font-style: italic;\n  font-size: 1.1rem;\n}\n[data-theme=\"light\"] blockquote.insight { background: rgba(26,127,196,.06); }\n\n/* ── Badges ── */\n.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--line); margin-right: 4px; }\n.badge.warn { border-color: var(--warn); color: var(--warn); }\n.badge.bad { border-color: var(--bad); color: var(--bad); }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 7</div>\n  <h1>Команда и ресурсы</h1>\n  <p class=\"lead lead-para\">Проекты делают люди. Ваша задача как ПМ-а — собрать команду и договориться о «правилах аренды» ресурсов.</p>\n\n  <h2>1. Типы организационных структур</h2>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Структура</th>\n          <th>Власть ПМ-а</th>\n          <th>Плюсы / Минусы</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>Функциональная</b></td>\n          <td>Почти нет</td>\n          <td>Люди сидят в своих отделах. ПМ — просто координатор.</td>\n        </tr>\n        <tr>\n          <td><b>Матричная</b></td>\n          <td>Средняя</td>\n          <td>Двойное подчинение. Конфликты за людей — ваша рутина.</td>\n        </tr>\n        <tr>\n          <td><b>Проектная</b></td>\n          <td>Полная</td>\n          <td>Команда подчиняется только вам. Максимальная эффективность.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <h2>2. RACI-матрица (Кто за что?)</h2>\n  <div class=\"callout\">\n    Чтобы команда не превратилась в лебедя, рака и щуку, используйте RACI:\n  </div>\n  \n  <div class=\"grid\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 2rem 0;\">\n    <div class=\"card\" style=\"border-bottom: 3px solid #3b82f6;\"><b>Responsible</b> <p>Исполнитель задачи.</p></div>\n    <div class=\"card\" style=\"border-bottom: 3px solid #10b981;\"><b>Accountable</b> <p>Ответственный за успех (только ОДИН человек).</p></div>\n    <div class=\"card\" style=\"border-bottom: 3px solid #f59e0b;\"><b>Consulted</b> <p>Эксперт, дает советы.</p></div>\n    <div class=\"card\" style=\"border-bottom: 3px solid #64748b;\"><b>Informed</b> <p>Получает отчет о результате.</p></div>\n  </div>\n\n  <h2>3. Делать или Покупать? (Make-or-Buy)</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side\">\n      <div class=\"comp-head\">ИНХАУС (MAKE)</div>\n      <p>Сохранение экспертизы внутри. Дешевле в долгосроке. Труднее масштабировать быстро.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">АУТСОРС (BUY)</div>\n      <p>Быстрый старт. Риски на подрядчике. Дороже. Есть риск утечки знаний.</p>\n    </div>\n  </div>\n\n  <blockquote class=\"insight\">\n    Главный грех ПМ-а — назначать ответственность \"на отдел\". Ответственным (Accountable) всегда должен быть конкретный человек с именем и фамилией.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/*\n  HTML Book Bundler v8.3 — Ultimate Theme\n  Shared Styles for all chapters.\n*/\n\n/* ── Dark theme (default) ── */\n:root {\n  --bg:    #081423;\n  --bg2:   #0c1b35;\n  --panel: #0f1f38;\n  --panel2:#163056;\n  --line:  #395f9d;\n  --txt:   #eef5ff;\n  --muted: #adc2e1;\n  --acc:   #72d8ff;\n  --acc2:  #87efc9;\n  --warn:  #ffd18a;\n  --bad:   #ff8f8f;\n  --fg:    #eef5ff;\n}\n\n/* ── Light theme ── */\n[data-theme=\"light\"] {\n  --bg:    #f0f4f8;\n  --bg2:   #e8eef5;\n  --panel: #dce8f2;\n  --panel2:#ccdeed;\n  --line:  #b0c8e0;\n  --txt:   #1a2535;\n  --muted: #4a6580;\n  --acc:   #1a7fc4;\n  --acc2:  #158060;\n  --warn:  #a06800;\n  --bad:   #c03030;\n  --fg:    #1a2535;\n}\n\n/* ── OS Preference Fallback ── */\n@media (prefers-color-scheme: light) {\n  :root:not([data-theme=\"dark\"]) {\n    --bg:    #f0f4f8;\n    --bg2:   #e8eef5;\n    --panel: #dce8f2;\n    --panel2:#ccdeed;\n    --line:  #b0c8e0;\n    --txt:   #1a2535;\n    --muted: #4a6580;\n    --acc:   #1a7fc4;\n    --acc2:  #158060;\n    --warn:  #a06800;\n    --bad:   #c03030;\n    --fg:    #1a2535;\n  }\n  :root:not([data-theme=\"dark\"]) body {\n    background: radial-gradient(circle at 15% -20%, #c8dff0 0, #e tor-from {\n  background: rgba(15,31,56,.5);\n  border-right: 1px solid var(--line);\n}\n[data-theme=\"light\"] .translator-from { background: rgba(176,200,224,.25); }\n.translator-to {\n  background: rgba(114,216,255,.06);\n}\n[data-theme=\"light\"] .translator-to { background: rgba(26,127,196,.06); }\n.translator-label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--muted);\n  margin-bottom: 8px;\n  font-weight: 700;\n}\n\n/* ── Cards ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n  margin: 24px 0;\n}\n.card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.03); }\n[data-theme=\"light\"] .card { background: rgba(220,232,242,.4); }\n.card b { display: block; color: var(--acc); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }\n\n/* ── Accordion ── */\ndetails.acc-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }\nsummary.acc-head { padding: 14px 18px; cursor: pointer; font-weight: 700; color: var(--acc); list-style: none; display: flex; justify-content: space-between; }\nsummary.acc-head::after { content: '+'; }\ndetails.acc-item[open] summary.acc-head { border-bottom: 1px solid var(--line); background: rgba(114,216,255,.05); }\ndetails.acc-item[open] summary.acc-head::after { content: '−'; }\n.acc-body { padding: 18px; }\n\n/* ── Long Paragraph Collapsible ── */\ndetails.long-para { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 1.2em; overflow: hidden; }\ndetails.long-para summary { padding: 10px 14px; cursor: pointer; color: var(--muted); list-style: none; font-style: italic; }\ndetails.long-para[open] summary { border-bottom: 1px solid var(--line); }\ndetails.long-para p { padding: 14px; margin: 0; max-width: none; }\n\n/* ── Timeline ── */\n.vis-timeline { margin: 32px 0; border-left: 2px solid var(--line); padding-left
