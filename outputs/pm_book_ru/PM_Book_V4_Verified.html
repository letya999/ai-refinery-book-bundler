ext.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = #\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a><a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">716</a> должна содержать 100% работ проекта. Ничего лишнего, но и ничего не пропущено.\n  </div>\n\n  <h2>1. Что такое <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a><a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">883</a> (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">WBS</a><a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">943</a>)?</h2>\n  <p>Это графическое представление декомпозиции проекта. Мы разбиваем большую задачу на мелкие «пакеты работ», которые можно оценить по времени и деньгам.</p>\n  \n  <div class=\"figure\">\n    <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_53e802764d_p037_i01.png\" alt=\"WBS Пример 1\" style=\"max-width: 400px; margin-bottom: 1rem;\">\n    <div class=\"figcaption\">Рис. 6.1. Пример классической древовидной декомпозиции из оригинального PDF.</div>\n  </div>\n\n  <h2>2. Правила декомпозиции</h2>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin: 2rem 0;\">\n    <div class=\"card\" style=\"border-left: 5px solid var(--acc);\">\n      <b>Правило 8/80</b>\n      <p>Нижний уровень (пакет работ) не должен быть короче 8 часов и длиннее 80 часов трудозатрат.</p>\n    </div>\n    <div class=\"card\" style=\"border-left: 5px solid var(--acc);\">\n      <b>Результативность</b>\n      <p>Каждый узел <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a><a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">1917</a> должен иметь понятный результат (deliverable), а не просто процесс \"делание чего-то\".</p>\n    </div>\n  </div>\n\n  <h2>3. Словарь <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a><a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">2104</a></h2>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>ID</th>\n          <th>Название</th>\n          <th>Результат</th>\n          <th>Критерий приемки</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>1.1</td>\n          <td>Дизайн-макет</td>\n          <td>Figma-файл</td>\n          <td>Подпись <a href=\"#\" class=\"term-link\" data-term=\"term-customer\">Заказчика</a><a href=\"#\" class=\"term-link\" data-term=\"term-customer\">2522</a> и <a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсора</a><a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">2593</a>.</td>\n        </tr>\n        <tr>\n          <td>1.2</td>\n          <td>Верстка Shell</td>\n          <td>HTML/CSS код</td>\n          <td>Прохождение тестов производительности.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <blockquote class=\"insight\">\n    Помните: <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a><a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">3059</a> — это дерево РЕЗУЛЬТАТОВ, а не дерево действий. Используйте существительные, а не глаголы.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: ' роекты делают люди. Ваша задача как <a href=\"#\" class=\"term-link\" data-term=\"term-pm\">ПМ-а</a> — собрать команду и договориться о «правилах аренды» ресурсов.</p>\n\n  <h2>1. Типы организационных структур</h2>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Структура</th>\n          <th>Власть <a href=\"#\" class=\"term-link\" data-term=\"term-pm\">ПМ-а</a></th>\n          <th>Плюсы / Минусы</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>Функциональная</b></td>\n          <td>Почти нет</td>\n          <td>Люди сидят в своих отделах. <a href=\"#\" class=\"term-link\" data-term=\"term-pm\">ПМ</a> — просто координатор.</td>\n        </tr>\n        <tr>\n          <td><b>Матричная</b></td>\n          <td>Средняя</td>\n          <td>Двойное подчинение. Конфликты за людей — ваша рутина.</td>\n        </tr>\n        <tr>\n          <td><b>Проектная</b></td>\n          <td>Полная</td>\n          <td>Команда подчиняется только вам. Максимальная эффективность.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <h2>2. RACI-матрица (Кто за что?)</h2>\n  <div class=\"callout\">\n    Чтобы команда не превратилась в лебедя, рака и щуку, используйте RACI:\n  </div>\n  \n  <div class=\"grid\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 2rem 0;\">\n    <div class=\"card\" style=\"border-bottom: 3px solid #3b82f6;\"><b>Responsible</b> <p>Исполнитель задачи.</p></div>\n    <div class=\"card\" style=\"border-bottom: 3px solid #10b981;\"><b>Accountable</b> <p>Ответственный за успех (только ОДИН человек).</p></div>\n    <div class=\"card\" style=\"border-bottom: 3px solid #f59e0b;\"><b>Consulted</b> <p>Эксперт, дает советы.</p></div>\n    <div class=\"card\" style=\"border-bottom: 3px solid #64748b;\"><b>Informed</b> <p>Получает отчет о результате.</p></div>\n  </div>\n\n  <h2>3. Делать или Покупать? (Make-or-Buy)</h2>\n  <div class= ft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) rt: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\n:root {\n  --bg: #ffffff;\n  --bg-deep: #f8fafc;\n  --txt: #0f172a;\n  --acc: #1d4ed8;\n  --acc-soft: #eff6ff;\n  --border: #cbd5e1;\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\n  --muted: #64748b;\n  --sidebar-w: 300px;\n}\n\n* { box-sizing: border-box; }\n\nbody { \n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \n  color: var(--txt); \n  background: var(--bg); \n  line-height: 1.6; \n  margin: 0; \n  overflow: hidden; /* App mode */\n}\n\n/* Typography inherited by chapters */\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padd     <script>
        const data = JSON.parse(document.getElementById('book-data').textContent);
        const toc = document.getElementById('toc');
        const mount = document.getElementById('content-mount');
        const reader = document.getElementById('reader');
        
        function hydrateImages(container) {
            container.querySelectorAll('img[data-src]').forEach(img => {
                const assetKey = img.getAttribute('data-src');
                if (data.assets[assetKey]) {
                    img.src = data.assets[assetKey];
                    img.removeAttribute('data-src');
                }
            });
        }

        function loadChapter(index) {
            mount.style.opacity = '0';
            setTimeout(() => {
                mount.innerHTML = data.chapters[index];
                hydrateImages(mount);
                reader.scrollTop = 0;
                mount.style.opacity = '1';
                
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                const navItem = document.querySelector(`[data-idx="${index}"]`);
                if (navItem) navItem.classList.add('active');
            }, 100);
        }

        // DELEGATED CLICK HANDLER
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (!link) return;

            // 1. Term links
            if (link.classList.contains('term-link')) {
                e.preventDefault();
                e.stopPropagation();
                showGlossary(link.dataset.term);
                return;
            }

            // 2. Anchor links
            const href = link.getAttribute('href');
            if (href && href.startsWith('#')) {
                const targetId = href.substring(1);
                const chapterIdx = data.anchors[targetId];
                if (chapterIdx !== undefined) {
                    e.preventDefault();
                    loadChapter(chapterIdx);
                    setTimeout(() => {
                        const target = document.getElementById(targetId);
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    }, 250);
                }
            }
        });

        function showGlossary(termId) {
            const term = data.glossary.find(t => t.id === termId);
            if (term) {
                document.getElementById('glossary-title').textContent = term.name;
                document.getElementById('glossary-def').innerHTML = term.def;
                document.getElementById('glossary-overlay').classList.add('open');
            }
        }

        function closeGlossary() { 
            document.getElementById('glossary-overlay').classList.remove('open'); 
        }

        // Render TOC
        data.titles.forEach((title, index) => {
            const el = document.createElement('div');
            el.className = 'nav-item';
            el.dataset.idx = index;
            el.textContent = `${index + 1}. ${title}`;
            el.onclick = () => loadChapter(index);
            toc.appendChild(el);
        });

        if (data.chapters.length > 0) loadChapter(0);
    </script>
