y => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === ROBUST PM BOOK THEME V2 === */\n:root {\n  --bg: #050a14;\n  --bg2: #0a101e;\n  --panel: #161f32;\n  --panel2: #1e2944;\n  --line: #303e5a;\n  --txt: #f0f5ff;\n  --muted: #a0aec0;\n  --acc: #00d2ff;\n  --acc2: #4fd1c5;\n  --warn: #f6ad55;\n  --bad: #fc8181;\n  --fg: #ffffff;\n}\n\nbody {\n  font-family: \"Segoe UI\", system-ui, -apple-system, sans-serif;\n  line-height: 1.7;\n  background: var(--bg);\n  color: var(--txt);\n  margin: 0;\n  padding: 0;\n}\n\n.wrap {\n  max-width: 860px;\n  margin: 0 auto;\n  padding: 40px 20px;\n}\n\n.hero {\n  background: linear-gradient(135deg, #050a14 0%, #161f32 100%);\n  padding: 60px 40px;\n  border-left: 4px solid var(--acc);\n  margin: -40px -20px 40px -20px;\n  box-shadow: 0 10px 30px rgba(0,0,0,0.3);\n}\n\n.kicker {\n  color: var(--acc);\n  text-transform: uppercase;\n  font-size: 12px;\n  letter-spacing: 2px;\n  font-weight: 800;\n  margin-bottom: 10px;\n}\n\nh1 { font-size: 2.5rem; line-height: 1.2; margin: 0; color: var(--fg); }\nh2 { font-size: 1.6rem; color: var(--acc); margin: 2rem 0 1rem; border-bottom: 1px solid var(--line); padding-bottom: 0.5rem; }\n\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; max-width: 700px; }\n\n/* Grid and Cards */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 20px;\n  margin: 2rem 0;\n}\n\n.card {\n  background: var(--panel);\n  padding: 24px;\n  border-radius: 12px;\n  border: 1px solid var(--line);\n  transition: transform 0.2s, border-color 0.2s;\n}\n\n.card:hover {\n  border-color: var(--acc);\n  transform: translateY(-2px);\n}\n\n.card b { display: block; font-size: 1.1rem; color: var(--acc2); margin-bottom: 10px; }\n.card p { margin: 0; font-size: 0.95rem; color: var(--txt); }\n\n/* Smart Table */\n.smart-table {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  overflow: hidden;\n  margin: 2rem 0;\n}\n\n.table-cell {\n  background: var(--panel);\n  padding: 16px;\n  font-size: 0.9rem;\n}\n\n.table-cell b { color: var(--acc); }\n\n/* Visuals */\n.vis-diag {\n  background: var(--bg2);\n  border-radius: 16px;\n  padding: 30px;\n  border: 1px solid var(--line);\n  margin: 2rem 0;\n  text-align: center;\n}\n\n.vis-diag svg {\n  max-width: 100%;\n  height: auto;\n  filter: drop-shadow(0 0 10px rgba(0,210,255,0.1));\n}\n\n.caption {\n  margin-top: 15px;\n  font-size: 13px;\n  color: var(--muted);\n  font-style: italic;\n}\n\n/* Timeline */\n.vis-timeline {\n  border-left: 2px solid var(--line);\n  margin: 2rem 0 2rem 20px;\n  padding-left: 30px;\n}\n\n.tl-step {\n  position: relative;\n  margin-bottom: 1.5rem;\n}\n\n.tl-step::before {\n  content: \"\";\n  position: absolute;\n  left: -41px;\n  top: 5px;\n  width: 20px;\n  height: 20px;\n  background: var(--bg);\n  border: 2px solid var(--acc);\n  border-radius: 50%;\n}\n\n/* Insights */\n.insight {\n  border-left: 4px solid var(--warn);\n  background: rgba(246, 173, 85, 0.05);\n  margin: 2rem 0;\n  padding: 20px 30px;\n  border-radius: 0 12px 12px 0;\n  font-style: italic;\n  font-size: 1.1rem;\n}\n\n.term-link {\n  color: var(--acc2);\n  text-decoration: none;\n  font-weight: 600;\n  box-shadow: inset 0 -1px 0 var(--acc2);\n  transition: 0.2s;\n}\n\n.term-link:hover {\n  background: var(--acc2);\n  color: var(--bg);\n}\n\n</style>\n</head>\n<body><main class=\"wrap\">\n<section class=\"hero\">\n  <h1>Приложения</h1>\n</section>\n<div class=\"content-body\">\n<h2><b>Приложения </b> Перечень:</h2>\n<p class=\"lead-para\"> Приложение 1 – Устав проекта</p>\n<p> Приложение 2 – Реестр заинтересованных лиц</p>\n<p> Приложение 3 – Матрица требований</p>\n<p> Приложение 4 – Концепция проекта</p>\n\n<blockquote class=\"insight\"><p>Эффективное использование приведенных шаблонов предполагает их модификацию и доработку под  нужды вашей организации и/или проекта по необходимости.</p></blockquote>\n<p> Приложение 5 – Реестр рисков</p>\n<p> Приложение 6 – Перечень ресурсов (команда)</p>\n<p>Эффективное использование приведенных шаблонов предполагает их модификацию и доработку под  нужды вашей организации и/или проекта по необходимости. Приложения данной книги 0 лишь  одним из способов адаптировать «лучшие практики» методологии PMBoK к управлению ИТ- проектами</p>\n<p>Селиховкин Иван (www.pmlead.ru)   75</p>\n<h3><b>Приложение 1 – Устав проекта</b></h3>\n<h3><b>УСТАВ ПРОЕКТА</b></h3>\n<p>Все документы, ссылки на которые на которые содержаться в настоящем документе являются его  неотъемлемой частью.</p>\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>Название проекта:</td><td></td><td></td></tr>\n  <tr><td></td><td>Менеджер проекта:</td><td></td><td></td></tr>\n  <tr><td></td><td>Дата (MM/DD/YYYY):</td><td></td><td></td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>Версии (строки добавляются по необходимости):</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n  <tr><td></td><td>Версия</td><td></td><td></td><td>Дата</td><td></td><td></td><td>Комментарий</td><td></td></tr>\n  <tr><td></td><td></td><td></td><td></td><td>(MM/DD/YYYY)</td><td></td><td></td><td></td><td></td></tr>\n  <tr><td>1.0</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n  <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n  <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n  <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n<p>Селиховкин Иван (www.pmlead.ru)   76</p>\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>1. Краткое описание проекта</td><td></td></tr>\n  <tr><td></td><td>1.1 Название проекта</td><td></td></tr>\n  <tr><td>&lt;Название проекта&gt;</td><td></td><td></td></tr>\n  <tr><td></td><td>1.2 Суть проекта</td><td></td></tr>\n  <tr><td>&lt;Что представляет собой проект? Это разработка или внедрение? Разработка чего и для\nчего – одним/двумя предложениями&gt;</td><td></td><td></td></tr>\n  <tr><td></td><td>1.3 Бизнес-окружение проекта</td><td></td></tr>\n  <tr><td>&lt;Почему предпринят проект; каковы ожидания / предположения высшего менеджмента? Как\nцели проекта связаны со стратегическими целями клиента (продукт выведет его на новые\nрынки, позволит сэкономить и т.п.)?</td><td></td><td></td></tr>\n  <tr><td></td><td>1.4. Цели проекта</td><td></td></tr>\n  <tr><td>&lt;Цели проекта SMART (перечисляемым списком)&gt;</td><td></td><td></td></tr>\n  <tr><td></td><td>1.5. Риски проекта</td><td></td></tr>\n  <tr><td>&lt;Если известно - предполагаемые результаты предполагаемой качественной оценки\nсовокупных рисков проекта (негативных и позитивных) – высокий / средний / низкий. Краткое\nобоснование оценки (1-2 предложения)&gt;\n&lt;Если известны – главные высокоуровневые риски (перечислить)&gt;</td><td></td><td></td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>2. Описание продукта и поставок</td><td></td></tr>\n  <tr><td></td><td>2.1 Продуктом проекта является (перечень поставок)</td><td></td></tr>\n  <tr><td></td><td>&lt;Перечислить результаты поставки списком - дистрибутив ПО, пользовательская</td><td></td></tr>\n  <tr><td></td><td>документация; и т.п.&gt;</td><td></td></tr>\n  <tr><td></td><td>2.2 Главными требованиям к продукту являются (продукт позволяет):</td><td></td></tr>\n  <tr><td>&lt;Указать высокоуровневые требования (функциональные и нефункциональные)&gt;</td><td></td><td></td></tr>\n  <tr><td></td><td>2.3 Требованиями к продукту НЕ являются (продукт не включает):</td><td></td></tr>\n  <tr><td>&lt;Указать значимые высокоуровневые требования, не включаемые в настоящий проект&gt;</td><td></td><td></td></tr>\n  <tr><td></td><td>2.4 Правила приемки поставок:</td><td></td></tr>\n  <tr><td></td><td>&lt;Указать общие правила приемки (будет ли создаваться комиссия, на основании каких</td><td></td></tr>\n  <tr><td></td><td>документов планируется сдача)&gt;</td><td></td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>3. Ограничения проекта</td><td></td><td></td></tr>\n  <tr><td></td><td>3.1 Вехи и дата завершения проекта:</td><td></td><td></td></tr>\n  <tr><td>Начало проекта</td><td></td><td>&lt;Дата&gt;</td><td></td></tr>\n  <tr><td> &lt;Указать название вехи 1&gt;</td><td></td><td>&lt;Дата&gt;</td><td></td></tr>\n  <tr><td> &lt;Указать название вехи 1&gt;</td><td></td><td>&lt;Дата&gt;</td><td></td></tr>\n  <tr><td> &lt;…&gt;</td><td></td><td>&lt;…&gt;</td><td></td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n\n<blockquote class=\"insight\"><p>Все документы, ссылки на которые на которые содержаться в настоящем документе являются его  неотъемлемой частью.</p></blockquote>\n<p>Селиховкин Иван (www.pmlead.ru)   77</p>\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>3. Ограничения проекта</td><td></td></tr>\n  <tr><td>Завершение проекта</td><td></td><td>&lt;Дата&gt;</td></tr>\n  <tr><td></td><td>3.2 Общий бюджет проекта:</td><td></td></tr>\n  <tr><td>&lt;Бюджет включает все расходы по проекту + все расходы по управлению рисками, в том числе\nи управленческие резервы&gt;</td><td></td><td></td></tr>\n  <tr><td></td><td>3.3 Ограничения по выполнению и организации работ</td><td></td></tr>\n  <tr><td></td><td>&lt;Например, для успеха проекта критично важно, чтобы сотрудники исполнителя не общались</td><td></td></tr>\n  <tr><td></td><td>с определенным департаментом заказчика; или указом менеджмента должна быт лтый + красный) = красный уровень риска\n (красный + красный) = красный уровень риска</td></tr>\n  <tr><td>Описание риска</td><td>Тезисно - в чем суть (причина, содержание) риска</td></tr>\n  <tr><td>Влияние на\nпроект</td><td>Тезисно - в чем суть влияния риска на проект</td></tr>\n  <tr><td>Область риска</td><td>Общее название группы, к которой можно отнести данный риск</td></tr>\n  <tr><td>План А\n(contingency\nplan)</td><td>Что будем делать для того, чтобы реализовать стратегию обработки\nриска</td></tr>\n  <tr><td>Триггеры</td><td>Условия для запуска действий по плану Б (одновременно - признак\nтого, что риск реализовался)</td></tr>\n  <tr><td>Тип стратегии\nобработки риска</td><td>Для позитивных рисков: \"использование / усиление / разделение\"; для\nнегативных рисков: \"предотвращение / смягчение / перенос\"; для обоих\nвидов риска: \"принятие\"</td></tr>\n  <tr><td>Хозяин риска</td><td>Лицо ответственное за мониторинг триггера и запуск contingency плана</td></tr>\n  <tr><td>План Б (fallback\nplan)</td><td>Что будем делать, если риск реализовался (не заполняется, если тип\nстратегии обработки риска - \"принятие\")</td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n<p>Селиховкин Иван (www.pmlead.ru)   88</p>\n<h3><b>Приложение 6 – Перечень ресурсов (команда) </b></h3>\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td></td><td>Перечень ресурсов (команда)</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n  <tr><td>Проект</td><td></td><td></td><td>&lt;обязательное&gt;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n  <tr><td>PM</td><td></td><td></td><td>&lt;обязательное&gt;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td chHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>"]</script>


<script>
(function() {
  'use strict';

  // ── Data injected by bundler ──────────────────────────────────────────────
  const BOOK_ID  = "book_b504f23d";
  const LANG     = {"code":"ru","dir":"ltr","chapter":"Глава","total_chapters":"Всего {n} глав","search_placeholder":"Поиск по книге...","prev":"← Назад","next":"Вперёд →","bookmark_add":"☆","bookmark_remove":"★","bookmarks_title":"Закладки","no_bookmarks":"Закладок пока нет","theme_to_light":"☀","theme_to_dark":"☾","chapter_label":"Глава {n}","stop_words":["и","в","на","не","с","а","но","из","к","по","за","то","как","что","так","же","это","да","уж","вот","он","она","оно","они","мы","вы","я","ни","ли","бы","до","при","про","над","под","без","через","для","который","если","когда","такой","всё","было","стало","может","нет","есть","один","два","три","первый","второй","каждый","всегда","уже","ещё","тоже","только","после","перед","между","много","других","самый","просто","очень","хотя","чтобы","потому","поэтому","всего","лишь","никто","никогда","ведь","всем","была","были"]};
  const T        = ["Глава I. О чем эта книга?","Глава II. Предлагают должность – соглашаться?","Глава III. Подход к управлению","Глава IV. Инициация","Глава V. Приступаем к планированию","Глава VI. Планируем содержание","Глава VII. Команда и покупки","Глава VIII. Время и Стоимость","Глава IX. Планируем ответственность, коммуникации, качество","Глава X. Риски","Глава XI. Другие планы и шаг назад","Глава XII. Выполнение и контроль","Глава XIII. Закрытие проекта","Глава XIV. Что дальше?","Рекомендованная литература","Глоссарий","Приложения"];
  const CHAPTERS = JSON.parse(document.getElementById('book-chapters').textContent);
  const SIDX     = JSON.parse(document.getElementById('book-search').textContent);
  const ASSETS   = JSON.parse(document.getElementById('book-assets').textContent);
  const FILES    = JSON.parse(document.getElementById('book-files').textContent);
  const ANCHORS  = JSON.parse(document.getElementById('book-anchors').textContent);

  // ── Helper to escape HTML for safe injection into innerHTML ───────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Safe Storage ──────────────────────────────────────────────────────────
  const store = {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const fr       = document.getElementById('fr');
  const tt       = document.getElementById('tt');
  const bar      = document.getElementById('bar');
  const side     = document.getElementById('side');
  const overlay  = document.getElementById('overlay');
  const searchEl = document.getElementById('search');
  const searchPrev = document.getElementById('search-prev');
  const searchNext = document.getElementById('search-next');
  const app      = document.getElementById('app');
  const bmBtn    = document.getElementById('bm-btn');
  const bmList   = document.getElementById('bm-list');
  const bmDetails = document.getElementById('bm-details');

  let cur = 0;
  let searchFilter = '';
  let pendingAnchor = null;

  // ── i18n helpers ─────────────────────────────────────────────────────────
  searchEl.placeholder = LANG.search_placeholder || 'Search...';
  document.getElementById('prev-btn').textContent = LANG.prev || '<';
  document.getElementById('next-btn').textContent = LANG.next || '>';
  document.getElementById('bm-summary').textContent = LANG.bookmarks_title || 'Bookmarks';
  document.getElementById('vol-info').textContent = (LANG.total_chapters || '{n} chapters').replace('{n}', T.length);

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? (LANG.theme_to_light || '☀') : (LANG.theme_to_dark || '☾');
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe via postMessage
    if (fr.contentWindow) {
      fr.contentWindow.postMessage({ action: 'setTheme', theme: t }, '*');
    }
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);
  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }
    catch(e) { return []; }
  }
  function saveBookmarks(bm) {
    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }
  function toggleBookmark() {
    const bm = getBookmarks();
    const idx = bm.indexOf(cur);
    if (idx === -1) bm.push(cur); else bm.splice(idx, 1);
    saveBookmarks(bm);
    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? (LANG.bookmark_remove || '★') : (LANG.bookmark_add || '☆');
  }
  function buildBookmarkList() {
    const bm = getBookmarks();
    bmList.innerHTML = '';
    if (!bm.length) {
      bmList.innerHTML = `<div class="bm-empty">${LANG.no_bookmarks || 'No bookmarks'}</div>`;
      return;
    }
    bm.forEach(i => {
      const btn = document.createElement('button');
      btn.className = 'bm-item';
      btn.textContent = `${LANG.chapter || 'Chapter'} ${i + 1} — ${T[i] || ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      bmList.appendChild(btn);
    });
  }
  bmBtn.onclick = toggleBookmark;

  // ── Search (inverted index) ───────────────────────────────────────────────
  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, ' ')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

  // ── Chapter navigation ────────────────────────────────────────────────────
  function go(i, anchor = null) {
    if (i < 0 || i >= T.length) return;
    cur = i;
    pendingAnchor = anchor;
    searchPrev.style.display = 'none';
    searchNext.style.display = 'none';

    const doSwitch = () => {
      fr.srcdoc = CHAPTERS[i];

      // Update UI
      const chLabel = (LANG.chapter_label || 'Chapter {n}').replace('{n}', i + 1);
      tt.innerHTML = `<i>${chLabel}</i> ${esc(T[i] || '')}`;
      bar.style.width = ((i + 1) / T.length * 100) + '%';
      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));
      store.set('prog_' + BOOK_ID, i);
      updateBookmarkBtn();
    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();
    const frag = document.createDocumentFragment();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = (LANG.chapter_label || 'Chapter {n}').replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${esc(t)}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      frag.appendChild(btn);
    });
    list.appendChild(frag);

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  // ── Mobile sidebar ────────────────────────────────────────────────────────
  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    // Allow Escape from search box to also close mobile sidebar
    if (e.target === searchEl) {
      if (e.key === 'Escape') { searchEl.blur(); closeSidebarMobile(); }
      return;
    }
    if (e.key === 'Escape')    closeSidebarMobile();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.source !== fr.contentWindow) return;
    const data = e.data;
    if (!data) return;

    if (data.action === 'bookGo') {
      let targetIdx = -1;
      
      // Global Anchor resolution takes absolute precedence over filename chunk bounds
      if (data.anchorId && ANCHORS[data.anchorId] !== undefined) {
        targetIdx = ANCHORS[data.anchorId];
      }
      else if (data.filename) {
        targetIdx = FILES.indexOf(data.filename.toLowerCase());
        if (targetIdx === -1 && data.filename.includes('chapter')) {
           const m = data.filename.match(/chapter(\d+)/i);
           if (m) {
             const idxHint = parseInt(m[1], 10) - 1;
             targetIdx = idxHint < FILES.length ? idxHint : -1;
           }
        }
      }
      
      if (targetIdx === -1 && data.chapterIdx !== undefined) targetIdx = data.chapterIdx;
      
      if (targetIdx >= 0 && targetIdx < CHAPTERS.length) {
        go(targetIdx, data.anchorId);
      }
    } 
    else if (data.action === 'scrollReport') {
      store.set('sc_' + BOOK_ID + '_' + cur, data.ratio.toFixed(4));
    }
    else if (data.action === 'requestAsset') {
      const b64 = ASSETS[data.key];
      if (b64) {
        fr.contentWindow.postMessage({ action: 'provideAsset', key: data.key, dataUri: b64 }, '*');
      }
    }
    else if (data.action === 'guestReady') {
      // Send theme
      fr.contentWindow.postMessage({ action: 'setTheme', theme: document.documentElement.getAttribute('data-theme') }, '*');
      
      // Handle position restoring
      if (!pendingAnchor) {
        const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + cur) || '0');
        if (savedRatio > 0.005) {
          fr.contentWindow.postMessage({ action: 'setScrollRatio', ratio: savedRatio }, '*');
        }
      }

      // Handle anchor or search
      if (pendingAnchor) {
        fr.contentWindow.postMessage({ action: 'scrollToAnchor', anchorId: pendingAnchor }, '*');
        pendingAnchor = null;
      } else if (searchFilter) {
        fr.contentWindow.postMessage({ action: 'highlightSearch', query: searchFilter }, '*');
      }
    }
    else if (data.action === 'searchHitsFound') {
      if (data.count > 0) {
        searchPrev.style.display = 'block';
        searchNext.style.display = 'block';
      }
    }
    else if (data.action === 'keypress') {
      if (data.key === 'Escape') closeSidebarMobile();
      if (data.key === 'ArrowRight' || data.key === 'ArrowDown') go(cur + 1);
      if (data.key === 'ArrowLeft'  || data.key === 'ArrowUp') go(cur - 1);
    }
  });

  searchPrev.onclick = () => {
    if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'prevSearchHit' }, '*');
  };
  searchNext.onclick = () => {
    if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'nextSearchHit' }, '*');
  };

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);

  // ── Print chapter in new window (iframes don't render in browser print) ──────
  // Restores lazy images from ASSETS dict before opening, so images print correctly.
  document.getElementById('print-btn').onclick = () => {
    const win = window.open('', '_blank', 'width=960,height=800');
    if (!win) { alert('Allow popups for this page to print.'); return; }
    // Restore lazy images: replace placeholder src + data-src with actual data-URI
    let printHtml = CHAPTERS[cur]
      .replace(/<script\b[\s\S]*?<\/script>/gi, '')  // strip navScript (no parent to message)
      .replace(
        /src="data:image\/gif;base64,[^"]*"\s+data-src="([^"]+)"/gi,
        (_, key) => `src="${ASSETS[key] || ''}"`);
    win.document.open();
    win.document.write(printHtml);
    win.document.close();
    // Use setTimeout instead of win.load event: after document.write()+close(),
    // the load event may have already fired before addEventListener() is called.
    setTimeout(() => win.print(), 400);
  };
  let searchDebounce;
  searchEl.oninput = e => {
    clearTimeout(searchDebounce);
    const val = e.target.value;
    searchDebounce = setTimeout(() => {
      buildList(val);
      if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'highlightSearch', query: val }, '*');
      if (!val) {
        searchPrev.style.display = 'none';
        searchNext.style.display = 'none';
      }
    }, 300);
  };

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
</script>
