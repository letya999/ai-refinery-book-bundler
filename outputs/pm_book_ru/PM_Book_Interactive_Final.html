<title>Управление ИТ-проектом (Идеальное издание)</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --bg2: #0c1b35; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a; --bad: #ff8f8f; --fg: #eef5ff;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Segoe UI Variable", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #dce8f2 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ── Print styles ── */
/* Note: iframe content is NOT rendered by browser print.
   Use the 🖨 button in the toolbar — it opens a printable popup with images restored. */
@media print {
  .side, .top, .prog, .stars { display: none !important; }
  .app { display: block; }
  .main { display: block; }
  .frame { height: auto; }
  iframe { display: none; }
}

or: var(--txt); }\n\n/* Smart Table */\n.smart-table {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  overflow: hidden;\n  margin: 2rem 0;\n}\n\n.table-cell {\n  background: var(--panel);\n  padding: 16px;\n  font-size: 0.9rem;\n}\n\n.table-cell b { color: var(--acc); }\n\n/* Visuals */\n.vis-diag {\n  background: var(--bg2);\n  border-radius: 16px;\n  padding: 30px;\n  border: 1px solid var(--line);\n  margin: 2rem 0;\n  text-align: center;\n}\n\n.vis-diag svg {\n  max-width: 100%;\n  height: auto;\n  filter: drop-shadow(0 0 10px rgba(0,210,255,0.1));\n}\n\n.caption {\n  margin-top: 15px;\n  font-size: 13px;\n  color: var(--muted);\n  font-style: italic;\n}\n\n/* Timeline */\n.vis-timeline {\n  border-left: 2px solid var(--line);\n  margin: 2rem 0 2rem 20px;\n  padding-left: 30px;\n}\n\n.tl-step {\n  position: relative;\n  margin-bottom: 1.5rem;\n}\n\n.tl-step::before {\n  content: \"\";\n  position: absolute;\n  left: -41px;\n  top: 5px;\n  width: 20px;\n  height: 20px;\n  background: var(--bg);\n  border: 2px solid var(--acc);\n  border-radius: 50%;\n}\n\n/* Insights */\n.insight {\n  border-left: 4px solid var(--warn);\n  background: rgba(246, 173, 85, 0.05);\n  margin: 2rem 0;\n  padding: 20px 30px;\n  border-radius: 0 12px 12px 0;\n  font-style: italic;\n  font-size: 1.1rem;\n}\n\n.term-link {\n  color: var(--acc2);\n  text-decoration: none;\n  font-weight: 600;\n  box-shadow: inset 0 -1px 0 var(--acc2);\n  transition: 0.2s;\n}\n\n.term-link:hover {\n  background: var(--acc2);\n  color: var(--bg);\n}\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Управление ИТ-проектом • Глава 1</div>\n    <h1>Зачем вам эта книга?</h1>\n    <p class=\"lead lead-para\">Это не теоретический талмуд, а практический «мостик» от стресса новичка к уверенности профи.</p>\n  </section>\n\n  <d r }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', da t, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n nd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === ROBUST PM BOOK THEME V2 === */\n:root {\n  --bg: #050a14;\n  --bg2: #0a101e;\n  --panel: #161f32;\n  --panel2: #1e2944;\n  --line: #303e5a;\n  --txt: #f0f5ff;\n  --muted: #a0aec0;\n  --acc: #00d2ff;\n  --acc2: #4fd1c5;\n  --warn: #f6ad55;\n  --bad: #fc8181;\n  --fg: #ffffff;\n}\n\nbody {\n  font-family: \"Segoe UI\", system-ui, -apple-system,       merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearc x);\n}\n\n.card b { display: block; font-size: 1.1rem; color: var(--acc2); margin-bottom: 10px; }\n.card p { margin: 0; font-size: 0.95rem; color: var(--txt); }\n\n/* Smart Table */\n.smart-table {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  overflow: hidden;\n  margin: 2rem 0;\n}\n\n.table-cell {\n  background: var(--panel);\n  padding: 16px;\n  font-size: 0.9rem;\n}\n\n.table-cell b { color: var(--acc); }\n\n/* Visuals */\n.vis-diag {\n  background: var(--bg2);\n  border-radius: 16px;\n  padding: 30px;\n  border: 1px solid var(--line);\n  margin: 2rem 0;\n  text-align: center;\n}\n\n.vis-diag svg {\n  max-width: 100%;\n  height: auto;\n  filter: drop-shadow(0 0 10px rgba(0,210,255,0.1));\n}\n\n.caption {\n  margin-top: 15px;\n  font-size: 13px;\n  color: var(--muted);\n  font-style: italic;\n}\n\n/* Timeline */\n.vis-timeline {\n  border-left: 2px solid var(--line);\n  margin: 2rem 0 2rem 20px;\n  padding-left: 30px;\n}\n\n.tl-step {\n  position: relative;\n  margin-bottom: 1.5rem;\n}\n\n.tl-step::before {\n  content: \"\";\n  position: absolute;\n  left: -41px;\n  top: 5px;\n  width: 20px;\n  height: 20px;\n  background: var(--bg);\n  border: 2px solid var(--acc);\n  border-radius: 50%;\n}\n\n/* Insights */\n.insight {\n  border-left: 4px solid var(--warn);\n  background: rgba(246, 173, 85, 0.05);\n  margin: 2rem 0;\n  padding: 20px 30px;\n  border-radius: 0 12px 12px 0;\n  font-style: italic;\n  font-size: 1.1rem;\n}\n\n.term-link {\n  color: var(--acc2);\n  text-decoration: none;\n  font-weight: 600;\n  box-shadow: inset 0 -1px 0 var(--acc2);\n  transition: 0.2s;\n}\n\n.term-link:hover {\n  background: var(--acc2);\n  color: var(--bg);\n}\n\n</style>\n</head>\n<body><main class=\"wrap\">\n<section class=\"hero\">\n  <h1>Глава IX. Планируем ответственность, коммуникации, качество</h1>\n</section>\n<div class=\"content-body\">\n<h2><b>Глава IX. Планируем ответственность, коммуникации, качество</b> Входы:</h2>\n<p class=\"lead-para\">- Концепция проекта</p>\n<p>- ИСР (WBS) и ресурсы, распределенные по работам</p>\n<p>- Команда проекта</p>\n<p>Каждый элемент создаваемого нами плана должен быть понятным и реально использоваться  заинтересованными лицами. Сейчас, когда все грани треугольника уточнены, стоит уделить особое  внимание достаточности коммуникаций и распределению ответственности на проекте.</p>\n<h3><b>Распределяем ответственность</b></h3>\n<h3><b>Что мне делать дальше? </b></h3>\n\n<blockquote class=\"insight\"><p>Каждый элемент создаваемого нами плана должен быть понятным и реально использоваться  заинтересованными лицами.</p></blockquote>\n<p>В предыдущей главе мы говорили о том, как распределяются ресурсы по работам (шаг 4).  Одновременно с таким «назначением» распределяется и ответственность за выполнение конкретного  пакета или действия.</p>\n<p>Если вы действительно привлекали команду к формированию ИСР (WBS) и прочим элементам  планирования – то каждый сотрудник уже «в курсе», за какие работы ему придется взяться и в какие  сроки уложиться. Не думайте, что ПМ на этом можно остановиться!</p>\n<p>Представьте, что произойдет, если вы дадите страт выполнению работ прямо сейчас? Действительно  ли каждый член команды понимает, за какую работу браться первой? А что делать, когда он ее  закончит? А если одна работа должна выполняться после другой– как понять, что соответствующий  этап выполнен и можно приступать?</p>\n<p>Каждый член команды должен знать свои приоритеты и понимать где их можно посмотреть, а также  откуда почерпнуть уточняющую информацию (помните – ИСР, ИСР-словарь, результаты  обследования?). На вашем проекте могут действовать различные правила: «сделал работу – позови –  покажи – берись за следующую», или «сделал первое по списку – отпишись - берись за второе».  Возможно, «младшие» члены команды будут уточнять постановку у более опытных.</p>\n<p>Признак правильно организованных работ – если вы, приступив к выполнению работ по проекту – никогда не услышите  от члена команды «я закончил, что дальше?» (или того хуже – не обнаружите  его за неоправданным бездействием «а разве есть еще работа?»). Постарайтесь организовать работу  так, что без вашего личного участия команда могла действовать во благо проекта.</p>\n<p>Помните, раздавать поручения в фазе исполнения проекта – не работа ПМ!</p>\n<h3><b>Я еще за что-то отвечаю? </b></h3>\n\n<blockquote class=\"insight\"><p>В предыдущей главе мы говорили о том, как распределяются ресурсы по работам (шаг 4).</p></blockquote>\n<p>Помимо самих работ - обратите внимание на распределение ответственностей за то, что не находит  отражения в ИСР (WBS).</p>\n<p>Вы помните, что ИСР (WBS) - это работы по созданию продукта? Он может не включать отдельных  работ по контролю качества, по выявлению и отслеживанию рисков и т.д. Найдите способ  договориться с командой о распределении ответственностей такого рода.</p>\n<p>Селиховкин Иван (www.pmlead.ru)   46</p>\n<p>Фиксируйте договоренности. Сделайте это для каждой области знаний или для каждой роли вашей  команды.</p>\n<p>Можно закрепить обязательства по областям знаний. Например, описав «главного» и  «вспомогательного» ответственных за какую-то задачу. Для этого удобно использовать простейшие  таблицы, которые иногда называют «матрицами ответственности».</p>\n<p>Матрица ответственности может выглядеть, следующим образом:</p>\n\n<!-- TABLE_START -->\n<table>\n  <tbody><tr><td>Член команды:\nРабота:</td><td>Олег</td><td>Василий</td><td>Петр</td></tr>\n  <tr><td>Выявление и отслеживание\nрисков</td><td></td><td>Г</td><td>В</td></tr>\n  <tr><td>Контроль качества продукта</td><td></td><td>В</td><td>Г</td></tr>\n  <tr><td>Ведение переговоров в фазе\nинициации</td><td>В</td><td>Г</td><td></td></tr>\n  <tr><td>…</td><td></td><td></td><td></td></tr>\n</tbody></table>\n<!-- TABLE_END -->\n\n<p>Г – главный ответственный, В – вспомогательный ответственный</p>\n<p>Другой способ - закрепить обязательства за определенными категориями сотрудников (скажем,  любой программист при разработке кода осуществляет самоконтроль качества, выполняя  тестирование по определенным принципам). Для таких целей лучше подходят свободные текстовые  описания.</p>\n<p>Постарайтесь не оставить «белых пятен». Все аспекты проекта должны иметь своего исполнителя,  если это не вы – позаботьтесь, чтобы он был назначен.</p>\n<h3><b>Планируем коммуникации</b></h3>\n<p>Распределяя ответственность - самое время договориться о коммуникациях.</p>\n<p>Этот, во многом интуитивно-понятный аспект управления проектом, по некоторым данным, отнимает  у ПМ до 90% его рабочего времени. Правильно спланированные коммуникации помогут вам серьезно  снизить собственные трудозатраты.</p>\n<p>Очень существенным является выбор метода. Будет ли общение на ту или иную тему вестись устно  или письменно? В последнем случае – требуются ли  согласовательные подписи (и чьи) или можно  ограничиться сообщением по электронной почте? Важен ли формат такого письма?</p>\n<p>Руководствуйтесь здравым смыслом.</p>\n<p>Наиболее существенные аспекты коммуникаций, которые всегда стоит оговаривать в любом проекте  это:</p>\n<p> Отчеты команды о выполненных работах</p>\n<p>Селиховкин Иван (www.pmlead.ru)   47</p>\n<p> Методы коммуникаций с представителями заказчика и пользователями</p>\n<p> Коммуникации со спонсором</p>\n<h3><b>Отчеты команды о выполненных работах. </b></h3>\n<p>Отчеты должны быть организованы наиболее удобным для обеих сторон способом. Их необходимо  адаптировать к конкретным используемым на проектах методологиям (так, при разработке ПО  согласно методологии «водопад» отчеты о выполнении работ будут драматически отличаться от  таковых, если применяются «гибкие» (Agile) методики).</p>\n<p>Однако, есть несколько общих правил, которых стоит придерживаться на любом проекте:</p>\n<p>Во-первых, плохой практикой является обсуждение статуса работ на совещаниях. Не делайте так (если  только это не продиктовано методологией разработки или особой производственной  необходимостью). Вам и команде и так есть, чем заняться. Просите прислать вам информацию в  электронном виде. Пусть каждый создаст отчет тогда, когда ему это будет удобно, и читайте их – когда  это удобно вам.</p>\n<details class=\"long-para\"><summary>Во-вторых, не заставляйте людей без нужды много писать. Отчет о результатах должен разумно  соотноситься по…</summary><p>Во-вторых, не заставляйте людей без нужды много писать. Отчет о результатах должен разумно  соотноситься по трудоемкости с самим результатом. Учтите также, что, подавляющее большинство  технических специалистов не любят писать и сочинять документы. Для них вы можете использовать  это как «наказание» («кто забыл прислать отчет – в следующий раз пишет эссе на пол страницы за всю  команду»); однако не демотивируйте таких людей с самого начала. Если вам нужна цифра (сколько  тебе осталось по задачке в часах?) – просите цифру и все. Если нужны комментарии – позвоните, или  оставьте их на усмотрение разработчика. Помните, не все одинаково относятся к созданию даже  коротких текстов.</p></details>\n<h3><b>Методы коммуникаций с заказчиком  </b></h3>\n<p>Правила таких коммуникаций важны не только для «фиксации договоренностей», но и для  соблюдения субординации.</p>\n<p>Аналитику понадобилось съездить на объект и еще раз переговорить с пользователем – можно ли  ехать сразу? Или позвонить пользователю и уточнить удобное время? Или обязательно каждый раз  договариваться с его начальником?</p>\n<p>А что если возникли вопросы к самому заказчику (скажем, директору крупного завода)? Удобно ли  ему позвонить на мобильник? Или через секретаря? Или послать вопрос почтой? Или по всем  вопросам за заказчика решения принимает его заместитель, и директора лучше вовсе не беспокоить?</p>\n<p>Нарушение гласных и негласных правил предприятия – в долгосрочной перспективе ни к чему  хорошему вас не приведет. Определите «правила игры» на поле заказчика и доведите их до всей  команды. Это существенно снизит количество и уровень потенциальных конфликтов.</p>\n<h3><b>Коммуникации со спонсором </b></h3>\n<p>Селиховкин Иван (www.pmlead.ru)   48</p>\n<p>Главное, что интересует спонсора в ходе выполнения проекта – укладывается ли тот в треугольник  сейчас и сохранится ли это по окончании проекта? Как правило, нюансы хода работ спонсора не очень  волнуют (для этого он нанял вас).</p>\n<p>Оговорите со спонсором до фазы исполнения – как именно вы будете держать его в курсе. Обычно,  одним из самых удобных инструментов для этого является «график вех» (о нем мы упоминали в главе  VIII во время шага 6 «создание расписания»).</p>\n<h3><b>Планируем качество </b></h3>\n<h3><b>Что означает термин «качество»? </b></h3>\n<p>Говорить об управлении качеством в отрыве от  проекта или организации – очень тяжело. Само  понятие качества ИТ-продуктов тесно сплетено с технологиями, используемыми для их создания. Мы  ограничимся лишь описанием важнейших терминов и практик.</p>\n<p>Качество – это некий уровень выполнения работ, при котором создаваемый продукт удовлетворяет  предъявленным требованиям.</p>\n<p>Обратите внимание – качество не является синонимом «очень хорошего продукта»или «продукта без  единого дефекта». Качество – это когда продукт настолько хорош, насколько этого просил заказчик.  Перфекционизм является типичной проектной ошибкой.</p>\n<p>«Золотая сервировка» (gold platting) - добавление в продукт  возможностей и функциональности,  которые хоть и приятны заказчику, но не были им запрошены и не являются необходимыми для  закрытия работ. Такое увлечение команды ненужными улучшениями очень характерно  для ИТ- проектов.</p>\n<p>«Золотая сервировка»  является злом, причем в сфере ИТ, часто - трудноискоренимым.  Разработчикам, аналитикам и прочим членам команды свойственно увлекаться своими делами, или  (того хуже) переключаться с «трудных задач» на «интересные».</p>\n<p>Предотвращение «золотой сервировки» – задача ПМ. Основные причины – она съедает драгоценные  ресурсы проекта (время, деньги). Даже если в результате этого, выполнение проекта не пострадает –  ресурсы вовсе не бесплатны для самой организации.</p>\n<p>Как планировать качество?</p>\n<p>Планирование данной сферы предполагает ответы на главные вопросы: «что есть качество на нашем  проекте?» и «как мы будем его достигать?».</p>\n<p>На первый вопрос помогут ответить документированные требования (концепция проекта + ИСР +  Словарь ИСР) и компетентные мнения нашей команды.</p>\n<details class=\"long-para\"><summary>Документированные требования позволяют нам понять ожидание заказчика и пользователей, а  командные усилия - найти…</summary><p>Документированные требования позволяют нам понять ожидание заказчика и пользователей, а  командные усилия - найти способ их достижения.  Как построить работы, чтобы действительно выдать  заказчику систему, функционирующую в режиме 24*7*365, как он и просил? Как реализовать  информационный обмен и устранение коллизий между распределенными системами, в объеме  доступных нам спецификаций? На подобные вопросы ищут ответы эксперты вашей команды  (возможно, при помощи «хозяев ресурсов»).</p></details>\n<p>Селиховкин Иван (www.pmlead.ru)   49</p>\n<p>«Хозяева ресурсов» могут очень сильно помочь вам в планировании качества. В большинстве  организаций именно они отвечают за развитие навыков своих подчиненных, наставничество и  кураторство.</p>\n<details class=\"long-para\"><summary>Занимаясь планированием, учтите: контроль качества не является действием, выполненным «перед  тем как отдать продукт…</summary><p>Занимаясь планированием, учтите: контроль качества не является действием, выполненным «перед  тем как отдать продукт заказчику». Этот процесс идет непрерывно. В него вовлечен каждый член  команды (каждый отвечает за качество собственной работы, т.е. «достаточно хорошее для  заказчика»). Вся работа ваших сотрудников построена и повязана на «представлениях о качестве». К  моменту «закрытия» работ (т.е. к моменту передачи продукта заказчику), работы по контролю  качества должны быть закончены (а не запущены).</p></details>\n<p>Если в вашем проекте предполагаются закупки – не забудь спланировать процедуры контроля  качества для них. В этом картина будет обратной – вы выступаете в роли «заказчика». Ваш  субподрядчик должен был позаботиться о том, чтобы контролировать качество в ходе выполнения  работ. Вы же оцениваете лишь конечный результат, сверяя продукт с его спецификациями.</p>\n<p>Таким образом, планирование качества на проекте предполагает использование экспертных знаний и  навыков членов команды («как продукт, соответствующий требованиям»), предотвращение «золотой  сервировки» и проверка результатов закупок.</p>\n<p>Выходы:</p>\n<p>- Дополнительные документы, описывающие ответственность (матрица ответственности / текстовые  описания)</p>\n<p>- Договоренности об отчетах (устно или письменно)</p>\n<p>- Представление о способах контроля качества</p>\n<p>- Запросы на изменения</p>\n<p>Селиховкин Иван (www.pmlead.ru)   50</p>\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === ROBUST PM BOOK THEME V2 === */\n:root {\n  --bg: #050a14;\n  --bg2: #0a101e;\n  --panel: #161f32;\n  --panel2: #1e2944;\n  --line: #303e5a;\n  --txt: #f0f5ff;\n  --muted: #a0aec0;\n  --acc: #00d2ff;\n  --acc2: #4fd1c5;\n  --warn: #f6ad55;\n  --bad: #fc8181;\n  --fg: #ffffff;\n}\n\nbody {\n  font-family: \"Segoe UI\", system-ui, -apple-system, sans-serif;\n  line-height: 1.7;\n  background: var(--bg);\n  color: var(--txt);\n  margin: 0;\n  padding: 0;\n}\n\n.wrap {\n  max-width: 860px;\n  margin: 0 auto;\n  padding: 40px 20px;\n}\n\n.hero {\n  background: linear-gradient(135deg, #050a14 0%, #161f32 100%);\n  padding: 60px 40px;\n  border-left: 4px solid var(--acc);\n  margin: -40px -20px 40px -20px;\n  box-shadow: 0 10px 30px rgba(0,0,0,0.3);\n}\n\n.kicker {\n  color: var(--acc);\n  text-transform: uppercase;\n  font-size: 12px;\n  letter-spacing: 2px;\n  font-weight: 800;\n  margin-bottom: 10px;\n}\n\nh1 { font-size: 2.5rem; line-height: 1.2; margin: 0; color: var(--fg); }\nh2 { font-size: 1.6rem; color: var(--acc); margin: 2rem 0 1rem; border-bottom: 1px solid var(--line); padding-bottom: 0.5rem; }\n\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; max-width: 700px; }\n\n/* Grid and Cards */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 20px;\n  margin: 2rem 0;\n}\n\n.card {\n  background: var(--panel);\n  padding: 24px;\n  border-radius: 12px;\n  border: 1px solid var(--line);\n  transition: transform 0.2s, border-color 0.2s;\n}\n\n.card:hover {\n  border-color: var(--acc);\n  transform: translateY(-2px);\n}\n\n.card b { display: block; font-size: 1.1rem; color: var(--acc2); margin-bottom: 10px; }\n.card p { margin: 0; font-size: 0.95rem; color: var(--txt); }\n\n/* Smart Table */\n.smart-table {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  overflow: hidden;\n  margin: 2rem 0;\n}\n\n.table-cell {\n  background: var(--panel);\n  padding: 16px;\n  font-size: 0.9rem;\n}\n\n.table-cell b { color: var(--acc); }\n\n/* Visuals */\n.vis-diag {\n  background: var(--bg2);\n  border-radius: 16px;\n  padding: 30px;\n  border: 1px solid var(--line);\n  margin: 2rem 0;\n  text-align: center;\n}\n\n.vis-diag svg {\n  max-width: 100%;\n  height: auto;\n  filter: drop-shadow(0 0 10px rgba(0,210,255,0.1));\n}\n\n.caption {\n  margin-top: 15px;\n  font-size: 13px;\n  color: var(--muted);\n  font-style: italic;\n}\n\n/* Timeline */\n.vis-timeline {\n  border-left: 2px solid var(--line);\n  margin: 2rem 0 2rem 20px;\n  padding-left: 30px;\n}\n\n.tl-step {\n  position: relative;\n  margin-bottom: 1.5rem;\n}\n\n.tl-step::before {\n  content: \"\";\n  position: absolute;\n  left: -41px;\n  top: 5px;\n  width: 20px;\n  height: 20px;\n  background: var(--bg);\n  border: 2px solid var(--acc);\n  border-radius: 50%;\n}\n\n/* Insights */\n.insight {\n  border-left: 4px solid var(--warn);\n  background: rgba(246, 173, 85, 0.05);\n  margin: 2rem 0;\n  padding: 20px 30px;\n  border-radius: 0 12px 12px 0;\n  font-style: italic;\n  font-size: 1.1rem;\n}\n\n.term-link {\n  color: var(--acc2);\n  text-decoration: none;\n  font-weight: 600;\n  box-shadow: inset 0 -1px 0 var(--acc2);\n  transition: 0.2s;\n}\n\n.term-link:hover {\n  background: var(--acc2);\n  color: var(--bg);\n}\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Управление ИТ-проектом • Глава 10</div>\n    <h1>Управление рисками</h1>\n    <p class=\"lead lead-para\">Риск — это вероятность. Если событие неизбежно, это не риск, а данность.</p>\n  </section>\n\n  <div class=\"content-body\">\n    <div class=\"grid\">\n      <div class=\"card\" style=\"border-left: 5px solid var(--bad)\">\n        <b>Красный уровень</b>\n        <p>Высокая вероятность + Сильное влияние. Требуют немедленного Плана А.</p>\n      </div>\n      <div class=\"card\" style=\"border-left: 5px solid var(--warn)\">\n        <b>Желтый уровень</b>\n        <p>Умеренные риски. Мониторинг триггеров.</p>\n      </div>\n    </div>\n\n    <h2>Стратегии реагирования</h2>\n    <div class=\"smart-table\">\n      <div class=\"table-cell\"><b>Нивелирование</b></div>\n      <div class=\"table-cell\">Устранить причину (заменить новичка на профи)</div>\n      \n      <div class=\"table-cell\"><b>Перенос</b></div>\n      <div class=\"table-cell\">Отдать риск подрядчику или страховке</div>\n      \n      <div class=\"table-cell\"><b>Принятие</b></div>\n      <div class=\"table-cell\">Смириться (не более 10% рисков)</div>\n    </div>\n\n    <blockquote class=\"insight\">\n      <p>План Б — это то, что вы будете делать, когда риск все-таки произойдет.</p>\n    </blockquote>\n  </div>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === ROBUST PM BOOK THEME V2 === */\n:root {\n  --bg: #050a14;\n  --bg2: #0a101e;\n  --panel: #161f32;\n  --panel2: #1e2944;\n  --line: #303e5a;\n  --txt: #f0f5ff;\n  --muted: #a0aec0;\n  --acc: #00d2ff;\n  --acc2: #4fd1c5;\n  --warn: #f6ad55;\n  --bad: #fc8181;\n  --fg: #ffffff;\n}\n\nbody {\n  font-family: \"Segoe UI\", system-ui, -apple-system, sans-serif;\n  line-height: 1.7;\n  background: var(--bg);\n  color: var(--txt);\n  margin: 0;\n  padding: 0;\n}\n\n.wrap {\n  max-width: 860px;\n  margin: 0 auto;\n  padding: 40px 20px;\n}\n\n.hero {\n  background: linear-gradient(135deg, #050a14 0%, #161f32 100%);\n  padding: 60px 40px;\n  border-left: 4px solid var(--acc);\n  margin: -40px -20px 40px -20px;\n  box-shadow: 0 10px 30px rgba(0,0,0,0.3);\n}\n\n.kicker {\n  color: var(--acc);\n  text-transform: uppercase;\n  font-size: 12px;\n  letter-spacing: 2px;\n  font-weight: 800;\n  margin-bottom: 10px;\n}\n\nh1 { font-size: 2.5rem; line-height: 1.2; margin: 0; color: var(--fg); }\nh2 { font-size: 1.6rem;  к планированию коллег (команда, «хозяева ресурсов» и прочие)</p>\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_c86718e0ad_p059_b56.webp\" alt=\"PDF Image\"></div>\n\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_0158f869cd_p059_b57.webp\" alt=\"PDF Image\"></div>\n\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_69b3aae3a6_p059_b54.webp\" alt=\"PDF Image\"></div>\n\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_b985ed00d1_p059_b58.webp\" alt=\"PDF Image\"></div>\n\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_dda11885fb_p059_b61.webp\" alt=\"PDF Image\"></div>\n\n<p>- Для планирования требуется специализированное ПО</p>\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_d8f01f0451_p059_b60.webp\" alt=\"PDF Image\"></div>\n\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_e642435102_p059_b55.webp\" alt=\"PDF Image\"></div>\n\n\n<div class=\"pdf-img\"><img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_f80b8e89ff_p059_b59.webp\" alt=\"PDF Image\"></div>\n\n<p>- Для планирования используются шаблоны</p>\n<p>n/a – Для планирования используются неформальные договоренности (или корпоративные  документы)</p>\n<p>Селиховкин Иван (www.pmlead.ru)   59</p>\n<p>Настало время совершить «шаг назад» и вернуться к разделам, требующим уточнения.</p>\n\n<blockquote class=\"insight\"><p>n/a – Для планирования используются неформальные договоренности (или корпоративные  документы)</p></blockquote>\n<p>Так, планируя риски, мы выявили необходимость скорректировать работы, расписание и, возможно,  бюджет. При обсуждении коммуникаций  нам могло понадобиться скорректировать роли и  ответственности и т.д. Одни элементы «плана управления проектом» влияют на другие. Внесите  требуемые изменения. Пока работы по проекту не начались, мы должны сделать планы как можно  более точными.</p>\n<h3><b>Другие элементы плана </b></h3>\n<p>«План управления проектом» не ограничивается перечисленными выше элементами.</p>\n<p>Все существенные моменты должны быть документированы, нельзя оставлять их только «в своей  голове».  Помните, план – средство коммуникаций вас с командой, членов команды друг с другом, вас  со спонсором.</p>\n<p>Планируйте все, что считаете значимым (определитесь, будут ли это устные или письменные  договоренности). Несколько таких аспектов приведены ниже.</p>\n<h3><b>Управление изменениями </b></h3>\n<p>Договоритесь о том, как будет организован процесс внесения изменений в планы после того, как  работы окажутся запущенными. Подробно эту тему мы осветим в следующей главе.</p>\n<p>Обратите внимание: «управление изменениями» - существенный аспект планирования. Без него вся  предыдущая работа может оказаться напрасной: первоначально созданные планы (как бы хороши  они не были) останутся статичными «бумажками», со временем, неизбежно разойдутся с реальностью  и станут бесполезными.</p>\n<h3><b>Управление конфигурациями </b></h3>\n<p>Создав хороший план, важно уметь довести его до всех заинтересованных сотрудников. При этом сам  план будет постоянно меняться.</p>\n<p>Сопоставление двух последних тезисов указывает на то, что каждый член команды должен иметь  доступ к самой последней версии каждого документа (то же самое справедливо и для версий  создаваемого продукта или его элементов).</p>\n<p>Более того, сотрудник должен ЗНАТЬ, какой документ последний и как это проверить. Изучая, скажем,   реестр рисков – читатель должен быть уверен, что видит перед собой актуальный перечень, что  пополняя его – он не делает «пустую работу» (если где-то хранится более свежая версия, уже  заполненная на ту же тему кем-то другим).</p>\n<p>Мы не будем разбирать тут тему хранения документов, планов проекта, а лишь обозначим  необходимость четко и однозначно реализовать доступ всех нуждающихся к «последней версии».</p>\n<p>Неважно, используете ли вы централизованно опубликованный файл электронной таблицы, или  развернутое в многопользовательском режиме специализированное ПО, или деревянную доску в  переговорной (ежедневно пришпиливая кнопками распечатки актуальных версий). Главное –  позаботьтесь о том, чтобы каждый ваш сотрудник был УВЕРЕН – он имеет доступ к актуальной</p>\n<p>Селиховкин Иван (www.pmlead.ru)   60</p>\n<p>информации. Не стоит недооценивать разрушительную силу подозрений «может я работаю со старым  документом?…».</p>\n<h3><b>План закупок </b></h3>\n<p>В главе VII мы говорили о том, что, возможно, станем использовать подрядчиков на проекте.</p>\n<p>Если данное намерение реализовалось – не забудьте, что контролировать закупки на проекте – это  ваша головная боль. Занимайте активную позицию по отношению к другим службам. Заранее  узнавайте- как устроен процесс закупок и поиск подрядчиков ,и сколько времени он может занять.  Помните, если «они» провалят вам закупки – это будет проблема ВАШЕГО проекта, а значит и ваша  ответственность.</p>\n<h3><b>Готовимся к запуску работ </b></h3>\n<p>Итак, план сформирован, скорректирован; элементы плана помещены в удобное хранилище и  доступны всем нуждающимся в любой момент времени. Каждый член вашей команды  знает, как  получить доступ к актуальной версии каждого документа и готов использовать их в своей работе.</p>\n<p>Время браться за работу!</p>\n<p>Не забывайте, что исполнение и контроль тесно связаны с изменением планов («туловище удава»).  Посему, объявляя о запуске работ, - держите планы открытыми для изменений, но строго  контролируйте этот процесс.</p>\n<p>Выходы:</p>\n<p>- Окончательный «план управления проектом»</p>\n<p>Селиховкин Иван (www.pmlead.ru)   61</p>\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === ROBUST PM BOOK THEME V2 === */\n:root {\n  --bg: #050a14;\n  --bg2: #0a101e;\n  --panel: #161f32;\n  --panel2: #1e2944;\n  --line: #303e5a;\n  --txt: #f0f5ff;\n  --muted: #a0aec0;\n  --acc: #00d2ff;\n  --acc2: #4fd1c5;\n  --warn: #f6ad55;\n  --bad: #fc8181;\n  --fg: #ffffff;\n}\n\nbody {\n  font-family: \"Segoe UI\", system-ui, -apple-system, sans-serif;\n  line-height: 1.7;\n  background: var(--bg);\n  color: var(--txt);\n  margin: 0;\n  padding: 0;\n}\n\n.wrap {\n  max-width: 860px;\n  margin: 0 auto;\n  padding: 40px 20px;\n}\n\n.hero {\n  background: linear-gradient(135deg, #050a14 0%, #161f32 100%);\n  padding: 60px 40px;\n  border-left: 4px solid var(--acc);\n  margin: -40px -20px 40px -20px;\n  box-shadow: 0 10px 30px rgba(0,0,0,0.3);\n}\n\n.kicker {\n  color: var(--acc);\n  text-transform: uppercase;\n  font-size: 12px;\n  letter-spacing: 2px;\n  font-weight: 800;\n  margin-bottom: 10px;\n}\n\nh1 { font-size: 2.5rem; line-height: 1.2; margin: 0; color: var(--fg); }\nh2 { font-size: 1.6rem; color: var(--acc); margin: 2rem 0 1rem; border-bottom: 1px solid var(--line); padding-bottom: 0.5rem; }\n\n.lead { font-size: 1.25rem; color: var(--muted); margin-top: 20px; max-width: 700px; }\n\n/* Grid and Cards */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 20px;\n  margin: 2rem 0;\n}\n\n.card {\n  background: var(--panel);\n  padding: 24px;\n  border-radius: 12px;\n  border: 1px solid var(--line);\n  transition: transform 0.2s, border-color 0.2s;\n}\n\n.card:hover {\n  border-color: var(--acc);\n  transform: translateY(-2px);\n}\n\n.card b { display: block; font-size: 1.1rem; color: var(--acc2); margin-bottom: 10px; }\n.card p { margin: 0; font-size: 0.95rem; color: var(--txt); }\n\n/* Smart Table */\n.smart-table {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  overflow: hidden;\n  margin: 2rem 0;\n}\n\n.table-cell {\n  background: var(--panel);\n  padding: 16px;\n  font-size: 0.9rem;\n}\n\n.table-cell b { color: var(--acc); }\n\n/* Visuals */\n.vis-diag {\n  background: var(--bg2);\n  border-radius: 16px;\n  padding: 30px;\n  border: 1px solid var(--line);\n  margin: 2rem 0;\n  text-align: center;\n}\n\n.vis-diag svg {\n  max-width: 100%;\n  height: auto;\n  filter: drop-shadow(0 0 10px rgba(0,210,255,0.1));\n}\n\n.caption {\n  margin-top: 15px;\n  font-size: 13px;\n  color: var(--muted);\n  font-style: italic;\n}\n\n/* Timeline */\n.vis-timeline {\n  border-left: 2px solid var(--line);\n  margin: 2rem 0 2rem 20px;\n  padding-left: 30px;\n}\n\n.tl-step {\n  position: relative;\n  margin-bottom: 1.5rem;\n}\n\n.tl-step::before {\n  content: \"\";\n  position: absolute;\n  left: -41px;\n  top: 5px;\n  width: 20px;\n  height: 20px;\n  background: var(--bg);\n  border: 2px solid var(--acc);\n  border-radius: 50%;\n}\n\n/* Insights */\n.insight {\n  border-left: 4px solid var(--warn);\n  background: rgba(246, 173, 85, 0.05);\n  margin: 2rem 0;\n  padding: 20px 30px;\n  border-radius: 0 12px 12px 0;\n  font-style: italic;\n  font-size: 1.1rem;\n}\n\n.term-link {\n  color: var(--acc2);\n  text-decoration: none;\n  font-weight: 600;\n  box-shadow:
