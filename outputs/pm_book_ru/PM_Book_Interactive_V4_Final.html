<!DOCTYPE html>
<html lang="ru" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' data:; img-src 'self' data:; object-src 'none'; connect-src 'none'">
<title>Управление ИТ-проектом (Universal V4)</title>
<style>
/* ── Dark theme (default) ── */
:root {
  --bg: #081423; --bg2: #0c1b35; --panel: #0f1f38; --panel2: #163056; --line: #395f9d;
  --txt: #eef5ff; --muted: #adc2e1; --acc: #72d8ff; --acc2: #87efc9; --warn: #ffd18a; --bad: #ff8f8f; --fg: #eef5ff;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg: #f0f4f8; --bg2: #e8eef5; --panel: #dce8f2; --panel2: #ccdeed; --line: #b0c8e0;
  --txt: #1a2535; --muted: #4a6580; --acc: #1a7fc4; --acc2: #158060; --warn: #a06800; --bad: #c03030; --fg: #1a2535;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Segoe UI Variable", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  transition: background .3s, color .3s;
}

[data-theme="dark"] body {
  background: radial-gradient(circle at 85% -20%, #2e5e9d 0, #152846 36%, #081423 72%);
}
[data-theme="light"] body {
  background: radial-gradient(circle at 85% -20%, #c8dff0 0, #dce8f2 36%, #f0f4f8 72%);
}

/* ── Stars (dark only) ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 160px 90px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 130px 20px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  opacity: 0.35;
  transition: opacity .3s;
}
[data-theme="light"] .stars { opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: .45; } }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(15,31,56,.95), rgba(11,22,45,.98));
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  backdrop-filter: blur(12px);
  transition: background .3s;
}
[data-theme="light"] .side {
  background: linear-gradient(180deg, rgba(228,236,245,.97), rgba(212,226,240,.99));
}
.app.side-hide .side { display: none; }

.brand { padding: 20px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand h1 { font-size: 16px; font-weight: 800; color: var(--txt); margin-bottom: 3px; line-height: 1.3; }
.brand p  { font-size: 11px; color: var(--muted); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(12,24,49,.7); border: 1px solid var(--line);
  color: var(--txt); border-radius: 10px; font-size: 13px; outline: none; transition: .2s;
}
[data-theme="light"] .search-box input { background: rgba(255,255,255,.7); }
.search-box input:focus { border-color: var(--acc); background: rgba(18,36,74,.8); }
[data-theme="light"] .search-box input:focus { background: #fff; }

/* ── Bookmarks panel ── */
.bm-panel { flex-shrink: 0; border-bottom: 1px solid var(--line); }
.bm-panel details summary {
  padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); cursor: pointer; user-select: none; font-weight: 700;
  list-style: none; display: flex; align-items: center; justify-content: space-between;
}
.bm-panel details summary::after { content: '▸'; font-size: 9px; }
.bm-panel details[open] summary::after { content: '▾'; }
.bm-panel details summary::marker { display: none; content: ''; }
.bm-list { padding: 6px 12px 10px; display: grid; gap: 4px; }
.bm-item {
  all: unset; cursor: pointer; padding: 7px 10px; border-radius: 8px;
  border: 1px solid rgba(255,209,138,.25); background: rgba(255,209,138,.05);
  font-size: 12px; color: var(--warn); transition: .15s; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bm-item:hover { background: rgba(255,209,138,.12); border-color: var(--warn); }
.bm-empty { padding: 8px 10px; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; display: grid; gap: 6px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 12px 14px; border-radius: 11px;
  border: 1px solid var(--line); background: rgba(17,31,57,.65);
  font-size: 13px; line-height: 1.4; color: var(--txt); transition: .18s;
  display: block; position: relative;
}
[data-theme="light"] .ch { background: rgba(228,236,245,.7); }
.ch:hover { border-color: var(--acc); background: rgba(22,48,86,.75); }
[data-theme="light"] .ch:hover { background: rgba(200,220,240,.9); }
.ch.on {
  background: linear-gradient(135deg, rgba(114,216,255,.2), rgba(135,239,201,.14));
  border-color: var(--acc); font-weight: 700;
}
[data-theme="light"] .ch.on { background: linear-gradient(135deg, rgba(26,127,196,.12), rgba(21,128,96,.08)); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--acc); margin-bottom: 3px; }
.ch .bm-star { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--warn); }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 54px; border-bottom: 1px solid var(--line);
  background: rgba(13,25,49,.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 10;
  flex-shrink: 0; transition: background .3s;
}
[data-theme="light"] .top { background: rgba(240,244,248,.92); }

.top button {
  all: unset; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line);
  border-radius: 9px; color: var(--txt); font-size: 12px; font-weight: 600;
  transition: .18s; white-space: nowrap; flex-shrink: 0;
}
.top button:hover { border-color: var(--acc); background: rgba(22,48,86,.45); }
[data-theme="light"] .top button:hover { background: rgba(26,127,196,.1); }

.tt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; min-width: 0; }
.tt i { font-style: normal; color: var(--muted); margin-right: 6px; }

/* ── Progress bar ── */
.prog { height: 3px; background: rgba(57,95,157,.4); position: relative; z-index: 10; flex-shrink: 0; }
.prog i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .4s; }

/* ── Reader frame ── */
.frame { flex: 1; min-height: 0; position: relative; view-transition-name: chapter-frame; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

/* ── Mobile ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side {
    position: fixed; left: -100%; width: min(85vw, 300px);
    inset-block: 0; transition: left .28s ease; z-index: 100;
    box-shadow: 20px 0 40px rgba(0,0,0,.4);
  }
  .side.open { left: 0; }
  .side-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 99; backdrop-filter: blur(2px);
  }
  .side.open ~ .side-overlay { display: block; }
}

/* ── View transitions ── */
::view-transition-old(chapter-frame) { animation: 120ms ease both fade-out; }
::view-transition-new(chapter-frame) { animation: 220ms ease both fade-in; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ── Print styles ── */
/* Note: iframe content is NOT rendered by browser print.
   Use the 🖨 button in the toolbar — it opens a printable popup with images restored. */
@media print {
  .side, .top, .prog, .stars { display: none !important; }
  .app { display: block; }
  .main { display: block; }
  .frame { height: auto; }
  iframe { display: none; }
}

\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.se Т-проектом • Глава 4</div>\n  <h1>Инициация: Рождение проекта</h1>\n  <p class=\"lead lead-para\">Инициация — это фаза, на которой организация официально признает, что проект существует, и наделяет менеджера полномочиями.</p>\n\n  <div class=\"callout\">\n    <b>Инсайт:</b> Если вы начали работать над проектом, но <a href=\"#\" class=\"term-link\" data-term=\"term-charter\">Устава</a> нет — вы не менеджер, вы волонтер. У вас нет официальной власти.\n  </div>\n\n  <h2>1. Бизнес-кейс: Зачем мы это делаем?</h2>\n  <p>Проект не рождается из ниоткуда. В основе всегда лежит бизнес-потребность:</p>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 2rem 0;\">\n    <div class=\"card\" style=\"border-top: 4px solid var(--acc);\">\n      <b>Рыночный спрос</b>\n      <p>Например, выпуск нового мобильного банка.</p>\n    </div>\n    <div class=\"card\" style=\"border-top: 4px solid var(--acc);\">\n      <b>Запрос клиента</b>\n      <p>Конкретный контракт на разработку ПО.</p>\n    </div>\n    <div class=\"card\" style=\"border-top: 4px solid var(--acc);\">\n      <b>Тех. прогресс</b>\n      <p>Переход на микросервисную архитектуру.</p>\n    </div>\n  </div>\n\n  <h2>2. <a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсор</a> проекта</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">КТО ЭТО?</div>\n      <p>Топ-менеджер или владелец продукта, который обеспечивает ресурсы и защищает проект.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">ЕГО ЗАДАЧА</div>\n      <p>Подписать <a href=\"#\" class=\"term-link\" data-term=\"term-charter\">Устав</a> и утвердить высокоуровневые цели (границы треугольника).</p>\n    </div>\n  </div>\n\n  <h2>3. <a href=\"#\" class=\"term-link\" data-term=\"term-charter\">Устав проекта</a> (Charter)</h2>\n  \n<blockquote class=\"insight\"><p>Инициация — это фаза, на которой организация официально признает, что проект существует, и наделяет менеджера полномочиями.</p></blockquote>\n<p>Это «Конституция» вашего проекта. Она должна содержать:</p>\n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Раздел</th>\n          <th>Что там должно быть</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>Назначение</b></td>\n          <td>Бизнес-цели и критерии успеха (SMART).</td>\n        </tr>\n        <tr>\n          <td><b>Границы</b></td>\n          <td>Что мы делаем, а что точно НЕ делаем.</td>\n        </tr>\n        <tr>\n          <td><b>Менеджер</b></td>\n          <td>Ваше имя и уровень полномочий (кто ваш босс).</td>\n        </tr>\n        <tr>\n          <td><b><a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсор</a></b></td>\n          <td>Кто платит и принимает финальные решения.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <h2>4. Механика запуска</h2>\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 600 120\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background: white; border-radius: 12px; box-shadow: var(--shadow);\">\n      <rect x=\"20\" y=\"35\" width=\"120\" height=\"50\" rx=\"8\" fill=\"#f1f5f9\" stroke=\"#cbd5e1\"></rect>\n      <text x=\"80\" y=\"65\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Бизнес-кейс</text>\n      \n      <path d=\"M140 60 L180 60\" stroke=\"var(--acc)\" stroke-width=\"2\" marker-end=\"url(#arrowhead)\"></path>\n      \n      <rect x=\"180\" y=\"35\" width=\"120\" height=\"50\" rx=\"8\" fill=\"var(--acc-soft)\" stroke=\"var(--acc)\"></rect>\n      <text x=\"240\" y=\"65\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" fill=\"var(--acc)\">УСТАВ</text>\n      \n      <path d=\"M300 60 L340 60\" stroke=\"var(--acc)\" stroke-width=\"2\" marker-end=\"url(#arrowhead)\"></path>\n      \n      <rect x=\"340\" y=\"35\" width=\"240\" height=\"50\" rx=\"8\" fill=\"#f Uri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\n:root {\n  --bg: #ffffff;\n  --bg-deep: #f8fafc;\n  --txt: #0f172a;\n  --acc: #1d4ed8;\n  --acc-soft: #eff6ff;\n  --border: #cbd5e1;\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\n  --muted: #64748b;\n  --sidebar-w: 300px;\n}\n\n* { box-sizing: border-box; }\n\nbody { \n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \n  color: var(--txt); \n  background: var(--bg); \n  line-height: 1.6; \n  margin: 0; \n  overflow: hidden; /* App mode */\n}\n\n/* Typography inherited by chapters */\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\n\n/* Components */\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\ntable { width: 100%; border-collapse: collapse; }\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\ntd { padding: 1rem; border-top: 1px solid var(--border); }\n\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\n.accordion[open] .accordion-summary::after { content: \"−\"; }\n\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\n.term-link:hover { background: var(--acc-soft); }\n\nsvg text { fill: #0f172a !important; font-weight: 700; }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 5</div>\n  <h1>Приступаем к планированию</h1>\n  <p class=\"lead lead-para\">Планирование — это не создание документа, а процесс обдумывания будущего. План нужен, чтобы знать, когда мы сбились с пути.</p>\n\n  <h2>1. Философия планирования</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side\">\n      <div class=\"comp-head\">ОШИБКА</div>\n      <p>План — это клятва. Мы должны выполнить его любой ценой, иначе мы плохие менеджеры.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">ПРАВДА</div>\n      <p>План — это прогноз. Он будет меняться. ПМ управляет отклонениями от этого прогноза.</p>\n    </div>\n  </div>\n\n  <h2>2. Алгоритм планирования (Поток)</h2>\n  <p>Планирование идет строго последовательно. Вы не можете оценить сроки, пока не знаете объем работ.</p>\n  \n  <div class=\"accordion-group\">\n    <details class=\"accordion\" open=\"\">\n      <summary class=\"accordion-summary\">Шаг 1. Содержание (Scope)</summary>\n      <div class=\"accordion-content\">Что именно мы делаем? Декомпозиция до пакетов работ (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">WBS</a>).</div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Шаг 2. Ресурсы (Resources)</summary>\n      <div class=\"accordion-content\">Кто это будет делать? Внутренняя команда или аутсорс?</div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Шаг 3. Время и Стоимость (Schedule &amp; Cost)</summary>\n      <div class=\"accordion-content\">Оценка трудозатрат, <a href=\"#\" class=\"term-link\" data-term=\"term-pert\">PERT</a> и критический путь.</div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Шаг 4. Риски и Качество (Risk &amp; Quality)</summary>\n      <div class=\"accordion-content\">Что может пойти не так и как мы это проверим?</div>\n    </details>\n  </div>\n\n  <h2>3. Метод набегающей волны (Rolling Wave)</h2>\n  <div class=\"callout\">\n    В ИТ невозможно спланировать всё сразу на год вперед. Мы планируем ближайший этап (2-4 недели) детально, а остальное — крупными мазками. По мере приближения к этапу мы \"раскрываем\" его детали.\n  </div>\n\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 500 150\" xmlns=\"http://www.w3.org/2000/svg\">\n      <rect x=\"10\" y=\"50\" width=\"100\" height=\"40\" fill=\"var(--acc)\" rx=\"5\"></rect>\n      <text x=\"60\" y=\"75\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\">ДЕТАЛЬНО</text>\n      \n      <rect x=\"120\" y=\"50\" width=\"150\" height=\"40\" fill=\"var(--acc-soft)\" stroke=\"var(--acc)\" stroke-dasharray=\"5,5\" rx=\"5\"></rect>\n      <text x=\"195\" y=\"75\" text-anchor=\"middle\" fill=\"var(--acc)\" font-size=\"10\">ВЕХИ (MILESTONES)</text>\n      \n      <rect x=\"280\" y=\"50\" width=\"200\" height=\"40\" fill=\"#f1f5f9\" stroke=\"#cbd5e1\" stroke-dasharray=\"10,5\" rx=\"5\"></rect>\n      <text x=\"380\" y=\"75\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"10\">ОЦЕНКА \"СВЕРХУ\"</text>\n      \n      <path d=\"M10 110 L490 110\" stroke=\"var(--border)\" stroke-width=\"2\" marker-end=\"url(#arrowhead)\"></path>\n      <text x=\"250\" y=\"135\" text-anchor=\"middle\" font-size=\"12\" fill=\"var(--muted)\">ВРЕМЯ</text>\n    </svg>\n    <div class=\"figcaption\">Суть метода набегающей волны: точность падает при удалении от текущего момента.</div>\n  </div>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\n:root {\n  --bg: #ffffff;\n  --bg-deep: #f8fafc;\n  --txt: #0f172a;\n  --acc: #1d4ed8;\n  --acc-soft: #eff6ff;\n  --border: #cbd5e1;\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\n  --muted: #64748b;\n  --sidebar-w: 300px;\n}\n\n* { box-sizing: border-box; }\n\nbody { \n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \n  color: var(--txt); \n  background: var(--bg); \n  line-height: 1.6; \n  margin: 0; \n  overflow: hidden; /* App mode */\n}\n\n/* Typography inherited by chapters */\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\n\n/* Components */\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\ntable { width: 100%; border-collapse: collapse; }\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\ntd { padding: 1rem; border-top: 1px solid var(--border); }\n\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\n.accordion[open] .accordion-summary::after { content: \"−\"; }\n\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\n.term-link:hover { background: var(--acc-soft); }\n\nsvg text { fill: #0f172a !important; font-weight: 700; }\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <div class=\"kicker\">Управление ИТ-проектом • Глава 6</div>\n  <h1>Планируем содержание: <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a></h1>\n  <p class=\"lead lead-para\">Самая важная часть планирования. Если работы нет в Иерархической Структуре Работ (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a>) — она не входит в проект и за неё не заплатят.</p>\n\n  <div class=\"callout\">\n    <b>Правило 100%:</b> <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> должна содержать 100% работ проекта. Ничего лишнего, но и ничего не пропущено.\n  </div>\n\n  <h2>1. Что такое <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> (<a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">WBS</a>)?</h2>\n  <p>Это графическое представление декомпозиции проекта. Мы разбиваем большую задачу на мелкие «пакеты работ», которые можно оценить по времени и деньгам.</p>\n  \n  <div class=\"figure\">\n    <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_53e802764d_p037_i01.png\" alt=\"WBS Пример 1\" style=\"max-width: 400px; margin-bottom: 1rem;\">\n    <div class=\"figcaption\">Рис. 6.1. Пример классической древовидной декомпозиции из оригинального PDF.</div>\n  </div>\n\n  <h2>2. Правила декомпозиции</h2>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin: 2rem 0;\">\n    <div class=\"card\" style=\"border-left: 5px solid var(--acc);\">\n      <b>Правило 8/80</b>\n      <p>Нижний уровень (пакет работ) не должен быть короче 8 часов и длиннее 80 часов трудозатрат.</p>\n    </div>\n    <div class=\"card\" style=\"border-left: 5px solid var(--acc);\">\n      <b>Результативность</b>\n      <p>Каждый узел <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a> должен иметь понятный результат (deliverable), а не просто процесс \"делание чего-то\".</p>\n    </div>\n  </div>\n\n  <h2>3. Словарь <a href=\"#\" class=\"term-link\" data-term=\"term-wbs\">ИСР</a></h2>\n  <div class=\"table-container\">\n    <table>\n      <t (--acc)\">\n        (P + 4M + O) / 6\n      </text>\n      <text x=\"50\" y=\"90\" font-size=\"10\" fill=\"#64748b\">P: Pessimistic</text>\n      <text x=\"235\" y=\"90\" font-size=\"10\" fill=\"#64748b\">M: Most Likely</text>\n      <text x=\"400\" y=\"90\" font-size=\"10\" fill=\"#64748b\">O: Optimistic</text>\n    </svg>\n    <div class=\"figcaption\">Среднеожидаемая длительность (EAD). Обратите внимание на вес «вероятной» оценки — он в 4 раза выше.</div>\n  </div>\n\n  <h2>2. Критический путь (CPM)</h2>\n  <p>Проект заканчивается тогда, когда закончена самая длинная цепочка задач. Это и есть Критический Путь.</p>\n  \n  <div class=\"table-container\">\n    <table>\n      <thead>\n        <tr>\n          <th>Тип задачи</th>\n          <th>Свойства</th>\n          <th>Действие ПМ-а</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><b>На КП</b></td>\n          <td>Резерв времени = 0. Любая задержка = задержка всего проекта.</td>\n          <td>Жесткий контроль, приоритет ресурсов.</td>\n        </tr>\n        <tr>\n          <td><b>Вне КП</b></td>\n          <td>Есть «люфт» (float). Можно задержать без вреда для дедлайна.</td>\n          <td>Источник ресурсов для задач на КП.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <h2>3. Диаграмма Ганта</h2>\n  <div class=\"figure\">\n    <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_78d09e4545_p041_i01.png\" alt=\"Диаграмма Ганта\" style=\"max-width: 600px; width: 100%;\">\n    <div class=\"figcaption\">Пример из книги: визуализация зависимостей и критического пути.</div>\n  </div>\n\n  <blockquote class=\"insight\">\n    <b>Закон Селиховкина:</b> ПМ управляет не задачами, а «запасом прочности» на критическом пути.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled ass          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ b \" stroke=\"var(--acc)\" stroke-width=\"3\"></path>\n      <line x1=\"50\" y1=\"150\" x2=\"350\" y2=\"150\" stroke=\"#cbd5e1\" stroke-width=\"2\"></line>\n      <line x1=\"50\" y1=\"150\" x2=\"50\" y2=\"30\" stroke=\"#cbd5e1\" stroke-width=\"2\"></line>\n      <text x=\"350\" y=\"170\" text-anchor=\"middle\" font-size=\"10\">ВРЕМЯ</text>\n      <text x=\"30\" y=\"30\" text-anchor=\"middle\" font-size=\"10\" transform=\"rotate(-90 30 30)\">ДЕНЬГИ</text>\n    </svg>\n    <div class=\"figcaption\">S-кривая: накопленные затраты проекта.</div>\n  </div>\n\n  <h2>3. Контроль: Освоенный объем (EVM)</h2>\n  <p>Краткая суть: ПМ должен знать не сколько он <i>потратил</i>, а какую <i>ценность</i> он создал на эти деньги.</p>\n  <div class=\"grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;\">\n    <div class=\"card\"><b>CPI &gt; 1</b> <p>Экономим. Работаем эффективнее, чем планировали.</p></div>\n    <div class=\"card\"><b>CPI &lt; 1</b> <p>Тратим лишнее. Нужно искать «дыры» в процессах.</p></div>\n  </div>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\n:root {\n  --bg: #ffffff;\n  --bg-deep: #f8fafc;\n  --txt: #0f172a;\n  --acc: #1d4ed8;\n  --acc-soft: #eff6ff;\n  --border: #cbd5e1;\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\n  --muted: #64748b;\n  --sidebar-w: 300px;\n}\n\n* { box-sizing: border-box; }\n\nbody { \n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \n  color: var(--txt); \n  back >\n  <div class=\"accordion-group\">\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Уклонение (Avoid)</summary>\n      <div class=\"accordion-content\">Мы меняем план, чтобы риск стал невозможен. <i>Пример: Отказ от использования нестабильной библиотеки.</i></div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Минимизация (Mitigate)</summary>\n      <div class=\"accordion-content\">Снижаем вероятность или влияние. <i>Пример: Проведение обучения для команды перед внедрением новой технологии.</i></div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Перенос (Transfer)</summary>\n      <div class=\"accordion-content\">Отдаем риск кому-то другому. <i>Пример: Аутсорс разработки сложного модуля с фиксированной ценой (Fixed Price).</i></div>\n    </details>\n    <details class=\"accordion\">\n      <summary class=\"accordion-summary\">Принятие (Accept)</summary>\n      <div class=\"accordion-content\">Мы согласны на риск, но создаем денежный резерв. <i>Пример: «Если сервер упадет — мы купим новый из резервного фонда».</i></div>\n    </details>\n  </div>\n\n  <h2>3. Резервы</h2>\n  <div class=\"comparison\">\n    <div class=\"comp-side\">\n      <div class=\"comp-head\">ТЕХНИЧЕСКИЙ (Contingency)</div>\n      <p>Для \"известных неизвестных\". Входит в базовый план. Распоряжается ПМ.</p>\n    </div>\n    <div class=\"comp-side comp-good\">\n      <div class=\"comp-head\">УПРАВЛЕНЧЕСКИЙ (Management)</div>\n      <p>Для форс-мажоров. НЕ входит в план ПМ-а. Распоряжается <a href=\"#\" class=\"term-link\" data-term=\"term-sponsor\">Спонсор</a>.</p>\n    </div>\n  </div>\n\n  <blockquote class=\"insight\">\n    <b>Инсайт:</b> Профессиональный ПМ на вопрос «Когда закончите?» всегда дает две даты: оптимистичную и дату с учетом рисков.\n  </blockquote>\n</main>\n\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n ghlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits eight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\n:root {\n  --bg: #ffffff;\n  --bg-deep: #f8fafc;\n  --txt: #0f172a;\n  --acc: #1d4ed8;\n  --acc-soft: #eff6ff;\n  --border: #cbd5e1;\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\n  --muted: #64748b;\n  --sidebar-w: 300px;\n}\n\n* { box-sizing: border-box; }\n\nbody { \n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \n  color: var(--txt); \n  background: var(--bg); \n  line-height: 1.6; \n  margin: 0; \n  overflow: hidden; /* App mode */\n}\n\n/* Typography inherited by chapters */\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\n\n/* Components */\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 <script>

  const T        = ["О чем эта книга?","Тройственное ограничение","Роли: Кто есть кто?","Инициация: Рождение проекта","Приступаем к планированию","Планируем содержание: ИСР","Команда и ресурсы","Сроки: Математика прогнозов","Стоимость: Бюджет и Контроль","Люди и Связи","Управление рисками: План Б","Качество: Не только баги","Выполнение и Контроль","Что делать после первого проекта?","Библиотека ПМ-а","Глоссарий","Приложения и Шаблоны"];
  const CHAPTERS = JSON.parse(document.getElementById('book-chapters').textContent);
  const SIDX     = JSON.parse(document.getElementById('book-search').textContent);

  // ── Helper to escape HTML for safe injection into innerHTML ───────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Safe Storage ──────────────────────────────────────────────────────────
  const store = {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const fr       = document.getElementById('fr');
  const tt       = document.getElementById('tt');
  const bar      = document.getElementById('bar');

  const overlay  = document.getElementById('overlay');

  // ── i18n helpers ─────────────────────────────────────────────────────────
  searchEl.placeholder = LANG.search_placeholder || 'Search...';
  document.getElementById('prev-btn').textContent = LANG.prev || '<';

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? (LANG.theme_to_light || '☀') : (LANG.theme_to_dark || '☾');
    store.set('theme_' + BOOK_ID, t);
    // Propagate to iframe via postMessage
    if (fr.contentWindow) {
      fr.contentWindow.postMessage({ action: 'setTheme', theme: t }, '*');
    }
  }
  const savedTheme = store.get('theme_' + BOOK_ID)
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

  themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Bookmarks ─────────────────────────────────────────────────────────────
  function getBookmarks() {
    try { return JSON.parse(store.get('bm_' + BOOK_ID) || '[]'); }

  }

    store.set('bm_' + BOOK_ID, JSON.stringify(bm));
  }

    updateBookmarkBtn();
    buildBookmarkList();
    buildList(searchFilter); // refresh stars in chapter list
  }
  function updateBookmarkBtn() {
    const bm = getBookmarks();
    bmBtn.textContent = bm.includes(cur) ? (LANG.bookmark_remove || '★') : (LANG.bookmark_add || '☆');
  }

    const bm = getBookmarks();

      bmList.appendChild(btn);
    });
  }

  function searchChapters(query) {
    const words = query.toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, ' ')
      .split(/\s+/)
      .filter(w => w.length > 1);
    if (!words.length) return null; // null = show all

    const wordSets = words.map(word => {
      const hits = new Set();
      for (const [key, indices] of Object.entries(SIDX)) {
        if (key.startsWith(word)) indices.forEach(i => hits.add(i));
      }
      return hits;
    });

    // AND intersection
    let result = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      result = new Set([...result].filter(x => wordSets[i].has(x)));
    }
    return result;
  }

      document.querySelectorAll('.ch').forEach(el => el.classList.toggle('on', +el.dataset.i === i));

    };

    if (document.startViewTransition) {
      document.startViewTransition(doSwitch);
    } else {
      doSwitch();
    }
  }

  // ── Sidebar chapter list ──────────────────────────────────────────────────
  function buildList(filter) {
    searchFilter = filter || '';
    const list = document.getElementById('list');
    list.innerHTML = '';
    const matchSet = filter ? searchChapters(filter.toLowerCase()) : null;
    const bm = getBookmarks();
    const frag = document.createDocumentFragment();

    T.forEach((t, i) => {
      if (matchSet !== null && !matchSet.has(i)) return;
      const btn = document.createElement('button');
      btn.className = 'ch' + (i === cur ? ' on' : '');
      btn.dataset.i = i;
      const chLabel = (LANG.chapter_label || 'Chapter {n}').replace('{n}', i + 1);
      btn.innerHTML = `<b>${chLabel}</b>${esc(t)}${bm.includes(i) ? '<span class="bm-star">★</span>' : ''}`;
      btn.onclick = () => { go(i); closeSidebarMobile(); };
      frag.appendChild(btn);
    });
    list.appendChild(frag);

    if (matchSet !== null && matchSet.size === 0) {
      list.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">—</div>`;
    }
  }

  // ── Mobile sidebar ────────────────────────────────────────────────────────
  function closeSidebarMobile() {
    if (window.innerWidth <= 860) side.classList.remove('open');
  }

  document.getElementById('menu-btn').onclick = e => {
    e.stopPropagation();
    if (window.innerWidth <= 860) {
      side.classList.toggle('open');
    } else {
      app.classList.toggle('side-hide');
    }
  };
  overlay.onclick = () => side.classList.remove('open');

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    // Allow Escape from search box to also close mobile sidebar
    if (e.target === searchEl) {
      if (e.key === 'Escape') { searchEl.blur(); closeSidebarMobile(); }
      return;
    }
    if (e.key === 'Escape')    closeSidebarMobile();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });

  // ── postMessage bridge (from iframe to shell) ─────────────────────────────
  window.addEventListener('message', e => {
    if (e.source !== fr.contentWindow) return;
    const data = e.data;
    if (!data) return;

    if (data.action === 'bookGo') {
      let targetIdx = -1;
      
      // Global Anchor resolution takes absolute precedence over filename chunk bounds
      if (data.anchorId && ANCHORS[data.anchorId] !== undefined) {
        targetIdx = ANCHORS[data.anchorId];
      }
      else if (data.filename) {
        targetIdx = FILES.indexOf(data.filename.toLowerCase());
        if (targetIdx === -1 && data.filename.includes('chapter')) {
           const m = data.filename.match(/chapter(\d+)/i);
           if (m) {
             const idxHint = parseInt(m[1], 10) - 1;
             targetIdx = idxHint < FILES.length ? idxHint : -1;
           }
        }
      }
      
      if (targetIdx === -1 && data.chapterIdx !== undefined) targetIdx = data.chapterIdx;
      
      if (targetIdx >= 0 && targetIdx < CHAPTERS.length) {
        go(targetIdx, data.anchorId);
      }
    } 
    else if (data.action === 'scrollReport') {
      store.set('sc_' + BOOK_ID + '_' + cur, data.ratio.toFixed(4));
    }
    else if (data.action === 'requestAsset') {
      const b64 = ASSETS[data.key];
      if (b64) {
        fr.contentWindow.postMessage({ action: 'provideAsset', key: data.key, dataUri: b64 }, '*');
      }
    }
    else if (data.action === 'guestReady') {
      // Send theme
      fr.contentWindow.postMessage({ action: 'setTheme', theme: document.documentElement.getAttribute('data-theme') }, '*');
      
      // Handle position restoring
      if (!pendingAnchor) {
        const savedRatio = parseFloat(store.get('sc_' + BOOK_ID + '_' + cur) || '0');
        if (savedRatio > 0.005) {
          fr.contentWindow.postMessage({ action: 'setScrollRatio', ratio: savedRatio }, '*');
        }
      }

      // Handle anchor or search
      if (pendingAnchor) {
        fr.contentWindow.postMessage({ action: 'scrollToAnchor', anchorId: pendingAnchor }, '*');
        pendingAnchor = null;
      } else if (searchFilter) {
        fr.contentWindow.postMessage({ action: 'highlightSearch', query: searchFilter }, '*');
      }
    }
    else if (data.action === 'searchHitsFound') {
      if (data.count > 0) {
        searchPrev.style.display = 'block';
        searchNext.style.display = 'block';
      }
    }
    else if (data.action === 'keypress') {
      if (data.key === 'Escape') closeSidebarMobile();
      if (data.key === 'ArrowRight' || data.key === 'ArrowDown') go(cur + 1);
      if (data.key === 'ArrowLeft'  || data.key === 'ArrowUp') go(cur - 1);
    }
  });

  searchPrev.onclick = () => {
    if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'prevSearchHit' }, '*');
  };
  searchNext.onclick = () => {
    if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'nextSearchHit' }, '*');
  };

  // ── Wire up buttons ───────────────────────────────────────────────────────
  document.getElementById('prev-btn').onclick = () => go(cur - 1);
  document.getElementById('next-btn').onclick = () => go(cur + 1);

  // ── Print chapter in new window (iframes don't render in browser print) ──────
  // Restores lazy images from ASSETS dict before opening, so images print correctly.
  document.getElementById('print-btn').onclick = () => {
    const win = window.open('', '_blank', 'width=960,height=800');
    if (!win) { alert('Allow popups for this page to print.'); return; }
    // Restore lazy images: replace placeholder src + data-src with actual data-URI
    let printHtml = CHAPTERS[cur]
      .replace(/<script\b[\s\S]*?<\/script>/gi, '')  // strip navScript (no parent to message)
      .replace(
        /src="data:image\/gif;base64,[^"]*"\s+data-src="([^"]+)"/gi,
        (_, key) => `src="${ASSETS[key] || ''}"`);
    win.document.open();
    win.document.write(printHtml);
    win.document.close();
    // Use setTimeout instead of win.load event: after document.write()+close(),
    // the load event may have already fired before addEventListener() is called.
    setTimeout(() => win.print(), 400);
  };
  let searchDebounce;
  searchEl.oninput = e => {
    clearTimeout(searchDebounce);
    const val = e.target.value;
    searchDebounce = setTimeout(() => {
      buildList(val);
      if (fr.contentWindow) fr.contentWindow.postMessage({ action: 'highlightSearch', query: val }, '*');
      if (!val) {
        searchPrev.style.display = 'none';
        searchNext.style.display = 'none';
      }
    }, 300);
  };

  // ── Initial render ────────────────────────────────────────────────────────
  buildBookmarkList();
  buildList('');
  const saved = parseInt(store.get('prog_' + BOOK_ID) || '0', 10);
  go(isNaN(saved) || saved >= T.length ? 0 : saved);

})();
</script>
</body>
</html>
