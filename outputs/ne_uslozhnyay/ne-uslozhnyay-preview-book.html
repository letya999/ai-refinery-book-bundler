<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интерактивная книга</title>
<style>
:root{--bg:#081423;--panel:#0f1f38;--panel2:#163056;--line:#395f9d;--text:#eef5ff;--muted:#adc2e1;--acc:#72d8ff;--acc2:#87efc9}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:radial-gradient(circle at 85% -20%,#2e5e9d 0,#152846 36%,#081423 72%);color:var(--text);font-family:"Trebuchet MS","Segoe UI Variable",Tahoma,sans-serif;overflow:hidden}
.app{display:grid;grid-template-columns:280px 1fr;height:100vh;position:relative;z-index:1}
.stars{position:fixed;inset:0;pointer-events:none;background:radial-gradient(1px 1px at 20px 30px,#fff,rgba(0,0,0,0)),radial-gradient(1.5px 1.5px at 40px 70px,#fff,rgba(0,0,0,0)),radial-gradient(1px 1px at 90px 40px,#fff,rgba(0,0,0,0));background-size:200px 200px;animation:twinkle 5s infinite;opacity:0.4;z-index:0}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.5}}
.app.side-hide{grid-template-columns:1fr}
.side{border-right:1px solid #2a4a7d;background:linear-gradient(180deg,rgba(15,31,56,0.95),rgba(11,22,45,0.98));display:flex;flex-direction:column;backdrop-filter:blur(10px)}
.app.side-hide .side{display:none}
.brand{padding:16px 14px;border-bottom:1px solid #223258}
.brand h1{font-size:16px;line-height:1.2;margin-bottom:6px}
.brand p{font-size:12px;color:var(--muted)}
.search-box{padding:10px;border-bottom:1px solid #223258}
.search-box input{width:100%;padding:8px;background:#0c1831;border:1px solid #3f66a6;color:#fff;border-radius:6px}
.list{padding:10px;display:grid;gap:8px;overflow:auto}
.ch{all:unset;cursor:pointer;padding:10px 12px;border-radius:10px;border:1px solid #3f66a6;background:rgba(17,31,57,.72);font-size:13px;line-height:1.35;color:#dce9ff}
.ch:hover{border-color:var(--acc)}
.ch.on{background:linear-gradient(135deg,rgba(114,216,255,.2),rgba(135,239,201,.14));border-color:var(--acc)}
.foot{margin-top:auto;padding:10px;border-top:1px solid #223258;color:var(--muted);font-size:12px}
.main{display:flex;flex-direction:column;min-width:0;background:rgba(8,20,35,0.4)}
.top{height:48px;flex-shrink:0;border-bottom:1px solid #2c4d80;background:rgba(13,25,49,0.8);display:flex;align-items:center;gap:10px;padding:0 10px;backdrop-filter:blur(8px)}
.top button{all:unset;cursor:pointer;padding:6px 10px;border:1px solid #456fb0;border-radius:8px;color:#d6e7ff;font-size:12px}
.top button:hover{border-color:var(--acc);color:#fff}
.tt{font-size:13px;color:#cfe0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tt b{color:#fff;font-weight:700}
.prog{height:4px;background:#234071;position:relative}
.prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .25s}
.frame{flex:1;min-height:0;view-transition-name: chapter-frame}
.frame iframe{width:100%;height:100%;border:none;background:#0c1831;display:block}
.mob{display:inline-block}

::view-transition-old(chapter-frame) {
  animation: 200ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
}
::view-transition-new(chapter-frame) {
  animation: 300ms cubic-bezier(0, 0, 0.2, 1) both fade-in;
}
@keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* Print CSS */
@media print {
  .side, .top, .prog, .stars { display: none !important; }
  .app { display: block; height: auto; overflow: visible; background: #fff; color: #000; }
  .frame { height: auto; overflow: visible; }
  .frame iframe { height: 100vh; background: #fff; }
}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
@media (max-width:900px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:86vw;max-width:320px;transform:translateX(-100%);transition:.25s;z-index:20;box-shadow:10px 0 30px rgba(0,0,0,.4)}
  .side.open{transform:translateX(0)}
  .app.side-hide .side{display:flex}
}
</style>
<script>
// Modules: Annotations & Analytics
const BookModules = {
  logEvent: (action, chapterIndex) => {
    try {
        let events = JSON.parse(localStorage.getItem('book_analytics') || '[]');
        events.push({ action, chapterIndex, time: Date.now() });
        localStorage.setItem('book_analytics', JSON.stringify(events));
    } catch(e) {}
  },
  saveBookmark: (chapterIndex) => {
    try {
        localStorage.setItem('book_last_chapter', String(chapterIndex));
    } catch(e) {}
  }
};
</script>
</head>
<body>
<div class="stars"></div>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1>Интерактивная книга</h1>
      <p>Ознакомительный фрагмент</p>
    </div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Поиск по книге...">
    </div>
    <div class="list" id="list"></div>
    <div class="foot">Навигация: главы, кнопки, клавиши ← →</div>
  </aside>

  <section class="main">
    <div class="top">
      <button class="mob" id="menu">☰</button>
      <button id="prev">← Назад</button>
      <button id="next">Вперед →</button>
      <div class="tt" id="tt"></div>
    </div>
    <div class="prog"><i id="bar"></i></div>
    <div class="frame"><iframe id="fr"></iframe></div>
  </section>
</div>

           люди (эго) \n         \n         \n           \n           процесс (хаос) \n         \n         \n         \n           \n           цели (туман) \n         \n         \n           \n           связь (разрыв) \n         \n         крах \n       \n       диаграмма исикавы: типовые причины провала без системного метода. \n     \n\n     суть перехода \n     \n        \n       схема читается слева направо: хаос → управленческий цикл → устойчивый результат. \n     \n\n     \n       \n         сложно (pmbok/prince2) \n         сотни процессов, тяжелые отчеты, порог входа в месяцы обучения. риск бюрократического паралича. \n       \n       \n         просто (p3.express) \n         33 понятных шага, фокус на ритме и принципах. запуск за 1 день. минимум лишнего шума. \n       \n     \n\n     \n        1. диагностика  фиксируем точки потерь: где плавают сроки, роли и риски.  \n        2. ритм  внедряем недельный и ежедневный контур. регулярность важнее штурмов.  \n        3. закрепление  цикл замыкается на ретроспективу и обновление артефактов.  \n     \n\n     \n       как это работает на практике? \n       p3.express — это не про бюрократию, а про ритм. мы не пишем отчеты ради отчетов, мы создаем ценность. весь процесс укладывается в  понятную схему-улитку , где каждый шаг логичен и необходим. \n     \n   \n \n\n \nconst cv=document.getelementbyid('flow');\nconst ctx=cv.getcontext('2d');\nconst base_w=1080, base_h=370;\nfunction rr(x,y,w,h,r){ctx.beginpath();ctx.moveto(x+r,y);ctx.arcto(x+w,y,x+w,y+h,r);ctx.arcto(x+w,y+h,x,y+h,r);ctx.arcto(x,y+h,x,y,r);ctx.arcto(x,y,x+w,y,r);ctx.closepath();}\nfunction wrap(text,x,y,maxw,lineh,color,font){ctx.fillstyle=color;ctx.font=font;const words=text.split(' ');let line='';let row=0;for(let i=0;i maxw && i>0){ctx.filltext(line,x,y+row*lineh);line=words[i]+' ';row++;} else line=test;}if(line) ctx.filltext(line,x,y+row*lineh);}\nfunction drawbox(x,y,w,h,title,rows,fill,stroke,titlecolor,rowcolor){ctx.fillstyle=fill;ctx.strokestyle=stroke;ctx.linewidth=2;rr(x,y,w,h,16);ctx.fill();ctx.stroke();wrap(title,x+16,y+40,w-32,30,titlecolor,'700 30px \"trebuchet ms\"');rows.foreach((r,i)=>wrap('• '+r,x+16,y+88+i*34,w-30,26,rowcolor,'19px \"trebuchet ms\"'));}\nfunction arrow(x1,y1,x2,y2){ctx.strokestyle='#5fc9ef';ctx.linewidth=6;ctx.beginpath();ctx.moveto(x1,y1);ctx.lineto(x2,y2);ctx.stroke();const a=math.atan2(y2-y1,x2-x1),l=14;ctx.fillstyle='#5fc9ef';ctx.beginpath();ctx.moveto(x2,y2);ctx.lineto(x2-l*math.cos(a-0.4),y2-l*math.sin(a-0.4));ctx.lineto(x2-l*math.cos(a+0.4),y2-l*math.sin(a+0.4));ctx.closepath();ctx.fill();}\nfunction draw(){\n  ctx.clearrect(0,0,base_w,base_h);\n  drawbox(20,26,322,318,'хаос',['случайные решения','реакция вместо плана','риски'], '#31274a','#69578f','#f4ecff','#ddcff7');\n  drawbox(378,26,318,318,'p3.express',['принципы nup','ритм цикла','уроки'], '#17334c','#4d81a5','#eaf6ff','#c8e1f6');\n  drawbox(732,26,328,318,'управление',['прогресс','меньше переделок','результат'], '#1b3850','#598bb2','#eef8ff','#d1e6fa');\n  arrow(350,184,372,184); arrow(704,184,726,184);\n}\nfunction setupcanvas(){\n  const dpr=math.max(1,window.devicepixelratio||1);\n  const cssw=cv.clientwidth||base_w;\n  const cssh=math.round(cssw*(base_h/base_w));\n  cv.style.height=cssh+'px';\n  cv.width=math.round(cssw*dpr); cv.height=math.round(cssh*dpr);\n  ctx.settransform(dpr,0,0,dpr,0,0); ctx.scale(cssw/base_w,cssh/base_h); draw();\n}\nsetupcanvas(); window.addeventlistener('resize',setupcanvas);\n \n\n \ndocument.addeventlistener('click', e => {\n  const a = e.target.closest('a');\n  if (a && a.getattribute('href')) {\n    const href = a.getattribute('href');\n    if (href.startswith('http') || href.startswith('mailto:')) return;\n    \n    e.preventdefault();\n    // logic: find chapter index by filename or keyword in href\n    let targetidx = -1;\n    let anchor = null;\n    \n    const parts = href.split('#');\n    const pathpart = parts[0].tolowercase();\n    anchor = parts[1] || null;\n    \n    if (pathpart.includes('chapter')) {\n       const m = pathpart.match(/chapter(\\d+)/);\n       if (m) targetidx = parseint(m[1]) - 1;\n    } else if (!pathpart) {\n       // just anchor in current chapter\n       const el = document.getelementbyid(anchor);\n       if (el) el.scrollintoview({behavior:'smooth'});\n       return;\n    }\n    \n    if (targetidx !== -1 && window.parent) {\n      window.parent.postmessage({ action: 'bookgo', chapteridx: targetidx, anchorid: anchor }, '*');\n    }\n  }\n});","2. схема p3.express (спираль) \r\n \r\n:root{--bg:#081423;--panel:#0f1f38;--line:#395f9d;--txt:#eef5ff;--muted:#adc2e1;--acc:#72d8ff;--acc2:#87efc9;--warn:#ffd18a}\r\n*{box-sizing:border-box}\r\nbody{margin:0;background:radial-gradient(circle at 84% -18%,#2f5f9f 0,#162846 42%,#081423 76%);color:var(--txt);font:16px/1.6 \"trebuchet ms\",\"segoe ui variable\",tahoma,sans-serif}\r\n.wrap{max-width:1180px;margin:0 auto;padding:26px 16px 56px}\r\n.hero{padding:22px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(145deg,rgba(114,216,255,.15),rgba(135,239,201,.1));margin-bottom:20px}\r\n.kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}\r\nh1{margin:8px 0 10px;font-size:clamp(30px,5vw,52px);line-height:1.03}\r\n.sec{padding:16px;border:1px solid #345790;border-radius:14px;background:rgba(10,18,34,.82)}\r\n.layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}\r\n.canvas-wrap{border:1px solid #3a609f;border-radius:12px;background:#fff;padding:0;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.3)}\r\n#spiral{display:block;width:100%;height:auto;max-width:770px;background:#fff}\r\n.tools{border:1px solid #3c629f;border-radius:12px;background:#10203a;padding:12px}\r\n.btns{display:grid;gap:6px}\r\nbutton{all:unset;cursor:pointer;padding:8px 10px;border-radius:9px;border:1px solid #4a71b3;background:rgba(18,30,58,.72);font-size:12px;text-transform:uppercase;font-weight:700;transition:0. enderbtns();\r\ndraw();\r\n \n \ndocument.addeventlistener('click', e => {\n  const a = e.target.closest('a');\n  if (a && a.getattribute('href')) {\n    const href = a.getattribute('href');\n    if (href.startswith('http') || href.startswith('mailto:')) return;\n    \n    e.preventdefault();\n    // logic: find chapter index by filename or keyword in href\n    let targetidx = -1;\n    let anchor = null;\n    \n    const parts = href.split('#');\n    const pathpart = parts[0].tolowercase();\n    anchor = parts[1] || null;\n    \n    if (pathpart.includes('chapter')) {\n       const m = pathpart.match(/chapter(\\d+)/);\n       if (m) targetidx = parseint(m[1]) - 1;\n    } else if (!pathpart) {\n       // just anchor in current chapter\n       const el = document.getelementbyid(anchor);\n       if (el) el.scrollintoview({behavior:'smooth'});\n       return;\n    }\n    \n    if (targetidx !== -1 && window.parent) {\n      window.parent.postmessage({ action: 'bookgo', chapteridx: targetidx, anchorid: anchor }, '*');\n    }\n  }\n});","3. nup: принципы и оценка зрелости \n \n:root{--bg:#071423;--panel:#10213c;--panel2:#172c4f;--line:#385f9c;--txt:#eef5ff;--muted:#adbfde;--acc:#6fd7ff;--acc2:#85efc7;--warn:#ffd48f;--bad:#ff8f8f}\n*{box-sizing:border-box}\nbody{margin:0;background:radial-gradient(circle at 10% -18%,#2a5ea2 0,#152747 42%,#071423 76%);color:var(--txt);font:16px/1.6 \"trebuchet ms\",\"segoe ui variable\",tahoma,sans-serif}\n.wrap{max-width:1160px;margin:0 auto;padding:26px 16px 56px}\n.hero{padding:22px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,rgba(111,215,255,.15),rgba(133,239,199,.1));box-shadow:0 18px 40px rgba(0,0,0,.34)}\n.kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}\nh1{margin:8px 0 10px;font-size:clamp(30px,5vw,52px);line-height:1.03}\n.lead{margin:0;max-width:920px;color:#dbe8ff}\n.sec{margin-top:20px;padding:16px;border:1px solid #34568f;border-radius:14px;background:rgba(9,17,33,.8)}\n.sec h2{margin:0 0 10px;font-size:28px}\n.scale{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:8px}\n.lv{padding:10px;border-radius:10px;border:1px solid #3c629f;background:rgba(16,30,56,.7);font-size:13px}\n.lv b{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#ffe4b3;margin-bottom:4px}\n.principles{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}\n.p{padding:10px;border:1px solid #3b619f;border-radius:12px;background:linear-gradient(165deg,#12213d,#1a3059)}\n.p canvas{display:block;width:100%;height:auto;border-radius:8px;border:1px solid #2d4b7f;background:#0c1730}\n.p b{display:block;margin-top:8px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#d6e5ff}\n.p h3{margin:2px 0 4px;font-size:19px}\n.p p{margin:0;color:#d8e6ff;font-size:14px}\n.assess{margin-top:12px;display:grid;grid-template-columns:360px 1fr;gap:12px}\n.panel{border:1px solid #3b619f;border-radius:12px;background:#0f1d37;padding:10px;background-image:linear-gradient(rgba(111,215,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(111,215,255,0.03) 1px,transparent 1px);background-size:20px 20px}\n#radar,#bars{display:block;width:100%;height:auto;border-radius:8px;background:#0d1730;border:1px solid #2e4f84}\n.ctrl .row{margin-bottom:8px}\n.ctrl label{display:flex;justify-content:space-between;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#cfe1ff;margin-bottom:4px;font-weight:700}\ninput[type=range]{width:100%}\n.quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}\n.quick button{all:unset;cursor:pointer;padding:8px 10px;border:1px solid #4a70b2;border-radius:8px;background:rgba(22,35,64,.8);font-size:12px;text-align:center}\n.quick button:hover{border-color:#6fd7ff}\n.score{margin-top:10px;padding:10px;border:1px solid #5379b5;border-radius:10px;background:rgba(111,215,255,.12)}\n.score b{font-size:24px;line-height:1;color:#fff}\n.focus{margin-top:8px;padding:10px;border:1px solid rgba(255,143,143,.5);border-radius:10px;background:rgba(255,143,143,.1);color:#ffe2e2}\n.matrix{margin-top:12px;overflow:auto;border:1px solid #4066a5;border-radius:12px}\ntable{width:100%;border-collapse:collapse;background:#0f1a31}\nth,td{padding:10px 12px;border-bottom:1px solid #2f4f88;vertical-align:top}\nth{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#cbe0ff;background:#152646;text-align:left}\ntd{color:#d8e7ff}\n.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;border:1px solid #597db8;background:rgba(111,215,255,.16)}\n@media(max-width:980px){.assess{grid-template-columns:1fr}.scale{grid-template-columns:1fr 1fr}}\n \n \n \n \n   \n     ознакомительный фрагмент • глава 3 \n     nup: принципы + нормальная оценка \n     без оценочной шкалы принципы превращаются в лозунги. ниже: четкая шкала 1–5, профиль зрелости по 6 принципам и приоритеты улучшения. \n   \n\n   \n     шкала nup (1–5) \n     \n        1 не применяется, решения хаотичны. \n        2 есть попытки, но без стабильности. \n        3 базово работает в части команды. \n        4 стабильно применяется в цикле. \n        5 эталон: воспроизводимо и масштабируется. \n     \n\n      \n\n     \n       \n          \n       \n       \n         \n           кризисный режим \n           базовый уровень \n           сильная команда \n         \n          \n          \n          \n          \n       \n     \n\n     \n       \n           принцип  ритуал  метрика  статус   \n          \n       \n     \n   \n \n \nconst data=[\n {k:'nup1',name:'истина важнее привязанности',short:'решение по фактам, не по эго.',rit:'факт-ревью еженедельно',met:'% решений, измененных по данным',icon:'truth'},\n {k:'nup2',name:'береги энергию и ресурсы',short:'убираем лишнюю активность.',rit:'лимиты wip и приоритет-фильтр',met:'незавершенные задачи в цикле',icon:'energy'},\n {k:'nup3',name:'будь проактивен',short:'ловим риск до пожара.',rit:'риск-радар на неделю вперед',met:'доля рисков до эскалации',icon:'pro'},\n {k:'nup4',name:'усиливай слабое звено',short:'бьем в bottleneck.',rit:'один bottleneck на цикл',met:'время прохождения узкого места',icon:'bottle'},\n {k:'nup5',name:'ничего без цели',short:'каждое действие = outcome.',rit:'цель у каждой встречи/дока',met:'доля действий без измеримого эффекта',icon:'target'},\n {k:'nup6',name:'воспроизводимые элементы',short:'шаблоны и чек-листы.',rit:'ретро + обновление стандартов',met:'повторяемость ошибок',icon:'blocks'}\n];\nlet vals=[3,3,2,2,3,2];\nconst principles=document.getelementbyid('principles');\nconst controls=document.getelementbyid('controls');\nconst scorebox=document.getelementbyid('score');\nconst focusbox=document.getelementbyid('focus');\nconst mt=document.getelementbyid('mt');\n\nfunction drawicon(c,type){\n  const x=c.getcontext('2d');const w=c.width,h=c.height;\n  x.fillstyle='#0d1c38';x.fillrect(0,0,w,h);\n  if(type==='truth'){\n    x.strokestyle='#70d8ff';x.linewidth=3;x.beginpath();x.moveto(40,80);x.lineto(120,30);x.lineto(210,90);x.lineto(280,40);x.stroke();\n    x.fillstyle='#85efc7';x.beginpath();x.arc(280,40,14,0,math.pi*2);x.fill();\n  }else if(type==='energy'){\n    x.fillstyle='#ffd48f';x.fillrect(36,26,90,68);x.fillstyle='#0d1c38';x.fillrect(52,38,58,44);\n    x.fillstyle='#70d8ff';x.fillrect(145,36,28,58);x.fillrect(179,48,28,46);x.fillrect(213,26,28,68);\n  }else if(type==='pro'){\n    x.strokestyle='#85efc7';x.linewidth=3;x.beginpath();x.arc(82,60,32,0,math.pi*2);x.stroke();\n    x.fillstyle='#85efc7';x.fillrect(108,56,82,8);\n    x.beginpath();x.moveto(190,60);x.lineto(176,50);x.lineto(176,70);x.fill();\n    x.fillstyle='#ffd48f';x.fillrect(220,34,58,52);\n  }else if(type==='bottle'){\n    x.fillstyle='#70d8ff';x.fillrect(34,34,96,54);x.fillstyle='#ffd48f';x.fillrect(130,46,24,30);x.fillstyle='#85efc7';x.fillrect(154,30,120,62);\n  }else if(type==='target'){\n    x.strokestyle='#70d8ff';x.linewidth=3;[46,34,22].foreach(r=>{x.beginpath();x.arc(84,60,r,0,math.pi*2);x.stroke();});\n    x.fillstyle='#ffd48f';x.fillrect(84,58,130,4);x.fillrect(204,48,4,24);\n  }else if(type==='blocks'){\n    x.fillstyle='#70d8ff';x.fillrect(30,26,72,32);x.fillstyle='#85efc7';x.fillrect(108,26,72,32);x.fillstyle='#ffd48f';x.fillrect(30,64,72,32);x.fillstyle='#bfd3f2';x.fillrect(108,64,72,32);\n    x.strokestyle='#9bb8eb';x.linewidth=2;x.strokerect(214,34,68,58);\n  }\n}\n\nfunction buildprinciples(){\n  principles.innerhtml='';\n  data.foreach((p,i)=>{\n    const el=document.createelement('article');el.classname='p';\n    el.innerhtml=`   ${p.k}  ${p.name}  ${p.short} `;\n    principles.appendchild(el);\n    drawicon(el.queryselector('canvas'),p.icon);\n  });\n}\n\nfunction leveltext(total){\n  if(total риск ';\n  if(v===3)return ' база ';\n  return ' сильно ';\n}\n\nfunction rendercontrols(){\n  controls.innerhtml='';\n  data.foreach((p,i)=>{\n    const row=document.createelement('div');row.classname='row';\n    row.innerhtml=` ${p.k}  ${vals[i]}/5   `;\n    controls.appendchild(row);\n  });\n  controls.queryselectorall('input').foreach(inp=>inp.addeventlistener('input',e=>{vals[+e.target.dataset.i]=+e.target.value;refresh();}));\n}\n\nfunction drawradar(){\n  const cv=document.getelementbyid('radar');const x=cv.getcontext('2d');const w=cv.width,h=cv.height,cx=w/2,cy=h/2,r=120;\n  x.clearrect(0,0,w,h);\n  x.strokestyle='rgba(180,205,255,.28)';\n  for(let l=1;l {const a=(-90+i*60)*math.pi/180;x.beginpath();x.moveto(cx,cy);x.lineto(cx+math.cos(a)*r,cy+math.sin(a)*r);x.stroke();x.fillstyle='#cfe1ff';x.font='12px \"trebuchet ms\"';x.filltext(p.k,cx+math.cos(a)*(r+14)-16,cy+math.sin(a)*(r+14));});\n  x.beginpath();\n  vals.foreach((v,i)=>{const a=(-90+i*60)*math.pi/180;const r=r*v/5;const px=cx+math.cos(a)*r,py=cy+math.sin(a)*r;i?x.lineto(px,py):x.moveto(px,py)});\n  x.closepath();\n  const g=x.createlineargradient(0,0,w,h);g.addcolorstop(0,'rgba(111,215,255,.45)');g.addcolorstop(1,'rgba(133,239,199,.34)');\n  x.fillstyle=g;x.strokestyle='#86e7ff';x.linewidth=2;x.fill();x.stroke();\n}\n\nfunction drawbars(){\n  const cv=document.getelementbyid('bars');const x=cv.getcontext('2d');\n  x.clearrect(0,0,cv.width,cv.height);\n  x.fillstyle='#0d1730';x.fillrect(0,0,cv.width,cv.height);\n  const gap=18,bw=(cv.width-80-gap*5)/6;\n  data.foreach((p,i)=>{\n    const h=vals[i]*24;\n    x.fillstyle='rgba(111,215,255,.9)';x.fillrect(30+i*(bw+gap),150-h,bw,h);\n    x.fillstyle='#d8e7ff';x.font='12px \"trebuchet ms\"';x.filltext(p.k,30+i*(bw+gap)+bw/2-14,166);\n    x.fillstyle='#ffd48f';x.filltext(vals[i]+'/5',30+i*(bw+gap)+bw/2-14,146-h);\n  });\n}\n\nfunction rendermatrix(){\n  mt.innerhtml='';\n  data.foreach((p,i)=>{\n    const tr=document.createelement('tr');\n    tr.innerhtml=` ${p.k}  ${p.rit}  ${p.met}  ${statusbadge(vals[i])} `;\n    mt.appendchild(tr);\n  });\n}\n\nfunction renderscore(){\n  const total=vals.reduce((a,b)=>a+b,0);\n  const pct=math.round(total/30*100);\n  scorebox.innerhtml=` ${total}/30  • ${pct}% • уровень: ${leveltext(total)}`;\n  const sorted=vals.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v).slice(0,2).map(o=>data[o.i]);\n  focusbox.innerhtml=' фокус улучшения:  '+sorted.map(s=>`${s.k} (${s.name})`).join(' и ')+'.';\n}\n\nfunction refresh(){rendercontrols();drawradar();drawbars();renderscore();rendermatrix();}\n\nbuildprinciples();\nrefresh();\ndocument.queryselectorall('.quick button').foreach(b=>b.addeventlistener('click',()=>{\n  if(b.dataset.preset==='low') vals=[1,2,1,2,2,1];\n  if(b.dataset.preset==='mid') vals=[3,3,3,2,3,3];\n  if(b.dataset.preset==='high') vals=[5,4,4,4,5,4];\n  refresh();\n}));\n \n\n \ndocument.addeventlistener('click', e => {\n  const a = e.target.closest('a');\n  if (a && a.getattribute('href')) {\n    const href = a.getattribute('href');\n    if (href.startswith('http') || href.startswith('mailto:')) return;\n    \n    e.preventdefault();\n    // logic: find chapter index by filename or keyword in href\n    let targetidx = -1;\n    let anchor = null;\n    \n    const parts = href.split('#');\n    const pathpart = parts[0].tolowercase();\n    anchor = parts[1] || null;\n    \n    if (pathpart.includes('chapter')) {\n       const m = pathpart.match(/chapter(\\d+)/);\n       if (m) targetidx = parseint(m[1]) - 1;\n    } else if (!pathpart) {\n       // just anchor in current chapter\n       const el = document.getelementbyid(anchor);\n       if (el) el.scrollintoview({behavior:'smooth'});\n       return;\n    }\n    \n    if (targetidx !== -1 && window.parent) {\n      window.parent.postmessage({ action: 'bookgo', chapteridx: targetidx, anchorid: anchor }, '*');\n    }\n  }\n});"];
let cur = 0;
let curBlobUrl = null;

const fr = document.getElementById('fr');
const tt = document.getElementById('tt');
const bar = document.getElementById('bar');
const list = document.getElementById('list');
const side = document.getElementById('side');
const menu = document.getElementById('menu');
const searchInput = document.getElementById('search');
const app = document.querySelector('.app');

menu.onclick = (e) => {
  e.stopPropagation();
  if (window.matchMedia('(max-width: 900px)').matches) {
    side.classList.toggle('open');
  } else {
    app.classList.toggle('side-hide');
  }
};

function buildList(filter = '') {
  list.innerHTML = '';
  T.forEach((t, i) => {
    if (filter && !t.toLowerCase().includes(filter) && !(IDX[i] && IDX[i].includes(filter))) return;
    const b = document.createElement('button');
    b.className = 'ch';
    b.dataset.i = i;
    b.innerHTML = '<b>Глава ' + (i + 1) + '</b><br>' + t;
    b.onclick = () => go(i, true);
    if (i === cur) b.classList.add('on');
    list.appendChild(b);
  });
}

searchInput.addEventListener('input', (e) => {
  buildList(e.target.value.toLowerCase());
});

function go(i, anchor = null, close = false) {
  if (i < 0 || i >= B64.length) return;
  cur = i;

  const switchLogic = () => {
    const bin = atob(B64[i]);
    const bytes = new Uint8Array(bin.length);
    for (let j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j);

    const blob = new Blob([bytes], { type: 'text/html;charset=utf-8' });
    if (curBlobUrl) URL.revokeObjectURL(curBlobUrl);
    curBlobUrl = URL.createObjectURL(blob);
    
    // Listen for iframe load to scroll to anchor
    fr.onload = () => {
      if (anchor) {
        const el = fr.contentWindow.document.getElementById(anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        // If it's a phase button in Ch2, try to click it
        const btn = fr.contentWindow.document.querySelector(`button[onclick*="${anchor}"]`) || 
                    fr.contentWindow.document.querySelector(`button:has-text("${anchor}")`);
        if (btn) btn.click();
      }
      fr.onload = null;
    };

    fr.src = curBlobUrl;

    tt.innerHTML = '<b>Глава ' + (i + 1) + '</b>&ensp;' + T[i];
    bar.style.width = ((i + 1) / B64.length * 100) + '%';

    document.querySelectorAll('.ch').forEach(el => {
      el.classList.toggle('on', Number(el.dataset.i) === i);
    });

    BookModules.saveBookmark(i);
    BookModules.logEvent('read_chapter', i);

    if (close) side.classList.remove('open');
  };

  if (document.startViewTransition) {
    document.startViewTransition(() => switchLogic());
  } else {
    switchLogic();
  }
}

// Global helper for links inside iframes using postMessage for cross-origin support
window.addEventListener('message', e => {
  if (e.data && e.data.action === 'bookGo') {
    go(e.data.chapterIdx, e.data.anchorId, true);
  }
});

document.getElementById('prev').onclick = () => go(cur - 1);
document.getElementById('next').onclick = () => go(cur + 1);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(cur - 1);
  if (e.key === 'ArrowRight') go(cur + 1);
});
document.addEventListener('click', (e) => {
  if (!window.matchMedia('(max-width: 900px)').matches) return;
  if (!side.classList.contains('open')) return;
  if (e.target.closest('#side') || e.target.closest('#menu')) return;
  side.classList.remove('open');
});

buildList();
const saved = Number(localStorage.getItem('book_last_chapter'));
go(Number.isFinite(saved) ? saved : 0);
</script>
