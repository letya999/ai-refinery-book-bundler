/* ── Dark theme (not used but kept) ── */
:root {

/* ── LIGHT THEME: THE EGYPTIAN CROSS MYSTERY ── */
[data-theme="light"] {
  --bg: #f9f4e8; 
  --bg2: #f1ebd7; 
  --panel: #f1ebd7; 
  --panel2: #e8dfc5; 
  --line: #d2c5a7;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: "Lora", "Georgia", serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  transition: background .3s, color .3s;
}

/* Atmospheric background for the Mystery theme */
[data-theme="light"] body {
  background: linear-gradient(135deg, #f9f4e8 0%, #f1ebd7 100%);
}

.stars { display: none; }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; position: relative; z-index: 1; }
.app.side-hide { grid-template-columns: 1fr; }

/* ── Sidebar ── */
.side {
  border-right: 1px solid var(--line);
  background: var(--panel);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.app.side-hide .side { display: none; }

.brand { padding: 25px 20px; border-bottom: 2px double var(--line); flex-shrink: 0; text-align: center; }
.brand h1 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 800; color: var(--acc); margin-bottom: 5px; text-transform: uppercase; }
.brand p  { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

.search-box { padding: 15px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.search-box input {
  width: 100%; padding: 12px;
  background: #fff; border: 1px solid var(--line);
  color: var(--txt); border-radius: 4px; font-size: 14px; outline: none;
}
.search-box input:focus { border-color: var(--acc); box-shadow: 0 0 5px rgba(139,0,0,0.2); }

/* ── Chapter list ── */
.list { flex: 1; overflow-y: auto; padding: 10px; display: grid; gap: 8px; align-content: start; }
.ch {
  all: unset; cursor: pointer; padding: 15px; border-radius: 4px;
  border: 1px solid var(--line); background: rgba(255,255,255,0.3);
  font-size: 14px; color: var(--txt); transition: .2s;
}
.ch:hover { border-color: var(--acc); background: #fff; }
.ch.on {
  background: var(--acc);
  border-color: var(--acc); color: #fff;
  box-shadow: var(--shadow);
}
.ch.on b { color: var(--acc2); }
.ch b { display: block; font-size: 11px; text-transform: uppercase; color: var(--acc); margin-bottom: 4px; }

/* ── Main content ── */
.main { display: flex; flex-direction: column; min-width: 0; position: relative; }

.top {
  height: 60px; border-bottom: 1px solid var(--line);
  background: var(--bg);
  display: flex; align-items: center; gap: 10px; padding: 0 15px; z-index: 10;
}

.top button {
  all: unset; cursor: pointer; padding: 8px 15px; border: 1px solid var(--line);
  border-radius: 4px; color: var(--txt); font-size: 13px; font-weight: 600; background: var(--bg2);
}
.top button:hover { border-color: var(--acc); color: var(--acc); }

.tt { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--acc); font-weight: 700; flex: 1; }

.prog { height: 4px; background: var(--line); position: relative; z-index: 10; }
.prog i { display: block; height: 100%; width: 0; background: var(--acc); transition: width .4s; }

.frame { flex: 1; min-height: 0; position: relative; }
iframe { width: 100%; height: 100%; border: none; background: transparent; display: block; }

@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .side { position: fixed; left: -100%; z-index: 100; width: 80%; }
  .side.open { left: 0; }
}

, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta na    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #6474  var(--acc);\r\n  padding: 1.5rem;\r\n  margin: 2rem 0;\r\n  position: relative;\r\n}\r\n\r\n.formula-card::before {\r\n  content: \"УЛИКА\";\r\n  position: absolute;\r\n  top: -12px;\r\n  left: 20px;\r\n  background: var(--acc);\r\n  color: #fff;\r\n  padding: 2px 10px;\r\n  font-size: 0.7rem;\r\n  font-weight: bold;\r\n}\r\n\r\n/* Evidence Photo Frame */\r\n.photo-frame {\r\n  background: #fff;\r\n  padding: 15px 15px 40px 15px;\r\n  border: 1px solid var(--border);\r\n  box-shadow: 5px 5px 15px rgba(0,0,0,0.2);\r\n  margin: 2rem auto;\r\n  max-width: 90%;\r\n  position: relative;\r\n  transform: rotate(-1deg);\r\n  transition: transform 0.3s;\r\n}\r\n\r\n.photo-frame:hover {\r\n  transform: rotate(0deg) scale(1.02);\r\n}\r\n\r\n.photo-frame img {\r\n  width: 100%;\r\n  height: auto;\r\n  display: block;\r\n  filter: grayscale(1) contrast(1.1) sepia(0.1);\r\n  border: 1px solid #ddd;\r\n}\r\n\r\n.photo-frame::after {\r\n  content: \"EXHIBIT A\";\r\n  position: absolute;\r\n  bottom: 10px;\r\n  right: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 14px;\r\n  font-weight: bold;\r\n  color: var(--acc);\r\n  opacity: 0.6;\r\n  border: 2px solid var(--acc);\r\n  padding: 2px 8px;\r\n  transform: rotate(-5deg);\r\n}\r\n\r\n.photo-label {\r\n  position: absolute;\r\n  bottom: 10px;\r\n  left: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 12px;\r\n  color: #666;\r\n}\r\n\r\n/* SVG Diagram Box */\r\n.vis-diag {\r\n  background: #fff;\r\n  padding: 1rem;\r\n  border-radius: 8px;\r\n  border: 1px solid var(--border);\r\n  margin: 1.5rem 0;\r\n  text-align: center;\r\n}\r\n\r\n.vis-diag svg {\r\n  max-height: 150px;\r\n  width: auto;\r\n  margin: 0 auto;\r\n  display: block;\r\n}\r\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Эллери Куин: Тайна египетского креста (Deluxe) • Глава 3</div>\n    <h1>Глава II: Знак Т</h1>\n    <p class=\"lead\"></p>\n  </section>\n  <div class=\"content-body\">\n    <div class=\"kicker\">Сверхсекретный архив Куина</div>\n    \n    \n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <radialGradient id=\"blood\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n        <stop offset=\"0%\" stop-color=\"#8b0000\"></stop>\n        <stop offset=\"100%\" stop-color=\"#2c3e50\"></stop>\n      </radialGradient>\n    </defs>\n    <path d=\"M200,180 L200,40 M120,40 L280,40\" stroke=\"var(--acc)\" stroke-width=\"12\" stroke-linecap=\"square\"></path>\n    <circle cx=\"200\" cy=\"40\" r=\"15\" fill=\"url(#blood)\" opacity=\"0.7\">\n      <animate attributeName=\"opacity\" values=\"0.7;0.2;0.7\" dur=\"2s\" repeatCount=\"indefinite\"></animate>\n    </circle>\n  </svg>\n  <div class=\"caption\">Схема распятия на перекрестке у Арройо</div>\n</div>\n<p class=\"lead-para\">На дорожном указателе, в самом сердце Т-образного перекрестка, висело тело. Обезглавленное, прибитое тяжелыми гвоздями, оно напоминало жуткую инсталляцию безумного художника. Убийца не просто лишил жизни Эндрю Вана — он стер его личность, оставив лишь пустую оболочку и символ.</p>\n<div class=\"formula-card\">\n  <b>АНТРОПОМЕТРИЧЕСКИЕ ДАННЫЕ</b>\n  <p>Жертва: Мужчина, около 45 лет. <br>Метод: Декапитация. <br>Специфика: Посмертное распятие в форме буквы Т.</p>\n</div>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: t-align: right;\r\n}\r\n\r\n.epigraph p { margin-bottom: 0.5rem; }\r\n\r\n/* Clue Box / Formula Card */\r\n.formula-card {\r\n  background: #fff;\r\n  border: 2px dashed var(--acc);\r\n  padding: 1.5rem;\r\n  margin: 2rem 0;\r\n  position: relative;\r\n}\r\n\r\n.formula-card::before {\r\n  content: \"УЛИКА\";\r\n  position: absolute;\r\n  top: -12px;\r\n  left: 20px;\r\n  background: var(--acc);\r\n  color: #fff;\r\n  padding: 2px 10px;\r\n  font-size: 0.7rem;\r\n  font-weight: bold;\r\n}\r\n\r\n/* Evidence Photo Frame */\r\n.photo-frame {\r\n  background: #fff;\r\n  padding: 15px 15px 40px 15px;\r\n  border: 1px solid var(--border);\r\n  box-shadow: 5px 5px 15px rgba(0,0,0,0.2);\r\n  margin: 2rem auto;\r\n  max-width: 90%;\r\n  position: relative;\r\n  transform: rotate(-1deg);\r\n  transition: transform 0.3s;\r\n}\r\n\r\n.photo-frame:hover {\r\n  transform: rotate(0deg) scale(1.02);\r\n}\r\n\r\n.photo-frame img {\r\n  width: 100%;\r\n  height: auto;\r\n  display: block;\r\n  filter: grayscale(1) contrast(1.1) sepia(0.1);\r\n  border: 1px solid #ddd;\r\n}\r\n\r\n.photo-frame::after {\r\n  content: \"EXHIBIT A\";\r\n  position: absolute;\r\n  bottom: 10px;\r\n  right: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 14px;\r\n  font-weight: bold;\r\n  color: var(--acc);\r\n  opacity: 0.6;\r\n  border: 2px solid var(--acc);\r\n  padding: 2px 8px;\r\n  transform: rotate(-5deg);\r\n}\r\n\r\n.photo-label {\r\n  position: absolute;\r\n  bottom: 10px;\r\n  left: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 12px;\r\n  color: #666;\r\n}\r\n\r\n/* SVG Diagram Box */\r\n.vis-diag {\r\n  background: #fff;\r\n  padding: 1rem;\r\n  border-radius: 8px;\r\n  border: 1px solid var(--border);\r\n  margin: 1.5rem 0;\r\n  text-align: center;\r\n}\r\n\r\n.vis-diag svg {\r\n  max-height: 150px;\r\n  width: auto;\r\n  margin: 0 auto;\r\n  display: block;\r\n}\r\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Эллери Куин: Тайна египетского креста (Deluxe) • Глава 4</div>\n    <h1>Глава III: Обитель страха</h1>\n    <p class=\"lead\"></p>\n  </section>\n  <div class=\"content-body\">\n    <div class=\"kicker\">Сверхсекретный архив Куина</div>\n    \n    \n\n<div class=\"photo-frame\">\n  <img src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Abandoned_shack_in_the_mountains.jpg/800px-Abandoned_shack_in_the_mountains.jpg\" alt=\"Хижина Эндрю Вана после обыска\">\n  <div class=\"photo-label\">Хижина Эндрю Вана после обыска</div>\n</div>\n<p class=\"lead-para\">Внутри хижины Вана пахло пылью и йодом. Опрокинутый стол, разбитая лампа — борьба была недолгой, но отчаянной. На входной двери, словно печать Сатаны, красовалась буква Т, выведенная кровью.</p>\n<p>— Клинг исчез, — доложил констебль Люден. — Его топор тоже. Похоже, слуга сошел с ума и разделался с хозяином.</p>\n<div class=\"callout\"><b>ПОМЕТКА КУИНА:</b> «Слишком много крови для одного человека. И слишком много аккуратности в этом безумии».</div>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-sys ass=\"tr-col bad\">\n    <div class=\"tr-head bad\">ВЕЛИЯ КРОЗАК</div>\n    <div class=\"grid\">\n<div class=\"card\"><p>Мистический мститель.</p></div>\n<div class=\"card\"><p>Жертва предательства.</p></div>\n<div class=\"card\"><p>Символ: Тройное Т.</p></div></div>\n  </div>\n  <div class=\"tr-col good\">\n    <div class=\"tr-head good\">БРАТЬЯ ТВЭР</div>\n    <div class=\"grid\">\n<div class=\"card\"><p>Богатые затворники.</p></div>\n<div class=\"card\"><p>Общее криминальное прошлое.</p></div>\n<div class=\"card\"><p>Цели №1, №2 и №3.</p></div></div>\n  </div>\n</div>\n<p class=\"lead-para\">Эллери узнает историю братьев Твэр. Двадцать лет назад они предали Крозака и сбежали с его деньгами. Теперь Крозак вернулся, чтобы забрать долг — по одной голове за каждого преданного предка.</p>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; r(--line)\" stroke-width=\"4\" fill=\"none\"></path>\n    <rect x=\"180\" y=\"40\" width=\"40\" height=\"80\" fill=\"var(--acc)\" opacity=\"0.3\"></rect>\n  </svg>\n  <div class=\"caption\">Садовая пергола — место смерти Томаса Брэда</div>\n</div>\n<p class=\"lead-para\">Второе тело находят в Брэдвуде. Томас Брэд, второй из братьев, распят на перголе в собственном саду. Сценарий повторяется с математической точностью: отсутствие головы, Т-образная поза, кровавый знак на двери.</p>\n<div class=\"callout\"><b>МЫСЛЬ КУИНА:</b> «Убийца играет с нами. Он не прячется — он выставляет свои трофеи напоказ. Но почему он всегда забирает головы?»</div>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-b gin: 2rem auto;\r\n  max-width: 90%;\r\n  position: relative;\r\n  transform: rotate(-1deg);\r\n  transition: transform 0.3s;\r\n}\r\n\r\n.photo-frame:hover {\r\n  transform: rotate(0deg) scale(1.02);\r\n}\r\n\r\n.photo-frame img {\r\n  width: 100%;\r\n  height: auto;\r\n  display: block;\r\n  filter: grayscale(1) contrast(1.1) sepia(0.1);\r\n  border: 1px solid #ddd;\r\n}\r\n\r\n.photo-frame::after {\r\n  content: \"EXHIBIT A\";\r\n  position: absolute;\r\n  bottom: 10px;\r\n  right: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 14px;\r\n  font-weight: bold;\r\n  color: var(--acc);\r\n  opacity: 0.6;\r\n  border: 2px solid var(--acc);\r\n  padding: 2px 8px;\r\n  transform: rotate(-5deg);\r\n}\r\n\r\n.photo-label {\r\n  position: absolute;\r\n  bottom: 10px;\r\n  left: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 12px;\r\n  color: #666;\r\n}\r\n\r\n/* SVG Diagram Box */\r\n.vis-diag {\r\n  background: #fff;\r\n  padding: 1rem;\r\n  border-radius: 8px;\r\n  border: 1px solid var(--border);\r\n  margin: 1.5rem 0;\r\n  text-align: center;\r\n}\r\n\r\n.vis-diag svg {\r\n  max-height: 150px;\r\n  width: auto;\r\n  margin: 0 auto;\r\n  display: block;\r\n}\r\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Эллери Куин: Тайна египетского креста (Deluxe) • Глава 7</div>\n    <h1>Глава VI: Роковой эндшпиль</h1>\n    <p class=\"lead\"></p>\n  </section>\n  <div class=\"content-body\">\n    <div class=\"kicker\">Сверхсекретный архив Куина</div>\n    \n    \n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 200 200\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect x=\"20\" y=\"20\" width=\"160\" height=\"160\" fill=\"var(--bg-deep)\" stroke=\"var(--line)\" stroke-width=\"2\"></rect>\n    <path d=\"M20,60 L180,60 M20,100 L180,100 M20,140 L180,140 M60,20 L60,180 M100,20 L100,180 M140,20 L140,180\" stroke=\"var(--line)\" stroke-width=\"1\" opacity=\"0.3\"></path>\n    <circle cx=\"80\" ft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.
