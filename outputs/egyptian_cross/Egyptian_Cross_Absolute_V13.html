<head>

<title>ТАЙНА ЕГИПЕТСКОГО КРЕСТА</title>
<style>
/* === THEME === */
:root {
  --bg: #f9f4e8; --bg2: #f1ebd7; --panel: #f1ebd7; --panel2: #e8dfc5; --line: #d2c5a7;
  --txt: #2c3e50; --muted: #7f8c8d; --acc: #8b0000; --acc2: #d4af37; --shadow: 0 4px 10px rgba(0,0,0,0.1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--txt); font-family: "Lora", "Georgia", serif; overflow: hidden; line-height: 1.6; }

.app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
.side { border-right: 1px solid var(--line); background: var(--panel); display: flex; flex-direction: column; overflow: hidden; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
.brand { padding: 25px 15px; border-bottom: 2px double var(--line); text-align: center; }
.brand h1 { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--acc); text-transform: uppercase; letter-spacing: 1px; }

.list { flex: 1; overflow-y: auto; padding: 12px; display: grid; gap: 10px; align-content: start; }
.ch { all: unset; cursor: pointer; padding: 14px; border: 1px solid var(--line); background: rgba(255,255,255,0.3); border-radius: 4px; font-size: 13px; transition: .2s; }
.ch:hover { background: #fff; border-color: var(--acc); }
.ch.on { background: var(--acc); color: #fff; border-color: var(--acc); box-shadow: var(--shadow); }
.ch b { display: block; font-size: 10px; text-transform: uppercase; color: var(--acc); margin-bottom: 4px; letter-spacing: 1px; }
.ch.on b { color: var(--acc2); }

.main { display: flex; flex-direction: column; min-width: 0; position: relative; }
.top { height: 60px; border-bottom: 1px solid var(--line); background: var(--bg); display: flex; align-items: center; gap: 15px; padding: 0 20px; z-index: 10; }
.tt { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--acc); font-weight: 700; flex: 1; }

.frame { flex: 1; position: relative; background: #fff; }
iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>

<script id="book-chapters" type="application/json">["\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Действующие лица и тени</h1>\n    \n\n<div class=\"photo-frame\">\n  <img data-src=\"cover.png\" alt=\"Оригинальное издание 1932 года\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Оригинальное издание 1932 года</div>\n</div>\n<p class=\"lead\">Декабрь 1932 года выдался аномально холодным. Но холод, сковавший горы Западной Виргинии, был ничем по сравнению с ледяным расчетом человека, решившего превратить алфавит в орудие казни. Перед вами — полная реконструкция дела «Т-убийств».</p>\n<div class=\"grid\">\n    <div class=\"card\"><b>Эллери Куин</b><p>Детектив-интеллектуал, чей мир логики вот-вот столкнется с чистым, концентрированным безумием. Он верит, что за любой загадкой стоит человек, и его задача — найти этого человека за маской символа.</p></div>\n    <div class=\"card\"><b>Эндрю Ван</b><p>Тихий, близорукий учитель из Арройо. Его жизнь казалась такой же скучной, как и пыльные книги в его хижине. Но именно его имя станет первым в списке «Т-жертв»... или же он сам написал этот список?</p></div>\n    <div class=\"card\"><b>Стивен Мегара</b><p>Миллионер и владелец яхты, чье криминальное прошлое в Черногории настигло его в самый неподходящий момент. Он пытался купить безопасность, но обнаружил, что от смерти нельзя откупиться.</p></div>\n    <div class=\"card\"><b>Велия Крозак</b><p>Легендарный мститель. Тень, которая следует за братьями Твэр уже двадцать лет. Его имя — это шепот смерти в ночном тумане.</p></div>\n</div>\n<div class=\"callout\"><b>ПРЕДУПРЕЖДЕНИЕ:</b> Каждое слово в этом деле важно. Ищите систему в хаосе.</div>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Дорога в ледяную мглу</h1>\n    \n\n<div class=\"photo-frame\">\n  <img data-src=\"car.png\" alt=\"Автомобиль подозреваемого на ночном шоссе\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Автомобиль подозреваемого на ночном шоссе</div>\n</div>\n<p>Снежная крупа нещадно била в лобовое стекло старого гоночного «дюсенберга». Эллери Куин до боли в суставах сжимал руль, вглядываясь в серые очертания горной дороги. На заднем сиденье инспектор Куин хмуро курил трубку, и дым его табака мешался с запахом перегретого мотора. Они мчались в Арройо — крошечное селение, о котором раньше знали только местные почтальоны, а теперь кричали все газеты страны.</p>\n<p>— Вчера это был просто перекресток, — пробасил инспектор, вытирая запотевшее стекло. — А сегодня это Голгофа. Ты видел заголовки, Эллери? «Распятый на Рождество». Это не просто убийство, это вызов всему человечеству.</p>\n<p>Эллери молчал. Его разум уже строил логические цепочки. Учитель, топор, отсутствие головы... И этот проклятый символ Т. Почему Т? Почему сейчас? Воздух гор казался тяжелым от предчувствия беды. Каждый поворот дороги мог стать последним, а тишина безлюдных ферм была громче любого крика.</p>\n<div class=\"callout\"><b>САСПЕНС:</b> Запах хвои, бензина и холодного металла. Мир за окном автомобиля перестал быть дружелюбным.</div>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Геометрия Смерти</h1>\n    \n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\">\n    <path d=\"M200,180 L200,40 M120,40 L280,40\" stroke=\"var(--acc)\" stroke-width=\"12\" stroke-linecap=\"square\"/>\n    <circle cx=\"200\" cy=\"40\" r=\"10\" fill=\"var(--acc)\" opacity=\"0.6\">\n      <animate attributeName=\"opacity\" values=\"0.6;0.2;0.6\" dur=\"2s\" repeatCount=\"indefinite\" />\n    </circle>\n  </svg>\n  <div class=\"caption\">Схема распятия: Т-образный указатель</div>\n</div>\n<p>Рождественское утро встретило их на перекрестке дорог Нью-Камберленд — Пагтаун. Тусклое солнце едва пробивалось сквозь облака, освещая жуткую инсталляцию. На старом дорожном столбе висело то, что когда-то было Эндрю Ваном. Убийца не просто лишил его жизни — он превратил его тело в часть ландшафта. Руки были широко раскинуты и прибиты гвоздями к перекладине, ноги сведены вместе. Идеальная буква Т.</p>\n<p>Эллери стоял в нескольких футах, не обращая внимания на суету полицейских. Голова жертвы отсутствовала, и это было самым пугающим. Без лица тело становилось безликим символом, трофеем в какой-то извращенной игре. Срезы были аккуратными, почти хирургическими. Убийца обладал не только силой, но и ледяным спокойствием.</p>\n<div class=\"formula-card\">\n  <b>ДАННЫЕ ОСМОТРА:</b>\n  <p>Жертва обезглавлена посмертно. Гвозди — стандартные четырехдюймовые костыли. Поза зафиксирована с математической точностью. Кровь на столбе указывает на то, что это был финал долгого процесса.</p>\n</div>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Обитель Страха и Йода</h1>\n    \n\n<div class=\"photo-frame\">\n  <img data-src=\"shack.png\" alt=\"Хижина Эндрю Вана: Осмотр места борьбы\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Хижина Эндрю Вана: Осмотр места борьбы</div>\n</div>\n<p>Хижина Вана стояла в стороне, окруженная колючей проволокой. На двери — огромное Т, начертанное кровью, словно вход в преисподнюю. Внутри царил хаос: опрокинутые стулья, разбитая лампа, разбросанные книги. Ван явно боролся, он понимал, что смерть пришла за ним. Эллери медленно проходил по комнате, подмечая детали, которые ускользали от других.</p>\n<p>На полке в аптечке стоял флакон йода. Без этикетки. Но рядом стоял другой — с четкой надписью «ЙОД». Кто-то в спешке или в темноте взял именно неподписанный флакон. Эллери нахмурился. Почему? Чужак взял бы тот, на котором написано. Хозяин взял бы тот, про который ОН ЗНАЛ.</p>\n<p>— Клинг исчез вместе с топором, — доложил констебль Люден. — Похоже, слуга спятил и разделался с хозяином. Но Эллери уже знал: Клинг — лишь фигура на доске, которую убийца пожертвовал в самом начале партии.</p>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Тени гор Черногории</h1>\n    \n<div class=\"translator\">\n  <div class=\"tr-col bad\">\n    <div class=\"tr-head bad\">ВЕЛИЯ КРОЗАК</div>\n    <p>Сын человека, преданного братьями Твэр. Его жизнь — амок, священная война. Он поклялся, что ни один Твэр не доживет до старости.</p>\n  </div>\n  <div class=\"tr-col good\">\n    <div class=\"tr-head good\">БРАТЬЯ ТВЭР</div>\n    <p>Томислав, Стефан и Андреа. Они украли золото и бежали в Америку, сменив имена. Но кровь нельзя отмыть деньгами.</p>\n  </div>\n</div>\n<p>Эллери раскапывал прошлое, которое должно было остаться в горах Европы. Двадцать лет тишины закончились. Теперь Крозак — или тот, кто им прикрывается — начал свой кровавый жатвенный поход по Америке. И следующая цель уже была намечена.</p>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Брэдвуд: Бастион Тьмы</h1>\n    \n<p>Лонг-Айленд встретил их шумом прибоя и роскошью поместья Брэдвуд. Здесь жил Томас Брэд (Томислав Твэр). Но богатство не приносило ему покоя. Он ходил по дому с пистолетом, вздрагивая от каждого шороха. Стивен Мегара, приехавший к брату, был не лучше — его глаза бегали, а руки тряслись. Они знали: Т-убийца идет за ними.</p>\n<p>Эллери наблюдал за гостями. Профессор Ярдли со своими теориями о мистике, таинственная чета Линнов... Воздух был наэлектризован саспенсом. Каждая дверь в особняке казалась ловушкой, а каждый слуга — потенциальным палачом. Ночь в Брэдвуде была полна несказанных угроз.</p>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Последняя партия Брэда</h1>\n    \n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 200 200\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect x=\"20\" y=\"20\" width=\"160\" height=\"160\" fill=\"var(--bg-deep)\" stroke=\"var(--line)\" stroke-width=\"2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"10\" fill=\"var(--acc)\"/>\n    <circle cx=\"150\" cy=\"150\" r=\"10\" fill=\"var(--txt)\" opacity=\"0.4\"/>\n    <path d=\"M50,50 L150,150\" stroke=\"var(--acc2)\" stroke-width=\"2\" stroke-dasharray=\"5\"/>\n  </svg>\n  <div class=\"caption\">Шахматная доска: Позиция перед исчезновением</div>\n</div>\n<p>Вечер в кабинете. Томас Брэд играл в шашки, пытаясь успокоить нервы. Когда Эллери вошел в комнату через час, Брэда там не было. На столе стояла чашка чая, от которой еще шел пар. Фигуры на доске застыли в напряженном моменте. Окно в сад было распахнуто. Никаких следов борьбы, никакой суеты. Брэд просто исчез в середине партии. Он впустил кого-то, кому доверял... и этот «кто-то» вывел его в ночь.</p>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Второе Распятие в Саду</h1>\n    \n<p>Рассвет в Брэдвуде принес ужасную находку. Томас Брэд висел на деревянной перголе в глубине сада. Сценарий из Арройо повторился с пугающей точностью: обезглавленное тело, раскинутые руки, прибитые тяжелыми гвоздями. Вторая буква Т в этом кровавом алфавите. На садовой двери снова красовался кровавый знак. Убийца не просто убивал — он издевался над всей правоохранительной системой страны.</p>\n<div class=\"formula-card\">\n  <b>АНАЛИЗ МЕТОДА №2:</b>\n  <p>Никаких отпечатков пальцев. Никаких свидетелей. Только безупречная геометрическая композиция. Убийца хочет, чтобы мы видели Символ, а не Человека. Но зачем он забирает головы? Ответ был у Эллери на кончике языка, но ускользал, как туман над бухтой.</p>\n</div>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Ловушка на яхте «Хелен»</h1>\n    \n\n<div class=\"photo-frame\">\n  <img data-src=\"yacht.png\" alt=\"Яхта Мегары за несколько часов до финала\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Яхта Мегары за несколько часов до финала</div>\n</div>\n<p>Стивен Мегара, последний из братьев, решил нанести ответный удар. «Я выманю его из тени!» — кричал он. Его план был безумен: снять охрану с яхты, оставить судно в туманной бухте и ждать убийцу. Ночь на берегу Лонг-Айленда тянулась мучительно долго. Эллери Куин сидел на причале, глядя на тусклые огни «Хелен». Тишина была абсолютной, лишь волны лениво бились о сваи. Он знал, что Мегара совершает ошибку, доверяя своей интуиции больше, чем логике фактов.</p>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Ночной Хищник и Тишина</h1>\n    \n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 200 200\" xmlns=\"http://www.w3.org/2000/svg\">\n    <circle cx=\"100\" cy=\"100\" r=\"80\" fill=\"none\" stroke=\"var(--line)\"/>\n    <path d=\"M100,20 L100,100 L160,100\" stroke=\"var(--acc)\" stroke-width=\"6\" fill=\"none\"/>\n  </svg>\n  <div class=\"caption\">Часы Мегары: Время замерло в 02:00</div>\n</div>\n<p>Когда рассвет прорезал туман, мачта яхты «Хелен» превратилась в третий крест. Стивен Мегара погиб так же, как и его братья. Обезглавлен, распят, лишен имени. Капитан Свифт был найден в каюте — связанный, оглушенный, но ЖИВОЙ. Это был финальный аккорд. Эллери смотрел на тело Мегары и вдруг понял: убийца не пробирался на яхту. Он был частью этого мира с самого начала. Т-загадка начала рассыпаться, обнажая истину.</p>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Прозрение в Хижине</h1>\n    \n<div class=\"vis-diag\">\n  <svg viewBox=\"0 0 100 150\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect x=\"20\" y=\"40\" width=\"60\" height=\"100\" rx=\"5\" fill=\"#1a1a2e\" stroke=\"var(--line)\"/>\n    <path d=\"M25,80 L75,80\" stroke=\"var(--acc)\" stroke-width=\"4\" opacity=\"0.6\"/>\n  </svg>\n  <div class=\"caption\">Флакон йода без этикетки — приговор убийце</div>\n</div>\n<p>Эллери вернулся в Арройо. Он снова стоял перед аптечкой в хижине Вана. Пузырек синего стекла без этикетки. Это была единственная ошибка гениального ума. В роковую ночь убийца поранился и в темноте взял именно этот флакон. Он ЗНАЛ, что там йод, потому что это БЫЛ ЕГО ДОМ. Чужак (Крозак) никогда бы не рискнул взять неподписанный флакон при наличии подписанного.</p>\n<div class=\"formula-card\">\n  <b>АКСИОМА КУИНА:</b>\n  <p>Эндрю Ван жив. Он — Андреа Твэр, младший брат, решивший уничтожить свою семью ради миллионов и мести. Он убил настоящего Крозака в первый же день и выдал его за себя, создав миф о ритуальном маньяке.</p>\n</div>\n\n","\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    <h1>Маска сорвана: Финал</h1>\n    \n\n<div class=\"photo-frame\">\n  <img data-src=\"ankh.png\" alt=\"Египетский Крест: Символ Жизни и Смерти\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Египетский Крест: Символ Жизни и Смерти</div>\n</div>\n<p>Арест в Чикаго. Отель «Рокфор». Дверь номера 643 вылетает под ударами плеч детективов. Перед ними — забинтованный, дрожащий человек с безумными глазами. Эндрю Ван. Или Андреа Твэр. Его припадок эпилепсии стал финальной точкой в этом деле. Он признался во всем: как заманил Крозака, как подменил тела, как методично убирал братьев, прикрываясь формой Анха (Египетского креста), чтобы направить следствие по ложному пути египтологии.</p>\n<p class=\"lead\">Дело закрыто. Эллери Куин уходит в ночь, зная: самый страшный монстр — это разум, лишенный сердца. Тень Египетского креста больше не пугает его, она стала лишь очередной строчкой в его архиве.</p>\n<div class=\"stats\">\n  <div class=\"stat\"><b class=\"stat-num\">4</b><span class=\"stat-label\">Тела</span></div>\n  <div class=\"stat\"><b class=\"stat-num\">1</b><span class=\"stat-label\">Гений</span></div>\n</div>\n<p style=\"text-align: center; font-style: italic; margin-top: 3rem; opacity: 0.5;\">Конец следственного дела №32-EQ.</p>\n\n"]</script>
<script>
(function() {
  const CHAPTERS = JSON.parse(document.getElementById('book-chapters').textContent);
  const ASSETS = JSON.parse(document.getElementById('book-assets').textContent);
  const fr = document.getElementById('fr');
  const tt = document.getElementById('tt');
  const T = ["Действующие лица и тени","Дорога в ледяную мглу","Геометрия Смерти","Обитель Страха и Йода","Тени гор Черногории","Брэдвуд: Бастион Тьмы","Последняя партия Брэда","Второе Распятие в Саду","Ловушка на яхте «Хелен»","Ночной Хищник и Тишина","Прозрение в Хижине","Маска сорвана: Финал"];

  function go(i) {
    if (i < 0 || i >= T.length) return;
    
    // Create a temporary DOM to process images properly
    const parser = new DOMParser();
    const doc = parser.parseFromString(CHAPTERS[i], 'text/html');
    
    // Fix all images: swap data-src (Base64) into src
    doc.querySelectorAll('img').forEach(img => {
      const key = img.getAttribute('data-src');
      if (key && ASSETS[key]) {
        img.src = ASSETS[key];
        img.removeAttribute('data-src');
      }
    });

    fr.srcdoc = doc.documentElement.outerHTML;
    tt.textContent = T[i];
    document.querySelectorAll('.ch').forEach((el, idx) => el.classList.toggle('on', idx === i));
  }

  const list = document.getElementById('list');
  T.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch';
    btn.innerHTML = `<b>Дѣло №${i+1}</b>${t}`;
    btn.onclick = () => go(i);
    list.appendChild(btn);
  });
  go(0);
})();
</script>
