<script id="book-chapters" type="application/json">["<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 12px 12px 0; }\r\n.table-container { margin: 2rem 0; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; background: white; }\r\ntable { width: 100%; border-collapse: collapse; }\r\nth { background: var(--bg-deep); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; }\r\ntd { padding: 1rem; border-top: 1px solid var(--border); }\r\n\r\n.accordion { border: 1px solid var(--border); border-radius: 10px; margin: 0.5rem 0; }\r\n.accordion-summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; }\r\n.accordion-summary::after { content: \"+\"; color: var(--acc); }\r\n.accordion[open] .accordion-summary::after { content: \"−\"; }\r\n\r\n.term-link { color: var(--acc); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--acc-soft); cursor: pointer; }\r\n.term-link:hover { background: var(--acc-soft); }\r\n\r\nsvg text { fill: #0f172a !important; font-weight: 700; }\r\n\n</style>\n<style>\n/* === THEME: THE EGYPTIAN CROSS MYSTERY === */\r\n:root {\r\n  --bg: #f9f4e8;\r\n  --bg-deep: #f1ebd7;\r\n  --txt: #2c3e50;\r\n  --acc: #8b0000; /* Blood Red */\r\n  --acc-soft: #fde8e8;\r\n  --acc2: #d4af37; /* Gold */\r\n  --border: #d2c5a7;\r\n  --shadow: 0 4px 10px rgba(0,0,0,0.1);\r\n  --muted: #7f8c8d;\r\n  --sidebar-w: 320px;\r\n}\r\n\r\nbody { \r\n  font-family: 'Lora', 'Georgia', serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.7; \r\n  margin: 0;\r\n  padding: 2rem;\r\n  overflow-y: auto !important;\r\n}\r\n\r\nh1, h2, h3 { \r\n  font-family: 'Playfair Display', 'Georgia', serif; \r\n  color: var(--acc);\r\n}\r\n\r\nh1 { font-size: 3rem; text-align: center; margin-bottom: 2rem; border-bottom: 3px double var(--acc2); padding-bottom: 1rem; }\r\nh2 { font-size: 2rem; border-left: 5px solid var(--acc); padding-left: 1rem; margin-top: 3rem; }\r\n\r\n/* Dramatis Personae Grid */\r\n.grid {\r\n  display: grid;\r\n  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));\r\n  gap: 1.5rem;\r\n  margin: 2rem 0;\r\n}\r\n\r\n.card {\r\n  background: var(--bg-deep);\r\n  border: 1px solid var(--border);\r\n  padding: 1.5rem;\r\n  border-radius: 8px;\r\n  box-shadow: var(--shadow);\r\n  transition: transform 0.2s;\r\n}\r\n\r\n.card:hover {\r\n  transform: translateY(-5px);\r\n  border-color: var(--acc2);\r\n}\r\n\r\n.card b {\r\n  display: block;\r\n  font-size: 1.1rem;\r\n  color: var(--acc);\r\n  margin-bottom: 0.5rem;\r\n  text-transform: uppercase;\r\n  letter-spacing: 1px;\r\n}\r\n\r\n.card p {\r\n  margin: 0;\r\n  font-size: 0.95rem;\r\n}\r\n\r\n/* Epigraph */\r\n.epigraph {\r\n  font-style: italic;\r\n  margin: 2rem auto;\r\n  max-width: 80%;\r\n  border-right: 4px solid var(--acc2);\r\n  padding: 1rem 2rem;\r\n  background: rgba(212, 175, 55, 0.05);\r\n  text-align: right;\r\n}\r\n\r\n.epigraph p { margin-bottom: 0.5rem; }\r\n\r\n/* Clue Box / Formula Card */\r\n.formula-card {\r\n  background: #fff;\r\n  border: 2px dashed var(--acc);\r\n  padding: 1.5rem;\r\n  margin: 2rem 0;\r\n  position: relative;\r\n}\r\n\r\n.formula-card::before {\r\n  content: \"УЛИКА\";\r\n  position: absolute;\r\n  top: -12px;\r\n  left: 20px;\r\n  background: var(--acc);\r\n  color: #fff;\r\n  padding: 2px 10px;\r\n  font-size: 0.7rem;\r\n  font-weight: bold;\r\n}\r\n\r\n/* Evidence Photo Frame */\r\n.photo-frame {\r\n  background: #fff;\r\n  padding: 15px 15px 40px 15px;\r\n  border: 1px solid var(--border);\r\n  box-shadow: 5px 5px 15px rgba(0,0,0,0.2);\r\n  margin: 2rem auto;\r\n  max-width: 90%;\r\n  position: relative;\r\n  transform: rotate(-1deg);\r\n  transition: transform 0.3s;\r\n}\r\n\r\n.photo-frame:hover {\r\n  transform: rotate(0deg) scale(1.02);\r\n}\r\n\r\n.photo-frame img {\r\n  width: 100%;\r\n  height: auto;\r\n  display: block;\r\n  filter: grayscale(1) contrast(1.1) sepia(0.1);\r\n  border: 1px solid #ddd;\r\n}\r\n\r\n.photo-frame::after {\r\n  content: \"EXHIBIT A\";\r\n  position: absolute;\r\n  bottom: 10px;\r\n  right: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 14px;\r\n  font-weight: bold;\r\n  color: var(--acc);\r\n  opacity: 0.6;\r\n  border: 2px solid var(--acc);\r\n  padding: 2px 8px;\r\n  transform: rotate(-5deg);\r\n}\r\n\r\n.photo-label {\r\n  position: absolute;\r\n  bottom: 10px;\r\n  left: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 12px;\r\n  color: #666;\r\n}\r\n\r\n/* SVG Diagram Box */\r\n.vis-diag {\r\n  background: #fff;\r\n  padding: 1rem;\r\n  border-radius: 8px;\r\n  border: 1px solid var(--border);\r\n  margin: 1.5rem 0;\r\n  text-align: center;\r\n}\r\n\r\n.vis-diag svg {\r\n  max-height: 150px;\r\n  width: auto;\r\n  margin: 0 auto;\r\n  display: block;\r\n}\r\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Эллери Куин: Тайна египетского креста • Глава 1</div>\n    <h1>Действующие лица и тени</h1>\n    <p class=\"lead\">Декабрь 1932 года выдался аномально холодным. Но холод, сковавший горы Западной Виргинии, был ничем по сравнению с ледяным расчетом человека, решившего превратить алфавит в орудие казни. Перед вами — полная реконструкция дела «Т-убийств».</p>\n  </section>\n  <div class=\"content-body\">\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    \n    \n\n<div class=\"photo-frame\">\n  <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_18d1876b00_cover.png\" alt=\"Оригинальное издание 1932 года\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Оригинальное издание 1932 года</div>\n</div>\n\n<div class=\"grid\">\n    <div class=\"card\"><b>Эллери Куин</b><p>Детектив-интеллектуал, чей мир логики вот-вот столкнется с чистым, концентрированным безумием. Он верит, что за любой загадкой стоит человек, и его задача — найти этого человека за маской символа.</p></div>\n    <div class=\"card\"><b>Эндрю Ван</b><p>Тихий, близорукий учитель из Арройо. Его жизнь казалась такой же скучной, как и пыльные книги в его хижине. Но именно его имя станет первым в списке «Т-жертв»... или же он сам написал этот список?</p></div>\n    <div class=\"card\"><b>Стивен Мегара</b><p>Миллионер и владелец яхты, чье криминальное прошлое в Черногории настигло его в самый неподходящий момент. Он пытался купить безопасность, но обнаружил, что от смерти нельзя откупиться.</p></div>\n    <div class=\"card\"><b>Велия Крозак</b><p>Легендарный мститель. Тень, которая следует за братьями Твэр уже двадцать лет. Его имя — это шепот смерти в ночном тумане.</p></div>\n</div>\n<div class=\"callout\"><b>ПРЕДУПРЕЖДЕНИЕ:</b> Каждое слово в этом деле важно. Ищите систему в хаосе.</div>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; margin: 2rem 0; border-radius: 0 sition: absolute;\r\n  bottom: 10px;\r\n  right: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 14px;\r\n  font-weight: bold;\r\n  color: var(--acc);\r\n  opacity: 0.6;\r\n  border: 2px solid var(--acc);\r\n  padding: 2px 8px;\r\n  transform: rotate(-5deg);\r\n}\r\n\r\n.photo-label {\r\n  position: absolute;\r\n  bottom: 10px;\r\n  left: 20px;\r\n  font-family: 'Courier New', monospace;\r\n  font-size: 12px;\r\n  color: #666;\r\n}\r\n\r\n/* SVG Diagram Box */\r\n.vis-diag {\r\n  background: #fff;\r\n  padding: 1rem;\r\n  border-radius: 8px;\r\n  border: 1px solid var(--border);\r\n  margin: 1.5rem 0;\r\n  text-align: center;\r\n}\r\n\r\n.vis-diag svg {\r\n  max-height: 150px;\r\n  width: auto;\r\n  margin: 0 auto;\r\n  display: block;\r\n}\r\n\n</style>\n</head>\n<body>\n<main class=\"wrap\">\n  <section class=\"hero\">\n    <div class=\"kicker\">Эллери Куин: Тайна египетского креста • Глава 2</div>\n    <h1>Дорога в ледяную мглу</h1>\n    <p class=\"lead\"></p>\n  </section>\n  <div class=\"content-body\">\n    <div class=\"kicker\">АРХИВЫ КУИНА: ДЕЛО №32</div>\n    \n    \n\n<div class=\"photo-frame\">\n  <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" data-src=\"asset_576fcdd635_car.png\" alt=\"Автомобиль подозреваемого на ночном шоссе\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Автомобиль подозреваемого на ночном шоссе</div>\n</div>\n<p class=\"lead-para\">Снежная крупа нещадно била в лобовое стекло старого гоночного «дюсенберга». Эллери Куин до боли в суставах сжимал руль, вглядываясь в серые очертания горной дороги. На заднем сиденье инспектор Куин хмуро курил трубку, и дым его табака мешался с запахом перегретого мотора. Они мчались в Арройо — крошечное селение, о котором раньше знали только местные почтальоны, а теперь кричали все газеты страны.</p>\n<p>— Вчера это был просто перекресток, — пробасил инспектор, вытирая запотевшее стекло. — А сегодня это Голгофа. Ты видел заголовки, Эллери? «Распятый на Рождество». Это не просто убийство, это вызов всему человечеству.</p>\n<p>Эллери молчал. Его разум уже строил логические цепочки. Учитель, топор, отсутствие головы... И этот проклятый символ Т. Почему Т? Почему сейчас? Воздух гор казался тяжелым от предчувствия беды. Каждый поворот дороги мог стать последним, а тишина безлюдных ферм была громче любого крика.</p>\n<div class=\"callout\"><b>САСПЕНС:</b> Запах хвои, бензина и холодного металла. Мир за окном автомобиля перестал быть дружелюбным.</div>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--m а перекрестке дорог Нью-Камберленд — Пагтаун. Тусклое солнце едва пробивалось сквозь облака, освещая жуткую инсталляцию. На старом дорожном столбе висело то, что когда-то было Эндрю Ваном. Убийца не просто лишил его жизни — он превратил его тело в часть ландшафта. Руки были широко раскинуты и прибиты гвоздями к перекладине, ноги сведены вместе. Идеальная буква Т.</p>\n<p>Эллери стоял в нескольких футах, не обращая внимания на суету полицейских. Голова жертвы отсутствовала, и это было самым пугающим. Без лица тело становилось безликим символом, трофеем в какой-то извращенной игре. Срезы были аккуратными, почти хирургическими. Убийца обладал не только силой, но и ледяным спокойствием.</p>\n<div class=\"formula-card\">\n  <b>ДАННЫЕ ОСМОТРА:</b>\n  <p>Жертва обезглавлена посмертно. Гвозди — стандартные четырехдюймовые костыли. Поза зафиксирована с математической точностью. Кровь на столбе указывает на то, что это был финал долгого процесса.</p>\n</div>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  lin \"asset_f95365c7cd_shack.png\" alt=\"Хижина Эндрю Вана: Осмотр места борьбы\">\n  <div class=\"photo-label\">ВЕЩЕСТВЕННОЕ ДОКАЗАТЕЛЬСТВО: Хижина Эндрю Вана: Осмотр места борьбы</div>\n</div>\n<p class=\"lead-para\">Хижина Вана стояла в стороне, окруженная колючей проволокой. На двери — огромное Т, начертанное кровью, словно вход в преисподнюю. Внутри царил хаос: опрокинутые стулья, разбитая лампа, разбросанные книги. Ван явно боролся, он понимал, что смерть пришла за ним. Эллери медленно проходил по комнате, подмечая детали, которые ускользали от других.</p>\n<p>На полке в аптечке стоял флакон йода. Без этикетки. Но рядом стоял другой — с четкой надписью «ЙОД». Кто-то в спешке или в темноте взял именно неподписанный флакон. Эллери нахмурился. Почему? Чужак взял бы тот, на котором написано. Хозяин взял бы тот, про который ОН ЗНАЛ.</p>\n<p>— Клинг исчез вместе с топором, — доложил констебль Люден. — Похоже, слуга спятил и разделался с хозяином. Но Эллери уже знал: Клинг — лишь фигура на доске, которую убийца пожертвовал в самом начале партии.</p>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', sys ss=\"tr-col bad\">\n    <div class=\"tr-head bad\">ВЕЛИЯ КРОЗАК</div>\n    <p class=\"lead-para\">Сын человека, преданного братьями Твэр. Его жизнь — амок, священная война. Он поклялся, что ни один Твэр не доживет до старости.</p>\n  </div>\n  <div class=\"tr-col good\">\n    <div class=\"tr-head good\">БРАТЬЯ ТВЭР</div>\n    <p>Томислав, Стефан и Андреа. Они украли золото и бежали в Америку, сменив имена. Но кровь нельзя отмыть деньгами.</p>\n  </div>\n</div>\n<p>Эллери раскапывал прошлое, которое должно было остаться в горах Европы. Двадцать лет тишины закончились. Теперь Крозак — или тот, кто им прикрывается — начал свой кровавый жатвенный поход по Америке. И следующая цель уже была намечена.</p>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-s р Ярдли со своими теориями о мистике, таинственная чета Линнов... Воздух был наэлектризован саспенсом. Каждая дверь в особняке казалась ловушкой, а каждый слуга — потенциальным палачом. Ночь в Брэдвуде была полна несказанных угроз.</p>\n\n</div>\n</main>\n<script>\n(function() {\n  // Link interception\n  document.addEventListener('click', e => {\n    const a = e.target.closest('a');\n    if (!a) return;\n\n    // Bundled asset download (href=\"#\" data-href=\"assetKey\")\n    const dataHref = a.getAttribute('data-href');\n    if (dataHref) {\n      e.preventDefault();\n      window._pendingHrefKey = dataHref;\n      window.parent.postMessage({ action: 'requestAsset', key: dataHref }, '*');\n      return;\n    }\n\n    const href = a.getAttribute('href');\n    if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('data:')) return;\n\n    e.preventDefault();\n    const parts = href.split('#');\n    const pathPart = parts[0] ? parts[0].split('/').pop().toLowerCase() : '';\n    const anchor = parts[1] || null;\n\n    if (pathPart) {\n      window.parent.postMessage({ action: 'bookGo', filename: pathPart, anchorId: anchor }, '*');\n    } else if (anchor) {\n      const el = document.getElementById(anchor);\n      if (el) el.scrollIntoView({ behavior: 'smooth' });\n      else window.parent.postMessage({ action: 'bookGo', anchorId: anchor }, '*');\n    }\n  });\n\n  document.addEventListener('keydown', e => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Escape'].includes(e.key)) {\n      window.parent.postMessage({ action: 'keypress', key: e.key }, '*');\n    }\n  });\n\n  // Scroll reporting (debounced 500 ms — prevents hundreds of localStorage writes per second\n  // on long chapters; the shell saves the ratio on each scrollReport message).\n  let _scrollTimer;\n  window.addEventListener('scroll', () => {\n    clearTimeout(_scrollTimer);\n    _scrollTimer = setTimeout(() => {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 10) {\n        window.parent.postMessage({ action: 'scrollReport', ratio: window.scrollY / maxY }, '*');\n      }\n    }, 500);\n  }, { passive: true });\n\n  // IntersectionObserver for lazy images\n  const lazyImages = document.querySelectorAll('img[data-src]');\n  if (lazyImages.length > 0) {\n    const imgObserver = new IntersectionObserver((entries, obs) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const img = entry.target;\n          const assetKey = img.getAttribute('data-src');\n          if (assetKey) {\n            window.parent.postMessage({ action: 'requestAsset', key: assetKey }, '*');\n          }\n          obs.unobserve(img);\n        }\n      });\n    }, { rootMargin: '200px' });\n    lazyImages.forEach(img => imgObserver.observe(img));\n  }\n\n  // Handle messages from shell\n  window.addEventListener('message', e => {\n    const data = e.data;\n    if (!data) return;\n\n    if (data.action === 'setTheme') {\n      document.documentElement.setAttribute('data-theme', data.theme);\n    } \n    else if (data.action === 'provideAsset') {\n      document.querySelectorAll('img[data-src]').forEach(img => {\n        if (img.getAttribute('data-src') === data.key) {\n          img.src = data.dataUri;\n          img.removeAttribute('data-src');\n        }\n      });\n      // Resolve pending data-href download if triggered by click\n      if (window._pendingHrefKey === data.key) {\n        window._pendingHrefKey = null;\n        const a = document.createElement('a');\n        a.href = data.dataUri;\n        a.download = data.key.replace(/^asset_[0-9a-f]+_/, '');\n        document.body.appendChild(a);\n        a.click();\n        document.body.removeChild(a);\n      }\n    }\n    else if (data.action === 'setScrollRatio') {\n      const maxY = document.body.scrollHeight - window.innerHeight;\n      if (maxY > 0 && data.ratio > 0.005) {\n        window.scrollTo({ top: data.ratio * maxY, behavior: 'instant' });\n      }\n    }\n    else if (data.action === 'scrollToAnchor') {\n      const el = document.getElementById(data.anchorId);\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n    else if (data.action === 'highlightSearch') {\n      // 1. Clear previous marks and normalize\n      const marks = document.querySelectorAll('mark.search-hit');\n      marks.forEach(m => {\n        const parent = m.parentNode;\n        parent.replaceChild(document.createTextNode(m.textContent), m);\n        parent.normalize();\n      });\n      window.searchHits = [];\n      window.currentSearchHit = -1;\n\n      if (!data.query) return;\n      const queryWords = data.query.toLowerCase()\n        .replace(/[^\\p{L}\\p{N}\\s]/gu, ' ')\n        .split(/\\s+/)\n        .filter(w => w.length > 1);\n      if (queryWords.length === 0) return;\n\n      // 2. Build virtual text buffer with DOM mapping\n      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n        acceptNode: n => {\n          const p = n.parentNode;\n          if (p.nodeName === 'SCRIPT' || p.nodeName === 'STYLE' || p.nodeName === 'MARK') return NodeFilter.FILTER_REJECT;\n          return NodeFilter.FILTER_ACCEPT;\n        }\n      });\n\n      let fullText = '';\n      const mappings = []; // { start, end, node }\n      let node;\n      while ((node = walker.nextNode())) {\n        const val = node.nodeValue;\n        mappings.push({ start: fullText.length, end: fullText.length + val.length, node });\n        fullText += val;\n      }\n\n      // 3. Search in virtual buffer\n      const lower = fullText.toLowerCase();\n      const rangesToMark = [];\n      queryWords.forEach(query => {\n        let pos = 0;\n        while ((pos = lower.indexOf(query, pos)) !== -1) {\n          rangesToMark.push({ start: pos, end: pos + query.length });\n          pos += query.length;\n        }\n      });\n      \n      rangesToMark.sort((a, b) => a.start - b.start);\n      const merged = [];\n      for (const r of rangesToMark) {\n        if (!merged.length) {\n          merged.push(r);\n        } else {\n          const last = merged[merged.length - 1];\n          if (r.start <= last.end) {\n            last.end = Math.max(last.end, r.end);\n          } else {\n            merged.push(r);\n          }\n        }\n      }\n\n      // 4. Map ranges back to DOM and wrap in <mark>\n      // Process backwards to avoid offset shifting issues\n      for (let i = merged.length - 1; i >= 0; i--) {\n        const { start, end } = merged[i];\n        const matchNodes = mappings.filter(m => m.start < end && m.end > start);\n        if (!matchNodes.length) continue;\n\n        matchNodes.forEach(m => {\n          const nodeStart = Math.max(0, start - m.start);\n          const nodeEnd = Math.min(m.node.length, end - m.start);\n          if (nodeStart >= nodeEnd) return;\n\n          try {\n            const range = document.createRange();\n            range.setStart(m.node, nodeStart);\n            range.setEnd(m.node, nodeEnd);\n            const mark = document.createElement('mark');\n            mark.className = 'search-hit';\n            mark.style.background = 'var(--acc)';\n            mark.style.color = 'var(--bg)';\n            range.surroundContents(mark);\n            window.searchHits.unshift(mark);\n          } catch(e) {}\n        });\n      }\n\n      if (window.searchHits.length > 0) {\n        window.currentSearchHit = 0;\n        window.searchHits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });\n        window.parent.postMessage({ action: 'searchHitsFound', count: window.searchHits.length }, '*');\n      }\n    }\n    else if (data.action === 'nextSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit + 1) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n    else if (data.action === 'prevSearchHit') {\n      if (!window.searchHits || window.searchHits.length === 0) return;\n      window.currentSearchHit = (window.currentSearchHit - 1 + window.searchHits.length) % window.searchHits.length;\n      window.searchHits[window.currentSearchHit].scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  });\n\n  // Ready signal\n  window.parent.postMessage({ action: 'guestReady' }, '*');\n})();\n<\/script></body>\n</html>","<!DOCTYPE html>\n<html lang=\"ru\" dir=\"ltr\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n/* === SHARED THEME === */\n/* === V4 UNIVERSAL HIGH-CONTRAST THEME === */\r\n:root {\r\n  --bg: #ffffff;\r\n  --bg-deep: #f8fafc;\r\n  --txt: #0f172a;\r\n  --acc: #1d4ed8;\r\n  --acc-soft: #eff6ff;\r\n  --border: #cbd5e1;\r\n  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);\r\n  --muted: #64748b;\r\n  --sidebar-w: 300px;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\n\r\nbody { \r\n  font-family: 'Inter', system-ui, -apple-system, sans-serif; \r\n  color: var(--txt); \r\n  background: var(--bg); \r\n  line-height: 1.6; \r\n  margin: 0; \r\n  overflow: hidden; /* App mode */\r\n}\r\n\r\n/* Typography inherited by chapters */\r\n.chapter-content h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }\r\n.chapter-content h2 { font-size: 1.75rem; font-weight: 800; margin-top: 2.5rem; border-bottom: 2px solid var(--acc-soft); padding-bottom: 0.5rem; }\r\n.chapter-content .lead { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }\r\n.chapter-content .kicker { font-weight: 800; text-transform: uppercase; color: var(--acc); font-size: 0.8rem; margin-bottom: 0.5rem; }\r\n\r\n/* Components */\r\n.callout { background: var(--acc-soft); border-left: 6px solid var(--acc); padding: 1.5rem; marg
